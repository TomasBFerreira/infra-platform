---
- name: Configure worker node
  hosts: all
  gather_facts: true

  tasks:
    # ── System prerequisites ─────────────────────────────────────────────────

    - name: Install prerequisites
      apt:
        name:
          - curl
          - apt-transport-https
          - ca-certificates
          - open-iscsi      # required by k3s for some storage backends
          - nfs-common      # required for NFS PersistentVolumes
          - qemu-guest-agent
        state: present
        update_cache: yes

    - name: Enable and start qemu-guest-agent
      systemd:
        name: qemu-guest-agent
        enabled: yes
        state: started

    # ── k3s ─────────────────────────────────────────────────────────────────
    # Single-node install: server + embedded agent on the same VM.
    # Installs to /usr/local/bin/k3s, systemd unit: k3s.service.
    # Kubeconfig written to /etc/rancher/k3s/k3s.yaml (root-only by default).

    - name: Install k3s
      shell: |
        curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s node to be Ready
      command: k3s kubectl get nodes
      register: k3s_nodes
      retries: 12
      delay: 10
      until: k3s_nodes.rc == 0 and 'Ready' in k3s_nodes.stdout

    - name: Ensure k3s is enabled and running
      systemd:
        name: k3s
        enabled: yes
        state: started

    # ── Standard users ───────────────────────────────────────────────────────
    # appadm  — service/app owner (owns k3s workloads, files, etc.)
    # tomas   — admin user for interactive access (sudo)

    - name: Ensure appadm user exists
      user:
        name: appadm
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Ensure tomas user exists
      user:
        name: tomas
        shell: /bin/bash
        create_home: yes
        groups: sudo
        append: yes
        state: present

    # ── Kubeconfig (copy for tomas admin user) ────────────────────────────────

    - name: Create .kube directory for tomas
      file:
        path: /home/tomas/.kube
        state: directory
        mode: '0700'
        owner: tomas
        group: tomas

    - name: Copy kubeconfig for tomas
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/tomas/.kube/config
        remote_src: yes
        owner: tomas
        group: tomas
        mode: '0600'

    # ── Verify ───────────────────────────────────────────────────────────────

    - name: Show node status
      command: k3s kubectl get nodes -o wide
      register: node_status
      changed_when: false

    - name: Print node status
      debug:
        msg: "{{ node_status.stdout }}"

    # ── Rancher registration (optional) ──────────────────────────────────────
    # Imports this k3s cluster into the env's Rancher instance as a downstream
    # managed cluster.  Skipped if rancher_bootstrap_password is not provided
    # (i.e. Rancher has not been deployed yet for this env).
    #
    # DNS strategy: the cattle-cluster-agent pods must reach Rancher by hostname
    # (the TLS cert SAN uses the hostname).  We add the Rancher IP→hostname
    # mapping to both /etc/hosts (for node-level processes) and to the CoreDNS
    # NodeHosts ConfigMap (for in-cluster pods), then restart CoreDNS.

    - name: Register cluster with Rancher
      when: rancher_bootstrap_password is defined and rancher_bootstrap_password | length > 0
      block:
        - name: Add Rancher hostname to /etc/hosts
          lineinfile:
            path: /etc/hosts
            line: "{{ rancher_ip }} {{ rancher_hostname }}"
            state: present

        - name: Patch CoreDNS NodeHosts ConfigMap for Rancher hostname resolution
          environment:
            RANCHER_IP: "{{ rancher_ip }}"
            RANCHER_HOST: "{{ rancher_hostname }}"
          shell: |
            ENTRY="$RANCHER_IP $RANCHER_HOST"
            if k3s kubectl get configmap coredns -n kube-system \
                -o jsonpath="{.data.NodeHosts}" 2>/dev/null | grep -qF "$RANCHER_HOST"; then
              echo "Rancher hostname already in CoreDNS NodeHosts"
            else
              CURRENT=$(k3s kubectl get configmap coredns -n kube-system \
                -o jsonpath="{.data.NodeHosts}" 2>/dev/null || echo "")
              MERGED_ESC=$(printf '%s\n%s' "$CURRENT" "$ENTRY" \
                | python3 -c "import sys; s=sys.stdin.read(); print(s.replace('\\\\','\\\\\\\\').replace('\"','\\\\\"').replace(chr(10),'\\\\n'), end='')")
              k3s kubectl patch configmap coredns -n kube-system \
                --type=merge -p "{\"data\":{\"NodeHosts\":\"${MERGED_ESC}\"}}"
              echo "Added $ENTRY to CoreDNS NodeHosts"
            fi
          changed_when: false

        - name: Restart CoreDNS to apply NodeHosts change
          shell: k3s kubectl rollout restart deployment/coredns -n kube-system
          changed_when: false

        - name: Wait for CoreDNS to be ready
          shell: k3s kubectl rollout status deployment/coredns -n kube-system --timeout=60s
          changed_when: false

        - name: Write Rancher registration script
          copy:
            dest: /tmp/register_rancher.sh
            mode: "0700"
            content: |
              #!/bin/bash
              set -e
              # All variables injected via environment by the calling task.

              LOGIN_RESP=$(curl -sk -H "Host: $RANCHER_HOST" \
                -X POST "https://$RANCHER_IP/v3-public/localProviders/local?action=login" \
                -H 'Content-Type: application/json' \
                -d '{"username":"admin","password":"'"$RANCHER_PASS"'","ttl":60000}')
              RANCHER_TOKEN=$(echo "$LOGIN_RESP" | python3 -c '
              import sys, json
              print(json.load(sys.stdin)["token"])
              ')

              MUST_CHANGE=$(echo "$LOGIN_RESP" | python3 -c '
              import sys, json
              print(json.load(sys.stdin).get("mustChangePassword", False))
              ' 2>/dev/null || echo "False")
              if [ "$MUST_CHANGE" = "True" ]; then
                USER_ID=$(echo "$LOGIN_RESP" | python3 -c '
              import sys, json
              print(json.load(sys.stdin)["userId"])
              ')
                curl -sk -H "Host: $RANCHER_HOST" \
                  -X POST "https://$RANCHER_IP/v3/users/$USER_ID?action=setpassword" \
                  -H "Authorization: Bearer $RANCHER_TOKEN" \
                  -H 'Content-Type: application/json' \
                  -d '{"newPassword":"'"$RANCHER_PASS"'"}' > /dev/null
              fi

              EXISTING=$(curl -sk -H "Host: $RANCHER_HOST" \
                -H "Authorization: Bearer $RANCHER_TOKEN" \
                "https://$RANCHER_IP/v3/clusters?name=$VM_HOST" \
                | python3 -c '
              import sys, json
              d = json.load(sys.stdin)
              items = d.get("data", [])
              print(items[0]["id"] if items else "")
              ' 2>/dev/null || echo "")

              if [ -n "$EXISTING" ]; then
                echo "Cluster already registered in Rancher (ID: $EXISTING)"
                CLUSTER_ID="$EXISTING"
              else
                CLUSTER_ID=$(curl -sk --fail-with-body -H "Host: $RANCHER_HOST" \
                  -X POST "https://$RANCHER_IP/v3/clusters" \
                  -H "Authorization: Bearer $RANCHER_TOKEN" \
                  -H 'Content-Type: application/json' \
                  -d '{"type":"cluster","name":"'"$VM_HOST"'"}' \
                  | python3 -c '
              import sys, json
              print(json.load(sys.stdin)["id"])
              ')
                echo "Created cluster in Rancher (ID: $CLUSTER_ID)"
              fi

              MANIFEST_URL=""
              for i in $(seq 1 12); do
                MANIFEST_URL=$(curl -sk -H "Host: $RANCHER_HOST" \
                  -H "Authorization: Bearer $RANCHER_TOKEN" \
                  "https://$RANCHER_IP/v3/clusterregistrationtokens?clusterId=$CLUSTER_ID" \
                  | python3 -c '
              import sys, json
              d = json.load(sys.stdin)
              items = d.get("data", [])
              print(items[0]["manifestUrl"] if items else "")
              ' 2>/dev/null || echo "")
                [ -n "$MANIFEST_URL" ] && break
                echo "Waiting for cluster registration token (attempt $i/12)..."
                sleep 5
              done

              if [ -z "$MANIFEST_URL" ]; then
                echo "ERROR: no cluster registration token after 60s"
                exit 1
              fi

              MANIFEST_URL_BY_IP=$(echo "$MANIFEST_URL" | sed "s|https://$RANCHER_HOST|https://$RANCHER_IP|g")
              echo "Applying registration manifest: $MANIFEST_URL_BY_IP"
              curl -sk "$MANIFEST_URL_BY_IP" \
                -H "Host: $RANCHER_HOST" \
                | k3s kubectl apply -f -
              echo "Rancher cluster agent manifest applied"

        - name: Login to Rancher and register cluster
          environment:
            RANCHER_IP: "{{ rancher_ip }}"
            RANCHER_HOST: "{{ rancher_hostname }}"
            RANCHER_PASS: "{{ rancher_bootstrap_password }}"
            VM_HOST: "{{ vm_hostname }}"
          command: /tmp/register_rancher.sh

        - name: Remove Rancher registration script
          file:
            path: /tmp/register_rancher.sh
            state: absent

        - name: Show Rancher registration result
          debug:
            msg: "Worker node '{{ vm_hostname }}' registered with Rancher at {{ rancher_ip }} ({{ rancher_hostname }})"
