- name: Add Tailscale GPG key
  shell: |
    curl -fsSL https://pkgs.tailscale.com/stable/debian/bookworm.noarmor.gpg \
      -o /usr/share/keyrings/tailscale-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/tailscale-archive-keyring.gpg

- name: Add Tailscale APT repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/debian bookworm main"
    state: present
    filename: tailscale

- name: Install Tailscale
  apt:
    name: tailscale
    state: present
    update_cache: yes

- name: Enable IP forwarding (IPv4)
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes

- name: Enable IP forwarding (IPv6)
  sysctl:
    name: net.ipv6.conf.all.forwarding
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes

- name: Check /dev/net/tun exists
  stat:
    path: /dev/net/tun
  register: tun_stat

- name: Fail if /dev/net/tun is missing
  fail:
    msg: "/dev/net/tun is missing. Enable tun device passthrough in the Proxmox LXC config (features: nesting=1)."
  when: not tun_stat.stat.exists

- name: Install iptables-persistent (for NAT rules across reboots)
  apt:
    name: iptables-persistent
    state: present
    update_cache: no

- name: Enable and start tailscaled
  systemd:
    name: tailscaled
    enabled: yes
    state: started

- name: Check if Tailscale is already connected
  command: tailscale status --json
  register: ts_status
  changed_when: false
  failed_when: false

- name: Set tailscale_connected fact
  set_fact:
    tailscale_connected: "{{ (ts_status.stdout | from_json).BackendState == 'Running' }}"
  when: ts_status.rc == 0

- name: Verify Tailscale auth key is available from Vault
  assert:
    that:
      - tailscale_authkey is defined
      - tailscale_authkey | length > 0
    fail_msg: "Tailscale auth key could not be retrieved from Vault at secret/data/tailscale:authkey"
  when: not (tailscale_skip_auth | default(false))

- name: Authenticate and configure Tailscale as subnet router
  command: >
    timeout 90
    tailscale up
    --authkey={{ tailscale_authkey }}
    --reset
    --advertise-routes={{ tailscale_subnet_routes }}
    --advertise-exit-node
    --hostname={{ tailscale_hostname }}
  register: ts_up_result
  when: not (tailscale_connected | default(false)) and not (tailscale_skip_auth | default(false))
  no_log: true

- name: Fail if Tailscale auth failed
  fail:
    msg: "tailscale up failed (rc={{ ts_up_result.rc }}) — check tailscale auth key validity and ACL policy"
  when: ts_up_result is defined and (ts_up_result.rc | default(0)) != 0

- name: Update Tailscale advertised routes (already connected node)
  command: >
    timeout 90
    tailscale up
    --advertise-routes={{ tailscale_subnet_routes }}
    --advertise-exit-node
  when: (tailscale_connected | default(false)) and not (tailscale_skip_auth | default(false))
  changed_when: false

- name: Wait for Tailscale to come online
  command: tailscale status
  register: ts_online
  retries: 10
  delay: 3
  until: ts_online.rc == 0
  changed_when: false
  when: not (tailscale_skip_auth | default(false))

- name: Allow forwarded traffic from internal subnets (FORWARD chain)
  iptables:
    chain: FORWARD
    source: "{{ item }}"
    jump: ACCEPT
    action: insert
    rule_num: 1
    state: present
  loop:
    - 192.168.10.0/24
    - 192.168.20.0/24
    - 192.168.30.0/24
    - 192.168.50.0/24

- name: Allow established/related return traffic through FORWARD chain
  iptables:
    chain: FORWARD
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT
    action: insert
    rule_num: 1
    state: present

- name: Add NAT masquerade rules for internal subnets
  iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ item }}"
    jump: MASQUERADE
    state: present
  loop:
    - 192.168.10.0/24
    - 192.168.20.0/24
    - 192.168.30.0/24
    - 192.168.50.0/24

- name: Persist iptables rules across reboots
  shell: iptables-save > /etc/iptables/rules.v4
  changed_when: true
