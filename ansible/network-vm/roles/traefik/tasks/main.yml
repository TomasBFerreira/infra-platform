- name: Install Docker prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes

- name: Add Docker GPG key
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker apt repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Enable and start Docker
  systemd:
    name: docker
    enabled: yes
    state: started

- name: Create Traefik directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/traefik/config/dynamic
    - /opt/traefik/data/logs

- name: Create ACME cert storage directory (mode 0700 — Traefik requires strict permissions)
  file:
    path: /opt/traefik/data/acme
    state: directory
    mode: '0700'

- name: Copy Traefik main config
  copy:
    src: traefik.yml
    dest: /opt/traefik/config/traefik.yml
    mode: '0644'
  register: traefik_static_config

- name: Copy OTel Collector sidecar config
  copy:
    src: otelcol-lxc.yml
    dest: /opt/traefik/config/otelcol-lxc.yml
    mode: '0644'

- name: Copy Traefik dynamic config from traefik-gitops (canonical source)
  # The runner always has traefik-gitops at /app/traefik-gitops. The pipeline
  # pulls latest before running Ansible so this is always up-to-date.
  copy:
    src: /app/traefik-gitops/config/dynamic/services.yml
    dest: /opt/traefik/config/dynamic/services.yml
    mode: '0644'

- name: Copy docker-compose.yml
  copy:
    src: docker-compose.yml
    dest: /opt/traefik/docker-compose.yml
    mode: '0644'

- name: Read Cloudflare DNS API token from Vault
  command: vault kv get -field=dns_api_token secret/cloudflare
  register: cf_dns_token_result
  # Allow failure — ACME cert won't issue until the token is stored, but Traefik still starts fine.
  failed_when: false
  no_log: true

- name: Write .env for docker-compose (OTel + deploy env + CF DNS token)
  copy:
    dest: /opt/traefik/.env
    mode: '0640'
    content: |
      OTEL_COLLECTOR_ENDPOINT={{ otel_collector_endpoint | default('') }}
      DEPLOY_ENV={{ deploy_env | default('dev') }}
      CF_DNS_API_TOKEN={{ cf_dns_token_result.stdout | default('') }}

- name: Deploy Traefik
  command: docker compose up -d
  args:
    chdir: /opt/traefik

- name: Restart Traefik if static config changed (required to pick up certresolver/entrypoints)
  command: docker compose restart traefik
  args:
    chdir: /opt/traefik
  when: traefik_static_config.changed
