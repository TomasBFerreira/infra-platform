global:
  checkNewVersion: true
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    forwardedHeaders:
      trustedIPs:
        - "127.0.0.1/32"
        - "::1/128"
        - "192.168.0.0/16"
        - "100.64.0.0/10"
  websecure:
    address: ":443"
    forwardedHeaders:
      # Trust X-Forwarded-Proto from Tailscale and internal subnets
      trustedIPs:
        - "127.0.0.1/32"
        - "::1/128"
        - "192.168.10.0/24"
        - "192.168.20.0/24"
        - "192.168.30.0/24"
        - "192.168.50.0/24"
        - "100.64.0.0/10"
    # Default TLS for all routers on websecure — uses per-domain certs from acme.json.
    # Routers on [web, websecure] get HTTPS without needing per-router tls: blocks.
    http:
      tls:
        certResolver: letsencrypt

  # Internal-only entrypoints for Authentik forwardAuth.
  # Routing auth checks via loopback prevents external headers from corrupting X-Forwarded-Host.
  internal-dev:
    address: "127.0.0.1:9099"
    forwardedHeaders:
      trustedIPs:
        - "127.0.0.1/32"
        - "::1/128"

  internal-prod:
    address: "127.0.0.1:9098"
    forwardedHeaders:
      trustedIPs:
        - "127.0.0.1/32"
        - "::1/128"

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@databaes.net
      storage: /data/acme/acme.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"

# OTLP metrics and traces to the central monitoring LXC.
# Note: Traefik's static YAML does NOT expand ${VAR} env vars (Go yaml parser limitation),
# so the collector endpoint is hardcoded here. For env-specific configs, use Ansible
# to template this file per environment.
metrics:
  otlp:
    grpc:
      endpoint: "192.168.20.96:4317"
      insecure: true

tracing:
  otlp:
    grpc:
      endpoint: "192.168.20.96:4317"
      insecure: true

log:
  level: INFO

accessLog: {}

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true
