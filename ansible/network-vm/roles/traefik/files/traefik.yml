global:
  checkNewVersion: true
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"

log:
  level: INFO

accessLog:
  format: json

# OTel metrics + tracing — endpoint injected at deploy time via OTEL_COLLECTOR_ENDPOINT env var.
# Set by Ansible from secret/monitoring/<env>/active-slot in Vault.
# When unset Traefik starts fine; the OTLP sections are simply inactive.
metrics:
  otlp:
    grpc:
      endpoint: "${OTEL_COLLECTOR_ENDPOINT}"
      insecure: true

tracing:
  otlp:
    grpc:
      endpoint: "${OTEL_COLLECTOR_ENDPOINT}"
      insecure: true

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true
