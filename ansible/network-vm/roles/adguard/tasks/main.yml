- name: Create AdGuard Home directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ adguard_data_path }}"
    - /opt/adguardhome

- name: Download AdGuard Home binary
  unarchive:
    src: https://github.com/AdguardTeam/AdGuardHome/releases/latest/download/AdGuardHome_linux_amd64.tar.gz
    dest: /opt/adguardhome
    remote_src: yes
    creates: /opt/adguardhome/AdGuardHome/AdGuardHome

- name: Install AdGuard Home as a service
  command: /opt/adguardhome/AdGuardHome/AdGuardHome -s install
  args:
    creates: /etc/systemd/system/AdGuardHome.service

- name: Ensure AdGuard Home is running
  systemd:
    name: AdGuardHome
    enabled: yes
    state: started

- name: Wait for AdGuard Home to be ready
  uri:
    url: "http://127.0.0.1:{{ adguard_port }}/control/status"
    method: GET
    # 200 = running, no auth required (dev/test mode)
    # 302 = first-run setup wizard redirect
    # 401 = already configured, auth required — also means healthy
    status_code: [200, 302, 401]
    follow_redirects: none
  register: adguard_status
  retries: 10
  delay: 3
  until: adguard_status.status in [200, 302, 401]

- name: Run AdGuard Home initial setup
  uri:
    url: "http://127.0.0.1:{{ adguard_port }}/control/install/configure"
    method: POST
    body_format: json
    body:
      web:
        ip: "0.0.0.0"
        port: "{{ adguard_port }}"
      dns:
        ip: "0.0.0.0"
        port: 53
      username: "{{ adguard_username }}"
      password: "{{ adguard_password }}"
    status_code: 200
  when: adguard_status.status == 302 and adguard_username != '' and adguard_password != ''
  no_log: true

- name: Verify AdGuard Home is healthy
  uri:
    url: "http://127.0.0.1:{{ adguard_port }}/control/status"
    method: GET
    url_username: "{{ adguard_username }}"
    url_password: "{{ adguard_password }}"
    force_basic_auth: yes
    status_code: 200
  register: adguard_health
  retries: 5
  delay: 3
  until: adguard_health.status == 200
  when: adguard_username != '' and adguard_password != ''
  no_log: true

# Register hostnames as DNS rewrites pointing to this network-vm's Tailscale IP.
# Using the Tailscale IP (not the LAN IP) sidesteps an asymmetric-source-address
# issue where a Tailscale client addressing the VM by its LAN IP gets replies
# sourced from tailscale0's 100.x address, which the client then discards.
# Traefik listens on 0.0.0.0:443 so it accepts connections on either IP.
- name: Resolve this network-vm's Tailscale IPv4
  command: tailscale ip -4
  register: ts_ipv4
  changed_when: false

- name: Resolve this network-vm's Tailscale IPv6
  command: tailscale ip -6
  register: ts_ipv6
  changed_when: false

- name: Set adguard_rewrite_answer_ip{,_v6} to the Tailscale IPs
  set_fact:
    adguard_rewrite_answer_ip:    "{{ ts_ipv4.stdout_lines[0] }}"
    adguard_rewrite_answer_ip_v6: "{{ ts_ipv6.stdout_lines[0] }}"

- name: Fetch current AdGuard rewrites
  uri:
    url: "http://127.0.0.1:{{ adguard_port }}/control/rewrite/list"
    method: GET
    url_username: "{{ adguard_username }}"
    url_password: "{{ adguard_password }}"
    force_basic_auth: yes
    return_content: yes
  register: adguard_rewrite_list
  when: adguard_username != '' and adguard_password != ''
  no_log: true

- name: Set managed domains list (ALL envs, so upsert is comprehensive)
  # Every netvm's AdGuard registers every env's hostnames, not just its own.
  # Tailscale split-DNS for databaes.net fans queries out to every network-vm's
  # AdGuard in parallel and the first answer wins — if any resolver doesn't
  # know a hostname, it falls through to public Cloudflare and browsers can
  # race onto a dead CF record. Registering universally guarantees a correct
  # answer regardless of which resolver wins.
  set_fact:
    adguard_managed_domains: >-
      {{ (adguard_dev_rewrites + adguard_qa_rewrites + adguard_prod_rewrites)
         | map(attribute='domain') | list }}

- name: Delete stale AdGuard rewrites for managed domains (clears duplicates + old LAN-IP entries)
  uri:
    url: "http://127.0.0.1:{{ adguard_port }}/control/rewrite/delete"
    method: POST
    body_format: json
    body:
      domain: "{{ item.domain }}"
      answer: "{{ item.answer }}"
    url_username: "{{ adguard_username }}"
    url_password: "{{ adguard_password }}"
    force_basic_auth: yes
    status_code: [200, 400, 404]
  loop: "{{ adguard_rewrite_list.json | default([]) | selectattr('domain', 'in', adguard_managed_domains) | list }}"
  when: adguard_rewrite_list is defined and adguard_rewrite_list.json is defined
  no_log: true

- name: Build cross-env upsert batch (A records — points each env's hostnames at that env's TS IPv4)
  set_fact:
    adguard_cross_env_upserts: >-
      {{
        (adguard_dev_rewrites  | map('combine', {'answer': adguard_env_tailscale_ips.dev})  | list)
        + (adguard_qa_rewrites   | map('combine', {'answer': adguard_env_tailscale_ips.qa})   | list)
        + (adguard_prod_rewrites | map('combine', {'answer': adguard_env_tailscale_ips.prod}) | list)
      }}

- name: Upsert AdGuard DNS A rewrites for ALL envs' hostnames
  # Each entry maps `domain` to the correct env's Tailscale IPv4. Running this
  # on every netvm means Tailscale split-DNS lookups succeed no matter which
  # resolver answers first.
  uri:
    url: "http://127.0.0.1:{{ adguard_port }}/control/rewrite/add"
    method: POST
    body_format: json
    body:
      domain: "{{ item.domain }}"
      answer: "{{ item.answer }}"
    url_username: "{{ adguard_username }}"
    url_password: "{{ adguard_password }}"
    force_basic_auth: yes
    status_code: [200, 409]
  loop: "{{ adguard_cross_env_upserts }}"
  when: adguard_username != '' and adguard_password != ''
  no_log: true

# AAAA records still use this netvm's own TS IPv6. Happy-Eyeballs racing
# between A and AAAA only matters when the browser is talking to this netvm's
# IP (i.e. the env this role is currently running against). Cross-env AAAA
# would require one extra TS IPv6 per env in vars — not worth the footprint
# since v4 alone is enough for correct routing.
- name: Upsert AdGuard DNS AAAA rewrites for THIS env's hostnames (Happy-Eyeballs safety net)
  uri:
    url: "http://127.0.0.1:{{ adguard_port }}/control/rewrite/add"
    method: POST
    body_format: json
    body:
      domain: "{{ item.domain }}"
      answer: "{{ adguard_rewrite_answer_ip_v6 }}"
    url_username: "{{ adguard_username }}"
    url_password: "{{ adguard_password }}"
    force_basic_auth: yes
    status_code: [200, 409]
  loop: >-
    {{ adguard_dev_rewrites  if deploy_env == 'dev'
       else (adguard_qa_rewrites   if deploy_env == 'qa'
       else (adguard_prod_rewrites if deploy_env == 'prod'
       else [])) }}
  when: adguard_username != '' and adguard_password != ''
  no_log: true
