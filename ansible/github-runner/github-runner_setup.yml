---
- name: GitHub Actions Runner Setup
  hosts: all
  become: yes

  vars:
    runner_version: "2.321.0"
    runner_user: root
    # github_repo and runner_env are passed as extra vars from the pipeline.
    # Format: github_repo=owner/repo  runner_env=dev|prod
    #
    # Each repo gets its own isolated directory and systemd service so multiple
    # repos can share the same runner LXC without conflicting.
    repo_slug: "{{ github_repo | regex_replace('/', '-') | lower }}"
    runner_home: "/opt/github-runners/{{ repo_slug }}"

  tasks:
    - name: Remove conflicting Docker apt source entries
      # If Docker was installed via the official script (/etc/apt/keyrings/docker.asc),
      # any stale line using our old keyring path causes apt update to fail.
      shell: |
        if [ -f /etc/apt/sources.list.d/docker.list ]; then
          grep -v "docker-archive-keyring.gpg" /etc/apt/sources.list.d/docker.list \
            > /tmp/docker.list.clean
          mv /tmp/docker.list.clean /etc/apt/sources.list.d/docker.list
        fi
      changed_when: false

    - name: Add static route to dev service subnet via benedict
      blockinfile:
        path: /etc/network/interfaces
        marker: "# {mark} ANSIBLE MANAGED — dev subnet route"
        block: |
          up ip route add 192.168.20.0/24 via 192.168.50.4 || true
      notify: Apply network routes

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install dependencies
      apt:
        name:
          - curl
          - tar
          - git
          - jq
          - ca-certificates
          - gnupg
          - lsb-release
          - sudo
          - unzip
          - python3-pip
          - python3-venv
          - python3-full
          - ansible
          - rsync
        state: present

    # ── Vault CLI ────────────────────────────────────────────────────────────
    # Required so workflow steps can call `vault kv get` at runtime.

    - name: Add HashiCorp GPG key
      shell: |
        curl -fsSL https://apt.releases.hashicorp.com/gpg \
          | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

    - name: Add HashiCorp apt repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
        state: present
        filename: hashicorp

    - name: Install Vault CLI
      apt:
        name: vault
        state: present
        update_cache: yes

    # ── GitHub CLI ───────────────────────────────────────────────────────────
    # Required so Ansible playbooks can call `gh secret set` at runtime
    # (e.g. vault-ct pipeline updates VAULT_ADDR/VAULT_TOKEN after deploy).

    - name: Add GitHub CLI GPG key
      shell: |
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
          | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/githubcli-archive-keyring.gpg

    - name: Add GitHub CLI apt repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
        state: present
        filename: github-cli

    - name: Install GitHub CLI
      apt:
        name: gh
        state: present
        update_cache: yes

    # ── SSH key for Proxmox access ────────────────────────────────────────────
    # Pipeline pre-flight steps SSH to Proxmox (192.168.50.x) as root to run
    # pct commands. The runner root account needs a key authorized on Proxmox.

    - name: Fetch Proxmox access SSH private key from vault
      delegate_to: localhost
      become: no
      shell: |
        vault kv get -field=private_key secret/ssh_keys/github_runner_proxmox_access \
          | python3 -c "
        import sys, textwrap
        raw = sys.stdin.read().strip().replace('\r', '')
        B = '-----BEGIN OPENSSH PRIVATE KEY-----'
        E = '-----END OPENSSH PRIVATE KEY-----'
        body = raw[raw.find(B)+len(B):raw.find(E)].replace(' ','').replace('\n','').replace('\t','')
        print(B); print(textwrap.fill(body, width=70)); print(E)
        "
      environment:
        VAULT_ADDR: "{{ lookup('env', 'VAULT_BOOTSTRAP_ADDR') }}"
        VAULT_TOKEN: "{{ lookup('env', 'VAULT_DEV_TOKEN') }}"
      register: proxmox_ssh_privkey
      no_log: true

    - name: Install Proxmox access SSH private key for root
      copy:
        content: "{{ proxmox_ssh_privkey.stdout }}\n"
        dest: /root/.ssh/id_ed25519
        owner: root
        group: root
        mode: '0600'

    - name: Fetch Proxmox access SSH public key from vault
      delegate_to: localhost
      become: no
      shell: vault kv get -field=public_key secret/ssh_keys/github_runner_proxmox_access
      environment:
        VAULT_ADDR: "{{ lookup('env', 'VAULT_BOOTSTRAP_ADDR') }}"
        VAULT_TOKEN: "{{ lookup('env', 'VAULT_DEV_TOKEN') }}"
      register: proxmox_ssh_pubkey

    - name: Install Proxmox access SSH public key for root
      copy:
        content: "{{ proxmox_ssh_pubkey.stdout }}\n"
        dest: /root/.ssh/id_ed25519.pub
        owner: root
        group: root
        mode: '0644'

    # ── SSH access for register-runner.yml ───────────────────────────────────
    # The register-runner.yml workflow SSHs into this LXC as root using the
    # github_runner_worker key to deploy additional runner registrations.
    # The public key must be in root's authorized_keys for that to work.

    - name: Fetch github_runner_worker public key from vault
      delegate_to: localhost
      become: no
      shell: |
        PRIVATE_KEY=$(vault kv get -field=private_key secret/ssh_keys/github_runner_worker \
          | python3 -c "
        import sys, textwrap
        raw = sys.stdin.read().strip().replace('\r', '')
        B = '-----BEGIN OPENSSH PRIVATE KEY-----'
        E = '-----END OPENSSH PRIVATE KEY-----'
        body = raw[raw.find(B)+len(B):raw.find(E)].replace(' ', '').replace('\n', '').replace('\t', '')
        print(B); print(textwrap.fill(body, width=70)); print(E)
        ")
        echo "$PRIVATE_KEY" > /tmp/runner_worker_key
        chmod 600 /tmp/runner_worker_key
        ssh-keygen -y -f /tmp/runner_worker_key
        rm -f /tmp/runner_worker_key
      environment:
        VAULT_ADDR: "{{ lookup('env', 'VAULT_BOOTSTRAP_ADDR') }}"
        VAULT_TOKEN: "{{ lookup('env', 'VAULT_DEV_TOKEN') }}"
      register: runner_worker_pubkey
      no_log: true

    - name: Ensure root .ssh directory exists
      file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Add github_runner_worker public key to root authorized_keys
      authorized_key:
        user: root
        key: "{{ runner_worker_pubkey.stdout }}"
        state: present

    # ── Standard users ───────────────────────────────────────────────────────
    # appadm  — service/app owner (runs the runner process, owns all files)
    # tomas   — admin user for interactive access (sudo)

    - name: Ensure appadm user exists
      user:
        name: appadm
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Ensure tomas user exists
      user:
        name: tomas
        shell: /bin/bash
        create_home: yes
        groups: sudo
        append: yes
        state: present

    - name: Allow appadm passwordless sudo for package management
      copy:
        dest: /etc/sudoers.d/appadm-apt
        content: "appadm ALL=(ALL) NOPASSWD: /usr/bin/apt-get, /usr/bin/apt\n"
        mode: '0440'

    # ── Docker ───────────────────────────────────────────────────────────────
    # Required for container-based workflow steps and the run-terraform.sh
    # docker-compose wrapper used by all existing pipelines.

    - name: Check if Docker is already installed
      command: docker --version
      register: docker_installed
      ignore_errors: yes
      changed_when: false

    - name: Add Docker GPG key
      shell: |
        curl -fsSL https://download.docker.com/linux/debian/gpg \
          | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/docker-archive-keyring.gpg
      when: docker_installed.rc != 0

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker
      when: docker_installed.rc != 0

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes
      when: docker_installed.rc != 0

    - name: Add appadm to docker group
      user:
        name: appadm
        groups: docker
        append: yes

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    # ── Weekly docker prune timer ─────────────────────────────────────────────
    # The env runner LXC has a 20 GB root disk; Docker images + build cache
    # accumulate from every CI run and can fill the disk within weeks. A
    # weekly prune of unused images and build cache keeps the disk healthy
    # without touching anything an active CI job depends on. See
    # docs/runbooks.md → "Env runner disk is full".

    - name: Install runner-disk-prune.service (weekly LXC disk hygiene)
      copy:
        dest: /etc/systemd/system/runner-disk-prune.service
        mode: '0644'
        content: |
          [Unit]
          Description=Prune Docker artifacts + stale runner self-update directories (LXC disk hygiene)
          Documentation=https://github.com/TomasBFerreira/infra-platform/blob/main/docs/runbooks.md

          [Service]
          Type=oneshot
          # Docker images + build cache — the original prune target.
          ExecStart=/usr/bin/docker system prune -af
          ExecStart=/usr/bin/docker builder prune -af
          # Runner self-update artifacts. Each registered runner caches the
          # next version under _work/_update/ when it tries to self-update;
          # if disk pressure aborts the update mid-way the dir stays around
          # and leaks ~600 MB per runner. Slice 6's deploy was blocked on
          # this — reclaimed ~5 GB in one sweep. The runner re-downloads on
          # the next legitimate update attempt, so this is safe.
          ExecStart=/bin/sh -c 'rm -rf /opt/github-runners/*/_work/_update'

    - name: Install runner-disk-prune.timer
      copy:
        dest: /etc/systemd/system/runner-disk-prune.timer
        mode: '0644'
        content: |
          [Unit]
          Description=Weekly LXC-disk prune (Docker + runner self-update leftovers)

          [Timer]
          # Every Sunday at 04:00 — quiet hours, not in the middle of business-day CI pushes.
          OnCalendar=Sun *-*-* 04:00:00
          Persistent=true
          RandomizedDelaySec=15min
          Unit=runner-disk-prune.service

          [Install]
          WantedBy=timers.target

    # Migration: the timer was previously called docker-prune; remove the
    # old units so we don't run two timers covering the same job.
    - name: Disable and remove legacy docker-prune.timer
      systemd:
        name: docker-prune.timer
        enabled: no
        state: stopped
      ignore_errors: yes
    - name: Remove legacy docker-prune unit files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/docker-prune.service
        - /etc/systemd/system/docker-prune.timer
        - /etc/systemd/system/timers.target.wants/docker-prune.timer

    - name: Enable and start runner-disk-prune.timer
      systemd:
        name: runner-disk-prune.timer
        enabled: yes
        state: started
        daemon_reload: yes

    # ── Nightly runner-listener restart (RSS hygiene) ─────────────────────────
    # The .NET Runner.Listener leaks slowly over long idle periods; multiple
    # per-repo listeners on one LXC add up to several GB of avoidable RSS
    # within a week. Restarting releases it; runners auto-reconnect using
    # their saved credentials, so there's no re-registration cost. Skip if
    # any runner is currently executing a job (Runner.Worker child present)
    # so we never kill an in-flight CI build. If skipped, the next night's
    # run handles it.

    - name: Install runner-restart.service
      copy:
        dest: /etc/systemd/system/runner-restart.service
        mode: '0644'
        content: |
          [Unit]
          Description=Restart GitHub Actions runner listeners to reclaim leaked RSS
          Documentation=https://github.com/TomasBFerreira/infra-platform/blob/main/docs/runbooks.md

          [Service]
          Type=oneshot
          ExecStart=/bin/bash -c 'if pgrep -f Runner.Worker >/dev/null; then echo "Skipping — at least one runner is mid-job"; exit 0; fi; systemctl restart "actions.runner.*.service"'

    - name: Install runner-restart.timer
      copy:
        dest: /etc/systemd/system/runner-restart.timer
        mode: '0644'
        content: |
          [Unit]
          Description=Nightly restart of GitHub Actions runner listeners

          [Timer]
          # 03:30 local — after the 03:00 hour where most other cron-ish jobs
          # fire, still in quiet hours. Randomised so parallel LXCs don't all
          # reconnect to GitHub in the same second.
          OnCalendar=*-*-* 03:30:00
          Persistent=true
          RandomizedDelaySec=10min
          Unit=runner-restart.service

          [Install]
          WantedBy=timers.target

    - name: Enable and start runner-restart.timer
      systemd:
        name: runner-restart.timer
        enabled: yes
        state: started
        daemon_reload: yes

    # ── Runner binary ─────────────────────────────────────────────────────────

    - name: Create runner directory
      file:
        path: "{{ runner_home }}"
        state: directory
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"
        mode: '0755'

    - name: Check if runner binary already present
      stat:
        path: "{{ runner_home }}/bin/Runner.Listener"
      register: runner_binary

    - name: Download actions-runner
      get_url:
        url: "https://github.com/actions/runner/releases/download/v{{ runner_version }}/actions-runner-linux-x64-{{ runner_version }}.tar.gz"
        dest: "/tmp/actions-runner-linux-x64-{{ runner_version }}.tar.gz"
        mode: '0644'
      when: not runner_binary.stat.exists

    - name: Extract actions-runner
      unarchive:
        src: "/tmp/actions-runner-linux-x64-{{ runner_version }}.tar.gz"
        dest: "{{ runner_home }}"
        remote_src: yes
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"
      when: not runner_binary.stat.exists

    - name: Install runner dependencies
      shell: "{{ runner_home }}/bin/installdependencies.sh"
      args:
        chdir: "{{ runner_home }}"

    # ── Runner registration ───────────────────────────────────────────────────
    # GH_PAT is injected into bootstrap vault by the pipeline before this
    # playbook runs. Ansible fetches it here so no secrets are passed on the
    # command line.

    - name: Fetch GH_PAT from bootstrap vault
      delegate_to: localhost
      become: no
      shell: |
        vault kv get -field=token secret/github-runner/gh_pat
      environment:
        VAULT_ADDR: "{{ lookup('env', 'VAULT_BOOTSTRAP_ADDR') }}"
        VAULT_TOKEN: "{{ lookup('env', 'VAULT_DEV_TOKEN') }}"
      register: gh_pat_result
      no_log: true

    - name: Get GitHub repo runner registration token
      delegate_to: localhost
      become: no
      uri:
        url: "https://api.github.com/repos/{{ github_repo }}/actions/runners/registration-token"
        method: POST
        headers:
          Authorization: "Bearer {{ gh_pat_result.stdout }}"
          Accept: "application/vnd.github+json"
          X-GitHub-Api-Version: "2022-11-28"
        status_code: [201, 401, 403, 404, 422]
      register: runner_reg_token
      no_log: true

    - name: Fail with diagnostic message if registration token request failed
      fail:
        msg: "GitHub API returned HTTP {{ runner_reg_token.status }} for repo {{ github_repo }}. Expected 201. Check GH_PAT has 'repo' scope and write access to the repo."
      when: runner_reg_token.status != 201

    - name: Stop existing runner service if running
      shell: |
        if [ -f "{{ runner_home }}/svc.sh" ]; then
          {{ runner_home }}/svc.sh stop 2>/dev/null || true
          {{ runner_home }}/svc.sh uninstall 2>/dev/null || true
        fi
      args:
        chdir: "{{ runner_home }}"
      ignore_errors: yes

    - name: Remove existing runner configuration
      become_user: "{{ runner_user }}"
      shell: |
        if [ -f "{{ runner_home }}/config.sh" ] && [ -f "{{ runner_home }}/.runner" ]; then
          RUNNER_ALLOW_RUNASROOT=1 {{ runner_home }}/config.sh remove \
            --token "{{ runner_reg_token.json.token }}" 2>/dev/null || true
        fi
      args:
        chdir: "{{ runner_home }}"
      no_log: true
      ignore_errors: yes

    - name: Configure runner
      become_user: "{{ runner_user }}"
      shell: |
        RUNNER_ALLOW_RUNASROOT=1 {{ runner_home }}/config.sh \
          --url "https://github.com/{{ github_repo }}" \
          --token "{{ runner_reg_token.json.token }}" \
          --name "github-runner-{{ runner_env }}" \
          --labels "self-hosted,linux,{{ runner_env }}" \
          --work "_work" \
          --unattended \
          --replace
      args:
        chdir: "{{ runner_home }}"
      no_log: true

    - name: Install runner as systemd service
      shell: "RUNNER_ALLOW_RUNASROOT=1 {{ runner_home }}/svc.sh install {{ runner_user }}"
      args:
        chdir: "{{ runner_home }}"

    - name: Start runner service
      shell: "{{ runner_home }}/svc.sh start"
      args:
        chdir: "{{ runner_home }}"

    # ── Persistent working directory ─────────────────────────────────────────
    # Pipelines hardcode "cd /app/infra-platform" instead of using
    # $GITHUB_WORKSPACE. This persistent clone provides that path and also
    # stores Terraform state files between pipeline runs.

    - name: Check if infra-platform repo already cloned
      stat:
        path: /app/infra-platform/.git
      register: infra_repo

    - name: Clone infra-platform repo to /app/infra-platform
      git:
        repo: "https://github.com/TomasBFerreira/infra-platform.git"
        dest: /app/infra-platform
        update: no
      when: not infra_repo.stat.exists

    - name: Runner setup summary
      debug:
        msg: "GitHub Actions runner 'github-runner-{{ runner_env }}' registered to repo {{ github_repo }} with labels: self-hosted, linux, {{ runner_env }}"

  handlers:
    - name: Apply network routes
      shell: ip route add 192.168.20.0/24 via 192.168.50.4 2>/dev/null || true
