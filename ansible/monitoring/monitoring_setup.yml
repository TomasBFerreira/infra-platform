---
- name: Monitoring LXC Setup
  hosts: all
  gather_facts: true
  become: yes

  vars:
    monitoring_dir: /opt/monitoring
    repo_url: "https://{{ gh_pat }}@github.com/tomasbferreira/otel-monitoring.git"
    deploy_env: "{{ monitoring_env | default('dev') }}"

  tasks:
    # ── System prerequisites ─────────────────────────────────────────────────

    - name: Install system prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3-pip
          - nfs-common      # required to mount NFS shares
          - sudo            # required for become_user tasks
          - git             # required to clone repositories
          - rsync           # required by deploy.yml to sync files via SSH
        state: present
        update_cache: yes

    # ── NFS mount for persistent monitoring data ──────────────────────────────
    # All backend data (Prometheus, Loki, Tempo, Grafana) is stored on the
    # shared NFS server so it survives blue/green LXC recreation.

    - name: Create NFS mount point
      file:
        path: /mnt/monitoring-data
        state: directory
        mode: '0755'

    - name: Mount monitoring NFS share
      mount:
        path: /mnt/monitoring-data
        src: "{{ nfs_server }}:/mnt/nfs-shared-data/monitoring"
        fstype: nfs
        opts: defaults,_netdev,soft,timeo=30,retrans=3
        state: mounted

    - name: Create per-service data subdirectories on NFS
      file:
        path: "/mnt/monitoring-data/{{ item }}"
        state: directory
        mode: '0777'
      loop:
        - grafana
        - prometheus
        - loki
        - tempo

    # ── Docker ──────────────────────────────────────────────────────────────

    # ── Standard users ───────────────────────────────────────────────────────
    # appadm  — service/app owner
    # tomas   — admin user for interactive access (sudo)

    - name: Ensure appadm user exists
      user:
        name: appadm
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Ensure tomas user exists
      user:
        name: tomas
        shell: /bin/bash
        create_home: yes
        groups: sudo
        append: yes
        state: present

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Add appadm to docker group
      user:
        name: appadm
        groups: docker
        append: yes

    # ── Monitoring directory structure ───────────────────────────────────────

    - name: Create monitoring base directory
      file:
        path: "{{ monitoring_dir }}"
        state: directory
        owner: appadm
        group: appadm
        mode: '0750'

    - name: Create monitoring repo directory
      file:
        path: "{{ monitoring_dir }}/repo"
        state: directory
        owner: appadm
        group: appadm
        mode: '0750'

    # ── Repo clone ───────────────────────────────────────────────────────────

    - name: Clone otel-monitoring repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ monitoring_dir }}/repo"
        version: main
        force: yes
      environment:
        GIT_TERMINAL_PROMPT: "0"
      become_user: appadm

    # ── Environment file ─────────────────────────────────────────────────────

    # Read Grafana OIDC credentials from bootstrap Vault if available.
    # The SSO pipeline writes these after Authentik is deployed.
    # Safe to skip: if the secret is absent, OIDC vars are left blank and
    # Grafana falls back to local admin auth (GF_AUTH_GENERIC_OAUTH_ENABLED=false).
    - name: Read Grafana OIDC credentials from bootstrap Vault
      delegate_to: localhost
      become: no
      shell: |
        CLIENT_ID=$(VAULT_ADDR="{{ lookup('env', 'VAULT_BOOTSTRAP_ADDR') }}" \
                    VAULT_TOKEN="{{ lookup('env', 'VAULT_DEV_TOKEN') }}" \
                    vault kv get -field=client_id secret/authentik/{{ deploy_env }}/grafana-oidc 2>/dev/null || true)
        CLIENT_SECRET=$(VAULT_ADDR="{{ lookup('env', 'VAULT_BOOTSTRAP_ADDR') }}" \
                        VAULT_TOKEN="{{ lookup('env', 'VAULT_DEV_TOKEN') }}" \
                        vault kv get -field=client_secret secret/authentik/{{ deploy_env }}/grafana-oidc 2>/dev/null || true)
        SSO_HOST=$(VAULT_ADDR="{{ lookup('env', 'VAULT_BOOTSTRAP_ADDR') }}" \
                   VAULT_TOKEN="{{ lookup('env', 'VAULT_DEV_TOKEN') }}" \
                   vault kv get -field=discovery_url secret/authentik/{{ deploy_env }}/grafana-oidc 2>/dev/null \
                   | sed 's|/application/o/grafana/||' || true)
        if [ -n "$CLIENT_ID" ]; then
          echo "client_id=$CLIENT_ID"
          echo "client_secret=$CLIENT_SECRET"
          echo "sso_host=$SSO_HOST"
          echo "oidc_enabled=true"
        else
          echo "client_id="
          echo "client_secret="
          echo "sso_host="
          echo "oidc_enabled=false"
          echo "SKIP: secret/authentik/{{ deploy_env }}/grafana-oidc not found (run SSO pipeline first)" >&2
        fi
      register: grafana_oidc_raw
      changed_when: false
      no_log: true

    - name: Parse Grafana OIDC credential facts
      set_fact:
        _grafana_oidc_client_id: "{{ grafana_oidc_raw.stdout | regex_search('client_id=(.+)', '\\1') | first | default('') }}"
        _grafana_oidc_client_secret: "{{ grafana_oidc_raw.stdout | regex_search('client_secret=(.+)', '\\1') | first | default('') }}"
        _grafana_oidc_sso_host: "{{ grafana_oidc_raw.stdout | regex_search('sso_host=(.+)', '\\1') | first | default('') }}"
        _grafana_oidc_enabled: "{{ grafana_oidc_raw.stdout | regex_search('oidc_enabled=(.+)', '\\1') | first | default('false') }}"
      no_log: true

    - name: Write monitoring .env file
      copy:
        dest: "{{ monitoring_dir }}/.env"
        owner: appadm
        group: appadm
        mode: '0600'
        content: |
          GRAFANA_ADMIN_PASSWORD={{ grafana_admin_password }}
          DEPLOY_ENV={{ deploy_env }}
          GRAFANA_OIDC_ENABLED={{ _grafana_oidc_enabled }}
          GRAFANA_OIDC_CLIENT_ID={{ _grafana_oidc_client_id }}
          GRAFANA_OIDC_CLIENT_SECRET={{ _grafana_oidc_client_secret }}
          GRAFANA_OIDC_SSO_HOST={{ _grafana_oidc_sso_host }}

    - name: Symlink .env into repo directory
      file:
        src: "{{ monitoring_dir }}/.env"
        dest: "{{ monitoring_dir }}/repo/.env"
        state: link
        force: yes

    # ── Docker Compose stack ─────────────────────────────────────────────────

    - name: Pre-warm Docker image cache (pull without starting stack)
      shell: docker compose pull
      args:
        chdir: "{{ monitoring_dir }}/repo"
      become_user: appadm
      environment:
        HOME: /home/appadm
