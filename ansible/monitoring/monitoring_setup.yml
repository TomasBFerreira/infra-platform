---
- name: Monitoring LXC Setup
  hosts: all
  gather_facts: true
  become: yes

  vars:
    monitoring_dir: /opt/monitoring
    repo_url: "https://{{ gh_pat }}@github.com/tomasbferreira/otel-monitoring.git"
    deploy_env: "{{ monitoring_env | default('dev') }}"

  tasks:
    # ── System prerequisites ─────────────────────────────────────────────────

    - name: Install system prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3-pip
          - nfs-common      # required to mount NFS shares
          - sudo            # required for become_user tasks
          - git             # required to clone repositories
        state: present
        update_cache: yes

    # ── NFS mount for persistent monitoring data ──────────────────────────────
    # All backend data (Prometheus, Loki, Tempo, Grafana) is stored on the
    # shared NFS server so it survives blue/green LXC recreation.

    - name: Create NFS mount point
      file:
        path: /mnt/monitoring-data
        state: directory
        mode: '0755'

    - name: Mount monitoring NFS share
      mount:
        path: /mnt/monitoring-data
        src: "{{ nfs_server }}:/mnt/nfs-shared-data/monitoring"
        fstype: nfs
        opts: defaults,_netdev,soft,timeo=30,retrans=3
        state: mounted

    - name: Create per-service data subdirectories on NFS
      file:
        path: "/mnt/monitoring-data/{{ item }}"
        state: directory
        mode: '0777'
      loop:
        - grafana
        - prometheus
        - loki
        - tempo

    # ── Docker ──────────────────────────────────────────────────────────────

    # ── Standard users ───────────────────────────────────────────────────────
    # appadm  — service/app owner
    # tomas   — admin user for interactive access (sudo)

    - name: Ensure appadm user exists
      user:
        name: appadm
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Ensure tomas user exists
      user:
        name: tomas
        shell: /bin/bash
        create_home: yes
        groups: sudo
        append: yes
        state: present

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Add appadm to docker group
      user:
        name: appadm
        groups: docker
        append: yes

    # ── Monitoring directory structure ───────────────────────────────────────

    - name: Create monitoring base directory
      file:
        path: "{{ monitoring_dir }}"
        state: directory
        owner: appadm
        group: appadm
        mode: '0750'

    - name: Create monitoring repo directory
      file:
        path: "{{ monitoring_dir }}/repo"
        state: directory
        owner: appadm
        group: appadm
        mode: '0750'

    # ── Repo clone ───────────────────────────────────────────────────────────

    - name: Clone otel-monitoring repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ monitoring_dir }}/repo"
        version: main
        force: yes
      environment:
        GIT_TERMINAL_PROMPT: "0"
      become_user: appadm

    # ── Environment file ─────────────────────────────────────────────────────

    - name: Write monitoring .env file
      copy:
        dest: "{{ monitoring_dir }}/.env"
        owner: appadm
        group: appadm
        mode: '0600'
        content: |
          GRAFANA_ADMIN_PASSWORD={{ grafana_admin_password }}
          DEPLOY_ENV={{ deploy_env }}

    - name: Symlink .env into repo directory
      file:
        src: "{{ monitoring_dir }}/.env"
        dest: "{{ monitoring_dir }}/repo/.env"
        state: link
        force: yes

    # ── Docker Compose stack ─────────────────────────────────────────────────

    - name: Deploy monitoring docker compose stack
      shell: docker compose pull && docker compose up -d
      args:
        chdir: "{{ monitoring_dir }}/repo"
      become_user: appadm
      environment:
        HOME: /home/appadm
