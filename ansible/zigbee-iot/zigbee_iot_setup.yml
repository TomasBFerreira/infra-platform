---
- name: Configure Zigbee IoT monitoring LXC
  hosts: all
  gather_facts: true
  become: yes
  environment:
    DEBIAN_FRONTEND: noninteractive

  pre_tasks:
    # -- Standard users --------------------------------------------------------
    - name: Ensure appadm user exists
      user:
        name: appadm
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Ensure tomas user exists
      user:
        name: tomas
        shell: /bin/bash
        create_home: yes
        groups: sudo
        append: yes
        state: present

    # -- System base -----------------------------------------------------------
    - name: Stop unattended-upgrades to prevent dpkg lock
      shell: |
        systemctl stop unattended-upgrades 2>/dev/null || true
        killall unattended-upgrades 2>/dev/null || true
      changed_when: false

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name:
          - curl
          - jq
          - ca-certificates
          - gnupg
        state: present

    - name: Disable unattended upgrades
      apt:
        name: unattended-upgrades
        state: absent
        purge: yes

    # -- Tailscale: intentionally NOT installed -------------------------------
    # This CT is reachable over the tailnet via the network-vm subnet router,
    # which advertises 192.168.10.0/24 (+ dev/qa/mgmt). Nothing resolves DNS to
    # this host's own Tailscale IP, so a per-CT `tailscale up` adds no value and
    # only couples the deploy to the shared secret/tailscale/<env> auth key.

    # -- Docker ----------------------------------------------------------------
    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg \
          -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker APT repository
      shell: |
        ARCH=$(dpkg --print-architecture)
        CODENAME=$(. /etc/os-release && echo "$VERSION_CODENAME")
        echo "deb [arch=${ARCH} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian ${CODENAME} stable" \
          > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Enable Docker service
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Add appadm to docker group
      user:
        name: appadm
        groups: docker
        append: yes

    - name: Add tomas to docker group
      user:
        name: tomas
        groups: docker
        append: yes

  roles:
    - role: zigbee-iot
