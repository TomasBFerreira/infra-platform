---
- name: Configure Zigbee IoT monitoring LXC
  hosts: all
  gather_facts: true
  become: yes
  environment:
    DEBIAN_FRONTEND: noninteractive

  pre_tasks:
    # -- Standard users --------------------------------------------------------
    - name: Ensure appadm user exists
      user:
        name: appadm
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Ensure tomas user exists
      user:
        name: tomas
        shell: /bin/bash
        create_home: yes
        groups: sudo
        append: yes
        state: present

    # -- System base -----------------------------------------------------------
    - name: Stop unattended-upgrades to prevent dpkg lock
      shell: |
        systemctl stop unattended-upgrades 2>/dev/null || true
        killall unattended-upgrades 2>/dev/null || true
      changed_when: false

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name:
          - curl
          - jq
          - ca-certificates
          - gnupg
        state: present

    - name: Disable unattended upgrades
      apt:
        name: unattended-upgrades
        state: absent
        purge: yes

    # -- Tailscale -------------------------------------------------------------
    - name: Add Tailscale GPG key
      shell: |
        curl -fsSL https://pkgs.tailscale.com/stable/debian/bookworm.noarmor.gpg \
          -o /usr/share/keyrings/tailscale-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/tailscale-archive-keyring.gpg

    - name: Add Tailscale APT repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/debian bookworm main"
        state: present
        filename: tailscale

    - name: Install Tailscale
      apt:
        name: tailscale
        state: present
        update_cache: yes

    - name: Enable and start tailscaled
      systemd:
        name: tailscaled
        enabled: yes
        state: started

    - name: Check if Tailscale is already connected
      command: tailscale status --json
      register: ts_status
      changed_when: false
      failed_when: false

    - name: Set tailscale_connected fact
      set_fact:
        tailscale_connected: "{{ (ts_status.stdout | from_json).BackendState == 'Running' }}"
      when: ts_status.rc == 0

    - name: Authenticate Tailscale
      command: >
        timeout 90
        tailscale up
        --authkey={{ tailscale_authkey }}
        --reset
        --hostname={{ tailscale_hostname }}
      when: not (tailscale_connected | default(false))
      no_log: true

    - name: Wait for Tailscale to come online
      command: tailscale status
      register: ts_online
      retries: 10
      delay: 3
      until: ts_online.rc == 0
      changed_when: false

    # -- Docker ----------------------------------------------------------------
    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg \
          -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker APT repository
      shell: |
        ARCH=$(dpkg --print-architecture)
        CODENAME=$(. /etc/os-release && echo "$VERSION_CODENAME")
        echo "deb [arch=${ARCH} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian ${CODENAME} stable" \
          > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Enable Docker service
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Add appadm to docker group
      user:
        name: appadm
        groups: docker
        append: yes

    - name: Add tomas to docker group
      user:
        name: tomas
        groups: docker
        append: yes

  roles:
    - role: zigbee-iot
