---
- name: Configure torrent LXC
  hosts: all
  gather_facts: true

  tasks:
    # ── Docker ──────────────────────────────────────────────────────────────

    - name: Install Docker prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker and WireGuard packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
          - wireguard
          - openresolv
        state: present
        update_cache: yes

    # ── Standard users ───────────────────────────────────────────────────────
    # appadm  — service/app owner
    # tomas   — admin user for interactive access (sudo)

    - name: Ensure appadm user exists
      user:
        name: appadm
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Ensure tomas user exists
      user:
        name: tomas
        shell: /bin/bash
        create_home: yes
        groups: sudo
        append: yes
        state: present

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    # ── Storage ─────────────────────────────────────────────────────────────
    # /mnt/media is bind-mounted from betsy in prod (via Proxmox mp0).
    # In dev, create it as a local directory.

    - name: Ensure /mnt/media exists
      file:
        path: /mnt/media/downloads
        state: directory
        mode: '0755'

    # ── qBittorrent ─────────────────────────────────────────────────────────

    - name: Create qBittorrent config directory
      file:
        path: /opt/qbittorrent/config
        state: directory
        mode: '0755'

    - name: Deploy qBittorrent docker-compose
      copy:
        dest: /opt/qbittorrent/docker-compose.yml
        mode: '0644'
        content: |
          services:
            qbittorrent:
              image: linuxserver/qbittorrent:latest
              container_name: qbittorrent
              environment:
                - PUID=1000
                - PGID=1000
                - TZ=Europe/London
                - WEBUI_PORT=8080
              volumes:
                - /opt/qbittorrent/config:/config
                - /mnt/media/downloads:/downloads
              network_mode: host
              restart: unless-stopped

    - name: Create qBittorrent config subdirectory
      file:
        path: /opt/qbittorrent/config/qBittorrent
        state: directory
        mode: '0755'

    # Disable WebUI authentication — Traefik ForwardAuth (Authentik) is the
    # sole gate. Any client that reaches qBittorrent has already authenticated.
    # AuthSubnetWhitelistEnabled=true + 0.0.0.0/0 bypasses the login page for
    # all IPs. LocalHostAuth=false also disables the localhost-only bypass prompt.
    - name: Write qBittorrent auth-bypass config
      copy:
        dest: /opt/qbittorrent/config/qBittorrent/qBittorrent.conf
        mode: '0644'
        force: false   # do not overwrite an existing config (preserves user settings)
        content: |
          [Preferences]
          WebUI\AuthSubnetWhitelistEnabled=true
          WebUI\AuthSubnetWhitelist=0.0.0.0/0
          WebUI\LocalHostAuth=false

    - name: Start qBittorrent
      command: docker compose up -d
      args:
        chdir: /opt/qbittorrent

    # ── WireGuard (prod only — skipped when private key is empty) ────────────
    # Uses Table=off + policy routing so LAN traffic (all env subnets + management net)
    # stays on eth0 while all internet traffic routes through wg0.
    # This keeps the NFS bind-mount and Tailscale reachable over LAN.

    - name: Configure WireGuard
      copy:
        dest: /etc/wireguard/wg0.conf
        mode: '0600'
        content: |
          [Interface]
          PrivateKey = {{ wg_private_key }}
          Address = {{ wg_address }}
          {% if wg_dns | default('') | length > 0 %}
          DNS = {{ wg_dns }}
          {% endif %}
          Table = off
          PostUp = GW=$(ip route show default | awk '/default/ {print $3; exit}'); ip route add {{ wg_endpoint.split(':')[0] }}/32 via ${GW} dev eth0 2>/dev/null || true; ip rule add to {{ wg_endpoint.split(':')[0] }}/32 lookup main priority 99 2>/dev/null || true; ip route add default dev wg0 table 200; ip rule add to 192.168.10.0/24 lookup main priority 100; ip rule add to 192.168.20.0/24 lookup main priority 101; ip rule add to 192.168.30.0/24 lookup main priority 102; ip rule add to 192.168.50.0/24 lookup main priority 103; ip rule add lookup 200 priority 200
          PostDown = ip route del default dev wg0 table 200 2>/dev/null || true; ip rule del to {{ wg_endpoint.split(':')[0] }}/32 lookup main priority 99 2>/dev/null || true; ip rule del to 192.168.10.0/24 lookup main priority 100 2>/dev/null || true; ip rule del to 192.168.20.0/24 lookup main priority 101 2>/dev/null || true; ip rule del to 192.168.30.0/24 lookup main priority 102 2>/dev/null || true; ip rule del to 192.168.50.0/24 lookup main priority 103 2>/dev/null || true; ip rule del lookup 200 priority 200 2>/dev/null || true; ip route del {{ wg_endpoint.split(':')[0] }}/32 2>/dev/null || true

          [Peer]
          PublicKey = {{ wg_peer_public_key }}
          Endpoint = {{ wg_endpoint }}
          AllowedIPs = 0.0.0.0/0
          PersistentKeepalive = 25
      when: wg_private_key | default('') | length > 0

    # ── Bind qBittorrent torrent traffic to VPN interface ──────────────────
    # WebUI stays on all interfaces (0.0.0.0) so Sonarr/Radarr can reach it
    # on the LAN, but BitTorrent traffic only goes through wg0.

    - name: Wait for qBittorrent API to be ready
      uri:
        url: "http://127.0.0.1:8080/api/v2/app/version"
        return_content: yes
      register: qbt_ready
      retries: 15
      delay: 4
      until: qbt_ready.status == 200
      when: wg_private_key | default('') | length > 0

    - name: Bind qBittorrent to wg0 interface
      uri:
        url: "http://127.0.0.1:8080/api/v2/app/setPreferences"
        method: POST
        body_format: form-urlencoded
        body:
          json: '{"current_network_interface":"wg0"}'
      when: wg_private_key | default('') | length > 0

    - name: Enable and start WireGuard
      block:
        - name: Start wg-quick@wg0
          systemd:
            name: wg-quick@wg0
            enabled: yes
            state: started
      rescue:
        - name: Dump WireGuard journal on failure
          command: journalctl -xeu wg-quick@wg0 --no-pager -n 50
          register: wg_journal
          changed_when: false
          failed_when: false
        - name: Show WireGuard journal
          debug:
            msg: "{{ wg_journal.stdout }}"
        - name: Fail after showing logs
          fail:
            msg: "wg-quick@wg0 failed to start — see journal above"
      when: wg_private_key | default('') | length > 0
