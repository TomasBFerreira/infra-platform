---
- name: Configure GPU worker node
  hosts: all
  gather_facts: true
  environment:
    PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

  tasks:
    # ── System prerequisites ─────────────────────────────────────────────────

    - name: Wait for cloud-init to finish
      command: cloud-init status --wait
      changed_when: false
      failed_when: false

    - name: Reset connection after cloud-init (may have triggered a reboot)
      meta: reset_connection

    - name: Wait for SSH to recover after potential cloud-init reboot
      wait_for_connection:
        delay: 5
        timeout: 120

    - name: Update apt cache (90s timeout, best-effort — sources may be restricted)
      shell: timeout 90 apt-get update -qq || true
      changed_when: false

    - name: Install prerequisites
      apt:
        name:
          - curl
          - apt-transport-https
          - ca-certificates
          - open-iscsi
          - nfs-common
          - qemu-guest-agent
          - linux-headers-amd64
          - build-essential
          - dkms
        state: present
        update_cache: no
        lock_timeout: 30
      ignore_errors: yes

    - name: Enable and start qemu-guest-agent
      systemd:
        name: qemu-guest-agent
        enabled: yes
        state: started
      ignore_errors: yes

    # ── NVIDIA drivers ───────────────────────────────────────────────────────
    # Installs the proprietary NVIDIA driver from the Debian non-free repo.
    # A reboot is required after install so the DKMS module loads into the
    # running kernel before k3s and the container toolkit are configured.
    # The GPU VM (prod) has internet access via NAT; packages are pulled
    # directly from the Debian archive.

    - name: Enable Debian non-free and non-free-firmware components
      apt_repository:
        repo: "deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware"
        state: present
        filename: debian-bookworm-nonfree

    - name: Install NVIDIA driver
      apt:
        name:
          - nvidia-driver
          - firmware-misc-nonfree
        state: present
        update_cache: yes
      register: nvidia_driver_install

    - name: Reboot to load NVIDIA kernel module
      reboot:
        reboot_timeout: 300
      when: nvidia_driver_install.changed

    - name: Verify NVIDIA driver is loaded
      command: nvidia-smi --query-gpu=name,driver_version --format=csv,noheader
      register: nvidia_smi_out
      changed_when: false

    - name: Print GPU info
      debug:
        msg: "GPU: {{ nvidia_smi_out.stdout }}"

    # ── k3s airgap install ───────────────────────────────────────────────────
    # The GPU VM is on an internal VLAN; download the k3s binary and install
    # script on the Ansible controller (the GitHub Actions runner, which has
    # internet access) and copy them to the VM, then run the installer with
    # INSTALL_K3S_SKIP_DOWNLOAD=true.

    - name: Switch to iptables-legacy before k3s install
      shell: |
        apt-get install -y -q iptables arptables ebtables || true
        update-alternatives --set iptables /usr/sbin/iptables-legacy || true
        update-alternatives --set ip6tables /usr/sbin/ip6tables-legacy || true
        update-alternatives --set arptables /usr/sbin/arptables-legacy || true
        update-alternatives --set ebtables /usr/sbin/ebtables-legacy || true
      changed_when: false

    - name: Download k3s binary on controller
      get_url:
        url: https://github.com/k3s-io/k3s/releases/latest/download/k3s
        dest: /tmp/k3s-binary
        mode: '0755'
        timeout: 120
      delegate_to: localhost
      run_once: true

    - name: Download k3s install script on controller
      get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: '0755'
        timeout: 60
      delegate_to: localhost
      run_once: true

    - name: Copy k3s binary to VM
      copy:
        src: /tmp/k3s-binary
        dest: /usr/local/bin/k3s
        mode: '0755'

    - name: Copy k3s install script to VM
      copy:
        src: /tmp/k3s-install.sh
        dest: /tmp/k3s-install.sh
        mode: '0755'

    - name: Install k3s (airgap — skip download, binary already present)
      shell: INSTALL_K3S_SKIP_DOWNLOAD=true sh /tmp/k3s-install.sh
      args:
        creates: /etc/rancher/k3s/k3s.yaml

    - name: Reset SSH connection after k3s CNI starts
      meta: reset_connection

    - name: Wait for SSH to recover after k3s networking changes
      wait_for_connection:
        delay: 5
        timeout: 60

    - name: Wait for k3s node to be Ready
      command: k3s kubectl get nodes
      register: k3s_nodes
      retries: 6
      delay: 5
      until: k3s_nodes.rc == 0 and 'Ready' in k3s_nodes.stdout

    - name: Ensure k3s is enabled and running
      systemd:
        name: k3s
        enabled: yes
        state: started

    # ── NVIDIA Container Toolkit ─────────────────────────────────────────────
    # Configures containerd (k3s's embedded runtime) to use the NVIDIA runtime
    # so GPU workloads (Plex transcoding, NVENC) can access the GPU from pods.

    - name: Add NVIDIA Container Toolkit GPG key
      shell: |
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
          | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
      args:
        creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

    - name: Add NVIDIA Container Toolkit apt repo
      shell: |
        curl -sL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
          | sed "s|deb https://|deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://|g" \
          > /etc/apt/sources.list.d/nvidia-container-toolkit.list
      args:
        creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

    - name: Install NVIDIA Container Toolkit
      apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: yes

    - name: Configure containerd to use NVIDIA runtime
      command: nvidia-ctk runtime configure --runtime=containerd
      register: ctk_configure
      changed_when: "'successfully' in ctk_configure.stdout or ctk_configure.rc == 0"

    - name: Restart k3s to pick up NVIDIA containerd config
      systemd:
        name: k3s
        state: restarted

    - name: Wait for k3s to be Ready after restart
      command: k3s kubectl get nodes
      register: k3s_nodes_post
      retries: 6
      delay: 5
      until: k3s_nodes_post.rc == 0 and 'Ready' in k3s_nodes_post.stdout

    - name: Label node as GPU-capable
      shell: |
        NODE=$(k3s kubectl get nodes -o jsonpath="{.items[0].metadata.name}")
        k3s kubectl label node "$NODE" nvidia.com/gpu.present=true --overwrite
        k3s kubectl label node "$NODE" workload=gpu --overwrite
      changed_when: false

    # ── Standard users ───────────────────────────────────────────────────────

    - name: Ensure appadm user exists
      user:
        name: appadm
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Ensure tomas user exists
      user:
        name: tomas
        shell: /bin/bash
        create_home: yes
        groups: sudo
        append: yes
        state: present

    # ── Kubeconfig ───────────────────────────────────────────────────────────

    - name: Create .kube directory for tomas
      file:
        path: /home/tomas/.kube
        state: directory
        mode: '0700'
        owner: tomas
        group: tomas

    - name: Copy kubeconfig for tomas
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/tomas/.kube/config
        remote_src: yes
        owner: tomas
        group: tomas
        mode: '0600'

    # ── Verify ───────────────────────────────────────────────────────────────

    - name: Show node status
      command: k3s kubectl get nodes -o wide
      register: node_status
      changed_when: false

    - name: Print node status
      debug:
        msg: "{{ node_status.stdout }}"

    # ── Rancher registration (optional) ──────────────────────────────────────

    - name: Register cluster with Rancher
      when: rancher_bootstrap_password is defined and rancher_bootstrap_password | length > 0
      block:
        - name: Add Rancher hostname to /etc/hosts
          lineinfile:
            path: /etc/hosts
            line: "{{ rancher_ip }} {{ rancher_hostname }}"
            state: present

        - name: Patch CoreDNS NodeHosts ConfigMap for Rancher hostname resolution
          environment:
            RANCHER_IP: "{{ rancher_ip }}"
            RANCHER_HOST: "{{ rancher_hostname }}"
          shell: |
            ENTRY="$RANCHER_IP $RANCHER_HOST"
            if k3s kubectl get configmap coredns -n kube-system \
                -o jsonpath="{.data.NodeHosts}" 2>/dev/null | grep -qF "$RANCHER_HOST"; then
              echo "Rancher hostname already in CoreDNS NodeHosts"
            else
              CURRENT=$(k3s kubectl get configmap coredns -n kube-system \
                -o jsonpath="{.data.NodeHosts}" 2>/dev/null || echo "")
              MERGED_ESC=$(printf '%s\n%s' "$CURRENT" "$ENTRY" \
                | python3 -c "import sys; s=sys.stdin.read(); print(s.replace('\\\\','\\\\\\\\').replace('\"','\\\\\"').replace(chr(10),'\\\\n'), end='')")
              k3s kubectl patch configmap coredns -n kube-system \
                --type=merge -p "{\"data\":{\"NodeHosts\":\"${MERGED_ESC}\"}}"
              echo "Added $ENTRY to CoreDNS NodeHosts"
            fi
          changed_when: false

        - name: Restart CoreDNS to apply NodeHosts change
          shell: k3s kubectl rollout restart deployment/coredns -n kube-system
          changed_when: false

        - name: Wait for CoreDNS to be ready
          shell: k3s kubectl rollout status deployment/coredns -n kube-system --timeout=120s
          changed_when: false
          ignore_errors: yes

        - name: Write Rancher registration script
          copy:
            dest: /tmp/register_rancher.sh
            mode: "0700"
            content: |
              #!/bin/bash
              set -e

              echo "Waiting for Rancher API at $RANCHER_IP ($RANCHER_HOST)..."
              for i in $(seq 1 24); do
                HTTP_STATUS=$(curl -sk -o /dev/null -w '%{http_code}' \
                  -H "Host: $RANCHER_HOST" \
                  "https://$RANCHER_IP/v3-public/authProviders" 2>/dev/null || echo "000")
                if [ "$HTTP_STATUS" = "200" ]; then
                  echo "Rancher API ready (attempt $i)"
                  break
                fi
                echo "Attempt $i/24: HTTP $HTTP_STATUS — retrying in 5s..."
                sleep 5
                if [ "$i" = "24" ]; then
                  echo "ERROR: Rancher API at $RANCHER_IP ($RANCHER_HOST) not reachable after 120s (last HTTP $HTTP_STATUS)"
                  exit 1
                fi
              done

              LOGIN_RESP=$(curl -sk -H "Host: $RANCHER_HOST" \
                -X POST "https://$RANCHER_IP/v3-public/localProviders/local?action=login" \
                -H 'Content-Type: application/json' \
                -d '{"username":"admin","password":"'"$RANCHER_PASS"'","ttl":60000}')

              if [ -z "$LOGIN_RESP" ]; then
                echo "ERROR: Rancher login returned an empty response from https://$RANCHER_IP (Host: $RANCHER_HOST)"
                exit 1
              fi
              echo "Login response: $(echo "$LOGIN_RESP" | python3 -c \
                'import sys,json; r=json.load(sys.stdin); print("type="+str(r.get("type")), "mustChangePassword="+str(r.get("mustChangePassword")))' \
                2>/dev/null || echo "parse error — raw: $LOGIN_RESP")"

              RANCHER_TOKEN=$(echo "$LOGIN_RESP" | python3 -c '
              import sys, json
              d = json.load(sys.stdin)
              if "token" not in d:
                  print("ERROR: no token in login response:", d, file=sys.stderr)
                  sys.exit(1)
              print(d["token"])
              ')

              MUST_CHANGE=$(echo "$LOGIN_RESP" | python3 -c '
              import sys, json
              print(json.load(sys.stdin).get("mustChangePassword", False))
              ' 2>/dev/null || echo "False")
              if [ "$MUST_CHANGE" = "True" ]; then
                USER_ID=$(echo "$LOGIN_RESP" | python3 -c '
              import sys, json
              print(json.load(sys.stdin)["userId"])
              ')
                curl -sk -H "Host: $RANCHER_HOST" \
                  -X POST "https://$RANCHER_IP/v3/users/$USER_ID?action=setpassword" \
                  -H "Authorization: Bearer $RANCHER_TOKEN" \
                  -H 'Content-Type: application/json' \
                  -d '{"newPassword":"'"$RANCHER_PASS"'"}' > /dev/null
              fi

              EXISTING=$(curl -sk -H "Host: $RANCHER_HOST" \
                -H "Authorization: Bearer $RANCHER_TOKEN" \
                "https://$RANCHER_IP/v3/clusters?name=$VM_HOST" \
                | python3 -c '
              import sys, json
              d = json.load(sys.stdin)
              items = d.get("data", [])
              print(items[0]["id"] if items else "")
              ' 2>/dev/null || echo "")

              if [ -n "$EXISTING" ]; then
                echo "Cluster already registered in Rancher (ID: $EXISTING)"
                CLUSTER_ID="$EXISTING"
              else
                CLUSTER_ID=$(curl -sk --fail-with-body -H "Host: $RANCHER_HOST" \
                  -X POST "https://$RANCHER_IP/v3/clusters" \
                  -H "Authorization: Bearer $RANCHER_TOKEN" \
                  -H 'Content-Type: application/json' \
                  -d '{"type":"cluster","name":"'"$VM_HOST"'"}' \
                  | python3 -c '
              import sys, json
              print(json.load(sys.stdin)["id"])
              ')
                echo "Created cluster in Rancher (ID: $CLUSTER_ID)"
              fi

              MANIFEST_URL=""
              for i in $(seq 1 12); do
                MANIFEST_URL=$(curl -sk -H "Host: $RANCHER_HOST" \
                  -H "Authorization: Bearer $RANCHER_TOKEN" \
                  "https://$RANCHER_IP/v3/clusterregistrationtokens?clusterId=$CLUSTER_ID" \
                  | python3 -c '
              import sys, json
              d = json.load(sys.stdin)
              items = d.get("data", [])
              print(items[0]["manifestUrl"] if items else "")
              ' 2>/dev/null || echo "")
                [ -n "$MANIFEST_URL" ] && break
                echo "Waiting for cluster registration token (attempt $i/12)..."
                sleep 5
              done

              if [ -z "$MANIFEST_URL" ]; then
                echo "ERROR: no cluster registration token after 60s"
                exit 1
              fi

              MANIFEST_URL_BY_IP=$(echo "$MANIFEST_URL" | sed "s|https://$RANCHER_HOST|https://$RANCHER_IP|g")
              echo "Applying registration manifest: $MANIFEST_URL_BY_IP"
              curl -sk "$MANIFEST_URL_BY_IP" \
                -H "Host: $RANCHER_HOST" \
                | k3s kubectl apply -f -
              echo "Rancher cluster agent manifest applied"

        - name: Login to Rancher and register cluster
          environment:
            RANCHER_IP: "{{ rancher_ip }}"
            RANCHER_HOST: "{{ rancher_hostname }}"
            RANCHER_PASS: "{{ rancher_bootstrap_password }}"
            VM_HOST: "{{ vm_hostname }}"
          command: /tmp/register_rancher.sh
          register: rancher_reg_result

        - name: Extract registered cluster ID
          set_fact:
            registered_cluster_id: >-
              {{ rancher_reg_result.stdout
                 | regex_search('ID: ([a-z0-9-]+)', '\1')
                 | first | default('local') }}

        - name: Wait for cattle-cluster-agent deployment to be created
          command: k3s kubectl get deployment cattle-cluster-agent -n cattle-system
          register: agent_check
          retries: 6
          delay: 5
          until: agent_check.rc == 0

        - name: Patch cattle-cluster-agent with hostAliases for Rancher
          shell: |
            k3s kubectl patch deployment cattle-cluster-agent -n cattle-system \
              --type=strategic \
              -p='{"spec":{"template":{"spec":{"hostAliases":[{"ip":"{{ rancher_ip }}","hostnames":["{{ rancher_hostname }}"]}]}}}}'

        - name: Wait for cattle-cluster-agent rollout
          command: >
            k3s kubectl rollout status deployment/cattle-cluster-agent
            -n cattle-system --timeout=180s
          ignore_errors: yes

        - name: Remove Rancher registration script
          file:
            path: /tmp/register_rancher.sh
            state: absent

        - name: Apply Rancher RBAC bindings for registered cluster
          when: rancher_rbac_cluster_bindings is defined
          block:
            - name: Copy RBAC apply script (GPU worker node)
              copy:
                dest: /tmp/apply_rancher_rbac.py
                mode: '0755'
                content: |
                  #!/usr/bin/env python3
                  import json, os, subprocess

                  host     = os.environ['RANCHER_HOST']
                  endpoint = os.environ.get('RANCHER_ENDPOINT', 'localhost')
                  password = os.environ['RANCHER_PASS']
                  cluster  = os.environ.get('CLUSTER_ID', 'local')

                  def curl_json(*args):
                      r = subprocess.run(['curl', '-sk'] + list(args),
                                         capture_output=True, text=True)
                      try:
                          return json.loads(r.stdout)
                      except Exception:
                          return {'_raw': r.stdout, 'type': 'error'}

                  token_resp = curl_json(
                      '-H', f'Host: {host}',
                      '-X', 'POST',
                      f'https://{endpoint}/v3-public/localProviders/local?action=login',
                      '-H', 'Content-Type: application/json',
                      '-d', json.dumps({'username': 'admin', 'password': password,
                                        'ttl': 60000}))
                  token = token_resp.get('token', '')
                  if not token:
                      print(f'ERROR: Rancher login failed: {token_resp}')
                      exit(1)

                  def post_binding(ep, body):
                      resp = curl_json(
                          '-H', f'Host: {host}',
                          '-H', f'Authorization: Bearer {token}',
                          '-X', 'POST', f'https://{endpoint}/{ep}',
                          '-H', 'Content-Type: application/json',
                          '-d', json.dumps(body))
                      rtype = resp.get('type', '')
                      msg   = resp.get('message', '')
                      if 'already exist' in msg.lower():
                          print(f'  {ep}: already exists, ok')
                      elif rtype and not rtype.startswith('error'):
                          print(f'  {ep}: created {resp.get("id", "?")}')
                      else:
                          print(f'  WARNING {ep}: {resp}')

                  for b in json.loads(os.environ.get('GLOBAL_BINDINGS', '[]')):
                      post_binding('v3/globalrolebindings', b)

                  for b in json.loads(os.environ.get('CLUSTER_BINDINGS', '[]')):
                      post_binding('v3/clusterroletemplatebindings',
                                   {**b, 'clusterId': cluster})
                  print('Done.')

            - name: Run RBAC apply script (GPU worker node)
              shell: python3 /tmp/apply_rancher_rbac.py
              environment:
                RANCHER_HOST:     "{{ rancher_hostname }}"
                RANCHER_ENDPOINT: "{{ rancher_ip }}"
                RANCHER_PASS:     "{{ rancher_bootstrap_password }}"
                GLOBAL_BINDINGS:  "[]"
                CLUSTER_BINDINGS: "{{ rancher_rbac_cluster_bindings | to_json }}"
                CLUSTER_ID:       "{{ registered_cluster_id | default('local') }}"

        - name: Show Rancher registration result
          debug:
            msg: "GPU worker node '{{ vm_hostname }}' registered with Rancher at {{ rancher_ip }} ({{ rancher_hostname }})"
