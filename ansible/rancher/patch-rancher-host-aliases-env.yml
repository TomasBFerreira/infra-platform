---
# Patches the live Rancher Deployment with hostAliases so Rancher pods can
# resolve the env-specific Authentik and Rancher hostnames for the OIDC token
# exchange step without depending on CoreDNS NodeHosts.
- name: Patch Rancher Deployment with hostAliases
  hosts: all
  gather_facts: false
  become: true
  environment:
    PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

  vars:
    env: "{{ runner_env | default('dev') }}"
    network_vm_ip: "{{ traefik_ip }}"
    auth_hostname: "{% if env == 'prod' %}auth.databaes.net{% else %}auth-{{ env }}.databaes.net{% endif %}"
    rancher_hostname: "{% if env == 'prod' %}rancher.databaes.net{% else %}rancher-{{ env }}.databaes.net{% endif %}"

  tasks:
    - name: Show current hostAliases on Rancher deployment
      shell: |
        k3s kubectl get deployment rancher -n cattle-system \
          -o jsonpath='{.spec.template.spec.hostAliases}' 2>/dev/null \
          || echo "(none)"
      register: current_aliases
      changed_when: false
      failed_when: false

    - name: Print current hostAliases
      debug:
        msg: "Current hostAliases: {{ current_aliases.stdout }}"

    - name: Patch Rancher deployment hostAliases
      shell: |
        k3s kubectl patch deployment rancher -n cattle-system --type='strategic' \
          -p='{"spec":{"template":{"spec":{"hostAliases":[{"ip":"{{ network_vm_ip }}","hostnames":["{{ auth_hostname }}","{{ rancher_hostname }}"]}]}}}}'
      register: patch_result
      changed_when: "'patched' in patch_result.stdout or 'configured' in patch_result.stdout"

    - name: Print patch result
      debug:
        msg: "{{ patch_result.stdout_lines }}"

    - name: Wait for Rancher rollout
      shell: |
        k3s kubectl rollout status deployment/rancher -n cattle-system --timeout=120s \
          2>/dev/null && echo "rollout complete" || echo "rollout timed out (non-fatal)"
      register: rollout_status
      changed_when: false
      failed_when: false

    - name: Print rollout status
      debug:
        msg: "{{ rollout_status.stdout_lines }}"

    - name: Verify hostAliases in new pods
      shell: |
        k3s kubectl get deployment rancher -n cattle-system \
          -o jsonpath='{.spec.template.spec.hostAliases}' 2>/dev/null
      register: new_aliases
      changed_when: false
      failed_when: false

    - name: Print new hostAliases
      debug:
        msg: "hostAliases after patch: {{ new_aliases.stdout }}"

    - name: Verify Authentik token endpoint from inside Rancher pod
      shell: |
        POD=$(k3s kubectl get pods -n cattle-system -l app=rancher \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$POD" ]; then
          echo "No Rancher pod found"
          exit 0
        fi
        echo "Testing from pod: $POD"
        k3s kubectl exec "$POD" -n cattle-system -- \
          sh -c "curl -skI --max-time 10 https://{{ auth_hostname }}/application/o/token/ | sed -n '1,8p'" \
          2>/dev/null || echo "exec failed (non-fatal)"
      register: pod_dns
      changed_when: false
      failed_when: false

    - name: Print pod DNS verification
      debug:
        msg: "{{ pod_dns.stdout_lines }}"
