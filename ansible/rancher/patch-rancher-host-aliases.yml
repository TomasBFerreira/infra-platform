---
# Patches the Rancher Helm release with extraHostAliases so Rancher pods can
# resolve internal hostnames (auth-*.databaes.net) for the OIDC token exchange
# step — without depending on CoreDNS NodeHosts or kubectl patch.
#
# WHY helm upgrade --reuse-values instead of kubectl patch:
# - CoreDNS NodeHosts: reset by k3s HelmChart controller on reconciliation
# - kubectl patch on Deployment: reverted by Helm reconciliation (~20 min)
# - extraHostAliases via helm upgrade: baked into the Helm release values,
#   survives reconciliation and pod restarts. Only lost on full chart re-install.
#
# Required vars:
#   traefik_ip    — active network-vm IP (Traefik, which routes to Authentik)
#   runner_env    — dev/qa/prod (used for hostname construction)
#
# Effect: Helm triggers a rolling restart of Rancher pods (~2 min total).
# The OIDC configure workflow should be re-run after this if OIDC settings
# were lost in the preceding restart.

- name: Patch Rancher Deployment with hostAliases
  hosts: all
  gather_facts: false
  become: true
  environment:
    PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

  vars:
    env: "{{ runner_env | default('dev') }}"
    network_vm_ip: "{{ traefik_ip }}"
    auth_hostname: "auth-{{ env }}.databaes.net"
    rancher_hostname: "rancher-{{ env }}.databaes.net"

  tasks:
    - name: Show current hostAliases on Rancher deployment
      shell: |
        k3s kubectl get deployment rancher -n cattle-system \
          -o jsonpath='{.spec.template.spec.hostAliases}' 2>/dev/null \
          || echo "(none)"
      register: current_aliases
      changed_when: false
      failed_when: false

    - name: Print current hostAliases
      debug:
        msg: "Current hostAliases: {{ current_aliases.stdout }}"

    - name: Patch Rancher Helm release with extraHostAliases
      # Use helm upgrade --reuse-values so all existing release values (hostname,
      # bootstrapPassword, TLS settings) are preserved — only extraHostAliases is
      # added/updated. This bakes the entries into the Helm release itself, so the
      # HelmChart controller cannot revert them (unlike kubectl patch which is undone
      # by Helm reconciliation within ~20 minutes).
      #
      # Pin to the currently installed chart version (read from helm history) to
      # avoid accidentally upgrading Rancher while applying the alias patch.
      become_user: appadm
      shell: |
        /usr/local/bin/helm repo update rancher-stable 2>/dev/null || true
        # Get the currently installed chart version to avoid accidental upgrades
        CHART_VER=$(/usr/local/bin/helm history rancher -n cattle-system --max 1 -o json 2>/dev/null \
          | python3 -c "import sys,json; h=json.load(sys.stdin); print(h[0]['chart'].replace('rancher-',''))" \
          2>/dev/null || echo "")
        VERSION_FLAG=""
        [ -n "$CHART_VER" ] && VERSION_FLAG="--version $CHART_VER"
        echo "Pinning helm upgrade to chart version: ${CHART_VER:-latest}"
        /usr/local/bin/helm upgrade rancher rancher-stable/rancher \
          --namespace cattle-system \
          --reuse-values \
          $VERSION_FLAG \
          --set extraHostAliases[0].ip={{ network_vm_ip }} \
          --set extraHostAliases[0].hostnames[0]={{ auth_hostname }} \
          --set extraHostAliases[0].hostnames[1]={{ rancher_hostname }} \
          && echo "hostAliases patched via helm upgrade" || echo "helm upgrade failed"
      register: patch_result
      changed_when: "'hostAliases patched' in patch_result.stdout"
      failed_when: false
      environment:
        KUBECONFIG: /home/appadm/.kube/config

    - name: Print patch result
      debug:
        msg: "{{ patch_result.stdout_lines }}"

    - name: Wait for Rancher rollout (pods restart with new hostAliases)
      shell: |
        k3s kubectl rollout status deployment/rancher -n cattle-system --timeout=120s \
          2>/dev/null && echo "rollout complete" || echo "rollout timed out (non-fatal)"
      register: rollout_status
      changed_when: false
      failed_when: false

    - name: Print rollout status
      debug:
        msg: "{{ rollout_status.stdout_lines }}"

    - name: Verify hostAliases in new pods
      shell: |
        k3s kubectl get deployment rancher -n cattle-system \
          -o jsonpath='{.spec.template.spec.hostAliases}' 2>/dev/null
      register: new_aliases
      changed_when: false
      failed_when: false

    - name: Print new hostAliases
      debug:
        msg: "hostAliases after patch: {{ new_aliases.stdout }}"

    - name: Verify DNS from inside Rancher pod
      shell: |
        POD=$(k3s kubectl get pods -n cattle-system -l app=rancher \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        if [ -z "$POD" ]; then
          echo "No Rancher pod found"
          exit 0
        fi
        echo "Testing from pod: $POD"
        k3s kubectl exec "$POD" -n cattle-system -- \
          sh -c "getent hosts {{ auth_hostname }} || nslookup {{ auth_hostname }} 2>/dev/null || echo 'DNS lookup failed'" \
          2>/dev/null || echo "exec failed (non-fatal)"
      register: pod_dns
      changed_when: false
      failed_when: false

    - name: Print pod DNS verification
      debug:
        msg: "{{ pod_dns.stdout_lines }}"
