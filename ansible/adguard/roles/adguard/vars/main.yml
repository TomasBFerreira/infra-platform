adguard_port: 3000
adguard_data_path: /opt/adguard

# Tailscale IPv4 per network-vm. Every netvm's AdGuard registers ALL envs'
# hostnames pointing at the right netvm's TS IP — see adguard/tasks/main.yml
# for why (Tailscale split-DNS races 4 resolvers in parallel; whichever
# answers first wins, so every resolver must agree or requests land on
# public Cloudflare).
# Keep in lock-step with secret/network-vm/<env>/active-slot in Vault;
# change here when a slot-flip persists.
#
# NOTE (2026-04-21): these entries are bootstrap values only. At steady state
# they WILL drift from reality whenever Tailscale re-registers a netvm (slot
# flips, auth-key rotation, node re-creation). The adguard-rewrite-sync
# systemd timer on each netvm re-asserts rewrites against `tailscale status`
# every boot + daily, so a stale entry here is self-healed within 24h.
# Update these when convenient (e.g. post-slot-flip) so a freshly provisioned
# netvm doesn't serve wrong answers for up to 2 min before the first sync.
adguard_env_tailscale_ips:
  dev:  100.71.47.6    # dev-network-vm-blue (updated 2026-04-21)
  qa:   100.123.3.27   # qa-network-vm-green
  prod: 100.125.152.26 # prod-network-vm-blue

# All dev hostnames that should resolve via AdGuard to the dev network-vm.
# Tailscale peers using AdGuard as their nameserver will resolve these internally
# without them ever appearing in public Cloudflare DNS.
adguard_dev_rewrites:
  - domain: auth-dev.databaes.net
  - domain: grafana-dev.databaes.net
  - domain: nextcloud-dev.databaes.net
  - domain: wikijs-dev.databaes.net
  - domain: semaphore-dev.databaes.net
  - domain: rancher-dev.databaes.net
  - domain: vault-dev.databaes.net
  - domain: kumadev.databaes.net
  - domain: databaes-status-api-dev.databaes.net
  - domain: devops-portal-dev.databaes.net
  - domain: ops-dev.databaes.net
  - domain: signup-dev.databaes.net
  - domain: overseerr-dev.databaes.net
  - domain: prowlarr-dev.databaes.net
  - domain: radarr-dev.databaes.net
  - domain: sonarr-dev.databaes.net
  - domain: dev.databaes.net

adguard_qa_rewrites:
  - domain: auth-qa.databaes.net
  - domain: grafana-qa.databaes.net
  - domain: rancher-qa.databaes.net
  - domain: vault-qa.databaes.net
  - domain: semaphore-qa.databaes.net
  - domain: devops-portal-qa.databaes.net
  - domain: ops-qa.databaes.net
  - domain: qa.databaes.net
  - domain: databaes-landing-page-qa.databaes.net

# Empty today — populate when a prod AdGuard rewrite is needed.
adguard_prod_rewrites: []
