---
- name: Vault CT Setup
  hosts: all
  become: yes

  vars:
    vault_version: "1.15.2"
    vault_addr: "http://127.0.0.1:8200"
    vault_config_dir: /etc/vault.d
    vault_data_dir: /opt/vault/data

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install dependencies
      apt:
        name:
          - curl
          - gpg
          - lsb-release
        state: present

    - name: Add HashiCorp GPG key
      shell: |
        curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

    - name: Add HashiCorp apt repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
        state: present
        filename: hashicorp

    - name: Install Vault
      apt:
        name: vault
        state: present
        update_cache: yes

    - name: Create Vault data directory
      file:
        path: "{{ vault_data_dir }}"
        state: directory
        owner: vault
        group: vault
        mode: '0750'

    - name: Write Vault config
      copy:
        dest: "{{ vault_config_dir }}/vault.hcl"
        owner: vault
        group: vault
        mode: '0640'
        content: |
          ui = true
          disable_mlock = true

          storage "file" {
            path = "{{ vault_data_dir }}"
          }

          listener "tcp" {
            address     = "0.0.0.0:8200"
            tls_disable = true
          }

          api_addr = "http://{{ vault_ct_ip }}:8200"

    - name: Enable and start Vault service
      systemd:
        name: vault
        enabled: yes
        state: started

    - name: Wait for Vault to be reachable
      uri:
        url: "{{ vault_addr }}/v1/sys/health"
        status_code: [200, 429, 472, 473, 501, 503]
      register: vault_health
      retries: 10
      delay: 2
      until: vault_health.status in [200, 429, 472, 473, 501, 503]

    - name: Check Vault init status
      uri:
        url: "{{ vault_addr }}/v1/sys/init"
        method: GET
      register: vault_init_status

    - name: Initialize Vault
      uri:
        url: "{{ vault_addr }}/v1/sys/init"
        method: PUT
        body_format: json
        body:
          secret_shares: 3
          secret_threshold: 2
      register: vault_init_result
      when: not vault_init_status.json.initialized

    - name: Save Vault init output to file
      copy:
        content: "{{ vault_init_result.json | to_nice_json }}"
        dest: /root/vault-init.json
        mode: '0400'
        owner: root
        group: root
      when: not vault_init_status.json.initialized

    - name: Extract unseal keys into facts
      set_fact:
        vault_unseal_key_0: "{{ vault_init_result.json['keys'][0] }}"
        vault_unseal_key_1: "{{ vault_init_result.json['keys'][1] }}"
      when: not vault_init_status.json.initialized

    - name: Write unseal keys file for auto-unseal service
      copy:
        dest: "{{ vault_config_dir }}/.unseal_keys"
        mode: '0400'
        owner: root
        group: root
        content: "{{ vault_unseal_key_0 }}\n{{ vault_unseal_key_1 }}\n"
      when: not vault_init_status.json.initialized

    - name: Write auto-unseal script
      copy:
        dest: "{{ vault_config_dir }}/unseal.sh"
        mode: '0700'
        owner: root
        group: root
        content: |
          #!/bin/bash
          VAULT_ADDR="http://127.0.0.1:8200"
          KEYS_FILE="{{ vault_config_dir }}/.unseal_keys"
          MAX_WAIT=30
          export VAULT_ADDR
          for i in $(seq 1 $MAX_WAIT); do
            vault status > /dev/null 2>&1 || vault status 2>&1 | grep -q "Sealed" && break
            sleep 1
          done
          if vault status 2>/dev/null | grep -q "^Sealed.*false"; then
            exit 0
          fi
          while IFS= read -r key; do
            [ -z "$key" ] && continue
            vault operator unseal "$key"
            vault status 2>/dev/null | grep -q "^Sealed.*false" && exit 0
          done < "$KEYS_FILE"
          exit 1

    - name: Install auto-unseal systemd service
      copy:
        dest: /etc/systemd/system/vault-unseal.service
        content: |
          [Unit]
          Description=Vault Auto-Unseal
          After=vault.service
          Requires=vault.service

          [Service]
          Type=oneshot
          ExecStart={{ vault_config_dir }}/unseal.sh
          RemainAfterExit=yes
          User=root

          [Install]
          WantedBy=multi-user.target

    - name: Enable vault-unseal service
      systemd:
        name: vault-unseal
        enabled: yes
        daemon_reload: yes
      when: not vault_init_status.json.initialized

    - name: Unseal Vault after init
      uri:
        url: "{{ vault_addr }}/v1/sys/unseal"
        method: PUT
        body_format: json
        body:
          key: "{{ item }}"
      loop:
        - "{{ vault_init_result.json['keys'][0] }}"
        - "{{ vault_init_result.json['keys'][1] }}"
      when: not vault_init_status.json.initialized

    - name: Print init summary
      debug:
        msg: |
          Vault initialized at http://{{ vault_ct_ip }}:8200
          Root token and unseal keys saved to /root/vault-init.json
          IMPORTANT: Copy /root/vault-init.json somewhere safe and then delete it.
      when: not vault_init_status.json.initialized

    - name: Vault already initialized
      debug:
        msg: "Vault was already initialized — skipping init steps."
      when: vault_init_status.json.initialized

    # --- CI policy + token setup (runs on init or when VAULT_ROOT_TOKEN is provided) ---

    - name: Set admin token fact
      set_fact:
        vault_admin_token: "{{ vault_init_result.json.root_token if (not vault_init_status.json.initialized) else lookup('env', 'VAULT_ROOT_TOKEN') }}"

    - name: Check if KV v2 is mounted
      uri:
        url: "{{ vault_addr }}/v1/sys/mounts/secret"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_admin_token }}"
        status_code: [200, 400]
      register: kv_mount_check
      when: vault_admin_token != ''

    - name: Enable KV v2 secrets engine
      uri:
        url: "{{ vault_addr }}/v1/sys/mounts/secret"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_admin_token }}"
        body_format: json
        body:
          type: kv
          options:
            version: "2"
        status_code: [200, 204]
      when: kv_mount_check is not skipped and kv_mount_check.status == 400

    - name: Create or update CI pipeline policy
      uri:
        url: "{{ vault_addr }}/v1/sys/policies/acl/ci-pipeline"
        method: PUT
        headers:
          X-Vault-Token: "{{ vault_admin_token }}"
        body_format: json
        body:
          policy: |
            path "secret/data/*" {
              capabilities = ["read", "list"]
            }
            path "secret/metadata/*" {
              capabilities = ["list"]
            }
            path "secret/data/network-vm/*" {
              capabilities = ["create", "update", "read", "list"]
            }
            path "secret/metadata/network-vm/*" {
              capabilities = ["read", "list", "delete"]
            }
            path "secret/data/authentik/*" {
              capabilities = ["create", "update", "read", "list"]
            }
            path "secret/metadata/authentik/*" {
              capabilities = ["read", "list", "delete"]
            }
            path "secret/data/sso" {
              capabilities = ["create", "update", "read", "list"]
            }
            path "secret/metadata/sso" {
              capabilities = ["read", "list"]
            }
        status_code: [200, 204]
      when: vault_admin_token != ''
      no_log: true

    - name: Create CI pipeline token
      uri:
        url: "{{ vault_addr }}/v1/auth/token/create"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_admin_token }}"
        body_format: json
        body:
          display_name: "github-actions"
          policies: ["ci-pipeline"]
          ttl: "8760h"
          renewable: true
        status_code: [200]
      register: ci_token_result
      when: vault_admin_token != ''
      no_log: true

    - name: Update GitHub secrets for environment vault
      delegate_to: localhost
      become: no
      shell: |
        case "{{ vault_env | default('dev') }}" in
          dev)  ADDR_SECRET="VAULT_ADDR";      TOKEN_SECRET="VAULT_TOKEN"      ;;
          qa)   ADDR_SECRET="VAULT_QA_ADDR";   TOKEN_SECRET="VAULT_QA_TOKEN"   ;;
          prod) ADDR_SECRET="VAULT_PROD_ADDR"; TOKEN_SECRET="VAULT_PROD_TOKEN" ;;
        esac
        gh secret set $ADDR_SECRET  --body "http://{{ vault_ct_ip }}:8200" --repo TomasBFerreira/infra-platform
        gh secret set $TOKEN_SECRET --body "{{ ci_token_result.json.auth.client_token }}" --repo TomasBFerreira/infra-platform
      environment:
        GH_TOKEN: "{{ lookup('env', 'GH_PAT') }}"
      when: vault_admin_token != '' and ci_token_result is not skipped
      no_log: true

    - name: CI setup summary
      debug:
        msg: "CI pipeline policy and token created. GitHub secrets updated to point to http://{{ vault_ct_ip }}:8200 (env: {{ vault_env | default('dev') }})."
      when: vault_admin_token != '' and ci_token_result is not skipped

    # --- Seed env vault with shared secrets from bootstrap vault ---
    # Reads canonical secrets from bootstrap vault (CT 200) and writes them into
    # this env vault. Idempotent — safe to run on every deployment. Skips any
    # secret not yet present in the bootstrap vault (no-op with a warning).

    - name: Seed env vault — tailscale
      delegate_to: localhost
      become: no
      shell: |
        AUTHKEY=$(VAULT_ADDR="{{ lookup('env', 'VAULT_DEV_ADDR') }}" \
                  VAULT_TOKEN="{{ lookup('env', 'VAULT_DEV_TOKEN') }}" \
                  vault kv get -field=authkey secret/tailscale 2>/dev/null || true)
        if [ -z "$AUTHKEY" ]; then
          echo "SKIP: secret/tailscale not found in bootstrap vault"
          exit 0
        fi
        VAULT_ADDR="http://{{ vault_ct_ip }}:8200" VAULT_TOKEN="{{ vault_admin_token }}" \
          vault kv put secret/tailscale authkey="$AUTHKEY"
      when: vault_admin_token != ''
      no_log: true

    - name: Seed env vault — wireguard
      delegate_to: localhost
      become: no
      shell: |
        _vault() { VAULT_ADDR="{{ lookup('env', 'VAULT_DEV_ADDR') }}" VAULT_TOKEN="{{ lookup('env', 'VAULT_DEV_TOKEN') }}" vault kv get -field="$1" secret/wireguard 2>/dev/null || true; }
        PRIV=$(_vault private_key)
        if [ -z "$PRIV" ]; then
          echo "SKIP: secret/wireguard not found in bootstrap vault"
          exit 0
        fi
        VAULT_ADDR="http://{{ vault_ct_ip }}:8200" VAULT_TOKEN="{{ vault_admin_token }}" \
          vault kv put secret/wireguard \
            private_key="$PRIV" \
            peer_public_key="$(_vault peer_public_key)" \
            endpoint="$(_vault endpoint)" \
            address="$(_vault address)" \
            dns="$(_vault dns)"
      when: vault_admin_token != ''
      no_log: true

    - name: Seed env vault — adguard
      delegate_to: localhost
      become: no
      shell: |
        USER=$(VAULT_ADDR="{{ lookup('env', 'VAULT_DEV_ADDR') }}" \
               VAULT_TOKEN="{{ lookup('env', 'VAULT_DEV_TOKEN') }}" \
               vault kv get -field=username secret/adguard 2>/dev/null || true)
        PASS=$(VAULT_ADDR="{{ lookup('env', 'VAULT_DEV_ADDR') }}" \
               VAULT_TOKEN="{{ lookup('env', 'VAULT_DEV_TOKEN') }}" \
               vault kv get -field=password secret/adguard 2>/dev/null || true)
        if [ -z "$USER" ]; then
          echo "SKIP: secret/adguard not found in bootstrap vault"
          exit 0
        fi
        VAULT_ADDR="http://{{ vault_ct_ip }}:8200" VAULT_TOKEN="{{ vault_admin_token }}" \
          vault kv put secret/adguard username="$USER" password="$PASS"
      when: vault_admin_token != ''
      no_log: true

    - name: Seed env vault — cloudflare-tunnel
      delegate_to: localhost
      become: no
      shell: |
        TOKEN=$(VAULT_ADDR="{{ lookup('env', 'VAULT_DEV_ADDR') }}" \
                VAULT_TOKEN="{{ lookup('env', 'VAULT_DEV_TOKEN') }}" \
                vault kv get -field=token secret/cloudflare-tunnel 2>/dev/null || true)
        if [ -z "$TOKEN" ]; then
          echo "SKIP: secret/cloudflare-tunnel not found in bootstrap vault"
          exit 0
        fi
        VAULT_ADDR="http://{{ vault_ct_ip }}:8200" VAULT_TOKEN="{{ vault_admin_token }}" \
          vault kv put secret/cloudflare-tunnel token="$TOKEN"
      when: vault_admin_token != ''
      no_log: true

    - name: Seed summary
      debug:
        msg: "Shared secrets seeded from bootstrap vault into http://{{ vault_ct_ip }}:8200"
      when: vault_admin_token != ''

    # --- OIDC auth method (configured only when SSO has been deployed) ---
    # The SSO pipeline writes `secret/authentik/vault-oidc` to this env vault
    # after Authentik is running. On subsequent vault-ct deploys, this block
    # reads those credentials and wires up Vault's OIDC auth method automatically.
    # Safe to skip: if the secret doesn't exist yet, all tasks are no-ops.

    - name: Check if Authentik OIDC credentials are available
      delegate_to: localhost
      become: no
      shell: |
        VAULT_ADDR="http://{{ vault_ct_ip }}:8200" \
        VAULT_TOKEN="{{ vault_admin_token }}" \
          vault kv get -field=client_id secret/authentik/vault-oidc 2>/dev/null || true
      register: oidc_client_id_check
      changed_when: false
      when: vault_admin_token != ''
      no_log: true

    - name: Configure Vault OIDC auth method
      delegate_to: localhost
      become: no
      shell: |
        export VAULT_ADDR="http://{{ vault_ct_ip }}:8200"
        export VAULT_TOKEN="{{ vault_admin_token }}"

        CLIENT_ID=$(vault kv get -field=client_id secret/authentik/vault-oidc)
        CLIENT_SECRET=$(vault kv get -field=client_secret secret/authentik/vault-oidc)
        DISCOVERY_URL=$(vault kv get -field=discovery_url secret/authentik/vault-oidc)

        # Enable OIDC auth method if not already enabled
        if ! vault auth list -format=json 2>/dev/null | grep -q '"oidc/"'; then
          vault auth enable oidc
        fi

        # Configure OIDC (idempotent — safe to re-apply)
        vault write auth/oidc/config \
          oidc_discovery_url="$DISCOVERY_URL" \
          oidc_client_id="$CLIENT_ID" \
          oidc_client_secret="$CLIENT_SECRET" \
          default_role="admin"

        # Create admin Vault policy (full access — appropriate for homelab admin)
        vault policy write admin - <<'EOF'
        path "*" {
          capabilities = ["create", "read", "update", "delete", "list", "sudo"]
        }
        EOF

        # Create OIDC admin role
        # Redirect URIs must cover both blue/green IPs for all envs + CLI port
        vault write auth/oidc/role/admin \
          bound_audiences="$CLIENT_ID" \
          allowed_redirect_uris="http://192.168.50.245:8200/ui/vault/auth/oidc/oidc/callback" \
          allowed_redirect_uris="http://192.168.50.246:8200/ui/vault/auth/oidc/oidc/callback" \
          allowed_redirect_uris="http://192.168.50.145:8200/ui/vault/auth/oidc/oidc/callback" \
          allowed_redirect_uris="http://192.168.50.146:8200/ui/vault/auth/oidc/oidc/callback" \
          allowed_redirect_uris="http://localhost:8250/oidc/callback" \
          allowed_redirect_uris="http://localhost:8200/oidc/callback" \
          user_claim="sub" \
          policies="admin" \
          ttl="12h"
      when: vault_admin_token != '' and oidc_client_id_check.stdout | length > 0
      no_log: true

    - name: OIDC configuration summary
      debug:
        msg: "Vault OIDC auth method configured. Login via: vault login -method=oidc -address=http://{{ vault_ct_ip }}:8200"
      when: vault_admin_token != '' and oidc_client_id_check is not skipped and oidc_client_id_check.stdout | length > 0

    - name: OIDC not yet configured (SSO not deployed)
      debug:
        msg: "No Authentik credentials found in vault — OIDC not configured. Deploy SSO first, then re-run this pipeline."
      when: vault_admin_token != '' and oidc_client_id_check is not skipped and oidc_client_id_check.stdout | length == 0
