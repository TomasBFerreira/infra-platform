tailscale_authkey: >-
  {{ lookup('community.hashi_vault.hashi_vault',
    'secret=secret/data/tailscale:authkey token=' ~ (vault_token | string) ~ ' url=' ~ (vault_addr | string)) }}
vault_addr: "{{ lookup('env', 'VAULT_ADDR') }}"
vault_token: "{{ lookup('env', 'VAULT_TOKEN') }}"
tailscale_subnet_routes: "192.168.50.0/24"
tailscale_hostname: "benedict-subnet-router"
