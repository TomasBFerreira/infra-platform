---
# Install node_exporter as a systemd service for fleet-wide host metrics.
# Complements the otelcol hostmetrics receiver (which covers CPU, mem, disk,
# fs, and load) by adding the kernel/network/time counters the ops-portal
# alerts rely on: OOM kills, conntrack saturation, TCP retransmits, clock drift.
#
# Required variables:
#   None — all covered by defaults/main.yml
#
# Exposes 9100/tcp on the host. Prometheus (on monitoring-lxc) scrapes it via
# a static_config added in otel-monitoring/config/prometheus/prometheus.yml.

- name: Create node_exporter system user
  ansible.builtin.user:
    name: node_exporter
    system: true
    shell: /sbin/nologin
    home: /var/lib/node_exporter
    create_home: true
    state: present

- name: Create textfile collector directory
  ansible.builtin.file:
    path: "{{ node_exporter_textfile_dir }}"
    state: directory
    owner: node_exporter
    group: node_exporter
    mode: '0755'

- name: Check installed node_exporter version
  ansible.builtin.shell:
    cmd: "set -o pipefail; /usr/local/bin/node_exporter --version 2>&1 | head -1 | grep -c {{ node_exporter_version | quote }} || true"
    executable: /bin/bash
  register: node_exporter_version_check
  changed_when: false
  failed_when: false

- name: Download node_exporter tarball
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    mode: '0644'
    timeout: 60
  when: node_exporter_version_check.stdout | default('0') == '0'

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: /tmp/
    remote_src: true
  when: node_exporter_version_check.stdout | default('0') == '0'

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    owner: root
    group: root
    mode: '0755'
    remote_src: true
  when: node_exporter_version_check.stdout | default('0') == '0'
  notify: restart node_exporter

- name: Clean up download artifacts
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    - "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64"

- name: Deploy node_exporter systemd unit
  ansible.builtin.template:
    src: node-exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart node_exporter

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true
