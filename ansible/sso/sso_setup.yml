---
- name: Configure SSO LXC (Authentik)
  hosts: all
  gather_facts: true

  tasks:
    # ── Docker ──────────────────────────────────────────────────────────────

    - name: Install Docker prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3-pip
        state: present
        update_cache: yes

    # ── Standard users ───────────────────────────────────────────────────────
    # appadm  — service/app owner
    # tomas   — admin user for interactive access (sudo)

    - name: Ensure appadm user exists
      user:
        name: appadm
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Ensure tomas user exists
      user:
        name: tomas
        shell: /bin/bash
        create_home: yes
        groups: sudo
        append: yes
        state: present

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    # ── Authentik ────────────────────────────────────────────────────────────

    - name: Create Authentik directory
      file:
        path: /opt/authentik
        state: directory
        mode: '0750'

    - name: Write Authentik environment file
      copy:
        dest: /opt/authentik/.env
        mode: '0600'
        content: |
          PG_PASS={{ sso_db_password }}
          AUTHENTIK_SECRET_KEY={{ sso_secret_key }}
          AUTHENTIK_BOOTSTRAP_PASSWORD={{ sso_bootstrap_password }}
          AUTHENTIK_BOOTSTRAP_TOKEN={{ sso_bootstrap_token }}
          # Error reporting — set to true to help Authentik developers
          AUTHENTIK_ERROR_REPORTING__ENABLED=false
          # Outpost host — used by embedded outpost to reach the Authentik server
          AUTHENTIK_HOST=http://{{ ansible_host }}:9000
          # Used by Traefik forward auth — the externally reachable URL of this Authentik instance
          # Must use https:// — Cloudflare terminates TLS, browser enforces mixed-content if this is http://
          AUTHENTIK_HOST_BROWSER={% if vault_env == 'prod' %}https://auth.databaes.net{% else %}https://auth-dev.databaes.net{% endif %}

    - name: Deploy Authentik docker-compose
      copy:
        dest: /opt/authentik/docker-compose.yml
        mode: '0644'
        content: |
          ---
          # network_mode: host avoids creating new network namespaces, which sidesteps
          # the ip_unprivileged_port_start sysctl issue in Proxmox unprivileged LXCs.
          # Inter-container communication uses 127.0.0.1 instead of container names.
          services:
            postgresql:
              image: postgres:16-alpine
              container_name: authentik-postgresql
              network_mode: host
              restart: unless-stopped
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -d authentik -U authentik"]
                start_period: 20s
                interval: 30s
                retries: 5
                timeout: 5s
              volumes:
                - pg-data:/var/lib/postgresql/data
              environment:
                POSTGRES_PASSWORD: ${PG_PASS}
                POSTGRES_USER: authentik
                POSTGRES_DB: authentik

            redis:
              image: redis:alpine
              container_name: authentik-redis
              network_mode: host
              restart: unless-stopped
              healthcheck:
                test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
                start_period: 20s
                interval: 30s
                retries: 5
                timeout: 3s
              command: --save 60 1 --loglevel warning
              volumes:
                - redis-data:/data

            server:
              image: ghcr.io/goauthentik/server:2024.12.3
              container_name: authentik-server
              network_mode: host
              restart: unless-stopped
              command: server
              environment:
                AUTHENTIK_REDIS__HOST: 127.0.0.1
                AUTHENTIK_POSTGRESQL__HOST: 127.0.0.1
                AUTHENTIK_POSTGRESQL__USER: authentik
                AUTHENTIK_POSTGRESQL__NAME: authentik
                AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
                AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
                AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
                AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN}
                AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED}
                AUTHENTIK_HOST_BROWSER: ${AUTHENTIK_HOST_BROWSER}
              volumes:
                - media:/media
                - custom-templates:/templates
              depends_on:
                postgresql:
                  condition: service_healthy
                redis:
                  condition: service_healthy

            worker:
              image: ghcr.io/goauthentik/server:2024.12.3
              container_name: authentik-worker
              network_mode: host
              restart: unless-stopped
              command: worker
              environment:
                AUTHENTIK_REDIS__HOST: 127.0.0.1
                AUTHENTIK_POSTGRESQL__HOST: 127.0.0.1
                AUTHENTIK_POSTGRESQL__USER: authentik
                AUTHENTIK_POSTGRESQL__NAME: authentik
                AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
                AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
                AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED}
                AUTHENTIK_HOST: ${AUTHENTIK_HOST}
              volumes:
                - /var/run/docker.sock:/var/run/docker.sock
                - media:/media
                - custom-templates:/templates
              depends_on:
                postgresql:
                  condition: service_healthy
                redis:
                  condition: service_healthy

          volumes:
            pg-data:
            redis-data:
            media:
            custom-templates:

    - name: Start PostgreSQL and Redis
      command: docker compose --env-file .env up -d postgresql redis
      args:
        chdir: /opt/authentik

    - name: Wait for PostgreSQL to be ready
      shell: docker exec authentik-postgresql pg_isready -U authentik -d authentik
      register: pg_ready
      retries: 20
      delay: 5
      until: pg_ready.rc == 0

    - name: Copy DB backup to remote host
      copy:
        src: /tmp/sso_db_backup.sql.gz
        dest: /tmp/sso_db_backup.sql.gz
        mode: '0600'
      when: sso_has_db_backup | default(false) | bool

    - name: Restore Authentik DB from backup
      shell: |
        docker cp /tmp/sso_db_backup.sql.gz authentik-postgresql:/tmp/sso_db_backup.sql.gz
        docker exec authentik-postgresql psql -U authentik -d postgres \
          -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'authentik' AND pid <> pg_backend_pid();"
        docker exec authentik-postgresql psql -U authentik -d postgres -c "DROP DATABASE IF EXISTS authentik;"
        docker exec authentik-postgresql psql -U authentik -d postgres -c "CREATE DATABASE authentik;"
        docker exec authentik-postgresql sh -c "zcat /tmp/sso_db_backup.sql.gz | psql -U authentik authentik"
        echo "DB restore complete."
      when: sso_has_db_backup | default(false) | bool

    - name: Start Authentik (full stack)
      command: docker compose --env-file .env up -d
      args:
        chdir: /opt/authentik

    - name: Wait for Authentik server to be ready
      uri:
        url: "http://localhost:9000/-/health/ready/"
        status_code: 200
      register: health
      until: health.status == 200
      retries: 30
      delay: 10

    - name: Show Authentik startup logs (for diagnostics)
      shell: |
        echo "=== Server ===" && docker logs authentik-server --tail 40 2>&1 || echo "(no server logs)"
        echo "=== Worker ===" && docker logs authentik-worker --tail 40 2>&1 || echo "(no worker logs)"
      register: startup_logs
      changed_when: false
      failed_when: false

    - name: Debug Authentik startup logs
      debug:
        msg: "{{ startup_logs.stdout }}"

    - name: Write bootstrap token script
      copy:
        dest: /tmp/ensure_authentik_token.py
        content: |
          # Run inside Authentik's Django shell to ensure the bootstrap API token exists.
          # This is called via: ak shell --command "exec(open(...)read())"
          # Delete-and-recreate on every deploy so DB restores never carry a stale/wrong key.
          import sys
          try:
              from authentik.core.models import Token, User, TokenIntents
              user = User.objects.filter(username='akadmin').first()
              if not user:
                  print('NO_USER')
                  sys.exit(1)
              key = '{{ sso_bootstrap_token }}'
              Token.objects.filter(identifier='authentik-bootstrap-token').delete()
              t = Token.objects.create(
                  identifier='authentik-bootstrap-token',
                  user=user,
                  intent=TokenIntents.INTENT_API,
                  key=key,
                  expiring=False,
              )
              print('OK:' + t.key[:8])
          except Exception as e:
              print('ERROR:', str(e))
              sys.exit(1)

    - name: Copy bootstrap token script to container
      shell: docker cp /tmp/ensure_authentik_token.py authentik-server:/tmp/ensure_authentik_token.py

    - name: Ensure bootstrap token exists in Authentik DB
      # Wait for akadmin to be created (part of Authentik's own bootstrap),
      # then get_or_create the API token so subsequent API calls work.
      shell: |
        docker exec authentik-server ak shell \
          --command "exec(open('/tmp/ensure_authentik_token.py').read())" 2>&1
      register: token_ensure
      until: "'OK:' in token_ensure.stdout"
      retries: 10
      delay: 15
      changed_when: false

    - name: Debug token creation result
      debug:
        msg: "{{ token_ensure.stdout }}"

    # ── Authentik API — configure Vault OIDC provider ────────────────────────
    # Idempotent: checks if the provider/application already exists before creating.
    # Writes client_id, client_secret, and discovery_url to the env vault so
    # vault-ct can read them and configure its OIDC auth method.

    - name: Get Authentik signing keys
      uri:
        url: "http://localhost:9000/api/v3/crypto/certificatekeypairs/"
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
      register: authentik_signing_keys

    - name: Get Authentik authorization flows
      uri:
        url: "http://localhost:9000/api/v3/flows/instances/?designation=authorization"
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
      register: authentik_auth_flows

    - name: Get Authentik invalidation flows
      uri:
        url: "http://localhost:9000/api/v3/flows/instances/?designation=invalidation"
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
      register: authentik_invalidation_flows

    - name: Get Authentik OIDC scope property mappings
      uri:
        url: "http://localhost:9000/api/v3/propertymappings/provider/scope/"
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
      register: authentik_scope_mappings

    - name: Check if Vault OAuth2 provider already exists
      uri:
        url: "http://localhost:9000/api/v3/providers/oauth2/?name=Vault"
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
      register: existing_vault_provider

    - name: Set Authentik resource facts
      set_fact:
        # Browser-facing Authentik URL — matches the iss claim Authentik puts in tokens.
        # OIDC consumers (Rancher, Vault) must use this as their issuer so token
        # validation succeeds; using the internal IP causes an iss mismatch.
        _sso_host_browser: "{% if vault_env == 'prod' %}https://auth.databaes.net{% else %}https://auth-dev.databaes.net{% endif %}"
        # Take the first signing key (Authentik always has one default)
        _signing_key: "{{ authentik_signing_keys.json.results[0].pk }}"
        # Prefer implicit consent flow (better UX for homelab), fallback to first
        _auth_flow: >-
          {{ (authentik_auth_flows.json.results
              | selectattr('slug', 'search', 'implicit')
              | map(attribute='pk')
              | list
              + authentik_auth_flows.json.results | map(attribute='pk') | list)
             | first }}
        _invalidation_flow: "{{ authentik_invalidation_flows.json.results[0].pk | default('') }}"
        # Standard OIDC scopes: openid, email, profile, plus groups for policy mapping
        _scope_mappings: >-
          {{ authentik_scope_mappings.json.results
             | selectattr('managed', 'search', 'goauthentik.io/providers/oauth2/scope-(openid|email|profile|groups)')
             | map(attribute='pk') | list }}
        _vault_provider_exists: "{{ existing_vault_provider.json.pagination.count > 0 }}"
        _existing_client_id: "{{ existing_vault_provider.json.results[0].client_id | default('') }}"
        _existing_client_secret: "{{ existing_vault_provider.json.results[0].client_secret | default('') }}"
        _existing_provider_pk: "{{ existing_vault_provider.json.results[0].pk | default('') }}"
        # Build redirect_uris as a proper list of dicts via set_fact to avoid
        # Ansible uri module serialising inline YAML map-in-list items as strings.
        _vault_redirect_uris:
          - {url: "http://192.168.50.200:8200/ui/vault/auth/oidc/oidc/callback", matching_mode: "strict"}
          - {url: "http://192.168.20.45:8200/ui/vault/auth/oidc/oidc/callback", matching_mode: "strict"}
          - {url: "http://192.168.20.46:8200/ui/vault/auth/oidc/oidc/callback", matching_mode: "strict"}
          - {url: "http://192.168.10.45:8200/ui/vault/auth/oidc/oidc/callback", matching_mode: "strict"}
          - {url: "http://192.168.10.46:8200/ui/vault/auth/oidc/oidc/callback", matching_mode: "strict"}
          - {url: "http://localhost:8250/oidc/callback", matching_mode: "strict"}
          - {url: "http://localhost:8200/oidc/callback", matching_mode: "strict"}

    - name: Create Vault OAuth2 provider in Authentik
      uri:
        url: "http://localhost:9000/api/v3/providers/oauth2/"
        method: POST
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
        body_format: json
        body:
          name: "Vault"
          client_type: "confidential"
          redirect_uris: "{{ _vault_redirect_uris }}"
          sub_mode: "user_id"
          include_claims_in_id_token: true
          signing_key: "{{ _signing_key }}"
          authorization_flow: "{{ _auth_flow }}"
          invalidation_flow: "{{ _invalidation_flow }}"
          property_mappings: "{{ _scope_mappings }}"
        status_code: 201
      register: created_vault_provider
      when: not _vault_provider_exists

    - name: Update Vault OAuth2 provider redirect URIs in Authentik
      uri:
        url: "http://localhost:9000/api/v3/providers/oauth2/{{ _existing_provider_pk }}/"
        method: PATCH
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
        body_format: json
        body:
          redirect_uris: "{{ _vault_redirect_uris }}"
        status_code: 200
      when: _vault_provider_exists

    - name: Resolve final provider facts (created vs existing)
      set_fact:
        _vault_provider_pk: "{{ created_vault_provider.json.pk if not _vault_provider_exists else _existing_provider_pk }}"
        _vault_client_id: "{{ created_vault_provider.json.client_id if not _vault_provider_exists else _existing_client_id }}"
        _vault_client_secret: "{{ created_vault_provider.json.client_secret if not _vault_provider_exists else _existing_client_secret }}"

    - name: Check if Vault application already exists
      uri:
        url: "http://localhost:9000/api/v3/core/applications/?slug=vault"
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
      register: existing_vault_app

    - name: Create Vault application in Authentik
      uri:
        url: "http://localhost:9000/api/v3/core/applications/"
        method: POST
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
        body_format: json
        body:
          name: "Vault"
          slug: "vault"
          provider: "{{ _vault_provider_pk }}"
          open_in_new_tab: true
        status_code: 201
      when: existing_vault_app.json.pagination.count == 0

    # ── Authentik API — configure Rancher OIDC provider ──────────────────────

    - name: Check if Rancher OAuth2 provider already exists
      uri:
        url: "http://localhost:9000/api/v3/providers/oauth2/?name=Rancher"
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
      register: existing_rancher_provider

    - name: Set Rancher resource facts
      set_fact:
        _rancher_provider_exists: "{{ existing_rancher_provider.json.pagination.count > 0 }}"
        _existing_rancher_client_id: "{{ existing_rancher_provider.json.results[0].client_id | default('') }}"
        _existing_rancher_client_secret: "{{ existing_rancher_provider.json.results[0].client_secret | default('') }}"
        _existing_rancher_provider_pk: "{{ existing_rancher_provider.json.results[0].pk | default('') }}"
        _rancher_redirect_uris:
          - {url: "https://rancher-dev.databaes.net/verify-auth", matching_mode: "strict"}
          - {url: "https://rancher.databaes.net/verify-auth", matching_mode: "strict"}

    - name: Create Rancher OAuth2 provider in Authentik
      uri:
        url: "http://localhost:9000/api/v3/providers/oauth2/"
        method: POST
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
        body_format: json
        body:
          name: "Rancher"
          client_type: "confidential"
          redirect_uris: "{{ _rancher_redirect_uris }}"
          sub_mode: "user_id"
          include_claims_in_id_token: true
          signing_key: "{{ _signing_key }}"
          authorization_flow: "{{ _auth_flow }}"
          invalidation_flow: "{{ _invalidation_flow }}"
          property_mappings: "{{ _scope_mappings }}"
        status_code: 201
      register: created_rancher_provider
      when: not _rancher_provider_exists

    - name: Resolve final Rancher provider facts
      set_fact:
        _rancher_provider_pk: "{{ created_rancher_provider.json.pk if not _rancher_provider_exists else _existing_rancher_provider_pk }}"
        _rancher_client_id: "{{ created_rancher_provider.json.client_id if not _rancher_provider_exists else _existing_rancher_client_id }}"
        _rancher_client_secret: "{{ created_rancher_provider.json.client_secret if not _rancher_provider_exists else _existing_rancher_client_secret }}"

    - name: Check if Rancher application already exists
      uri:
        url: "http://localhost:9000/api/v3/core/applications/?slug=rancher"
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
      register: existing_rancher_app

    - name: Create Rancher application in Authentik
      uri:
        url: "http://localhost:9000/api/v3/core/applications/"
        method: POST
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
        body_format: json
        body:
          name: "Rancher"
          slug: "rancher"
          provider: "{{ _rancher_provider_pk }}"
          open_in_new_tab: true
        status_code: 201
      when: existing_rancher_app.json.pagination.count == 0

    - name: Store Rancher OIDC credentials in env vault
      delegate_to: localhost
      become: no
      shell: |
        case "{{ vault_env | default('dev') }}" in
          dev)
            export VAULT_ADDR="{{ lookup('env', 'VAULT_ADDR') }}"
            export VAULT_TOKEN="{{ lookup('env', 'VAULT_TOKEN') }}"
            ;;
          prod)
            export VAULT_ADDR="{{ lookup('env', 'VAULT_PROD_ADDR') }}"
            export VAULT_TOKEN="{{ lookup('env', 'VAULT_PROD_TOKEN') }}"
            ;;
        esac
        vault kv put secret/authentik/rancher-oidc \
          client_id="{{ _rancher_client_id }}" \
          client_secret="{{ _rancher_client_secret }}" \
          sso_ip="{{ ansible_host }}" \
          discovery_url="{{ _sso_host_browser }}/application/o/rancher/"

        # Also write to bootstrap vault so rancher pipeline re-runs can re-seed this secret
        VAULT_ADDR="{{ lookup('env', 'VAULT_BOOTSTRAP_ADDR') }}" \
        VAULT_TOKEN="{{ lookup('env', 'VAULT_DEV_TOKEN') }}" \
          vault kv put secret/authentik/{{ vault_env | default('dev') }}/rancher-oidc \
            client_id="{{ _rancher_client_id }}" \
            client_secret="{{ _rancher_client_secret }}" \
            sso_ip="{{ ansible_host }}" \
            discovery_url="{{ _sso_host_browser }}/application/o/rancher/"
      no_log: true

    # Query Authentik for superuser groups (is_superuser=true on the group object).
    # We use group-based globalRoleBindings (groupPrincipalId) because Rancher's v3 API
    # does NOT accept userPrincipalName on globalRoleBindings — only groupPrincipalId or userId.
    # Group principals survive across Rancher redeploys and don't require a prior login.
    - name: Fetch Authentik superuser groups for Rancher RBAC
      uri:
        url: "http://localhost:9000/api/v3/core/groups/?is_superuser=true"
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
      register: authentik_admin_groups

    - name: Store Rancher RBAC bindings in bootstrap Vault
      delegate_to: localhost
      become: no
      shell: |
        GLOBAL_BINDINGS=$(python3 -c "import json; names={{ authentik_admin_groups.json.results | map(attribute='name') | list | to_json }}; print(json.dumps([{'groupPrincipalId':'genericoidc_group://'+n,'globalRoleId':'admin'} for n in names]))")
        echo "Superuser groups: {{ authentik_admin_groups.json.results | map(attribute='name') | list | join(', ') }}"
        # Patch if secret exists, otherwise create it — preserves any manually set cluster_bindings.
        VAULT_ADDR="{{ lookup('env', 'VAULT_BOOTSTRAP_ADDR') }}" \
        VAULT_TOKEN="{{ lookup('env', 'VAULT_DEV_TOKEN') }}" \
          vault kv patch secret/rancher/{{ vault_env | default('dev') }}/rbac \
            global_bindings="$GLOBAL_BINDINGS" 2>/dev/null \
        || \
        VAULT_ADDR="{{ lookup('env', 'VAULT_BOOTSTRAP_ADDR') }}" \
        VAULT_TOKEN="{{ lookup('env', 'VAULT_DEV_TOKEN') }}" \
          vault kv put secret/rancher/{{ vault_env | default('dev') }}/rbac \
            global_bindings="$GLOBAL_BINDINGS" \
            cluster_bindings="[]"
        echo "Rancher RBAC bindings stored ({{ authentik_admin_groups.json.results | length }} admin group(s))"

    - name: Store Vault OIDC credentials in env vault
      delegate_to: localhost
      become: no
      shell: |
        case "{{ vault_env | default('dev') }}" in
          dev)
            export VAULT_ADDR="{{ lookup('env', 'VAULT_ADDR') }}"
            export VAULT_TOKEN="{{ lookup('env', 'VAULT_TOKEN') }}"
            ;;
          prod)
            export VAULT_ADDR="{{ lookup('env', 'VAULT_PROD_ADDR') }}"
            export VAULT_TOKEN="{{ lookup('env', 'VAULT_PROD_TOKEN') }}"
            ;;
        esac
        vault kv put secret/authentik/vault-oidc \
          client_id="{{ _vault_client_id }}" \
          client_secret="{{ _vault_client_secret }}" \
          sso_ip="{{ ansible_host }}" \
          discovery_url="{{ _sso_host_browser }}/application/o/vault/"

        # Also write to bootstrap vault so vault-ct redeploys can re-seed this secret
        VAULT_ADDR="{{ lookup('env', 'VAULT_BOOTSTRAP_ADDR') }}" \
        VAULT_TOKEN="{{ lookup('env', 'VAULT_DEV_TOKEN') }}" \
          vault kv put secret/authentik/{{ vault_env | default('dev') }}/vault-oidc \
            client_id="{{ _vault_client_id }}" \
            client_secret="{{ _vault_client_secret }}" \
            sso_ip="{{ ansible_host }}" \
            discovery_url="{{ _sso_host_browser }}/application/o/vault/"
      no_log: true

    # ── Authentik API — configure Grafana OIDC provider ──────────────────────
    # Grafana uses Generic OAuth (GF_AUTH_GENERIC_OAUTH_*) which is standard OIDC.
    # Credentials are written to Vault so the monitoring pipeline can inject them
    # into the Grafana docker-compose .env at deploy time.

    - name: Check if Grafana OAuth2 provider already exists
      uri:
        url: "http://localhost:9000/api/v3/providers/oauth2/?name=Grafana"
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
      register: existing_grafana_provider

    - name: Set Grafana resource facts
      set_fact:
        _grafana_provider_exists: "{{ existing_grafana_provider.json.pagination.count > 0 }}"
        _existing_grafana_client_id: "{{ existing_grafana_provider.json.results[0].client_id | default('') }}"
        _existing_grafana_client_secret: "{{ existing_grafana_provider.json.results[0].client_secret | default('') }}"
        _existing_grafana_provider_pk: "{{ existing_grafana_provider.json.results[0].pk | default('') }}"
        _grafana_redirect_uris:
          - {url: "https://grafana.databaes.net/login/generic_oauth", matching_mode: "strict"}
          - {url: "https://grafana-dev.databaes.net/login/generic_oauth", matching_mode: "strict"}

    - name: Create Grafana OAuth2 provider in Authentik
      uri:
        url: "http://localhost:9000/api/v3/providers/oauth2/"
        method: POST
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
        body_format: json
        body:
          name: "Grafana"
          client_type: "confidential"
          redirect_uris: "{{ _grafana_redirect_uris }}"
          sub_mode: "user_id"
          include_claims_in_id_token: true
          signing_key: "{{ _signing_key }}"
          authorization_flow: "{{ _auth_flow }}"
          invalidation_flow: "{{ _invalidation_flow }}"
          property_mappings: "{{ _scope_mappings }}"
        status_code: 201
      register: created_grafana_provider
      when: not _grafana_provider_exists

    - name: Update Grafana OAuth2 provider redirect URIs in Authentik
      uri:
        url: "http://localhost:9000/api/v3/providers/oauth2/{{ _existing_grafana_provider_pk }}/"
        method: PATCH
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
        body_format: json
        body:
          redirect_uris: "{{ _grafana_redirect_uris }}"
        status_code: 200
      when: _grafana_provider_exists

    - name: Resolve final Grafana provider facts
      set_fact:
        _grafana_provider_pk: "{{ created_grafana_provider.json.pk if not _grafana_provider_exists else _existing_grafana_provider_pk }}"
        _grafana_client_id: "{{ created_grafana_provider.json.client_id if not _grafana_provider_exists else _existing_grafana_client_id }}"
        _grafana_client_secret: "{{ created_grafana_provider.json.client_secret if not _grafana_provider_exists else _existing_grafana_client_secret }}"

    - name: Check if Grafana application already exists
      uri:
        url: "http://localhost:9000/api/v3/core/applications/?slug=grafana"
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
      register: existing_grafana_app

    - name: Create Grafana application in Authentik
      uri:
        url: "http://localhost:9000/api/v3/core/applications/"
        method: POST
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
        body_format: json
        body:
          name: "Grafana"
          slug: "grafana"
          provider: "{{ _grafana_provider_pk }}"
          open_in_new_tab: true
        status_code: 201
      when: existing_grafana_app.json.pagination.count == 0

    - name: Store Grafana OIDC credentials in env vault
      delegate_to: localhost
      become: no
      shell: |
        case "{{ vault_env | default('dev') }}" in
          dev)
            export VAULT_ADDR="{{ lookup('env', 'VAULT_ADDR') }}"
            export VAULT_TOKEN="{{ lookup('env', 'VAULT_TOKEN') }}"
            ;;
          prod)
            export VAULT_ADDR="{{ lookup('env', 'VAULT_PROD_ADDR') }}"
            export VAULT_TOKEN="{{ lookup('env', 'VAULT_PROD_TOKEN') }}"
            ;;
        esac
        vault kv put secret/authentik/grafana-oidc \
          client_id="{{ _grafana_client_id }}" \
          client_secret="{{ _grafana_client_secret }}" \
          sso_ip="{{ ansible_host }}" \
          discovery_url="{{ _sso_host_browser }}/application/o/grafana/"

        # Also write to bootstrap vault so monitoring pipeline re-runs can re-seed this secret
        VAULT_ADDR="{{ lookup('env', 'VAULT_BOOTSTRAP_ADDR') }}" \
        VAULT_TOKEN="{{ lookup('env', 'VAULT_DEV_TOKEN') }}" \
          vault kv put secret/authentik/{{ vault_env | default('dev') }}/grafana-oidc \
            client_id="{{ _grafana_client_id }}" \
            client_secret="{{ _grafana_client_secret }}" \
            sso_ip="{{ ansible_host }}" \
            discovery_url="{{ _sso_host_browser }}/application/o/grafana/"
      no_log: true

    # ── Authentik API — configure WikiJS Proxy provider ──────────────────────
    # WikiJS is gated by the Traefik authentik-dev/prod forwardAuth middleware.
    # A Proxy Provider (forward_single mode) must exist in Authentik and be
    # assigned to the embedded outpost so it can handle the auth challenge.

    - name: Check if WikiJS Proxy provider already exists
      uri:
        url: "http://localhost:9000/api/v3/providers/proxy/?name=WikiJS"
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
      register: existing_wikijs_provider

    - name: Set WikiJS provider facts
      set_fact:
        _wikijs_provider_exists: "{{ existing_wikijs_provider.json.pagination.count > 0 }}"
        _existing_wikijs_provider_pk: "{{ existing_wikijs_provider.json.results[0].pk | default('') }}"
        _wikijs_external_host: "{% if vault_env == 'prod' %}https://wikijs.databaes.net{% else %}https://wikijs-dev.databaes.net{% endif %}"

    - name: Create WikiJS Proxy provider in Authentik
      uri:
        url: "http://localhost:9000/api/v3/providers/proxy/"
        method: POST
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
        body_format: json
        body:
          name: "WikiJS"
          authorization_flow: "{{ _auth_flow }}"
          invalidation_flow: "{{ _invalidation_flow }}"
          mode: "forward_single"
          external_host: "{{ _wikijs_external_host }}"
        status_code: 201
      register: created_wikijs_provider
      when: not _wikijs_provider_exists

    - name: Resolve final WikiJS provider pk
      set_fact:
        _wikijs_provider_pk: "{{ created_wikijs_provider.json.pk if not _wikijs_provider_exists else _existing_wikijs_provider_pk }}"

    - name: Check if WikiJS application already exists
      uri:
        url: "http://localhost:9000/api/v3/core/applications/?slug=wikijs"
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
      register: existing_wikijs_app

    - name: Create WikiJS application in Authentik
      uri:
        url: "http://localhost:9000/api/v3/core/applications/"
        method: POST
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
        body_format: json
        body:
          name: "WikiJS"
          slug: "wikijs"
          provider: "{{ _wikijs_provider_pk }}"
          open_in_new_tab: true
        status_code: 201
      when: existing_wikijs_app.json.pagination.count == 0

    # ── Assign WikiJS provider to the embedded outpost ───────────────────────

    - name: Get embedded outpost
      uri:
        url: "http://localhost:9000/api/v3/outposts/instances/?managed=goauthentik.io/outposts/embedded"
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
      register: embedded_outpost

    - name: Add WikiJS provider to embedded outpost
      uri:
        url: "http://localhost:9000/api/v3/outposts/instances/{{ embedded_outpost.json.results[0].pk }}/"
        method: PATCH
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
        body_format: json
        body:
          providers: "{{ (embedded_outpost.json.results[0].providers + [_wikijs_provider_pk | int]) | unique }}"
      when:
        - embedded_outpost.json.results | length > 0
        - (_wikijs_provider_pk | int) not in embedded_outpost.json.results[0].providers

    # ── Authentik Branding — databaes.net theme ───────────────────────────────
    # Applies the databaes.net visual identity (dark bg, orange accent, Inter
    # font, scanline overlay) to the Authentik login and admin UI via the
    # Brands API.  This is idempotent — PATCH overwrites existing values.

    - name: Get Authentik default brand
      tags: [branding]
      uri:
        url: "http://localhost:9000/api/v3/core/brands/"
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
      register: authentik_brands

    - name: Apply databaes.net branding to Authentik
      tags: [branding]
      uri:
        url: "http://localhost:9000/api/v3/core/brands/{{ authentik_brands.json.results[0].brand_uuid }}/"
        method: PATCH
        headers:
          Authorization: "Bearer {{ sso_bootstrap_token }}"
        body_format: json
        body:
          branding_title: "databaes.net"
          ui_theme: "dark"
          branding_custom_css: |
            /* ── databaes.net theme for Authentik ─────────────────────────── */
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

            /* ---------------------------------------------------------------- */
            /* Flow background — !important beats Authentik's inline <style>    */
            /* ---------------------------------------------------------------- */
            :root {
              --ak-flow-background: #161616 !important;
            }

            /* Force dark mode + palette */
            :root,
            html[data-theme],
            html[data-theme="light"] {
              color-scheme: dark;

              /* PatternFly 4 global token overrides — inherited into shadow DOM */
              --pf-global--BackgroundColor--100:      #161616;
              --pf-global--BackgroundColor--200:      #1f1f1f;
              --pf-global--BackgroundColor--300:      #272727;
              --pf-global--Color--100:                #e5e5e5;
              --pf-global--Color--200:                #888888;
              --pf-global--Color--300:                #555555;
              --pf-global--BorderColor--100:          #383838;
              --pf-global--primary-color--100:        #f97316;
              --pf-global--primary-color--200:        #c2570f;
              --pf-global--active-color--100:         #f97316;
              --pf-global--link--Color:               #f97316;
              --pf-global--link--Color--hover:        #c2570f;
              --pf-global--FontFamily--sans-serif:    'Inter', system-ui, sans-serif;
              --pf-global--FontFamily--monospace:     'Space Mono', 'JetBrains Mono', monospace;
              --pf-global--BorderRadius--sm:          10px;

              /* authentik-specific tokens */
              --ak-global--BackgroundColor--100:      #161616;
              --ak-global--Color--100:                #e5e5e5;
            }

            /* Page background */
            .pf-c-page,
            .pf-c-background-image,
            body,
            html {
              background-color: #161616 !important;
              font-family: 'Inter', system-ui, sans-serif !important;
            }

            /* Scanline texture overlay matching databaes.net body::after */
            body::after {
              content: "";
              position: fixed;
              inset: 0;
              background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.04) 2px,
                rgba(0, 0, 0, 0.04) 4px
              );
              pointer-events: none;
              z-index: 9999;
            }

            /* Login card */
            .pf-c-login__main,
            .pf-c-card {
              background-color: #1f1f1f !important;
              border: 1px solid #383838 !important;
              border-radius: 10px !important;
            }

            /* Card header / title */
            .pf-c-login__main-header,
            .pf-c-title {
              color: #e5e5e5 !important;
            }

            /* Labels and body text */
            .pf-c-form__label,
            .pf-c-login__main-body,
            .pf-c-login__main-footer {
              color: #e5e5e5 !important;
            }

            /* Inputs */
            .pf-c-form-control {
              background-color: #272727 !important;
              border-color: #383838 !important;
              border-radius: 10px !important;
              color: #e5e5e5 !important;
            }

            .pf-c-form-control:focus,
            .pf-c-form-control:focus-within {
              border-color: #f97316 !important;
              box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.18) !important;
              outline: none !important;
            }

            /* Primary button — orange */
            .pf-c-button.pf-m-primary {
              background-color: #f97316 !important;
              border-color: #f97316 !important;
              border-radius: 10px !important;
              color: #161616 !important;
              font-weight: 600 !important;
              font-family: 'Inter', system-ui, sans-serif !important;
            }

            .pf-c-button.pf-m-primary:hover,
            .pf-c-button.pf-m-primary:focus {
              background-color: #c2570f !important;
              border-color: #c2570f !important;
              box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.35) !important;
            }

            /* Secondary / link buttons */
            .pf-c-button.pf-m-link,
            .pf-c-button.pf-m-plain {
              color: #f97316 !important;
            }

            .pf-c-button.pf-m-link:hover {
              color: #c2570f !important;
            }

            /* Alert / error banners */
            .pf-c-alert.pf-m-danger {
              background-color: rgba(239, 68, 68, 0.12) !important;
              border-color: #ef4444 !important;
            }

            .pf-c-alert.pf-m-warning {
              background-color: rgba(234, 179, 8, 0.12) !important;
              border-color: #eab308 !important;
            }

            .pf-c-alert.pf-m-success {
              background-color: rgba(34, 197, 94, 0.12) !important;
              border-color: #22c55e !important;
            }

            /* Navigation sidebar (admin UI) */
            .pf-c-nav,
            .pf-c-page__sidebar {
              background-color: #1f1f1f !important;
              border-right: 1px solid #383838 !important;
            }

            .pf-c-nav__item .pf-c-nav__link {
              color: #e5e5e5 !important;
            }

            .pf-c-nav__item .pf-c-nav__link:hover,
            .pf-c-nav__item .pf-c-nav__link.pf-m-current {
              background-color: rgba(249, 115, 22, 0.18) !important;
              color: #f97316 !important;
            }

            /* Top masthead */
            .pf-c-page__header,
            .pf-c-masthead {
              background-color: #1f1f1f !important;
              border-bottom: 1px solid #383838 !important;
            }

            /* Data tables */
            .pf-c-table tr:hover td {
              background-color: #272727 !important;
            }

            .pf-c-table thead th {
              background-color: #1f1f1f !important;
              color: #888888 !important;
              border-color: #383838 !important;
            }

            /* Dropdown menus */
            .pf-c-dropdown__menu,
            .pf-c-select__menu {
              background-color: #272727 !important;
              border: 1px solid #383838 !important;
              border-radius: 10px !important;
            }

            .pf-c-dropdown__menu-item:hover,
            .pf-c-select__menu-item:hover {
              background-color: rgba(249, 115, 22, 0.18) !important;
              color: #f97316 !important;
            }
        attributes:
          settings:
            theme:
              base: dark
      when: authentik_brands.json.pagination.count > 0
