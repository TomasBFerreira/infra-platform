services:
  terraform:
    image: hashicorp/terraform:1.6.4
    container_name: terraform-runner
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ~/.ssh:/root/.ssh:ro
      - terraform_cache:/root/.terraform.d/plugin-cache
    environment:
      - TF_CACHE_PLUGIN_CACHE_DIR=/root/.terraform.d/plugin-cache
    # host networking: shares the host network namespace, so no new netns is
    # created and Docker does not attempt to write net.ipv4.* sysctls that are
    # blocked inside an LXC. Terraform only needs to reach Vault and Proxmox
    # APIs which are on the LAN — host network access is sufficient.
    network_mode: host
    profiles:
      - tools

  ansible:
    image: quay.io/ansible/ansible-core:2.17
    container_name: ansible-runner
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ~/.ssh:/root/.ssh:ro
      - ansible_cache:/root/.ansible
    network_mode: host
    profiles:
      - tools

volumes:
  terraform_cache:
  ansible_cache:
