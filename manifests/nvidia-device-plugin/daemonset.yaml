# NVIDIA k8s device plugin — advertises nvidia.com/gpu on GPU nodes so pods can
# request GPUs via resources.limits."nvidia.com/gpu". Runs through the `nvidia`
# RuntimeClass so the container sees the driver + /dev/nvidia* devices.
#
# Prerequisites on the node (see README.md): vfio passthrough on the Proxmox
# host, hostpci on the VM, the NVIDIA driver + nvidia-container-toolkit inside
# the guest, the k3s `nvidia` containerd runtime, and a raised inotify limit.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      runtimeClassName: nvidia
      priorityClassName: system-node-critical
      tolerations:
        # schedule onto GPU nodes even if they carry the nvidia.com/gpu taint
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - image: nvcr.io/nvidia/k8s-device-plugin:v0.17.1
          name: nvidia-device-plugin-ctr
          env:
            - name: FAIL_ON_INIT_ERROR
              value: "false"
            # required so the nvidia runtime injects the GPU into the plugin pod
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
