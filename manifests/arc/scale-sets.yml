# Source of truth for which (repo, env) pairs ARC manages.
#
# Mirror of ansible/github-runner/registered-repos.yml but per-repo, with
# explicit min/max replicas. The arc-deploy.yml workflow reads this file and
# helm-installs one scale set per matching entry.
#
# Phase 0: a single pilot scale set in dev only, label "dev-arc" so it doesn't
# collide with the existing LXC runner's "dev" label. Pilot repo runs the
# arc-smoketest.yml workflow against [self-hosted, dev-arc] to validate the
# stack before we cut any real workflow over.
#
# Cutover plan: as each repo migrates, change its scale-set label here from
# "<env>-arc" to "<env>" and decommission the LXC runner registration. See
# docs/arc-migration.md for the per-phase steps.

scale_sets:
  # ── Pilot ────────────────────────────────────────────────────────────────
  - repo: TomasBFerreira/infra-platform
    env: dev
    label: dev-arc          # intentionally distinct from "dev" during pilot
    name: arc-pilot-dev
    min_runners: 0
    max_runners: 2

  # ── QA + prod pilots (added 2026-05-19 for network-vm split Phase 1) ────
  # Mirrors arc-pilot-dev so the network-vm-split pipelines have a per-env
  # ARC target. Labels stay {env}-arc to keep the "pilot is distinct from
  # the legacy LXC label" convention. Run arc-deploy.yml with env=qa then
  # env=prod to provision the controller + scale set on each env's k3s.
  # Same-cluster terraform state lives in the `terraform-state` namespace
  # created by the deploy workflow (see network-vm-split-2026-05-19.md).
  - repo: TomasBFerreira/infra-platform
    env: qa
    label: qa-arc
    name: arc-pilot-qa
    min_runners: 0
    max_runners: 2
  - repo: TomasBFerreira/infra-platform
    env: prod
    label: prod-arc
    name: arc-pilot-prod
    min_runners: 0
    max_runners: 2

  # ── First real cutover (2026-05-13) ──────────────────────────────────────
  # Only the deploy.yml's two self-hosted jobs in traefik-gitops are wired to
  # this scale set; the ~48 diagnostic workflows in that repo still target the
  # LXC runner via `runs-on: self-hosted`. We'll migrate those once deploy.yml
  # has a week of clean runs through ARC.
  - repo: TomasBFerreira/traefik-gitops
    env: dev
    label: dev          # unused under ARC v0.10's name-based routing; kept for future modes
    name: traefik-gitops-dev
    min_runners: 0
    max_runners: 3

  # ── Streambox cutover (re-attempted 2026-05-14, push branch only) ───────
  # Streambox is the user's most-active CD path (Tomaj Flix deploys land
  # frequently). The push-to-main deploy now routes through this scale set
  # via the same build-on-ubuntu-latest + crane-pull-tarball + k3s-import
  # pattern that landing-page uses (the original 2026-05-13 cutover was
  # reverted because streambox previously built with `docker build` on the
  # deploy runner — ARC pods have no Docker daemon; that's been fixed in
  # streambox#52 + #54). workflow_dispatch path stays on the LXC runner as
  # a fallback during soak and is what prod deploys use.
  - repo: TomasBFerreira/streambox
    env: dev
    label: dev
    name: streambox-dev
    min_runners: 0
    max_runners: 2

  # ── landing-page cutover (build-on-ubuntu-latest + deploy-on-arc) ───────
  # Uses the standard ops-portal-style pattern: build/push on GH-hosted, then
  # deploy step crane-pulls the image and `k3s ctr images import`s it onto
  # the worker (airgap-friendly). Needs crane + kustomize baked in the
  # runner image (see Dockerfile).
  - repo: TomasBFerreira/landing-page
    env: dev
    label: dev
    name: landing-page-dev
    min_runners: 0
    max_runners: 2

  # ── signup-page onboarding (ARC-first new SPA, 2026-05-13) ──────────────
  # Public signup page for friends/family tomajflix accounts. Same
  # build-on-ubuntu-latest + crane-pull + k3s-import pattern as landing-page.
  - repo: TomasBFerreira/signup-page
    env: dev
    label: dev
    name: signup-page-dev
    min_runners: 0
    max_runners: 2

  # ── nextcloud dev path (staging for LXC → k3s migration, 2026-05-19) ────
  # Prod nextcloud still serves cloud.databaes.net from CT 105 on betsy; this
  # scale set is for the dev path so we can validate the k3s manifests under
  # ARC before any data move. Prod stays on the [self-hosted, prod] LXC
  # runner until ARC is rolled out to the prod cluster. Migration scoping:
  # /app/issues/nextcloud-lxc-to-k3s-migration.md.
  - repo: TomasBFerreira/nextcloud
    env: dev
    label: dev
    name: nextcloud-dev
    min_runners: 0
    max_runners: 2

