# Source of truth for which (repo, env) pairs ARC manages.
#
# Mirror of ansible/github-runner/registered-repos.yml but per-repo, with
# explicit min/max replicas. The arc-deploy.yml workflow reads this file and
# helm-installs one scale set per matching entry.
#
# Phase 0: a single pilot scale set in dev only, label "dev-arc" so it doesn't
# collide with the existing LXC runner's "dev" label. Pilot repo runs the
# arc-smoketest.yml workflow against [self-hosted, dev-arc] to validate the
# stack before we cut any real workflow over.
#
# Cutover plan: as each repo migrates, change its scale-set label here from
# "<env>-arc" to "<env>" and decommission the LXC runner registration. See
# docs/arc-migration.md for the per-phase steps.

scale_sets:
  # ── Pilot ────────────────────────────────────────────────────────────────
  - repo: TomasBFerreira/infra-platform
    env: dev
    label: dev-arc          # intentionally distinct from "dev" during pilot
    name: arc-pilot-dev
    min_runners: 0
    max_runners: 2

  # ── First real cutover (2026-05-13) ──────────────────────────────────────
  # Only the deploy.yml's two self-hosted jobs in traefik-gitops are wired to
  # this scale set; the ~48 diagnostic workflows in that repo still target the
  # LXC runner via `runs-on: self-hosted`. We'll migrate those once deploy.yml
  # has a week of clean runs through ARC.
  - repo: TomasBFerreira/traefik-gitops
    env: dev
    label: dev          # unused under ARC v0.10's name-based routing; kept for future modes
    name: traefik-gitops-dev
    min_runners: 0
    max_runners: 3

  # ── Streambox cutover (2026-05-13, push branch only initially) ──────────
  # Streambox is the user's most-active CD path (Tomaj Flix deploys land
  # frequently). Migrating its push-to-main deploy through ARC gives daily
  # signal that the stack is healthy. workflow_dispatch path stays on the
  # LXC runner as a fallback for now.
  - repo: TomasBFerreira/streambox
    env: dev
    label: dev
    name: streambox-dev
    min_runners: 0
    max_runners: 2

  # ── Queued for later cutover (uncomment when the repo above is green) ────
  # - repo: TomasBFerreira/landing-page
