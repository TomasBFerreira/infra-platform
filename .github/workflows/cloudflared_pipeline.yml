name: Cloudflared Pipeline (ARC)

# Blue/green deploy of the cloudflared LXC via the ARC ephemeral-runner stack.
# Prereq: arc-deploy.yml has been dispatched for the target env so the
# `arc-pilot-<env>` scale set + the `terraform-state` namespace + RBAC exist.
# State is stored as Kubernetes Secrets in `terraform-state` (same cluster as
# the pod), keyed by `secret_suffix=cloudflared-<slot>-<env>`.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod

concurrency:
  group: cloudflared-pipeline-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: true

jobs:
  resolve-slots:
    runs-on: arc-pilot-${{ github.event.inputs.environment || 'dev' }}
    outputs:
      environment: ${{ steps.slots.outputs.environment }}
      pve_api_url: ${{ steps.slots.outputs.pve_api_url }}
      pve_node: ${{ steps.slots.outputs.pve_node }}
      active_slot: ${{ steps.slots.outputs.active_slot }}
      active_vmid: ${{ steps.slots.outputs.active_vmid }}
      active_ip: ${{ steps.slots.outputs.active_ip }}
      active_host: ${{ steps.slots.outputs.active_host }}
      staging_slot: ${{ steps.slots.outputs.staging_slot }}
      staging_vmid: ${{ steps.slots.outputs.staging_vmid }}
      staging_ip: ${{ steps.slots.outputs.staging_ip }}
      staging_host: ${{ steps.slots.outputs.staging_host }}
      first_run: ${{ steps.slots.outputs.first_run }}
      gateway: ${{ steps.slots.outputs.gateway }}
      network_bridge: ${{ steps.slots.outputs.network_bridge }}
    steps:
      - name: Resolve active and staging slots
        id: slots
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
          PVE_USER: ${{ secrets.PVE_USER }}
          PVE_PASS_DEV_QA: ${{ secrets.PVE_PASS }}
          PVE_PASS_PROD:   ${{ secrets.PVE_PROD_PASS }}
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"

          case "$ENV" in
            dev)
              BLUE_VMID=293;  BLUE_IP="192.168.20.93"
              GREEN_VMID=294; GREEN_IP="192.168.20.94"
              PVE_NODE="benedict"
              PVE_API_URL="https://192.168.50.4:8006/api2/json"
              GATEWAY="192.168.20.1"; NETWORK_BRIDGE="vmbr20"
              PVE_PASS="$PVE_PASS_DEV_QA"
              ;;
            qa)
              BLUE_VMID=393;  BLUE_IP="192.168.30.93"
              GREEN_VMID=394; GREEN_IP="192.168.30.94"
              PVE_NODE="heaton"
              PVE_API_URL="https://192.168.50.8:8006/api2/json"
              GATEWAY="192.168.30.1"; NETWORK_BRIDGE="vmbr30"
              PVE_PASS="$PVE_PASS_DEV_QA"
              ;;
            prod)
              BLUE_VMID=193;  BLUE_IP="192.168.10.93"
              GREEN_VMID=194; GREEN_IP="192.168.10.94"
              PVE_NODE="betsy"
              PVE_API_URL="https://192.168.50.2:8006/api2/json"
              GATEWAY="192.168.10.1"; NETWORK_BRIDGE="vmbr10"
              PVE_PASS="$PVE_PASS_PROD"
              ;;
          esac

          BLUE_HOST="cloudflared-lxc-blue"
          GREEN_HOST="cloudflared-lxc-green"

          ACTIVE_SLOT=$(vault kv get -field=slot secret/cloudflared/$ENV/active-slot 2>/dev/null || echo "")

          # ─── First-run trap guard (same pattern as PR #294 for network-vm) ────
          # An empty Vault slot could be data corruption (write-empty from a prior
          # run) rather than a genuine first deploy. Cross-check Proxmox: if
          # either VMID already exists, refuse to treat as first-run.
          if [ -z "$ACTIVE_SLOT" ]; then
            echo "::warning::Vault returned empty active-slot for $ENV — probing PVE before treating as first-run"
            TICKET_RESP=$(curl -sk --max-time 10 -X POST "${PVE_API_URL}/access/ticket" \
              --data-urlencode "username=${PVE_USER}" \
              --data-urlencode "password=${PVE_PASS}")
            PVE_TICKET=$(echo "$TICKET_RESP" | python3 -c 'import json,sys;print(json.load(sys.stdin)["data"]["ticket"])' 2>/dev/null)
            if [ -z "$PVE_TICKET" ]; then
              echo "::error::Could not authenticate to PVE at $PVE_API_URL — cannot safely decide first-run"
              exit 1
            fi
            EXISTING=""
            for VMID in "$BLUE_VMID" "$GREEN_VMID"; do
              STATUS=$(curl -sk --max-time 10 -o /dev/null -w "%{http_code}" \
                -H "Cookie: PVEAuthCookie=${PVE_TICKET}" \
                "${PVE_API_URL}/nodes/${PVE_NODE}/lxc/${VMID}/status/current")
              [ "$STATUS" = "200" ] && EXISTING="$EXISTING $VMID"
            done
            if [ -n "$EXISTING" ]; then
              echo "::error::Vault slot empty but CTs already exist:$EXISTING on $PVE_NODE."
              echo "::error::Refusing to treat as first-run — would destroy the existing CT."
              echo "::error::Recovery: vault kv put secret/cloudflared/$ENV/active-slot slot=<blue|green> vmid=<vmid> ip=<ip>"
              exit 1
            fi
            echo "No CT at $BLUE_VMID or $GREEN_VMID — genuine first run, deploying to blue"
            ACTIVE_SLOT="none"
          fi

          if [ "$ACTIVE_SLOT" = "none" ]; then
            STAGING_SLOT="blue"
            STAGING_VMID="$BLUE_VMID"; STAGING_IP="$BLUE_IP"; STAGING_HOST="$BLUE_HOST"
            ACTIVE_VMID=""; ACTIVE_IP=""; ACTIVE_HOST=""
            FIRST_RUN="true"
          elif [ "$ACTIVE_SLOT" = "blue" ]; then
            STAGING_SLOT="green"
            STAGING_VMID="$GREEN_VMID"; STAGING_IP="$GREEN_IP"; STAGING_HOST="$GREEN_HOST"
            ACTIVE_VMID="$BLUE_VMID"; ACTIVE_IP="$BLUE_IP"; ACTIVE_HOST="$BLUE_HOST"
            FIRST_RUN="false"
          else
            STAGING_SLOT="blue"
            STAGING_VMID="$BLUE_VMID"; STAGING_IP="$BLUE_IP"; STAGING_HOST="$BLUE_HOST"
            ACTIVE_VMID="$GREEN_VMID"; ACTIVE_IP="$GREEN_IP"; ACTIVE_HOST="$GREEN_HOST"
            FIRST_RUN="false"
          fi

          {
            echo "environment=$ENV"
            echo "pve_api_url=$PVE_API_URL"
            echo "pve_node=$PVE_NODE"
            echo "active_slot=$ACTIVE_SLOT"
            echo "active_vmid=$ACTIVE_VMID"
            echo "active_ip=$ACTIVE_IP"
            echo "active_host=$ACTIVE_HOST"
            echo "staging_slot=$STAGING_SLOT"
            echo "staging_vmid=$STAGING_VMID"
            echo "staging_ip=$STAGING_IP"
            echo "staging_host=$STAGING_HOST"
            echo "first_run=$FIRST_RUN"
            echo "gateway=$GATEWAY"
            echo "network_bridge=$NETWORK_BRIDGE"
          } >> "$GITHUB_OUTPUT"

  terraform-staging:
    needs: resolve-slots
    runs-on: arc-pilot-${{ needs.resolve-slots.outputs.environment }}
    env:
      ENV: ${{ needs.resolve-slots.outputs.environment }}
      STAGING_SLOT: ${{ needs.resolve-slots.outputs.staging_slot }}
      STAGING_VMID: ${{ needs.resolve-slots.outputs.staging_vmid }}
      STAGING_IP: ${{ needs.resolve-slots.outputs.staging_ip }}
      STAGING_HOST: ${{ needs.resolve-slots.outputs.staging_host }}
      TF_VAR_pve_api: ${{ needs.resolve-slots.outputs.pve_api_url }}
      TF_VAR_pve_user: ${{ secrets.PVE_USER }}
      TF_VAR_pve_pass: ${{ needs.resolve-slots.outputs.environment == 'prod' && secrets.PVE_PROD_PASS || secrets.PVE_PASS }}
      TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
      TF_VAR_vault_token: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
      TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      TF_VAR_target_node: ${{ needs.resolve-slots.outputs.pve_node }}
      TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
      TF_VAR_gateway: ${{ needs.resolve-slots.outputs.gateway }}
      TF_VAR_vmid: ${{ needs.resolve-slots.outputs.staging_vmid }}
      TF_VAR_ip_address: ${{ needs.resolve-slots.outputs.staging_ip }}
      TF_VAR_vm_hostname: ${{ needs.resolve-slots.outputs.staging_host }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Proxmox SSH key from vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/github_runner_proxmox_access \
            | awk 'NF > 0' > /tmp/pve_key
          chmod 600 /tmp/pve_key

      - name: Terraform Init
        working-directory: terraform/cloudflared
        run: |
          terraform init -input=false \
            -backend-config="secret_suffix=cloudflared-${STAGING_SLOT}-${ENV}"

      - name: Pre-flight — destroy any stale staging LXC
        working-directory: terraform/cloudflared
        env:
          PVE_API: ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          terraform destroy -no-color -input=false -auto-approve || true
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no -i /tmp/pve_key ${PVE_SSH_USER}@${PVE_HOST} \
            "pct stop ${STAGING_VMID} 2>/dev/null || true; pct destroy ${STAGING_VMID} 2>/dev/null || true"

      - name: Terraform Apply
        working-directory: terraform/cloudflared
        run: terraform apply -no-color -input=false -auto-approve

  configure-tun-staging:
    needs: [resolve-slots, terraform-staging]
    runs-on: arc-pilot-${{ needs.resolve-slots.outputs.environment }}
    env:
      STAGING_VMID: ${{ needs.resolve-slots.outputs.staging_vmid }}
      STAGING_IP: ${{ needs.resolve-slots.outputs.staging_ip }}
    steps:
      - name: Fetch Proxmox SSH key from vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/github_runner_proxmox_access \
            | awk 'NF > 0' > /tmp/pve_key
          chmod 600 /tmp/pve_key

      - name: Configure TUN device via SSH to Proxmox host
        env:
          PVE_API: ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no -i /tmp/pve_key ${PVE_SSH_USER}@${PVE_HOST} bash -s -- "${STAGING_VMID}" << 'SSHEOF'
            VMID="$1"
            grep -q 'lxc.cgroup2.devices.allow: c 10:200 rwm' /etc/pve/lxc/${VMID}.conf \
              || echo 'lxc.cgroup2.devices.allow: c 10:200 rwm' >> /etc/pve/lxc/${VMID}.conf
            grep -q 'lxc.mount.entry.*tun' /etc/pve/lxc/${VMID}.conf \
              || echo 'lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file' >> /etc/pve/lxc/${VMID}.conf
            pct reboot ${VMID}
          SSHEOF
          echo "TUN configured, waiting for reboot..."
          sleep 15

      - name: Wait for SSH to be ready
        # arc-runner image has no netcat; use bash /dev/tcp instead.
        run: |
          echo "Waiting for SSH on ${STAGING_IP}..."
          timeout 120 bash -c "until (echo > /dev/tcp/${STAGING_IP}/22) 2>/dev/null; do sleep 5; done"
          echo "SSH is up"

  ansible-staging:
    needs: [resolve-slots, configure-tun-staging]
    runs-on: arc-pilot-${{ needs.resolve-slots.outputs.environment }}
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      ENV: ${{ needs.resolve-slots.outputs.environment }}
      STAGING_IP: ${{ needs.resolve-slots.outputs.staging_ip }}
      STAGING_HOST: ${{ needs.resolve-slots.outputs.staging_host }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch SSH key from Vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/cloudflared_worker \
            | awk 'NF > 0' > /tmp/cloudflared_key
          chmod 600 /tmp/cloudflared_key

      - name: Fetch secrets from Vault
        # All three CF tunnel tokens live in the bootstrap vault under per-env
        # paths (dev was migrated 2026-06-01; prod was corrected 2026-05-31;
        # qa was created 2026-06-01). Tailscale auth keys are at the same
        # per-env path pattern from PR #235.
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          TS_AUTHKEY=$(vault kv get -field=authkey "secret/tailscale/${ENV}")
          case "$ENV" in
            prod) CF_PATH=secret/cloudflare-tunnel ;;
            qa)   CF_PATH=secret/cloudflare-tunnel-qa ;;
            dev)  CF_PATH=secret/cloudflare-tunnel-dev ;;
          esac
          CF_TUNNEL_TOKEN=$(vault kv get -field=token "$CF_PATH" 2>/dev/null || echo "")
          if [ -z "$CF_TUNNEL_TOKEN" ]; then
            echo "::error::No CF tunnel token at $CF_PATH — refusing to deploy a cloudflared-lxc with no token (would just sit idle)."
            exit 1
          fi
          echo "::add-mask::$TS_AUTHKEY"
          echo "::add-mask::$CF_TUNNEL_TOKEN"
          {
            echo "TS_AUTHKEY=$TS_AUTHKEY"
            echo "CF_TUNNEL_TOKEN=$CF_TUNNEL_TOKEN"
            echo "TS_TAGS=tag:container,tag:${ENV}"
          } >> "$GITHUB_ENV"

      - name: Run Ansible playbook
        run: |
          ssh-keygen -R "${STAGING_IP}" || true
          ansible-playbook \
            -i "${STAGING_IP}," \
            -v \
            -e "ansible_host=${STAGING_IP}" \
            -e "ansible_user=root" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no -i /tmp/cloudflared_key'" \
            -e "tailscale_hostname=${ENV}-${STAGING_HOST}" \
            -e "tailscale_authkey=$TS_AUTHKEY" \
            -e "tailscale_advertise_tags=$TS_TAGS" \
            -e "cloudflare_tunnel_token=$CF_TUNNEL_TOKEN" \
            -e "deploy_env=${ENV}" \
            ansible/cloudflared/cloudflared_setup.yml

  flip-active:
    needs: [resolve-slots, ansible-staging]
    runs-on: arc-pilot-${{ needs.resolve-slots.outputs.environment }}
    steps:
      - name: Write new active slot to Vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          ENV="${{ needs.resolve-slots.outputs.environment }}"
          vault kv put secret/cloudflared/$ENV/active-slot \
            slot="${{ needs.resolve-slots.outputs.staging_slot }}" \
            vmid="${{ needs.resolve-slots.outputs.staging_vmid }}" \
            ip="${{ needs.resolve-slots.outputs.staging_ip }}"

  teardown-old-active:
    needs: [resolve-slots, flip-active]
    if: needs.resolve-slots.outputs.first_run == 'false' && needs.flip-active.result == 'success'
    runs-on: arc-pilot-${{ needs.resolve-slots.outputs.environment }}
    env:
      ENV: ${{ needs.resolve-slots.outputs.environment }}
      ACTIVE_SLOT: ${{ needs.resolve-slots.outputs.active_slot }}
      ACTIVE_VMID: ${{ needs.resolve-slots.outputs.active_vmid }}
      ACTIVE_IP: ${{ needs.resolve-slots.outputs.active_ip }}
      ACTIVE_HOST: ${{ needs.resolve-slots.outputs.active_host }}
      TF_VAR_pve_api: ${{ needs.resolve-slots.outputs.pve_api_url }}
      TF_VAR_pve_user: ${{ secrets.PVE_USER }}
      TF_VAR_pve_pass: ${{ needs.resolve-slots.outputs.environment == 'prod' && secrets.PVE_PROD_PASS || secrets.PVE_PASS }}
      TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
      TF_VAR_vault_token: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
      TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      TF_VAR_target_node: ${{ needs.resolve-slots.outputs.pve_node }}
      TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
      TF_VAR_gateway: ${{ needs.resolve-slots.outputs.gateway }}
      TF_VAR_vmid: ${{ needs.resolve-slots.outputs.active_vmid }}
      TF_VAR_ip_address: ${{ needs.resolve-slots.outputs.active_ip }}
      TF_VAR_vm_hostname: ${{ needs.resolve-slots.outputs.active_host }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Proxmox SSH key from vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/github_runner_proxmox_access \
            | awk 'NF > 0' > /tmp/pve_key
          chmod 600 /tmp/pve_key

      - name: Tailscale logout on old active LXC
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/cloudflared_worker \
            | awk 'NF > 0' > /tmp/cloudflared_key
          chmod 600 /tmp/cloudflared_key
          ssh -o StrictHostKeyChecking=no -i /tmp/cloudflared_key \
            ${SSH_USER}@${ACTIVE_IP} "tailscale logout || true" || true

      - name: Terraform Init
        working-directory: terraform/cloudflared
        run: |
          terraform init -input=false \
            -backend-config="secret_suffix=cloudflared-${ACTIVE_SLOT}-${ENV}"

      - name: Terraform Destroy old active LXC
        working-directory: terraform/cloudflared
        env:
          PVE_API: ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          terraform destroy -no-color -input=false -auto-approve || true
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no -i /tmp/pve_key ${PVE_SSH_USER}@${PVE_HOST} \
            "pct stop ${ACTIVE_VMID} 2>/dev/null || true; pct destroy ${ACTIVE_VMID} 2>/dev/null || true"

  cleanup-on-failure:
    needs: [resolve-slots, terraform-staging, configure-tun-staging, ansible-staging]
    if: failure()
    runs-on: arc-pilot-${{ needs.resolve-slots.outputs.environment }}
    env:
      ENV: ${{ needs.resolve-slots.outputs.environment }}
      STAGING_SLOT: ${{ needs.resolve-slots.outputs.staging_slot }}
      STAGING_VMID: ${{ needs.resolve-slots.outputs.staging_vmid }}
      STAGING_IP: ${{ needs.resolve-slots.outputs.staging_ip }}
      STAGING_HOST: ${{ needs.resolve-slots.outputs.staging_host }}
      TF_VAR_pve_api: ${{ needs.resolve-slots.outputs.pve_api_url }}
      TF_VAR_pve_user: ${{ secrets.PVE_USER }}
      TF_VAR_pve_pass: ${{ needs.resolve-slots.outputs.environment == 'prod' && secrets.PVE_PROD_PASS || secrets.PVE_PASS }}
      TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
      TF_VAR_vault_token: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
      TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      TF_VAR_target_node: ${{ needs.resolve-slots.outputs.pve_node }}
      TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
      TF_VAR_gateway: ${{ needs.resolve-slots.outputs.gateway }}
      TF_VAR_vmid: ${{ needs.resolve-slots.outputs.staging_vmid }}
      TF_VAR_ip_address: ${{ needs.resolve-slots.outputs.staging_ip }}
      TF_VAR_vm_hostname: ${{ needs.resolve-slots.outputs.staging_host }}
    steps:
      - name: Fetch Proxmox SSH key from vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/github_runner_proxmox_access \
            | awk 'NF > 0' > /tmp/pve_key
          chmod 600 /tmp/pve_key

      - name: Collect failure logs from CT
        env:
          PVE_API:  ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          mkdir -p failure-logs
          LOG_FILE="failure-logs/cloudflared-${ENV}-${STAGING_VMID}.log"
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          {
            echo "=== cloudflared failure log: run ${{ github.run_id }}, env=${ENV}, vmid=${STAGING_VMID} ==="
            echo "=== $(date -u) ==="
            echo "--- system journal (last 100 lines) ---"
            ssh -o StrictHostKeyChecking=no -i /tmp/pve_key ${PVE_SSH_USER}@${PVE_HOST} \
              "pct exec ${STAGING_VMID} -- journalctl -n 100 --no-pager 2>/dev/null || echo '(journal unavailable)'" 2>/dev/null || echo "(pct exec failed)"
          } | tee "$LOG_FILE" || true

      - uses: actions/upload-artifact@v4
        with:
          name: cloudflared-failure-${{ env.ENV }}-run${{ github.run_id }}
          path: failure-logs/
          if-no-files-found: warn

      - uses: actions/checkout@v4

      - name: Terraform Init
        working-directory: terraform/cloudflared
        run: |
          terraform init -input=false \
            -backend-config="secret_suffix=cloudflared-${STAGING_SLOT}-${ENV}"

      - name: Terraform Destroy staging LXC
        working-directory: terraform/cloudflared
        env:
          PVE_API: ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          terraform destroy -no-color -input=false -auto-approve || true
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no -i /tmp/pve_key ${PVE_SSH_USER}@${PVE_HOST} \
            "pct stop ${STAGING_VMID} 2>/dev/null || true; pct destroy ${STAGING_VMID} 2>/dev/null || true"
