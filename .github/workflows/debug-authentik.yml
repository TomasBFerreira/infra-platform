name: Debug Authentik
on:
  workflow_dispatch:
    inputs:
      hotfix_host_browser:
        description: 'Patch AUTHENTIK_HOST_BROWSER to https:// on running CT'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
jobs:
  debug:
    runs-on: [self-hosted, dev]
    steps:
      - name: Print Authentik bootstrap credentials
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          echo "=== AUTHENTIK LOGIN CREDENTIALS ==="
          echo "Username: akadmin"
          echo "Password: $(vault kv get -field=bootstrap_password secret/sso)"

      - name: Get Authentik logs and flow errors
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/sso_worker \
            | awk 'NF > 0' > /tmp/sso_dbg_key
          chmod 600 /tmp/sso_dbg_key
          SSO_IP=$(vault kv get -field=ip secret/sso/dev/active-slot)

          if [ "${{ inputs.hotfix_host_browser }}" = "true" ]; then
            echo "=== APPLYING HOTFIX: AUTHENTIK_HOST_BROWSER → https ==="
            ssh -i /tmp/sso_dbg_key -o StrictHostKeyChecking=no root@"$SSO_IP" \
              "sed -i 's|AUTHENTIK_HOST_BROWSER=http://|AUTHENTIK_HOST_BROWSER=https://|g' /opt/authentik/.env && grep AUTHENTIK_HOST_BROWSER /opt/authentik/.env"
            echo "=== Restarting Authentik containers ==="
            ssh -i /tmp/sso_dbg_key -o StrictHostKeyChecking=no root@"$SSO_IP" \
              "cd /opt/authentik && docker compose --env-file .env up -d --force-recreate server worker 2>&1"
            echo "=== Waiting 20s for containers to be ready ==="
            sleep 20
          fi

          echo "=== AUTHENTIK_HOST_BROWSER in .env ==="
          ssh -i /tmp/sso_dbg_key -o StrictHostKeyChecking=no root@"$SSO_IP" \
            "grep AUTHENTIK_HOST_BROWSER /opt/authentik/.env"

          echo "=== AUTHENTIK_HOST_BROWSER in docker-compose.yml ==="
          ssh -i /tmp/sso_dbg_key -o StrictHostKeyChecking=no root@"$SSO_IP" \
            "grep -A1 AUTHENTIK_HOST /opt/authentik/docker-compose.yml || echo '(not found)'"

          echo "=== AUTHENTIK_HOST_BROWSER in running container env ==="
          ssh -i /tmp/sso_dbg_key -o StrictHostKeyChecking=no root@"$SSO_IP" \
            "docker exec authentik-server env | grep AUTHENTIK_HOST || echo '(not set in container)'"

          echo "=== discovery doc authorization_endpoint ==="
          ssh -i /tmp/sso_dbg_key -o StrictHostKeyChecking=no root@"$SSO_IP" \
            "curl -s http://localhost:9000/application/o/vault/.well-known/openid-configuration | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get(\"authorization_endpoint\",\"not found\"))'"

          echo "=== SERVER ERRORS/WARNINGS (last 200 lines, filtered) ==="
          ssh -i /tmp/sso_dbg_key -o StrictHostKeyChecking=no root@"$SSO_IP" \
            "docker logs authentik-server --tail 200 2>&1 | grep -E 'error|Error|warning|Warning|exception|Exception|executor|CSRF|403|400|500|forbidden|invalid' || echo '(none)'"
          echo "=== SERVER LOGS — FLOW EXECUTOR CALLS (last 200 lines) ==="
          ssh -i /tmp/sso_dbg_key -o StrictHostKeyChecking=no root@"$SSO_IP" \
            "docker logs authentik-server --tail 200 2>&1 | grep 'executor' || echo '(no executor calls in last 200 lines)'"
          echo "=== WORKER LOGS (last 60 lines) ==="
          ssh -i /tmp/sso_dbg_key -o StrictHostKeyChecking=no root@"$SSO_IP" \
            "docker logs authentik-worker --tail 60 2>&1"
          echo "=== FLOW EXECUTOR DIRECT TEST ==="
          ssh -i /tmp/sso_dbg_key -o StrictHostKeyChecking=no root@"$SSO_IP" \
            "curl -si -X GET 'http://localhost:9000/api/v3/flows/executor/default-authentication-flow/?query=next%3D%2F' -H 'Accept: application/json' 2>&1 | head -15"
          rm -f /tmp/sso_dbg_key
