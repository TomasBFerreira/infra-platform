name: Wipe qa monitoring active-slot (one-shot)

# One-shot: delete `secret/monitoring/qa/active-slot` from the bootstrap vault
# so the next monitoring_pipeline_self_hosted.yml env=qa run treats it as a
# first-run and creates the new blue CT (391, .91) without touching the
# previous claim (395, which is now traefik-lxc-qa-blue).
#
# This file should be deleted after the relocation is verified.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "WIPE-QA-MONITORING-SLOT" to confirm'
        required: true
        type: string

jobs:
  wipe:
    runs-on: [self-hosted, management]
    steps:
      - name: Sanity check confirm phrase
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "WIPE-QA-MONITORING-SLOT" ]; then
            echo "Confirmation phrase mismatch; aborting."
            exit 1
          fi

      - name: Show current active-slot before wipe
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          V="${VAULT_ADDR}"
          if [[ "$V" != http://* && "$V" != https://* ]]; then V="http://${V}"; fi
          export VAULT_ADDR="$V"
          echo "=== current secret/monitoring/qa/active-slot ==="
          vault kv get secret/monitoring/qa/active-slot 2>&1 || echo "(no data)"

      - name: Delete secret/monitoring/qa/active-slot
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          V="${VAULT_ADDR}"
          if [[ "$V" != http://* && "$V" != https://* ]]; then V="http://${V}"; fi
          export VAULT_ADDR="$V"

          echo "=== vault kv metadata delete (purges all versions) ==="
          vault kv metadata delete secret/monitoring/qa/active-slot 2>&1

          echo ""
          echo "=== confirm gone ==="
          vault kv get secret/monitoring/qa/active-slot 2>&1 || echo "(confirmed: path no longer exists — pipeline will FIRST_RUN)"
