name: Check Rancher Server Logs

# SSH into the Rancher LXC and get Rancher pod logs.
# Useful to see what Rancher reports when a cluster agent tries (and fails) to connect.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (prod/dev)'
        required: true
        default: 'prod'
        type: choice
        options: [prod, dev]
      cluster_id:
        description: 'Rancher cluster ID (clusters.management.cattle.io name). Leave blank to use default (c-dj4lv for prod).'
        required: false
        default: ''
        type: string

jobs:
  check-rancher-logs:
    runs-on: [self-hosted, "${{ inputs.environment }}"]
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code
        run: |
          cd /app/infra-platform
          git fetch origin && git checkout main && git reset --hard origin/main

      - name: Set Rancher IP from environment
        run: |
          case "${{ inputs.environment }}" in
            prod) echo "RANCHER_IP=192.168.10.2" >> $GITHUB_ENV ;;
            dev)  echo "RANCHER_IP=192.168.20.2" >> $GITHUB_ENV ;;
          esac

      - name: Fetch Rancher SSH key from Vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/rancher_worker \
            | python3 -c "import sys,textwrap; raw=sys.stdin.read().strip().replace('\r',''); B='-----BEGIN OPENSSH PRIVATE KEY-----'; E='-----END OPENSSH PRIVATE KEY-----'; body=raw[raw.find(B)+len(B):raw.find(E)].replace(' ','').replace('\n','').replace('\t',''); print(B); print(textwrap.fill(body,width=70)); print(E)" \
            > /tmp/rancher_key
          chmod 600 /tmp/rancher_key

      - name: Get Rancher server logs
        run: |
          ssh-keygen -R "${RANCHER_IP}" || true
          ansible-playbook \
            -i "${RANCHER_IP}," -v \
            --private-key /tmp/rancher_key \
            -e "ansible_host=${RANCHER_IP}" \
            -e "ansible_user=root" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            ansible/worker-node/check-rancher-logs.yml

      - name: Check cluster conditions on Rancher LXC
        run: |
          EXTRA_CLUSTER=""
          [ -n "${{ inputs.cluster_id }}" ] && EXTRA_CLUSTER="-e rancher_cluster_id=${{ inputs.cluster_id }}"
          ansible-playbook \
            -i "${RANCHER_IP}," -v \
            --private-key /tmp/rancher_key \
            -e "ansible_host=${RANCHER_IP}" \
            -e "ansible_user=root" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            ${EXTRA_CLUSTER} \
            ansible/worker-node/check-cluster-conditions.yml

      - name: Cleanup
        if: always()
        run: rm -f /tmp/rancher_key
