name: Diagnose Authentik recovery flow

# Dumps the recovery flow's access config (authentication requirement,
# denied_action), its ordered stage bindings, any policy bindings on the flow,
# and the identification stage detail — to debug AccessDeniedStage. Read-only.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'qa'
        type: choice
        options: [dev, qa, prod]

jobs:
  diagnose:
    runs-on: [self-hosted, "${{ inputs.environment }}"]
    env:
      ENVIRONMENT: ${{ inputs.environment }}
      VAULT_BOOTSTRAP_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_DEV_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
    steps:
      - name: Resolve env vault creds
        run: |
          case "$ENVIRONMENT" in
            dev)  echo "ENVVAULT_ADDR=${{ secrets.VAULT_ADDR }}"   >> "$GITHUB_ENV"; echo "ENVVAULT_TOKEN=${{ secrets.VAULT_TOKEN }}" >> "$GITHUB_ENV" ;;
            qa)   echo "ENVVAULT_ADDR=${{ secrets.VAULT_QA_ADDR }}" >> "$GITHUB_ENV"; echo "ENVVAULT_TOKEN=${{ secrets.VAULT_QA_TOKEN }}" >> "$GITHUB_ENV" ;;
            prod) echo "ENVVAULT_ADDR=${{ secrets.VAULT_PROD_ADDR }}" >> "$GITHUB_ENV"; echo "ENVVAULT_TOKEN=${{ secrets.VAULT_PROD_TOKEN }}" >> "$GITHUB_ENV" ;;
          esac
      - name: Resolve SSO IP + token
        run: |
          IP=$(VAULT_ADDR="$VAULT_BOOTSTRAP_ADDR" VAULT_TOKEN="$VAULT_DEV_TOKEN" vault kv get -field=ip secret/sso/$ENVIRONMENT/active-slot)
          TOK=$(VAULT_ADDR="$ENVVAULT_ADDR" VAULT_TOKEN="$ENVVAULT_TOKEN" vault kv get -field=bootstrap_token secret/sso)
          echo "::add-mask::$TOK"; echo "SSO_IP=$IP" >> "$GITHUB_ENV"; echo "AK_TOKEN=$TOK" >> "$GITHUB_ENV"
      - name: Dump recovery flow config
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          BASE="http://%s:9000/api/v3" % os.environ["SSO_IP"]; TOK=os.environ["AK_TOKEN"]
          def g(path):
              req=urllib.request.Request(BASE+path, headers={"Authorization":"Bearer "+TOK})
              return json.load(urllib.request.urlopen(req))
          f=g("/flows/instances/?designation=recovery")["results"][0]
          print("FLOW:", f["slug"])
          for k in ("authentication","denied_action","policy_engine_mode","compatibility_mode","name"):
              print("  %s = %s" % (k, f.get(k)))
          print("STAGE BINDINGS (target=flow):")
          for b in sorted(g("/flows/bindings/?target=%s"%f["pk"])["results"], key=lambda x:x.get("order",0)):
              so=b.get("stage_obj",{})
              print("  order=%s stage=%s component=%s eval_on_plan=%s" % (b.get("order"), so.get("name"), so.get("component"), b.get("evaluate_on_plan")))
          print("POLICY BINDINGS ON FLOW (target=flow):")
          pol=g("/policies/bindings/?target=%s"%f["pk"])["results"]
          if not pol: print("  (none)")
          for p in pol:
              print("  policy=%s group=%s user=%s action? enabled=%s negate=%s order=%s" % (
                  (p.get("policy_obj") or {}).get("name"), p.get("group"), p.get("user"), p.get("enabled"), p.get("negate"), p.get("order")))
          print("IDENTIFICATION STAGES:")
          for s in g("/stages/identification/?page_size=200")["results"]:
              if "auth" in (s.get("name") or "").lower() or "recovery" in (s.get("name") or "").lower():
                  print("  %s: user_fields=%s sources=%s password_stage=%s recovery_flow=%s pretend=%s" % (
                      s.get("name"), s.get("user_fields"), len(s.get("sources") or []), s.get("password_stage"), s.get("recovery_flow"), s.get("pretend_user_exists")))
          PY