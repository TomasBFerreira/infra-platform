name: Fix Torrent Queue

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options: [dev, qa, prod]
      step:
        description: 'Which fix step to run (1=raise limits, 2=recheck, 3=delete dead, 4=save_path+move)'
        required: true
        default: '1'
        type: choice
        options: ['1', '2', '3', '4']

jobs:
  fix:
    runs-on: [self-hosted, "${{ github.event.inputs.environment || 'prod' }}"]
    env:
      STEP: ${{ github.event.inputs.step }}
      DEPLOY_ENV: ${{ github.event.inputs.environment || 'prod' }}
    steps:
      - name: Resolve torrent CT + fetch ssh keys
        id: setup
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ACTIVE_IP=$(vault kv get -field=ip secret/torrent/${DEPLOY_ENV}/active-slot 2>/dev/null || echo "")
          echo "torrent_ip=$ACTIVE_IP" >> $GITHUB_OUTPUT
          WORKER_IP=$(vault kv get -field=ip secret/worker-node/${DEPLOY_ENV}/active-slot 2>/dev/null || echo "192.168.10.21")
          echo "worker_ip=$WORKER_IP" >> $GITHUB_OUTPUT
          vault kv get -field=private_key secret/ssh_keys/torrent_worker | awk 'NF>0' > /tmp/tkey
          vault kv get -field=private_key secret/ssh_keys/worker_node_worker | awk 'NF>0' > /tmp/wkey
          chmod 600 /tmp/tkey /tmp/wkey
          echo "Torrent CT: $ACTIVE_IP   Worker node: $WORKER_IP"

      - name: Setup kubectl
        run: |
          WORKER_IP="${{ steps.setup.outputs.worker_ip }}"
          if ! command -v kubectl &>/dev/null; then
            curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            mkdir -p "$HOME/bin" && mv kubectl "$HOME/bin/"
            echo "$HOME/bin" >> "$GITHUB_PATH"
          fi
          ssh -i /tmp/wkey -o StrictHostKeyChecking=no root@"$WORKER_IP" \
            "cat /etc/rancher/k3s/k3s.yaml" | sed "s/127.0.0.1/${WORKER_IP}/g" > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: STEP 1 — raise qBT active-download limits
        if: env.STEP == '1'
        run: |
          IP="${{ steps.setup.outputs.torrent_ip }}"
          ssh -i /tmp/tkey -o StrictHostKeyChecking=no root@"$IP" bash <<'REMOTE'
          set +e
          COOKIE=$(mktemp)
          curl -s -c "$COOKIE" -d "username=admin&password=adminadmin" \
            http://127.0.0.1:8080/api/v2/auth/login > /dev/null

          echo "--- Before ---"
          curl -s -b "$COOKIE" http://127.0.0.1:8080/api/v2/app/preferences | python3 -c "
          import json, sys
          d=json.load(sys.stdin)
          for k in ['max_active_downloads','max_active_torrents','max_active_uploads','queueing_enabled','dont_count_slow_torrents']:
              print(f'  {k} = {d.get(k)}')" | sed 's/^          //'

          # Post new prefs (form-encoded json string)
          NEW='{"max_active_downloads":10,"max_active_torrents":20,"max_active_uploads":10,"dont_count_slow_torrents":true}'
          HTTP=$(curl -s -o /tmp/r -w '%{http_code}' -b "$COOKIE" \
            --data-urlencode "json=$NEW" \
            http://127.0.0.1:8080/api/v2/app/setPreferences)
          echo "setPreferences → HTTP $HTTP"
          cat /tmp/r; echo

          echo "--- After ---"
          curl -s -b "$COOKIE" http://127.0.0.1:8080/api/v2/app/preferences | python3 -c "
          import json, sys
          d=json.load(sys.stdin)
          for k in ['max_active_downloads','max_active_torrents','max_active_uploads','queueing_enabled','dont_count_slow_torrents']:
              print(f'  {k} = {d.get(k)}')" | sed 's/^          //'

          echo ""
          echo "--- Torrent states after prefs change (give qBT 3s to react) ---"
          sleep 3
          curl -s -b "$COOKIE" 'http://127.0.0.1:8080/api/v2/torrents/info?filter=all' \
            | python3 -c "
          import json, sys
          t=json.load(sys.stdin)
          for x in t:
              print(f\"  [{x.get('category','')[:10]:10s}] {x.get('state',''):14s} {x.get('progress',0)*100:5.1f}%  peers={x.get('num_leechs',0)}/{x.get('num_seeds',0)}  {x.get('name','')[:80]}\")" | sed 's/^          //'
          rm -f "$COOKIE" /tmp/r
          REMOTE

      - name: STEP 2 — force-recheck stuck torrents
        if: env.STEP == '2'
        run: |
          IP="${{ steps.setup.outputs.torrent_ip }}"
          ssh -i /tmp/tkey -o StrictHostKeyChecking=no root@"$IP" bash <<'REMOTE'
          set +e
          COOKIE=$(mktemp)
          curl -s -c "$COOKIE" -d "username=admin&password=adminadmin" \
            http://127.0.0.1:8080/api/v2/auth/login > /dev/null

          echo "--- Finding torrents in error/stalledDL ---"
          HASHES=$(curl -s -b "$COOKIE" 'http://127.0.0.1:8080/api/v2/torrents/info?filter=all' \
            | python3 -c "
          import json, sys
          t=json.load(sys.stdin)
          stuck=[x for x in t if x.get('state') in ('error','stalledDL') and x.get('category') in ('radarr','tv-sonarr')]
          for x in stuck: print(x['hash']+'|'+x.get('name','')[:80]+'|'+x.get('state',''))
          ")
          echo "Matched:"
          echo "$HASHES"
          if [ -z "$HASHES" ]; then echo "(nothing to recheck)"; exit 0; fi

          # Build |-joined list for API
          HLIST=$(echo "$HASHES" | awk -F'|' '{print $1}' | paste -sd '|' -)
          echo ""
          echo "--- Force-resume first (unpause), then recheck: $HLIST ---"
          curl -s -b "$COOKIE" -d "hashes=$HLIST" http://127.0.0.1:8080/api/v2/torrents/resume
          curl -s -b "$COOKIE" -d "hashes=$HLIST" http://127.0.0.1:8080/api/v2/torrents/recheck
          # Force reannounce to all trackers
          curl -s -b "$COOKIE" -d "hashes=$HLIST" http://127.0.0.1:8080/api/v2/torrents/reannounce
          echo "issued recheck + reannounce"

          echo ""
          echo "--- State after 10s ---"
          sleep 10
          curl -s -b "$COOKIE" 'http://127.0.0.1:8080/api/v2/torrents/info?filter=all' \
            | python3 -c "
          import json, sys
          want=set('$HLIST'.split('|'))
          for x in json.load(sys.stdin):
              if x['hash'] in want:
                  print(f\"  {x.get('state',''):14s} {x.get('progress',0)*100:5.1f}%  peers={x.get('num_leechs',0)}/{x.get('num_seeds',0)}  dl={x.get('dlspeed',0)}B/s  {x.get('name','')[:80]}\")" | sed 's/^          //'
          rm -f "$COOKIE"
          REMOTE

      - name: STEP 3 — remove dead torrents from qBT + Sonarr/Radarr queue
        if: env.STEP == '3'
        run: |
          IP="${{ steps.setup.outputs.torrent_ip }}"

          # First query qBT to re-confirm which are still in error/stalled with 0 peers, 0 dlspeed
          ssh -i /tmp/tkey -o StrictHostKeyChecking=no root@"$IP" bash <<'REMOTE' > /tmp/dead_torrents.txt
          COOKIE=$(mktemp)
          curl -s -c "$COOKIE" -d "username=admin&password=adminadmin" \
            http://127.0.0.1:8080/api/v2/auth/login > /dev/null
          curl -s -b "$COOKIE" 'http://127.0.0.1:8080/api/v2/torrents/info?filter=all' \
            | python3 -c "
          import json, sys
          t=json.load(sys.stdin)
          # Dead = error OR (stalledDL with 0 peers AND 0 dlspeed) AND category is radarr/tv-sonarr
          for x in t:
              if x.get('category') not in ('radarr','tv-sonarr'): continue
              s=x.get('state','')
              peers=x.get('num_leechs',0)
              dl=x.get('dlspeed',0)
              if s=='error' or (s=='stalledDL' and peers==0 and dl<100):
                  print(x['hash']+'|'+x.get('category','')+'|'+x.get('name','')[:80])"
          rm -f "$COOKIE"
          REMOTE

          echo "--- Dead torrents identified ---"
          cat /tmp/dead_torrents.txt
          if [ ! -s /tmp/dead_torrents.txt ]; then
            echo "(no dead torrents to remove)"
            exit 0
          fi

          # For each, remove from Sonarr/Radarr queue (with blocklist=true so it re-searches)
          SONARR_POD=$(kubectl get pod -n media-stack -l app=sonarr -o jsonpath='{.items[0].metadata.name}')
          RADARR_POD=$(kubectl get pod -n media-stack -l app=radarr -o jsonpath='{.items[0].metadata.name}')
          SONARR_KEY=$(kubectl -n streambox get secret streambox-secrets -o jsonpath='{.data.sonarr-api-key}' | base64 -d)
          RADARR_KEY=$(kubectl -n streambox get secret streambox-secrets -o jsonpath='{.data.radarr-api-key}' | base64 -d)

          while IFS='|' read HASH CAT NAME; do
            echo ""
            echo "== Removing $CAT/$NAME (hash=$HASH) =="
            UHASH=$(echo "$HASH" | tr 'a-z' 'A-Z')
            if [ "$CAT" = "tv-sonarr" ]; then
              POD=$SONARR_POD; KEY=$SONARR_KEY; PORT=8989; APP=sonarr
            else
              POD=$RADARR_POD; KEY=$RADARR_KEY; PORT=7878; APP=radarr
            fi
            # Find queue entry id by downloadId
            QID=$(kubectl exec -n media-stack "$POD" -- \
              curl -s -H "X-Api-Key: $KEY" "http://localhost:${PORT}/api/v3/queue?pageSize=200" \
              | python3 -c "
          import json, sys
          d=json.load(sys.stdin)
          rec=d.get('records',d)
          ids=[str(q['id']) for q in rec if q.get('downloadId','').upper()=='$UHASH']
          print(','.join(sorted(set(ids))))" 2>&1)
            echo "  ${APP} queue ids: $QID"
            if [ -n "$QID" ] && [ "$QID" != "None" ]; then
              # Use bulk DELETE with removeFromClient=true, blocklist=true (so a different release is chosen next time)
              # Single-item delete: DELETE /api/v3/queue/{id}?removeFromClient=true&blocklist=true
              IFS=',' read -ra IDS <<< "$QID"
              for id in "${IDS[@]}"; do
                kubectl exec -n media-stack "$POD" -- \
                  curl -s -X DELETE -H "X-Api-Key: $KEY" \
                  "http://localhost:${PORT}/api/v3/queue/${id}?removeFromClient=true&blocklist=true&skipRedownload=false" \
                  && echo "  deleted ${APP} queue id $id (blocklisted)"
              done
            fi
            # Also ensure removed from qBT (belt and suspenders)
            ssh -i /tmp/tkey -o StrictHostKeyChecking=no root@"$IP" \
              "curl -s -c /tmp/c -d 'username=admin&password=adminadmin' http://127.0.0.1:8080/api/v2/auth/login >/dev/null && curl -s -b /tmp/c -d 'hashes=$HASH&deleteFiles=true' http://127.0.0.1:8080/api/v2/torrents/delete && rm -f /tmp/c && echo '  deleted $HASH from qBT'"
          done < /tmp/dead_torrents.txt

          echo ""
          echo "--- Triggering Sonarr+Radarr missing search so replacement releases get grabbed ---"
          kubectl exec -n media-stack "$SONARR_POD" -- \
            curl -s -X POST -H "X-Api-Key: $SONARR_KEY" -H "Content-Type: application/json" \
            --data '{"name":"MissingEpisodeSearch"}' \
            http://localhost:8989/api/v3/command | head -c 300 ; echo
          kubectl exec -n media-stack "$RADARR_POD" -- \
            curl -s -X POST -H "X-Api-Key: $RADARR_KEY" -H "Content-Type: application/json" \
            --data '{"name":"MissingMoviesSearch"}' \
            http://localhost:7878/api/v3/command | head -c 300 ; echo

      - name: STEP 4 — fix qBT save_path + relocate Narcos S03
        if: env.STEP == '4'
        run: |
          IP="${{ steps.setup.outputs.torrent_ip }}"
          ssh -i /tmp/tkey -o StrictHostKeyChecking=no root@"$IP" bash <<'REMOTE'
          set +e
          COOKIE=$(mktemp)
          curl -s -c "$COOKIE" -d "username=admin&password=adminadmin" \
            http://127.0.0.1:8080/api/v2/auth/login > /dev/null

          echo "--- Before: save_path ---"
          curl -s -b "$COOKIE" http://127.0.0.1:8080/api/v2/app/preferences | python3 -c "
          import json,sys;d=json.load(sys.stdin);print(d.get('save_path'),'|',d.get('temp_path'))" | sed 's/^          //'

          echo "--- Setting save_path=/downloads, temp_path unset ---"
          NEW='{"save_path":"/downloads","temp_path":""}'
          curl -s -b "$COOKIE" --data-urlencode "json=$NEW" \
            http://127.0.0.1:8080/api/v2/app/setPreferences
          echo "  set"

          echo "--- After ---"
          curl -s -b "$COOKIE" http://127.0.0.1:8080/api/v2/app/preferences | python3 -c "
          import json,sys;d=json.load(sys.stdin);print(d.get('save_path'),'|',d.get('temp_path'))" | sed 's/^          //'

          echo ""
          echo "--- Checking if Narcos S03 exists at wrong path inside qBT container ---"
          docker exec qbittorrent sh -c 'ls -la "/config/Downloads/" 2>/dev/null | head -20'
          echo ""
          echo "--- Host view of the qBT config volume (looking for Narcos S03) ---"
          find /opt/torrent /var/lib/docker/volumes -maxdepth 4 -name '*Narcos*' 2>/dev/null | head -10
          find / -maxdepth 6 -type d -name 'Narcos (2015) Season 3*' 2>/dev/null | head -5

          rm -f "$COOKIE"
          REMOTE

          # After we know where the folder is, the actual move is a manual step — this step reports the location only.
          # If the folder was inside qBT's container at /config/Downloads, we need to move via docker cp → mnt volume.
          echo ""
          echo "(If Narcos S03 was found at /config/Downloads inside qBT, a manual mv into /downloads/tv-sonarr is needed — see follow-up.)"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/tkey /tmp/wkey /tmp/kubeconfig /tmp/dead_torrents.txt
