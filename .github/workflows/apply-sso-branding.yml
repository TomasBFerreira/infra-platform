name: Apply SSO Branding

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, prod]

jobs:
  apply-branding:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check SSO is deployed — skip if not
        id: check-sso
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ENV="${{ inputs.environment }}"
          if ! vault kv get secret/sso/${ENV}/active-slot > /dev/null 2>&1; then
            echo "SSO not yet deployed for ${ENV} — skipping branding"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch SSH key and resolve SSO IP
        if: steps.check-sso.outputs.skip != 'true'
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/sso_worker \
            | awk 'NF > 0' > /tmp/sso_key
          chmod 600 /tmp/sso_key

          SSO_IP=$(vault kv get -field=ip secret/sso/${{ inputs.environment }}/active-slot)
          echo "SSO_IP=$SSO_IP" >> $GITHUB_ENV

      - name: Get fresh Authentik API token
        if: steps.check-sso.outputs.skip != 'true'
        run: |
          FRESH_TOKEN=$(ssh -i /tmp/sso_key -o StrictHostKeyChecking=no root@"$SSO_IP" \
            "docker exec authentik-server ak shell --command \
              \"from authentik.core.models import Token, TokenIntents, User; u=User.objects.get(username='akadmin'); t,_=Token.objects.get_or_create(identifier='bootstrap-api-token',defaults={'user':u,'intent':TokenIntents.INTENT_API,'expiring':False}); print(t.key)\"" 2>/dev/null)

          if [ -z "$FRESH_TOKEN" ]; then
            echo "Could not get fresh token from Authentik — aborting"
            exit 1
          fi
          echo "::add-mask::$FRESH_TOKEN"
          echo "AUTHENTIK_TOKEN=$FRESH_TOKEN" >> $GITHUB_ENV

      - name: Apply databaes.net branding
        if: steps.check-sso.outputs.skip != 'true'
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys, urllib.request, urllib.error

          ip    = os.environ["SSO_IP"]
          token = os.environ["AUTHENTIK_TOKEN"]
          base  = f"http://{ip}:9000/api/v3"
          hdrs  = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          sshkey = "/tmp/sso_key"
          css_src = os.path.join(os.path.dirname(os.path.abspath(__file__)),
                                 "authentik-custom.css") \
                    if False else \
                    os.path.join(os.environ.get("GITHUB_WORKSPACE", ""),
                                 ".github/workflows/authentik-custom.css")

          def api(method, path, body=None):
              url = base + path
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(url, data=data, headers=hdrs, method=method)
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  print(f"HTTP {e.code} {method} {path}: {e.read().decode()}", file=sys.stderr)
                  sys.exit(1)

          def ssh(cmd):
              r = subprocess.run(
                  ["ssh", "-i", sshkey, "-o", "StrictHostKeyChecking=no", f"root@{ip}", cmd],
                  capture_output=True, text=True)
              if r.returncode != 0:
                  print(f"SSH error: {r.stderr}", file=sys.stderr)
                  sys.exit(1)
              return r.stdout.strip()

          # ── REST API: patch title + attributes ────────────────────────────────
          brands = api("GET", "/core/brands/")
          if not brands["results"]:
              print("No brands found", file=sys.stderr); sys.exit(1)
          brand_pk = brands["results"][0]["brand_uuid"]
          print(f"Found brand uuid={brand_pk}")

          result = api("PATCH", f"/core/brands/{brand_pk}/", {
              "branding_title": "databaes.net",
              "attributes": {"settings": {"theme": {"base": "dark"}}},
          })
          print(f"✅ REST PATCH — title: {result.get('branding_title')!r}")

          # ── Django ORM: set branding_custom_css + ui_theme ───────────────────
          # These fields are NOT in the REST API serializer for this Authentik version.
          # Pipe CSS via SSH stdin (avoids SCP which fails on some runner configs).
          css_content = open(css_src).read()
          r = subprocess.run(
              ["ssh", "-i", sshkey, "-o", "StrictHostKeyChecking=no",
               f"root@{ip}", "cat > /tmp/ak_custom.css"],
              input=css_content, text=True, capture_output=True)
          if r.returncode != 0:
              print(f"SSH write error: {r.stderr}", file=sys.stderr); sys.exit(1)
          print(f"Wrote {len(css_content)} chars of CSS to remote /tmp/ak_custom.css")

          django_cmd = (
              "from authentik.brands.models import Brand;"
              "b=Brand.objects.get(default=True);"
              "css=open(\"/tmp/ak_custom.css\").read();"
              "b.branding_custom_css=css;"
              "b.ui_theme=\"dark\";"
              "b.save();"
              "print(\"Django ORM ok — ui_theme=\"+repr(b.ui_theme)+\", css=\"+str(len(b.branding_custom_css))+\" chars\")"
          )
          out = ssh(
              f"docker cp /tmp/ak_custom.css authentik-server:/tmp/ak_custom.css && "
              f"rm -f /tmp/ak_custom.css && "
              f"docker exec authentik-server ak shell --command '{django_cmd}'"
          )
          print(f"✅ {out}")
          PYEOF

      - name: Purge Cloudflare cache for custom.css
        if: steps.check-sso.outputs.skip != 'true'
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          if [ "$ENVIRONMENT" = "prod" ]; then
            HOST="auth.databaes.net"
          else
            HOST="auth-dev.databaes.net"
          fi
          # Prefer a dedicated cache-purge token; fall back to the DNS token (Zone:Zone:Read only).
          # To create one: CF Dashboard → User Profile → API Tokens → Create Token →
          #   "Cache Purge" template → scope to databaes.net → then:
          #   vault kv patch secret/cloudflare cache_purge_token=<value>
          CF_TOKEN=$(vault kv get -field=cache_purge_token secret/cloudflare 2>/dev/null || \
                     vault kv get -field=dns_api_token    secret/cloudflare 2>/dev/null || true)
          if [ -z "$CF_TOKEN" ]; then
            echo "⚠️  No Cloudflare token in Vault — skipping cache purge (will expire naturally in ~4 h)"
            exit 0
          fi
          ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=databaes.net" \
            -H "Authorization: Bearer $CF_TOKEN" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])" 2>/dev/null || true)
          if [ -z "$ZONE_ID" ]; then
            echo "⚠️  Could not look up zone ID — skipping cache purge"
            exit 0
          fi
          RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"files\":[\"https://${HOST}/static/dist/custom.css\"]}")
          SUCCESS=$(echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['success'])" 2>/dev/null || echo "false")
          if [ "$SUCCESS" = "True" ]; then
            echo "✅ CF cache purged for https://${HOST}/static/dist/custom.css"
          else
            ERRORS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('errors','?'))" 2>/dev/null || echo "?")
            echo "⚠️  CF cache purge failed (errors: $ERRORS)"
            echo "    To fix: add a 'Cache Purge' scoped token to Vault:"
            echo "    vault kv patch secret/cloudflare cache_purge_token=<token>"
            echo "    Cache will expire naturally in ~4 h."
          fi

      - name: Cleanup
        if: always()
        run: rm -f /tmp/sso_key
