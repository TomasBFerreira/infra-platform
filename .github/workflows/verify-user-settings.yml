name: Verify Authentik user-settings fields (prod)
on:
  workflow_dispatch:
    inputs:
      environment: { description: env, required: true, default: 'prod', type: choice, options: [prod, qa, dev] }
jobs:
  check:
    runs-on: [self-hosted, "${{ inputs.environment }}"]
    env:
      ENVIRONMENT: ${{ inputs.environment }}
      VAULT_BOOTSTRAP_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_DEV_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
    steps:
      - name: resolve
        run: |
          case "$ENVIRONMENT" in
            prod) EV="${{ secrets.VAULT_PROD_ADDR }}"; ET="${{ secrets.VAULT_PROD_TOKEN }}" ;;
            qa) EV="${{ secrets.VAULT_QA_ADDR }}"; ET="${{ secrets.VAULT_QA_TOKEN }}" ;;
            dev) EV="${{ secrets.VAULT_ADDR }}"; ET="${{ secrets.VAULT_TOKEN }}" ;;
          esac
          AK_IP=$(vault kv get -field=ip secret/sso/$ENVIRONMENT/active-slot)
          AK_TOKEN=$(VAULT_ADDR="$EV" VAULT_TOKEN="$ET" vault kv get -field=bootstrap_token secret/sso)
          echo "::add-mask::$AK_TOKEN"; echo "AK_IP=$AK_IP" >> "$GITHUB_ENV"; echo "AK_TOKEN=$AK_TOKEN" >> "$GITHUB_ENV"
        env: { VAULT_ADDR: "${{ secrets.VAULT_BOOTSTRAP_ADDR }}", VAULT_TOKEN: "${{ secrets.VAULT_DEV_TOKEN }}" }
      - name: dump user-settings fields + password-change flow
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          BASE="http://%s:9000/api/v3" % os.environ["AK_IP"]; TOK=os.environ["AK_TOKEN"]
          def g(p):
              return json.load(urllib.request.urlopen(urllib.request.Request(BASE+p, headers={"Authorization":"Bearer "+TOK})))
          uf=g("/flows/instances/?slug=default-user-settings-flow")["results"]
          if not uf: print("NO default-user-settings-flow"); 
          else:
            pk=uf[0]["pk"]; print("user-settings flow:", uf[0]["slug"])
            for b in sorted(g("/flows/bindings/?target=%s"%pk)["results"], key=lambda x:x.get("order",0)):
                so=b.get("stage_obj",{}); print("  stage:", so.get("name"), so.get("component"))
                if "prompt" in (so.get("component") or ""):
                    st=g("/stages/prompt/stages/%s/"%b["stage"])
                    for fpk in st.get("fields",[]):
                        f=g("/stages/prompt/prompts/%s/"%fpk)
                        print("    field:", f.get("field_key"), "| label:", f.get("label"), "| type:", f.get("type"))
          pc=g("/flows/instances/?slug=default-password-change")["results"]
          print("password-change flow present:", bool(pc), "->", "Change-password option available in /if/user/" if pc else "MISSING")
          PY
