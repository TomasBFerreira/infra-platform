name: Seed cross-env kubeconfigs into prod Vault

# Pulls /etc/rancher/k3s/k3s.yaml from dev + qa workers and writes them to
# secret/data/ops-portal/prod/kubeconfigs/{dev,qa}. The prod
# ops-portal-infrastructure deployment mounts these so its multi-cluster
# k8s manager can act against any of the three clusters.

on:
  workflow_dispatch: {}

jobs:
  seed:
    runs-on: [self-hosted, prod]
    env:
      VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
    steps:
      - name: Normalise Vault address
        run: |
          V="${VAULT_ADDR%/}"; [[ "$V" != http://* && "$V" != https://* ]] && V="http://$V"
          echo "VAULT_ADDR=$V" >> $GITHUB_ENV
      - name: Fetch worker SSH key
        run: |
          mkdir -p keys && chmod 700 keys
          curl -sf -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/secret/data/ssh_keys/worker_node_worker" \
            | python3 -c 'import sys,json,os; d=json.load(sys.stdin); k=d["data"]["data"]["private_key"]; open("keys/w","w").write(k if k.endswith("\n") else k+"\n")'
          chmod 600 keys/w

      - name: Pull each kubeconfig + write to Vault
        run: |
          for env in dev qa; do
            IP=$(curl -sf -H "X-Vault-Token: $VAULT_TOKEN" \
              "$VAULT_ADDR/v1/secret/data/worker-node/$env/active-slot" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['data']['ip'])")
            echo "fetching kubeconfig for $env worker $IP"
            KC=$(ssh -i keys/w -o StrictHostKeyChecking=no root@$IP "cat /etc/rancher/k3s/k3s.yaml" \
              | sed "s/127.0.0.1/$IP/g")
            [ -z "$KC" ] && { echo "ERROR: empty kubeconfig for $env"; exit 1; }
            # Wrap in JSON via Python (safer than embedded heredoc with k8s YAML)
            python3 - <<PYEOF
          import os, json, urllib.request
          payload = json.dumps({"data": {"kubeconfig": os.environ["KC"]}}).encode()
          req = urllib.request.Request(
              f"{os.environ['VAULT_ADDR']}/v1/secret/data/ops-portal/prod/kubeconfigs/$env",
              data=payload, method='POST',
              headers={'X-Vault-Token': os.environ['VAULT_TOKEN'], 'Content-Type': 'application/json'},
          )
          urllib.request.urlopen(req).read()
          print("wrote ops-portal/prod/kubeconfigs/$env")
          PYEOF
          done
        env:
          KC: placeholder
