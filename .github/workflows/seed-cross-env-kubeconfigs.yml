name: Seed cross-env kubeconfig into prod Vault

# Pulls /etc/rancher/k3s/k3s.yaml from the SOURCE env's worker (where the
# local SSH key authorises) and writes it to
# secret/data/ops-portal/prod/kubeconfigs/<source_env>. Run twice, once
# with source_env=dev and once with source_env=qa.

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: env whose kubeconfig to seed
        required: true
        type: choice
        options: [dev, qa]

jobs:
  seed:
    # Run on the source env's runner — its worker_node_worker key is the
    # one authorised on that env's worker.
    runs-on: [self-hosted, "${{ inputs.source_env }}"]
    env:
      VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
      SOURCE_ENV:  ${{ inputs.source_env }}
    steps:
      - name: Normalise Vault address
        run: |
          V="${VAULT_ADDR%/}"; [[ "$V" != http://* && "$V" != https://* ]] && V="http://$V"
          echo "VAULT_ADDR=$V" >> $GITHUB_ENV

      - name: Resolve worker IP + fetch SSH key
        run: |
          mkdir -p keys && chmod 700 keys
          curl -sf -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/secret/data/ssh_keys/worker_node_worker" \
            | python3 -c 'import sys,json,os; d=json.load(sys.stdin); k=d["data"]["data"]["private_key"]; open("keys/w","w").write(k if k.endswith("\n") else k+"\n")'
          chmod 600 keys/w
          IP=$(curl -sf -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/secret/data/worker-node/$SOURCE_ENV/active-slot" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['data']['ip'])")
          echo "WORKER_IP=$IP" >> $GITHUB_ENV

      - name: Fetch kubeconfig + write to Vault
        run: |
          KC=$(ssh -i keys/w -o StrictHostKeyChecking=no root@$WORKER_IP "cat /etc/rancher/k3s/k3s.yaml" \
            | sed "s/127.0.0.1/$WORKER_IP/g")
          [ -z "$KC" ] && { echo "ERROR: empty kubeconfig for $SOURCE_ENV"; exit 1; }
          export KC
          python3 - <<'PYEOF'
          import os, json, urllib.request
          payload = json.dumps({"data": {"kubeconfig": os.environ["KC"]}}).encode()
          req = urllib.request.Request(
              f"{os.environ['VAULT_ADDR']}/v1/secret/data/ops-portal/prod/kubeconfigs/{os.environ['SOURCE_ENV']}",
              data=payload, method='POST',
              headers={'X-Vault-Token': os.environ['VAULT_TOKEN'], 'Content-Type': 'application/json'},
          )
          urllib.request.urlopen(req).read()
          print(f"wrote ops-portal/prod/kubeconfigs/{os.environ['SOURCE_ENV']}")
          PYEOF
