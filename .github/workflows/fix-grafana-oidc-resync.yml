name: Fix Grafana OIDC sub-drift (prod)

# After a prod SSO blue/green flip, Authentik can re-sequence user PKs; Authentik
# emits the PK as the OIDC `sub`, so Grafana's stored user_auth.auth_id no longer
# matches and login fails with "user sync failed" (Rancher self-heals, Grafana
# doesn't). This re-syncs Grafana's auth_id to Tomas's current Authentik PK.
# Documented incident: /app/issues/grafana-oidc-user-sync-2026-04-23.md. Backup
# first, conditional update, verify. Idempotent.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options: [prod, qa, dev]
      username:
        description: 'Authentik username to resync'
        required: true
        default: 'tomas'

jobs:
  resync:
    runs-on: [self-hosted, "${{ inputs.environment }}"]
    env:
      ENVIRONMENT: ${{ inputs.environment }}
      USERNAME: ${{ inputs.username }}
      VAULT_BOOTSTRAP_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_DEV_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
      GRAFANA_DB: /mnt/monitoring-data/grafana/grafana.db
    steps:
      - name: Resolve env vault creds + monitoring IP
        run: |
          case "$ENVIRONMENT" in
            dev)  echo "ENVVAULT_ADDR=${{ secrets.VAULT_ADDR }}"   >> "$GITHUB_ENV"; echo "ENVVAULT_TOKEN=${{ secrets.VAULT_TOKEN }}" >> "$GITHUB_ENV"; echo "MON_IP=192.168.20.96" >> "$GITHUB_ENV" ;;
            qa)   echo "ENVVAULT_ADDR=${{ secrets.VAULT_QA_ADDR }}" >> "$GITHUB_ENV"; echo "ENVVAULT_TOKEN=${{ secrets.VAULT_QA_TOKEN }}" >> "$GITHUB_ENV"; echo "MON_IP=192.168.30.92" >> "$GITHUB_ENV" ;;
            prod) echo "ENVVAULT_ADDR=${{ secrets.VAULT_PROD_ADDR }}" >> "$GITHUB_ENV"; echo "ENVVAULT_TOKEN=${{ secrets.VAULT_PROD_TOKEN }}" >> "$GITHUB_ENV"; echo "MON_IP=192.168.10.96" >> "$GITHUB_ENV" ;;
          esac

      - name: Resolve Authentik IP + bootstrap token; look up user PK + email
        run: |
          IP=$(vault kv get -field=ip secret/sso/$ENVIRONMENT/active-slot)
          TOK=$(VAULT_ADDR="$ENVVAULT_ADDR" VAULT_TOKEN="$ENVVAULT_TOKEN" vault kv get -field=bootstrap_token secret/sso)
          echo "::add-mask::$TOK"
          U=$(curl -s "http://$IP:9000/api/v3/core/users/?username=$USERNAME" -H "Authorization: Bearer $TOK")
          PK=$(echo "$U" | python3 -c "import sys,json;r=json.load(sys.stdin)['results'];print(r[0]['pk'] if r else '')")
          EMAIL=$(echo "$U" | python3 -c "import sys,json;r=json.load(sys.stdin)['results'];print(r[0]['email'] if r else '')")
          [ -n "$PK" ] && [ -n "$EMAIL" ] || { echo "::error::could not resolve $USERNAME pk/email from Authentik"; exit 1; }
          echo "Authentik $USERNAME: pk=$PK email=$EMAIL"
          echo "NEW_PK=$PK" >> "$GITHUB_ENV"
          echo "USER_EMAIL=$EMAIL" >> "$GITHUB_ENV"
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}

      - name: Fetch monitoring SSH key
        run: |
          vault kv get -field=private_key secret/ssh_keys/monitoring_worker | awk 'NF>0' > /tmp/mon_key
          chmod 600 /tmp/mon_key
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}

      - name: Backup, read, and re-sync Grafana auth_id
        run: |
          SSH="ssh -i /tmp/mon_key -o StrictHostKeyChecking=no root@${MON_IP}"
          $SSH "test -f ${GRAFANA_DB} || { echo 'grafana.db not found at ${GRAFANA_DB}'; exit 1; }"
          echo "=== backup ==="
          $SSH "cp ${GRAFANA_DB} ${GRAFANA_DB}.bak-\$(date +%Y%m%dT%H%M%SZ) && ls -la ${GRAFANA_DB}.bak-* | tail -1"
          echo "=== current state ==="
          $SSH "sqlite3 ${GRAFANA_DB} \"SELECT id,login,email FROM user;\""
          $SSH "sqlite3 ${GRAFANA_DB} \"SELECT user_id,auth_module,auth_id FROM user_auth WHERE auth_module='oauth_generic_oauth';\""
          echo "=== resync: set auth_id=${NEW_PK} for the user with email ${USER_EMAIL} ==="
          $SSH "sqlite3 ${GRAFANA_DB} \"UPDATE user_auth SET auth_id='${NEW_PK}' WHERE auth_module='oauth_generic_oauth' AND user_id IN (SELECT id FROM user WHERE lower(email)=lower('${USER_EMAIL}')); SELECT 'rows_updated=' || changes();\""
          echo "=== after ==="
          $SSH "sqlite3 ${GRAFANA_DB} \"SELECT user_id,auth_module,auth_id FROM user_auth WHERE auth_module='oauth_generic_oauth';\""
          rm -f /tmp/mon_key
          echo "::notice::Grafana auth_id re-synced to Authentik pk ${NEW_PK} for ${USER_EMAIL}. Grafana re-reads user_auth per login — no restart needed."