name: Repair Torrent WireGuard

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options: [dev, prod]
      new_endpoint:
        description: 'New WireGuard endpoint (host:port). Leave blank to use vault value as-is.'
        required: false
        default: ''
      new_private_key:
        description: 'New WireGuard private key (Interface PrivateKey). Leave blank to use vault value.'
        required: false
        default: ''
      new_address:
        description: 'New WireGuard interface address (e.g. 100.64.1.230/32). Leave blank to use vault value.'
        required: false
        default: ''

jobs:
  repair:
    runs-on: [self-hosted, "${{ github.event.inputs.environment || 'prod' }}"]
    steps:
      - name: Resolve active torrent slot
        id: slots
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ENV="${{ github.event.inputs.environment || 'prod' }}"
          ACTIVE_IP=$(vault kv get -field=ip secret/torrent/$ENV/active-slot 2>/dev/null || echo "")
          echo "ip=$ACTIVE_IP" >> $GITHUB_OUTPUT
          echo "Active torrent CT: $ACTIVE_IP"

      - name: Fetch SSH key
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/torrent_worker \
            | awk 'NF > 0' > /tmp/torrent_repair_key
          chmod 600 /tmp/torrent_repair_key

      - name: Update vault endpoint (if new_endpoint provided)
        if: ${{ github.event.inputs.new_endpoint != '' }}
        continue-on-error: true
        run: |
          ENV="${{ github.event.inputs.environment || 'prod' }}"
          if [ "$ENV" = "prod" ]; then
            export VAULT_ADDR="${{ secrets.VAULT_PROD_ADDR }}"
            export VAULT_TOKEN="${{ secrets.VAULT_PROD_TOKEN }}"
          else
            export VAULT_ADDR="${{ secrets.VAULT_ADDR }}"
            export VAULT_TOKEN="${{ secrets.VAULT_TOKEN }}"
          fi
          NEW_ENDPOINT="${{ github.event.inputs.new_endpoint }}"
          echo "Patching secret/wireguard endpoint → $NEW_ENDPOINT"
          vault kv patch secret/wireguard endpoint="$NEW_ENDPOINT"

      - name: Fetch WireGuard config from vault
        id: wgcfg
        run: |
          ENV="${{ github.event.inputs.environment || 'prod' }}"
          if [ "$ENV" = "prod" ]; then
            export VAULT_ADDR="${{ secrets.VAULT_PROD_ADDR }}"
            export VAULT_TOKEN="${{ secrets.VAULT_PROD_TOKEN }}"
          else
            export VAULT_ADDR="${{ secrets.VAULT_ADDR }}"
            export VAULT_TOKEN="${{ secrets.VAULT_TOKEN }}"
          fi

          WG_PRIVATE_KEY=$(vault kv get -field=private_key secret/wireguard)
          WG_PEER_PUBLIC_KEY=$(vault kv get -field=peer_public_key secret/wireguard)
          WG_ENDPOINT=$(vault kv get -field=endpoint secret/wireguard)
          WG_ADDRESS=$(vault kv get -field=address secret/wireguard)
          WG_DNS=$(vault kv get -field=dns secret/wireguard 2>/dev/null || echo "")

          echo "Endpoint from vault: $WG_ENDPOINT"

          # If caller passed override values, use them instead of vault
          NEW_ENDPOINT="${{ github.event.inputs.new_endpoint }}"
          NEW_PRIVATE_KEY="${{ github.event.inputs.new_private_key }}"
          NEW_ADDRESS="${{ github.event.inputs.new_address }}"
          [ -n "$NEW_ENDPOINT"     ] && { echo "Overriding endpoint: $NEW_ENDPOINT";       WG_ENDPOINT="$NEW_ENDPOINT";         }
          [ -n "$NEW_PRIVATE_KEY"  ] && { echo "Overriding private_key (provided)";        WG_PRIVATE_KEY="$NEW_PRIVATE_KEY";   }
          [ -n "$NEW_ADDRESS"      ] && { echo "Overriding address: $NEW_ADDRESS";          WG_ADDRESS="$NEW_ADDRESS";           }
          {
            echo "wg_private_key=$WG_PRIVATE_KEY"
            echo "wg_peer_public_key=$WG_PEER_PUBLIC_KEY"
            echo "wg_endpoint=$WG_ENDPOINT"
            echo "wg_address=$WG_ADDRESS"
            echo "wg_dns=$WG_DNS"
          } >> $GITHUB_OUTPUT

      - name: Rewrite wg0.conf and restart WireGuard
        env:
          WG_PRIVATE_KEY:     ${{ steps.wgcfg.outputs.wg_private_key }}
          WG_PEER_PUBLIC_KEY: ${{ steps.wgcfg.outputs.wg_peer_public_key }}
          WG_ENDPOINT:        ${{ steps.wgcfg.outputs.wg_endpoint }}
          WG_ADDRESS:         ${{ steps.wgcfg.outputs.wg_address }}
          WG_DNS:             ${{ steps.wgcfg.outputs.wg_dns }}
        run: |
          IP="${{ steps.slots.outputs.ip }}"
          ENDPOINT_IP="${WG_ENDPOINT%%:*}"

          echo "=== Rewriting wg0.conf on $IP (endpoint: $WG_ENDPOINT) ==="

          CONF_FILE=$(mktemp)
          chmod 600 "$CONF_FILE"

          printf '[Interface]\n'                                                            > "$CONF_FILE"
          printf 'PrivateKey = %s\n' "$WG_PRIVATE_KEY"                                   >> "$CONF_FILE"
          printf 'Address = %s\n'    "$WG_ADDRESS"                                        >> "$CONF_FILE"
          [ -n "$WG_DNS" ] && printf 'DNS = %s\n' "$WG_DNS"                              >> "$CONF_FILE"
          printf 'Table = off\n'                                                           >> "$CONF_FILE"
          printf 'PostUp = GW=$(ip route show default | awk '"'"'/default/ {print $3; exit}'"'"'); ip route add %s/32 via ${GW} dev eth0 2>/dev/null || true; ip rule add to %s/32 lookup main priority 99 2>/dev/null || true; ip route add default dev wg0 table 200; ip rule add to 192.168.10.0/24 lookup main priority 100; ip rule add to 192.168.20.0/24 lookup main priority 101; ip rule add to 192.168.30.0/24 lookup main priority 102; ip rule add to 192.168.50.0/24 lookup main priority 103; ip rule add lookup 200 priority 200\n' "$ENDPOINT_IP" "$ENDPOINT_IP" >> "$CONF_FILE"
          printf 'PostDown = ip route del default dev wg0 table 200 2>/dev/null || true; ip rule del to %s/32 lookup main priority 99 2>/dev/null || true; ip rule del to 192.168.10.0/24 lookup main priority 100 2>/dev/null || true; ip rule del to 192.168.20.0/24 lookup main priority 101 2>/dev/null || true; ip rule del to 192.168.30.0/24 lookup main priority 102 2>/dev/null || true; ip rule del to 192.168.50.0/24 lookup main priority 103 2>/dev/null || true; ip rule del lookup 200 priority 200 2>/dev/null || true; ip route del %s/32 2>/dev/null || true\n' "$ENDPOINT_IP" "$ENDPOINT_IP" >> "$CONF_FILE"
          printf '\n[Peer]\n'                                                              >> "$CONF_FILE"
          printf 'PublicKey = %s\n'  "$WG_PEER_PUBLIC_KEY"                                >> "$CONF_FILE"
          printf 'Endpoint = %s\n'   "$WG_ENDPOINT"                                       >> "$CONF_FILE"
          printf 'AllowedIPs = 0.0.0.0/0\n'                                               >> "$CONF_FILE"
          printf 'PersistentKeepalive = 25\n'                                               >> "$CONF_FILE"

          scp -i /tmp/torrent_repair_key -o StrictHostKeyChecking=no \
            "$CONF_FILE" root@"$IP":/etc/wireguard/wg0.conf
          rm -f "$CONF_FILE"

          ssh -i /tmp/torrent_repair_key -o StrictHostKeyChecking=no root@"$IP" bash <<'REMOTE'
          chmod 600 /etc/wireguard/wg0.conf
          echo "--- Restarting wg-quick@wg0 ---"
          systemctl restart wg-quick@wg0
          sleep 30

          echo "--- Status (30s) ---"
          wg show 2>&1

          LATEST_HS=$(wg show wg0 latest-handshakes 2>/dev/null | awk '{print $2}')
          if [ -n "$LATEST_HS" ] && [ "$LATEST_HS" != "0" ]; then
            echo "✓ Handshake established (epoch $LATEST_HS)"
          else
            echo "✗ No handshake yet — peer may be unreachable or keys may be stale"
          fi
          REMOTE

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/torrent_repair_key

