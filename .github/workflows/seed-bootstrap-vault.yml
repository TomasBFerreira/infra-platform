name: Seed Bootstrap Vault Secrets

on:
  workflow_dispatch:
    inputs:
      secret_path:
        description: 'Vault secret path (e.g. tailscale, adguard, wireguard)'
        required: true
        type: choice
        options:
          - tailscale
          - adguard
          - wireguard
          - cloudflare-tunnel
          - cloudflare-dns
          - ssh-key
          - qbittorrent
          - wikijs-api-token
          - newrelic-shared
      # ssh-key
      ssh_key_name:
        description: '[ssh-key] Key name (e.g. torrent_worker) — stored at secret/ssh_keys/<key_name>'
        required: false
      ssh_private_key:
        description: '[ssh-key] Private key (PEM/OpenSSH)'
        required: false
      ssh_public_key:
        description: '[ssh-key] Public key'
        required: false
      # tailscale
      ts_authkey:
        description: '[tailscale] authkey'
        required: false
      # adguard
      adguard_username:
        description: '[adguard] username'
        required: false
      adguard_password:
        description: '[adguard] password'
        required: false
      # wireguard
      wg_private_key:
        description: '[wireguard] PrivateKey from VPN config'
        required: false
      wg_peer_public_key:
        description: '[wireguard] Peer PublicKey from VPN config'
        required: false
      wg_endpoint:
        description: '[wireguard] Peer Endpoint (e.g. 1.2.3.4:51820)'
        required: false
      wg_address:
        description: '[wireguard] Interface Address (e.g. 10.x.x.x/32)'
        required: false
      wg_dns:
        description: '[wireguard] DNS (optional, e.g. 1.1.1.1)'
        required: false
      # cloudflare-dns
      cf_dns_api_token:
        description: '[cloudflare-dns] Zone:DNS:Edit API token for ACME DNS-01 challenge'
        required: false
      # cloudflare-tunnel
      cf_tunnel_token:
        description: '[cloudflare-tunnel] Tunnel token from Cloudflare dashboard'
        required: false
      # qbittorrent
      qb_username:
        description: '[qbittorrent] WebUI username'
        required: false
      qb_password:
        description: '[qbittorrent] WebUI password'
        required: false
      # wikijs-api-token
      wikijs_env:
        description: '[wikijs-api-token] env: dev | prod (default prod)'
        required: false
        default: 'prod'
      wikijs_api_token:
        description: '[wikijs-api-token] Bearer token from wikijs Administration → API Access'
        required: false
      # newrelic-shared
      newrelic_region:
        description: '[newrelic-shared] Region override (default EU)'
        required: false
        default: 'EU'

jobs:
  seed:
    runs-on: self-hosted
    steps:
      - name: Write secret to bootstrap vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
          NEWRELIC_OTLP_API_KEY: ${{ secrets.NEWRELIC_OTLP_API_KEY }}
        run: |
          SECRET="${{ github.event.inputs.secret_path }}"
          case "$SECRET" in
            ssh-key)
              KEY_NAME="${{ github.event.inputs.ssh_key_name }}"
              vault kv put "secret/ssh_keys/${KEY_NAME}" \
                private_key="${{ github.event.inputs.ssh_private_key }}" \
                public_key="${{ github.event.inputs.ssh_public_key }}"
              ;;
            tailscale)
              vault kv put secret/tailscale \
                authkey="${{ github.event.inputs.ts_authkey }}"
              ;;
            adguard)
              vault kv put secret/adguard \
                username="${{ github.event.inputs.adguard_username }}" \
                password="${{ github.event.inputs.adguard_password }}"
              ;;
            wireguard)
              vault kv put secret/wireguard \
                private_key="${{ github.event.inputs.wg_private_key }}" \
                peer_public_key="${{ github.event.inputs.wg_peer_public_key }}" \
                endpoint="${{ github.event.inputs.wg_endpoint }}" \
                address="${{ github.event.inputs.wg_address }}" \
                dns="${{ github.event.inputs.wg_dns }}"
              ;;
            cloudflare-tunnel)
              vault kv put secret/cloudflare-tunnel \
                token="${{ github.event.inputs.cf_tunnel_token }}"
              ;;
            cloudflare-dns)
              vault kv put secret/cloudflare \
                dns_api_token="${{ github.event.inputs.cf_dns_api_token }}"
              ;;
            qbittorrent)
              vault kv put secret/qbittorrent \
                username="${{ github.event.inputs.qb_username }}" \
                password="${{ github.event.inputs.qb_password }}"
              ;;
            wikijs-api-token)
              WK_ENV="${{ github.event.inputs.wikijs_env }}"
              vault kv put "secret/wikijs/${WK_ENV:-prod}/api-token" \
                token="${{ github.event.inputs.wikijs_api_token }}"
              ;;
            newrelic-shared)
              export NEWRELIC_REGION="${{ github.event.inputs.newrelic_region }}"
              python3 - <<'PYEOF'
              import json
              import os
              import urllib.error
              import urllib.request

              vault_addr = os.environ["VAULT_ADDR"].rstrip("/")
              vault_token = os.environ["VAULT_TOKEN"]
              path = "secret/data/monitoring/shared/newrelic"
              env_path = os.environ["GITHUB_ENV"]

              headers = {"X-Vault-Token": vault_token, "Content-Type": "application/json"}

              def request(method: str, url: str, payload: dict | None = None) -> dict | None:
                  body = None if payload is None else json.dumps(payload).encode()
                  req = urllib.request.Request(url, data=body, headers=headers, method=method)
                  try:
                      with urllib.request.urlopen(req, timeout=30) as response:
                          if response.length == 0:
                              return None
                          return json.load(response)
                  except urllib.error.HTTPError as exc:
                      if exc.code == 404:
                          return None
                      raise

              current = request("GET", f"{vault_addr}/v1/{path}") or {}
              merged = dict((((current.get("data") or {}).get("data")) or {}))

              otlp_api_key = os.environ.get("NEWRELIC_OTLP_API_KEY", "").strip()
              if not otlp_api_key:
                  raise SystemExit("NEWRELIC_OTLP_API_KEY repo secret is required for newrelic-shared")

              merged["otlp_api_key"] = otlp_api_key
              merged["region"] = os.environ.get("NEWRELIC_REGION", "").strip() or merged.get("region") or "EU"

              request("POST", f"{vault_addr}/v1/{path}", {"data": merged})

              visible_fields = ", ".join(sorted(merged.keys()))
              print(f"Wrote secret/monitoring/shared/newrelic with fields: {visible_fields}")
              with open(env_path, "a", encoding="utf-8") as handle:
                  handle.write(f"NEWRELIC_WRITTEN_FIELDS={visible_fields}\n")
              PYEOF
              ;;
          esac
          echo "Written secret/$SECRET to bootstrap vault."
