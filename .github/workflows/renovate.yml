name: Renovate

# Self-hosted Renovate orchestrator. Runs on the ARC pilot scale set in the
# dev k3s cluster and opens PRs against the repos listed in renovate/config.js.
#
# Auth: a GitHub App named "Renovate" (separate from the ARC app — different
# permission scope). App credentials are seeded into the dev env vault at
# secret/renovate/github-app with fields {app_id, installation_id, private_key}.
# See docs/renovate.md for the one-time setup.
#
# Cadence: twice daily (08:17 and 20:17 UTC). Use workflow_dispatch with
# dry_run=full for a no-op preview run that shows what Renovate would do.

on:
  schedule:
    - cron: '17 8,20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        # Renovate accepts: null (real run) | extract | lookup | full.
        # We pass these strings through as-is — DO NOT add an alias like
        # 'none', because GHA's `A && B || C` ternary coalesces empty
        # strings to C, so any sentinel that maps to '' falls through to
        # the original value and Renovate enters dry-run anyway (caught
        # 2026-05-18 in run 26060708126 — passed RENOVATE_DRY_RUN=none and
        # Renovate treated the non-empty value as dry-run).
        description: Renovate dry-run mode (null = real run)
        type: choice
        options: ['null', extract, lookup, full]
        default: 'null'
      log_level:
        description: Log verbosity
        type: choice
        options: [info, debug]
        default: info

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    # Routes by ARC scale-set NAME, not classic [self-hosted, label] —
    # see manifests/arc/scale-sets.yml and arc-smoketest.yml for the pattern.
    runs-on: arc-pilot-dev
    timeout-minutes: 30
    env:
      # Bootstrap vault (CT 200, 192.168.50.200), authenticated with a
      # scoped token that can only read `secret/data/renovate/*` and
      # `secret/metadata/renovate/*` — see vault policy `renovate` upserted
      # 2026-05-19. Token is `period=768h` (auto-renews on each use, valid
      # as long as Renovate keeps running at least every 32 days).
      VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_RENOVATE_TOKEN }}
    steps:
      - name: Checkout orchestrator config
        uses: actions/checkout@v4

      - name: Fetch Renovate GitHub App credentials from vault
        id: app
        run: |
          set -euo pipefail
          app_id=$(vault kv get -field=app_id secret/renovate/github-app)
          private_key=$(vault kv get -field=private_key secret/renovate/github-app)

          # Mask both before exporting. add-mask is applied line-by-line for the
          # private key, so the PEM body is mostly safe even if a step echoes it.
          echo "::add-mask::${app_id}"
          while IFS= read -r line; do echo "::add-mask::${line}"; done <<< "${private_key}"

          echo "app_id=${app_id}" >> "$GITHUB_OUTPUT"
          delimiter="EOF_$(openssl rand -hex 8)"
          {
            echo "private_key<<${delimiter}"
            printf '%s\n' "${private_key}"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Mint installation token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ steps.app.outputs.app_id }}
          private-key: ${{ steps.app.outputs.private_key }}
          owner: TomasBFerreira

      # renovate + Node 24 are pre-baked into the arc-runner image as of
      # infra-platform#223 (2026-05-19). Drop the setup-node + npm install
      # steps that previously provisioned them per-dispatch (~40s overhead).
      - name: Run Renovate
        env:
          RENOVATE_TOKEN: ${{ steps.token.outputs.token }}
          RENOVATE_CONFIG_FILE: ${{ github.workspace }}/renovate/config.js
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
          # Renovate accepts 'null' as the sentinel for "not a dry-run".
          # Scheduled runs (no inputs.dry_run) pass through as empty string;
          # Renovate also treats unset / empty as real run.
          RENOVATE_DRY_RUN: ${{ inputs.dry_run || 'null' }}
        run: renovate
