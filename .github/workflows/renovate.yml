name: Renovate

# Self-hosted Renovate orchestrator. Runs on the ARC pilot scale set in the
# dev k3s cluster and opens PRs against the repos listed in renovate/config.js.
#
# Auth: a GitHub App named "Renovate" (separate from the ARC app — different
# permission scope). App credentials are seeded into the dev env vault at
# secret/renovate/github-app with fields {app_id, installation_id, private_key}.
# See docs/renovate.md for the one-time setup.
#
# Cadence: twice daily (08:17 and 20:17 UTC). Use workflow_dispatch with
# dry_run=full for a no-op preview run that shows what Renovate would do.

on:
  schedule:
    - cron: '17 8,20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: Renovate dry-run mode
        type: choice
        options: [none, extract, lookup, full]
        default: none
      log_level:
        description: Log verbosity
        type: choice
        options: [info, debug]
        default: info

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    # Routes by ARC scale-set NAME, not classic [self-hosted, label] —
    # see manifests/arc/scale-sets.yml and arc-smoketest.yml for the pattern.
    runs-on: arc-pilot-dev
    timeout-minutes: 30
    env:
      # We talk to the BOOTSTRAP vault (CT 200, 192.168.50.200). The
      # `VAULT_DEV_TOKEN` CI token is stale (last rotated 2026-03-23; runs
      # 26059409023 / 26059584590 both 403'd with it), while
      # `VAULT_BOOTSTRAP_ROOT_TOKEN` was rotated 2026-05-13 and is what every
      # other workflow that writes app secrets uses (e.g.
      # nextcloud/seed-vault.yml). Using root is heavier than needed — a
      # follow-up should mint a scoped `renovate` token via the vault-ct
      # playbook and add it as `VAULT_RENOVATE_TOKEN` to GitHub secrets.
      VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
    steps:
      - name: Checkout orchestrator config
        uses: actions/checkout@v4

      - name: Fetch Renovate GitHub App credentials from vault
        id: app
        run: |
          set -euo pipefail
          app_id=$(vault kv get -field=app_id secret/renovate/github-app)
          private_key=$(vault kv get -field=private_key secret/renovate/github-app)

          # Mask both before exporting. add-mask is applied line-by-line for the
          # private key, so the PEM body is mostly safe even if a step echoes it.
          echo "::add-mask::${app_id}"
          while IFS= read -r line; do echo "::add-mask::${line}"; done <<< "${private_key}"

          echo "app_id=${app_id}" >> "$GITHUB_OUTPUT"
          delimiter="EOF_$(openssl rand -hex 8)"
          {
            echo "private_key<<${delimiter}"
            printf '%s\n' "${private_key}"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Mint installation token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ steps.app.outputs.app_id }}
          private-key: ${{ steps.app.outputs.private_key }}
          owner: TomasBFerreira

      # renovatebot/github-action runs renovate inside a docker container via
      # /var/run/docker.sock. ARC pods have no Docker daemon, so we install
      # renovate as a plain Node CLI and invoke it directly. The arc-runner
      # image is based on ghcr.io/actions/actions-runner which bundles Node
      # internally for JS-action execution, but doesn't expose `npm` on PATH
      # for shell steps — so use setup-node to provision a usable Node.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Renovate latest requires node ^24.11.0 — found 20.20.2 too old
          # in run 26059905965 with "Unsupported node environment detected".
          node-version: '24'

      - name: Install Renovate CLI
        run: npm install -g renovate@latest

      - name: Run Renovate
        env:
          RENOVATE_TOKEN: ${{ steps.token.outputs.token }}
          RENOVATE_CONFIG_FILE: ${{ github.workspace }}/renovate/config.js
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
          # Renovate ignores RENOVATE_DRY_RUN when empty/unset.
          RENOVATE_DRY_RUN: ${{ inputs.dry_run == 'none' && '' || inputs.dry_run }}
        run: renovate
