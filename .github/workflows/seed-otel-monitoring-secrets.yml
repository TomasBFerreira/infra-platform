name: Seed otel-monitoring repo secrets

# One-off workflow: copies VAULT_BOOTSTRAP_ADDR, VAULT_BOOTSTRAP_ROOT_TOKEN,
# and GH_PAT from infra-platform secrets into otel-monitoring repo secrets.
# Delete this file after running.

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: [self-hosted, dev]
    steps:
      - name: Copy secrets to otel-monitoring
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          VAULT_BOOTSTRAP_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_BOOTSTRAP_ROOT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          gh secret set VAULT_BOOTSTRAP_ADDR \
            --repo TomasBFerreira/otel-monitoring \
            --body "${VAULT_BOOTSTRAP_ADDR}"

          gh secret set VAULT_BOOTSTRAP_ROOT_TOKEN \
            --repo TomasBFerreira/otel-monitoring \
            --body "${VAULT_BOOTSTRAP_ROOT_TOKEN}"

          gh secret set GH_PAT \
            --repo TomasBFerreira/otel-monitoring \
            --body "${GH_PAT}"

          echo "✅ Secrets seeded into otel-monitoring"
