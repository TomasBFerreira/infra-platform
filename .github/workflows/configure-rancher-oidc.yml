name: Configure Rancher OIDC

# Configures Authentik OIDC on an already-running Rancher instance.
# Run this after first-time Rancher setup (password set) when OIDC is
# missing — e.g. after a forced redeploy wiped Rancher state.
#
# Usage:
#   gh workflow run configure-rancher-oidc.yml --field environment=dev

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, prod]

jobs:
  configure:
    runs-on: [self-hosted, "${{ inputs.environment }}"]
    steps:
      - name: Fetch credentials from Vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ENV="${{ inputs.environment }}"

          # Rancher is a singleton per env — static VMID/IP scheme
          case "$ENV" in
            dev)
              RANCHER_IP="192.168.20.2"
              RANCHER_HOSTNAME="rancher-dev.databaes.net"
              ;;
            qa)
              RANCHER_IP="192.168.30.2"
              RANCHER_HOSTNAME="rancher-qa.databaes.net"
              ;;
            prod)
              RANCHER_IP="192.168.10.2"
              RANCHER_HOSTNAME="rancher.databaes.net"
              ;;
          esac

          # All Rancher secrets live in the bootstrap vault (same as the pipeline)
          RANCHER_PASSWORD=$(vault kv get -field=password secret/rancher/${ENV}/bootstrap)
          OIDC_CLIENT_ID=$(vault kv get -field=client_id secret/authentik/${ENV}/rancher-oidc)
          OIDC_CLIENT_SECRET=$(vault kv get -field=client_secret secret/authentik/${ENV}/rancher-oidc)

          # Always use the public HTTPS discovery URL — Rancher CT has internet access
          # and the public URL returns https:// authorization_endpoint URLs so OIDC
          # login redirects to the correct public address.
          case "$ENV" in
            dev)  PUBLIC_SSO_URL="https://auth-dev.databaes.net" ;;
            qa)   PUBLIC_SSO_URL="https://auth-qa.databaes.net"  ;;
            prod) PUBLIC_SSO_URL="https://auth.databaes.net"     ;;
          esac
          OIDC_DISCOVERY_URL="${PUBLIC_SSO_URL}/application/o/rancher/"
          vault kv patch secret/authentik/${ENV}/rancher-oidc \
            discovery_url="$OIDC_DISCOVERY_URL"
          echo "Patched rancher-oidc discovery_url → $OIDC_DISCOVERY_URL"

          echo "::add-mask::$RANCHER_PASSWORD"
          echo "::add-mask::$OIDC_CLIENT_SECRET"

          echo "RANCHER_IP=$RANCHER_IP"                   >> $GITHUB_ENV
          echo "RANCHER_HOSTNAME=$RANCHER_HOSTNAME"       >> $GITHUB_ENV
          echo "RANCHER_PASSWORD=$RANCHER_PASSWORD"       >> $GITHUB_ENV
          echo "OIDC_CLIENT_ID=$OIDC_CLIENT_ID"           >> $GITHUB_ENV
          echo "OIDC_CLIENT_SECRET=$OIDC_CLIENT_SECRET"   >> $GITHUB_ENV
          echo "OIDC_DISCOVERY_URL=$OIDC_DISCOVERY_URL"   >> $GITHUB_ENV

      - name: Configure Rancher OIDC via API
        run: |
          # All API calls use Host header — K3s Traefik routes by hostname.
          rancher_curl() {
            curl -sk --fail-with-body -H "Host: ${RANCHER_HOSTNAME}" "$@"
          }

          # Login (no -f so we capture body for mustChangePassword check)
          echo "=== Logging in to Rancher ==="
          LOGIN_RESP=$(curl -sk \
            -H "Host: ${RANCHER_HOSTNAME}" \
            -X POST "https://${RANCHER_IP}/v3-public/localProviders/local?action=login" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"admin\", \"password\": \"${RANCHER_PASSWORD}\", \"ttl\": 60000}")
          echo "Login: $(echo "$LOGIN_RESP" | python3 -c \
            'import sys,json; r=json.load(sys.stdin); print("type="+str(r.get("type")), "mustChangePassword="+str(r.get("mustChangePassword")))' \
            2>/dev/null || echo "parse error")"

          RANCHER_TOKEN=$(echo "$LOGIN_RESP" | python3 -c \
            "import sys,json; print(json.load(sys.stdin)['token'])" 2>/dev/null || echo "")
          if [ -z "$RANCHER_TOKEN" ]; then
            echo "ERROR: Could not extract token. Full response: $LOGIN_RESP"
            exit 1
          fi

          # Unlock account if mustChangePassword=true
          MUST_CHANGE=$(echo "$LOGIN_RESP" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('mustChangePassword', False))" \
            2>/dev/null || echo "False")
          if [ "$MUST_CHANGE" = "True" ]; then
            echo "=== Unlocking account (mustChangePassword=true) ==="
            USER_ID=$(echo "$LOGIN_RESP" | python3 -c \
              "import sys,json; print(json.load(sys.stdin)['userId'])")
            curl -sk -H "Host: ${RANCHER_HOSTNAME}" \
              -X POST "https://${RANCHER_IP}/v3/users/${USER_ID}?action=setpassword" \
              -H "Authorization: Bearer $RANCHER_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"newPassword\": \"${RANCHER_PASSWORD}\"}" > /dev/null
            echo "Account unlocked for user $USER_ID"
          fi

          # Wait for admin RBAC
          echo "=== Waiting for admin RBAC ==="
          for i in $(seq 1 30); do
            HTTP_STATUS=$(curl -sk -o /dev/null -w '%{http_code}' \
              -H "Host: ${RANCHER_HOSTNAME}" \
              -H "Authorization: Bearer $RANCHER_TOKEN" \
              "https://${RANCHER_IP}/v3/settings/server-url")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "RBAC ready (attempt $i)"
              break
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS — waiting 10s..."
            sleep 10
          done

          # Set server URL
          rancher_curl -X PUT "https://${RANCHER_IP}/v3/settings/server-url" \
            -H "Authorization: Bearer $RANCHER_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"value\": \"https://${RANCHER_HOSTNAME}\"}" > /dev/null
          echo "server-url set to https://${RANCHER_HOSTNAME}"

          # Disable first-login wizard
          rancher_curl -X PUT "https://${RANCHER_IP}/v3/settings/first-login" \
            -H "Authorization: Bearer $RANCHER_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"value": "false"}' > /dev/null
          echo "first-login disabled"

          # Configure OIDC
          echo "=== Configuring OIDC ==="
          CURRENT_OIDC=$(rancher_curl \
            -H "Authorization: Bearer $RANCHER_TOKEN" \
            "https://${RANCHER_IP}/v3/genericOIDCConfigs/genericoidc") \
            || { echo "OIDC GET failed: $CURRENT_OIDC"; exit 1; }

          MERGED=$(echo "$CURRENT_OIDC" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          d.update({
            'enabled': True,
            'clientId': '$OIDC_CLIENT_ID',
            'clientSecret': '$OIDC_CLIENT_SECRET',
            'issuer': '$OIDC_DISCOVERY_URL',
            'scope': 'openid profile email groups',
            'rancherUrl': 'https://${RANCHER_HOSTNAME}/verify-auth',
            'accessMode': 'unrestricted',
            'allowedPrincipalIds': [],
            'groupSearchEnabled': True,
          })
          print(json.dumps(d))
          ")

          RESULT=$(rancher_curl -X PUT "https://${RANCHER_IP}/v3/genericOIDCConfigs/genericoidc" \
            -H "Authorization: Bearer $RANCHER_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$MERGED" || true)
          echo "OIDC enabled: $(echo "$RESULT" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('enabled', 'unknown'))" 2>/dev/null)"
          echo "OIDC issuer: $(echo "$RESULT" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('issuer', 'unknown'))" 2>/dev/null)"

      - name: Grant Authentik admin user global admin role
        run: |
          # When an OIDC user logs into Rancher for the first time, Rancher creates
          # a local user object for them — but with no roles. The cluster was created
          # by the local bootstrap admin, so OIDC users can't see it until they're
          # granted the admin GlobalRole.
          #
          # This step finds any Rancher users whose principalIds contain 'genericoidc'
          # and grants them the built-in 'admin' GlobalRole. Idempotent — skipped if
          # the binding already exists. If no OIDC users have logged in yet, it warns
          # and exits cleanly (log in once, then re-run this workflow).

          rancher_curl() {
            curl -sk --fail-with-body -H "Host: ${RANCHER_HOSTNAME}" "$@"
          }

          # Re-login (token from previous step is not available across steps)
          LOGIN_RESP=$(curl -sk -H "Host: ${RANCHER_HOSTNAME}" \
            -X POST "https://${RANCHER_IP}/v3-public/localProviders/local?action=login" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"admin\", \"password\": \"${RANCHER_PASSWORD}\", \"ttl\": 60000}")
          RANCHER_TOKEN=$(echo "$LOGIN_RESP" | python3 -c \
            "import sys,json; print(json.load(sys.stdin)['token'])" 2>/dev/null)
          if [ -z "$RANCHER_TOKEN" ]; then
            echo "ERROR: Could not log in. Response: $LOGIN_RESP"
            exit 1
          fi

          echo "=== OIDC users in Rancher ==="
          USERS=$(rancher_curl \
            -H "Authorization: Bearer $RANCHER_TOKEN" \
            "https://${RANCHER_IP}/v3/users")

          OIDC_USERS=$(echo "$USERS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          oidc = [(u['id'], u.get('username',''), u.get('principalIds',[])) 
                  for u in data.get('data', [])
                  if any('genericoidc' in p for p in u.get('principalIds', []))]
          for uid, uname, pids in oidc:
              print(f'{uid}:{uname}')
          " 2>/dev/null)

          if [ -z "$OIDC_USERS" ]; then
            echo "WARNING: No OIDC users have logged into Rancher yet."
            echo "Log in via Authentik at https://${RANCHER_HOSTNAME} once, then re-run this workflow."
            exit 0
          fi

          echo "Found OIDC users: $OIDC_USERS"

          # Fetch existing admin GlobalRoleBindings so we don't duplicate
          EXISTING_BINDINGS=$(rancher_curl \
            -H "Authorization: Bearer $RANCHER_TOKEN" \
            "https://${RANCHER_IP}/v3/globalrolebindings?globalRoleId=admin" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(' '.join(b.get('userId','') for b in data.get('data',[])))
          " 2>/dev/null)

          echo "$OIDC_USERS" | while IFS=: read -r USER_ID USERNAME; do
            if echo "$EXISTING_BINDINGS" | grep -qw "$USER_ID"; then
              echo "User $USERNAME ($USER_ID) already has admin GlobalRoleBinding — skipping"
            else
              echo "Granting admin GlobalRole to $USERNAME ($USER_ID)..."
              RESULT=$(rancher_curl \
                -X POST "https://${RANCHER_IP}/v3/globalrolebindings" \
                -H "Authorization: Bearer $RANCHER_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"type\":\"globalRoleBinding\",\"globalRoleId\":\"admin\",\"userId\":\"$USER_ID\"}" \
                || true)
              BINDING_ID=$(echo "$RESULT" | python3 -c \
                "import sys,json; print(json.load(sys.stdin).get('id','error'))" 2>/dev/null)
              echo "GlobalRoleBinding created: $BINDING_ID for $USERNAME"
            fi
          done

      - name: Cleanup
        if: always()
        run: echo "done"
