name: Diagnose Prod Rancher State

on:
  workflow_dispatch:

jobs:
  diagnose-node:
    runs-on: [self-hosted, prod]
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      NODE_IP: 192.168.10.21
      RANCHER_IP: 192.168.10.2
      RANCHER_HOSTNAME: rancher.databaes.net
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code
        run: |
          cd /app/infra-platform
          git fetch origin && git checkout main && git reset --hard origin/main

      - name: Fetch credentials from Vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/worker_node_worker \
            | awk 'NF > 0' > /tmp/worker_node_key
          chmod 600 /tmp/worker_node_key

      - name: Check agent connection and current logs
        run: |
          ssh-keygen -R "${NODE_IP}" || true
          ansible-playbook \
            -i "${NODE_IP}," -v \
            --private-key /tmp/worker_node_key \
            -e "ansible_host=${NODE_IP}" \
            -e "ansible_user=root" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            -e "rancher_ip=${RANCHER_IP}" \
            -e "rancher_hostname=${RANCHER_HOSTNAME}" \
            ansible/worker-node/check-agent-connection.yml

      - name: Cleanup
        if: always()
        run: rm -f /tmp/worker_node_key

  query-rancher-api:
    runs-on: [self-hosted, prod]
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      RANCHER_IP: 192.168.10.2
      RANCHER_HOSTNAME: rancher.databaes.net
    steps:
      - name: Fetch Rancher password from Vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          RANCHER_PASS=$(vault kv get -field=password secret/rancher/prod/bootstrap)
          echo "::add-mask::$RANCHER_PASS"
          echo "RANCHER_PASS=$RANCHER_PASS" >> $GITHUB_ENV

      - name: Query Rancher API for cluster states
        run: |
          python3 - << 'PYEOF'
          import subprocess, json, os

          ip   = os.environ["RANCHER_IP"]
          host = os.environ["RANCHER_HOSTNAME"]
          pw   = os.environ["RANCHER_PASS"]

          def curl(*args):
              r = subprocess.run(["curl", "-sk"] + list(args), capture_output=True, text=True)
              try:
                  return json.loads(r.stdout)
              except Exception:
                  print("raw:", r.stdout[:500])
                  return {}

          login = curl(
              "-H", "Host: " + host,
              "-X", "POST", "https://" + ip + "/v3-public/localProviders/local?action=login",
              "-H", "Content-Type: application/json",
              "-d", json.dumps({"username": "admin", "password": pw, "ttl": 60000}))
          token = login.get("token", "")
          if not token:
              print("ERROR: login failed:", login)
              exit(1)

          clusters = curl(
              "-H", "Host: " + host,
              "-H", "Authorization: Bearer " + token,
              "https://" + ip + "/v3/clusters")

          print("\n=== Cluster states ===")
          for c in clusters.get("data", []):
              cid   = c["id"]
              name  = c["name"]
              state = c.get("state", "?")
              trans = c.get("transitioning", "?")
              msg   = c.get("transitioningMessage", "")[:120]
              print("  " + cid.ljust(20) + " " + name.ljust(30) + " state=" + state.ljust(15) + " transitioning=" + trans)
              if msg:
                  print("    message: " + msg)
              for cond in c.get("conditions", []):
                  if cond.get("status") != "True":
                      print("    CONDITION " + cond.get("type","") + ": " + cond.get("status","") + " -- " + cond.get("message","")[:80])

          # Detailed info for non-local clusters
          for c in clusters.get("data", []):
              if c["id"] == "local":
                  continue
              cid = c["id"]
              print("\n=== Cluster detail: " + cid + " ===")
              k3s = c.get("k3sConfig", {})
              if k3s:
                  print("  k3sConfig.kubernetesVersion: " + str(k3s.get("kubernetesVersion", "not set")))
              rke2 = c.get("rke2Config", {})
              if rke2:
                  print("  rke2Config.kubernetesVersion: " + str(rke2.get("kubernetesVersion", "not set")))
              print("  version.gitVersion: " + str(c.get("version", {}).get("gitVersion", "unknown")))
              print("  driver: " + str(c.get("driver", "unknown")))
              print("  requested: " + str(c.get("requested", {})))

              # Fetch cluster registration tokens
              reg = curl(
                  "-H", "Host: " + host,
                  "-H", "Authorization: Bearer " + token,
                  "https://" + ip + "/v3/clusterregistrationtokens?clusterId=" + cid)
              print("  registrationTokens: " + str(len(reg.get("data", []))) + " tokens")
              for t in reg.get("data", []):
                  print("    token: " + t.get("token","")[:30] + "... state=" + t.get("state","?"))

          PYEOF
