name: Worker Node Pipeline (Self-Hosted)

# Worker nodes follow a numbered singleton scheme (111, 112, 113…) rather than
# blue/green pairs. Each node has exactly one VMID and one IP, and stays running
# indefinitely. Kubernetes provides workload resilience — VM-level blue/green is
# not applicable here.
#
# Adapted 6-job structure:
#   resolve-node       → resolve-slots equivalent  (computes VMID/IP from node_number)
#   terraform-node     → terraform-staging equivalent
#   ansible-node       → ansible-staging equivalent
#   register-node      → flip-active equivalent    (records node in bootstrap vault)
#   (teardown-old-active skipped — no slot rotation; use deprovision workflow)
#   cleanup-on-failure → unchanged

on:
  workflow_dispatch:
    inputs:
      node_number:
        description: 'Worker node number (e.g. 1). Dev: VMID=210+N, IP=192.168.20.(10+N). Prod: VMID=110+N, IP=192.168.10.(10+N).'
        required: true
        type: string
      target_node:
        description: 'Proxmox node to deploy on'
        required: true
        default: 'benedict'
        type: choice
        options:
          - benedict
          - betsy
          - vladimir
      template_vmid:
        description: 'VMID of the cloud-init template VM to clone (must exist on target node)'
        required: true
        default: '9000'
        type: string

concurrency:
  group: worker-node-pipeline-${{ github.event.inputs.node_number }}
  cancel-in-progress: false

jobs:
  resolve-node:
    runs-on: [self-hosted, "${{ github.event.inputs.target_node == 'betsy' && 'prod' || github.event.inputs.target_node == 'vladimir' && 'qa' || 'dev' }}"]
    outputs:
      node_number:      ${{ steps.resolve.outputs.node_number }}
      vmid:             ${{ steps.resolve.outputs.vmid }}
      ip_address:       ${{ steps.resolve.outputs.ip_address }}
      vm_hostname:      ${{ steps.resolve.outputs.vm_hostname }}
      pve_api_url:      ${{ steps.resolve.outputs.pve_api_url }}
      pve_node:         ${{ steps.resolve.outputs.pve_node }}
      env:              ${{ steps.resolve.outputs.env }}
      rancher_ip:       ${{ steps.resolve.outputs.rancher_ip }}
      rancher_hostname: ${{ steps.resolve.outputs.rancher_hostname }}
      gateway:        ${{ steps.resolve.outputs.gateway }}
      network_bridge: ${{ steps.resolve.outputs.network_bridge }}
    steps:
      - name: Resolve node parameters
        id: resolve
        run: |
          NODE_NUM="${{ github.event.inputs.node_number }}"
          TARGET_NODE="${{ github.event.inputs.target_node }}"

          # Validate node_number is a positive integer
          if ! echo "$NODE_NUM" | grep -qE '^[1-9][0-9]*$'; then
            echo "ERROR: node_number must be a positive integer, got: $NODE_NUM"
            exit 1
          fi

          # VMID/IP scheme: prod(betsy)=110+N, dev(benedict)=210+N, qa(vladimir)=310+N
          # IP: 192.168.<env_subnet>.<vmid_last_2_digits>
          #   prod=192.168.10.x, dev=192.168.20.x, qa=192.168.30.x
          case "$TARGET_NODE" in
            benedict)
              VMID_BASE=210; ENV=dev; ENV_SUBNET=20
              PVE_API_URL="https://192.168.50.4:8006/api2/json"
              GATEWAY="192.168.20.1"; NETWORK_BRIDGE="vmbr20"
              RANCHER_IP="192.168.20.2"; RANCHER_HOSTNAME="rancher-dev.databaes.net"
              ;;
            betsy)
              VMID_BASE=110; ENV=prod; ENV_SUBNET=10
              PVE_API_URL="https://192.168.50.2:8006/api2/json"
              GATEWAY="192.168.10.1"; NETWORK_BRIDGE="vmbr10"
              RANCHER_IP="192.168.10.2"; RANCHER_HOSTNAME="rancher-prod.databaes.net"
              ;;
            vladimir)
              VMID_BASE=310; ENV=qa; ENV_SUBNET=30
              PVE_API_URL="https://192.168.50.4:8006/api2/json"
              GATEWAY="192.168.30.1"; NETWORK_BRIDGE="vmbr30"
              RANCHER_IP="192.168.30.2"; RANCHER_HOSTNAME="rancher-qa.databaes.net"
              ;;
            *)
              echo "ERROR: unknown target_node: $TARGET_NODE"
              exit 1
              ;;
          esac

          VMID=$((VMID_BASE + NODE_NUM))
          VMID_SUFFIX=$((VMID % 100))
          IP_ADDRESS="192.168.${ENV_SUBNET}.${VMID_SUFFIX}"
          PADDED=$(printf '%02d' "$NODE_NUM")
          VM_HOSTNAME="worker-node-${PADDED}"

          echo "node_number=$NODE_NUM"           >> "$GITHUB_OUTPUT"
          echo "vmid=$VMID"                      >> "$GITHUB_OUTPUT"
          echo "ip_address=$IP_ADDRESS"          >> "$GITHUB_OUTPUT"
          echo "vm_hostname=$VM_HOSTNAME"        >> "$GITHUB_OUTPUT"
          echo "pve_api_url=$PVE_API_URL"        >> "$GITHUB_OUTPUT"
          echo "pve_node=$TARGET_NODE"           >> "$GITHUB_OUTPUT"
          echo "env=$ENV"                        >> "$GITHUB_OUTPUT"
          echo "rancher_ip=$RANCHER_IP"          >> "$GITHUB_OUTPUT"
          echo "rancher_hostname=$RANCHER_HOSTNAME" >> "$GITHUB_OUTPUT"
          echo "gateway=$GATEWAY"               >> "$GITHUB_OUTPUT"
          echo "network_bridge=$NETWORK_BRIDGE" >> "$GITHUB_OUTPUT"

          echo "Resolved: $VM_HOSTNAME ($ENV) — VMID $VMID — $IP_ADDRESS — $TARGET_NODE (subnet 192.168.${ENV_SUBNET}.0/24)"

  terraform-node:
    needs: resolve-node
    runs-on: [self-hosted, "${{ needs.resolve-node.outputs.env }}"]
    env:
      NODE_NUM:    ${{ needs.resolve-node.outputs.node_number }}
      VMID:        ${{ needs.resolve-node.outputs.vmid }}
      IP_ADDRESS:  ${{ needs.resolve-node.outputs.ip_address }}
      VM_HOSTNAME: ${{ needs.resolve-node.outputs.vm_hostname }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to persistent clone
        run: |
          cd /app/infra-platform
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}

      - name: Terraform Init
        env:
          TF_VAR_pve_api:        ${{ needs.resolve-node.outputs.pve_api_url }}
          TF_VAR_pve_user:       ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:       ${{ inputs.target_node == 'betsy' && secrets.PVE_PROD_PASS || secrets.PVE_PASS }}
          TF_VAR_vault_token:    ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:           ${{ env.VMID }}
          TF_VAR_ip_address:     ${{ env.IP_ADDRESS }}
          TF_VAR_vm_hostname:    ${{ env.VM_HOSTNAME }}
          TF_VAR_target_node:    ${{ needs.resolve-node.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-node.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-node.outputs.gateway }}
          TF_VAR_template_vmid:  ${{ github.event.inputs.template_vmid }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/worker-node init -input=false

      - name: Pre-flight — destroy any stale VM with this VMID
        env:
          TF_VAR_pve_api:        ${{ needs.resolve-node.outputs.pve_api_url }}
          TF_VAR_pve_user:       ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:       ${{ inputs.target_node == 'betsy' && secrets.PVE_PROD_PASS || secrets.PVE_PASS }}
          TF_VAR_vault_token:    ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:           ${{ env.VMID }}
          TF_VAR_ip_address:     ${{ env.IP_ADDRESS }}
          TF_VAR_vm_hostname:    ${{ env.VM_HOSTNAME }}
          TF_VAR_target_node:    ${{ needs.resolve-node.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-node.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-node.outputs.gateway }}
          TF_VAR_template_vmid:  ${{ github.event.inputs.template_vmid }}
          PVE_API:  ${{ needs.resolve-node.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/worker-node destroy \
            -no-color -input=false -auto-approve \
            -state=terraform.node-${VMID}.tfstate || true
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
            "qm stop ${VMID} 2>/dev/null || true; qm destroy ${VMID} --purge 2>/dev/null || true"
          rm -f /app/infra-platform/terraform/worker-node/terraform.node-${VMID}.tfstate

      - name: Terraform Apply
        env:
          TF_VAR_pve_api:        ${{ needs.resolve-node.outputs.pve_api_url }}
          TF_VAR_pve_user:       ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:       ${{ inputs.target_node == 'betsy' && secrets.PVE_PROD_PASS || secrets.PVE_PASS }}
          TF_VAR_vault_token:    ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:           ${{ env.VMID }}
          TF_VAR_ip_address:     ${{ env.IP_ADDRESS }}
          TF_VAR_vm_hostname:    ${{ env.VM_HOSTNAME }}
          TF_VAR_target_node:    ${{ needs.resolve-node.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-node.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-node.outputs.gateway }}
          TF_VAR_template_vmid:  ${{ github.event.inputs.template_vmid }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/worker-node apply \
            -no-color -input=false -auto-approve \
            -state=terraform.node-${VMID}.tfstate

  ansible-node:
    needs: [resolve-node, terraform-node]
    runs-on: [self-hosted, "${{ needs.resolve-node.outputs.env }}"]
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      VMID:         ${{ needs.resolve-node.outputs.vmid }}
      IP_ADDRESS:   ${{ needs.resolve-node.outputs.ip_address }}
      VM_HOSTNAME:  ${{ needs.resolve-node.outputs.vm_hostname }}
      DEPLOY_ENV:   ${{ needs.resolve-node.outputs.env }}
      RANCHER_IP:   ${{ needs.resolve-node.outputs.rancher_ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to persistent clone
        run: |
          cd /app/infra-platform
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Fetch SSH key from bootstrap vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/worker_node_worker \
            | awk 'NF > 0' > /tmp/worker_node_key
          chmod 600 /tmp/worker_node_key

      - name: Fetch Rancher bootstrap credentials
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          # Optional — skipped gracefully if Rancher has not been deployed yet.
          RANCHER_PASS=$(vault kv get -field=password secret/rancher/${DEPLOY_ENV}/bootstrap 2>/dev/null || echo "")
          if [ -n "$RANCHER_PASS" ]; then
            echo "::add-mask::$RANCHER_PASS"
            echo "RANCHER_BOOTSTRAP_PASSWORD=$RANCHER_PASS" >> $GITHUB_ENV
            echo "Rancher credentials found — cluster will be registered with Rancher"
          else
            echo "No Rancher credentials found for env=${DEPLOY_ENV} — skipping Rancher registration"
          fi

          # Fetch RBAC bindings so cluster-level permissions are applied after registration.
          if vault kv get secret/rancher/${DEPLOY_ENV}/rbac > /dev/null 2>&1; then
            RBAC_CLUSTER="$(vault kv get -field=cluster_bindings secret/rancher/${DEPLOY_ENV}/rbac 2>/dev/null || echo '[]')"
            python3 -c "import json,sys; c=json.loads(sys.argv[1]); print(json.dumps({'rancher_rbac_cluster_bindings':c}))" "$RBAC_CLUSTER" > /tmp/rancher_rbac_vars.json
            echo "RANCHER_RBAC_VARS_FILE=/tmp/rancher_rbac_vars.json" >> "$GITHUB_ENV"
            echo "Rancher RBAC cluster bindings found"
          else
            echo "No RBAC bindings in Vault (secret/rancher/${DEPLOY_ENV}/rbac) — skipping"
          fi

      - name: Wait for SSH to be ready
        run: |
          echo "Waiting for SSH on ${IP_ADDRESS}..."
          timeout 180 bash -c "until nc -z ${IP_ADDRESS} 22; do sleep 5; done"
          echo "SSH is up"

      - name: Run Ansible playbook
        run: |
          ssh-keygen -R "${IP_ADDRESS}" || true
          ansible-playbook \
            -i "${IP_ADDRESS}," \
            -v \
            --private-key /tmp/worker_node_key \
            -e "ansible_host=${IP_ADDRESS}" \
            -e "ansible_user=root" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            -e "vm_hostname=${VM_HOSTNAME}" \
            -e "rancher_ip=${RANCHER_IP}" \
            -e "rancher_hostname=${{ needs.resolve-node.outputs.rancher_hostname }}" \
            ${RANCHER_BOOTSTRAP_PASSWORD:+-e "rancher_bootstrap_password=${RANCHER_BOOTSTRAP_PASSWORD}"} \
            ${RANCHER_RBAC_VARS_FILE:+-e "@${RANCHER_RBAC_VARS_FILE}"} \
            ansible/worker-node/worker-node_setup.yml

  register-node:
    needs: [resolve-node, ansible-node]
    runs-on: [self-hosted, "${{ needs.resolve-node.outputs.env }}"]
    steps:
      - name: Record node state in bootstrap vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          NODE_NUM="${{ needs.resolve-node.outputs.node_number }}"
          PVE_NODE="${{ needs.resolve-node.outputs.pve_node }}"
          IP="${{ needs.resolve-node.outputs.ip_address }}"

          # Node state — keyed by node number (canonical record)
          vault kv put secret/worker-node/${NODE_NUM}/state \
            vmid="${{ needs.resolve-node.outputs.vmid }}" \
            ip="${IP}" \
            hostname="${{ needs.resolve-node.outputs.vm_hostname }}" \
            pve_node="${PVE_NODE}" \
            provisioned_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Env-keyed active slot — used by app pipelines (e.g. media-stack) to
          # resolve the current worker node IP without knowing the node number.
          case "${PVE_NODE}" in
            benedict) ENV=dev ;;
            betsy)    ENV=prod ;;
            vladimir) ENV=qa ;;
            *) echo "Unknown pve_node '${PVE_NODE}', skipping env slot write"; exit 0 ;;
          esac
          vault kv put secret/worker-node/${ENV}/active-slot \
            ip="${IP}" \
            node_number="${NODE_NUM}" \
            vmid="${{ needs.resolve-node.outputs.vmid }}"

  cleanup-on-failure:
    needs: [resolve-node, terraform-node, ansible-node]
    if: failure()
    runs-on: [self-hosted, "${{ needs.resolve-node.outputs.env }}"]
    env:
      VMID: ${{ needs.resolve-node.outputs.vmid }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to persistent clone
        run: |
          cd /app/infra-platform
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}

      - name: Terraform Init
        env:
          TF_VAR_pve_api:        ${{ needs.resolve-node.outputs.pve_api_url }}
          TF_VAR_pve_user:       ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:       ${{ inputs.target_node == 'betsy' && secrets.PVE_PROD_PASS || secrets.PVE_PASS }}
          TF_VAR_vault_token:    ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:           ${{ env.VMID }}
          TF_VAR_ip_address:     ${{ needs.resolve-node.outputs.ip_address }}
          TF_VAR_vm_hostname:    ${{ needs.resolve-node.outputs.vm_hostname }}
          TF_VAR_target_node:    ${{ needs.resolve-node.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-node.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-node.outputs.gateway }}
          TF_VAR_template_vmid:  ${{ github.event.inputs.template_vmid }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/worker-node init -input=false

      - name: Terraform Destroy failed VM
        env:
          TF_VAR_pve_api:        ${{ needs.resolve-node.outputs.pve_api_url }}
          TF_VAR_pve_user:       ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:       ${{ inputs.target_node == 'betsy' && secrets.PVE_PROD_PASS || secrets.PVE_PASS }}
          TF_VAR_vault_token:    ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:           ${{ env.VMID }}
          TF_VAR_ip_address:     ${{ needs.resolve-node.outputs.ip_address }}
          TF_VAR_vm_hostname:    ${{ needs.resolve-node.outputs.vm_hostname }}
          TF_VAR_target_node:    ${{ needs.resolve-node.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-node.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-node.outputs.gateway }}
          TF_VAR_template_vmid:  ${{ github.event.inputs.template_vmid }}
          PVE_API:  ${{ needs.resolve-node.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/worker-node destroy \
            -no-color -input=false -auto-approve \
            -state=terraform.node-${VMID}.tfstate || true
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
            "qm stop ${VMID} 2>/dev/null || true; qm destroy ${VMID} --purge 2>/dev/null || true"
          rm -f /app/infra-platform/terraform/worker-node/terraform.node-${VMID}.tfstate
