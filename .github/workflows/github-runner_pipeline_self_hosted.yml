name: GitHub Runner Pipeline (Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod
      github_repo:
        description: 'GitHub repo to register runner against (owner/repo). Personal accounts: repo-level only.'
        required: false
        default: 'TomasBFerreira/infra-platform'
        type: string

concurrency:
  group: github-runner-pipeline-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: true

jobs:
  resolve-runner:
    runs-on: self-hosted
    outputs:
      environment:  ${{ steps.runner.outputs.environment }}
      pve_api_url:  ${{ steps.runner.outputs.pve_api_url }}
      pve_node:     ${{ steps.runner.outputs.pve_node }}
      vmid:         ${{ steps.runner.outputs.vmid }}
      ip:           ${{ steps.runner.outputs.ip }}
      hostname:     ${{ steps.runner.outputs.hostname }}
    steps:
      - name: Resolve runner VMID, IP, and node
        id: runner
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"

          # github-runner uses singleton scheme (no blue/green):
          # prod=101/.101 on betsy, dev=201/.201 on benedict, qa=301/.301 on vladimir
          case "$ENV" in
            dev)
              VMID=201; IP="192.168.50.201"
              PVE_API_URL="https://192.168.50.4:8006/api2/json"
              PVE_NODE="benedict"
              ;;
            qa)
              VMID=301; IP="192.168.50.301"
              PVE_API_URL="https://192.168.50.4:8006/api2/json"
              PVE_NODE="vladimir"
              ;;
            prod)
              VMID=101; IP="192.168.50.101"
              PVE_API_URL="https://192.168.50.2:8006/api2/json"
              PVE_NODE="betsy"
              ;;
          esac

          echo "environment=$ENV"         >> "$GITHUB_OUTPUT"
          echo "pve_api_url=$PVE_API_URL" >> "$GITHUB_OUTPUT"
          echo "pve_node=$PVE_NODE"       >> "$GITHUB_OUTPUT"
          echo "vmid=$VMID"               >> "$GITHUB_OUTPUT"
          echo "ip=$IP"                   >> "$GITHUB_OUTPUT"
          echo "hostname=github-runner-$ENV" >> "$GITHUB_OUTPUT"

  terraform-runner:
    needs: resolve-runner
    runs-on: self-hosted
    env:
      ENV:      ${{ needs.resolve-runner.outputs.environment }}
      VMID:     ${{ needs.resolve-runner.outputs.vmid }}
      IP:       ${{ needs.resolve-runner.outputs.ip }}
      HOSTNAME: ${{ needs.resolve-runner.outputs.hostname }}
    steps:
      - name: Clean stale root-owned Terraform artifacts
        run: |
          # run-terraform.sh uses --user so new files are appadm-owned.
          # Sudo find covers any residual root-owned .terraform dirs from
          # older runs. Falls back to plain find if sudo is unavailable
          # (e.g. tomas-dev runner where appadm sudoers may not include find).
          sudo find "${GITHUB_WORKSPACE:-$(pwd)}" -name .terraform -type d \
            -exec rm -rf {} + 2>/dev/null || \
          find "${GITHUB_WORKSPACE:-$(pwd)}" -name .terraform -type d \
            -user "$(id -u)" -exec rm -rf {} + 2>/dev/null || true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Terraform Init
        env:
          TF_VAR_pve_api:       ${{ needs.resolve-runner.outputs.pve_api_url }}
          TF_VAR_pve_user:      ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:      ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user:      ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:   ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:          ${{ env.VMID }}
          TF_VAR_ip_address:    ${{ env.IP }}
          TF_VAR_vm_hostname:   ${{ env.HOSTNAME }}
          TF_VAR_target_node:   ${{ needs.resolve-runner.outputs.pve_node }}
        run: |
          cd "$GITHUB_WORKSPACE"
          ./scripts/run-terraform.sh -chdir terraform/github-runner init -input=false

      - name: Pre-flight — destroy any existing runner CT
        env:
          PVE_API:  ${{ needs.resolve-runner.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
          TF_VAR_pve_api:       ${{ needs.resolve-runner.outputs.pve_api_url }}
          TF_VAR_pve_user:      ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:      ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user:      ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:   ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:          ${{ env.VMID }}
          TF_VAR_ip_address:    ${{ env.IP }}
          TF_VAR_vm_hostname:   ${{ env.HOSTNAME }}
          TF_VAR_target_node:   ${{ needs.resolve-runner.outputs.pve_node }}
        run: |
          cd "$GITHUB_WORKSPACE"
          ./scripts/run-terraform.sh -chdir terraform/github-runner destroy \
            -no-color -input=false -auto-approve \
            -state=terraform.${ENV}.tfstate || true
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
            "pct stop ${VMID} 2>/dev/null || true; pct destroy ${VMID} 2>/dev/null || true"
          rm -f "$GITHUB_WORKSPACE/terraform/github-runner/terraform.${ENV}.tfstate"

      - name: Terraform Apply
        env:
          TF_VAR_pve_api:       ${{ needs.resolve-runner.outputs.pve_api_url }}
          TF_VAR_pve_user:      ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:      ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user:      ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:   ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:          ${{ env.VMID }}
          TF_VAR_ip_address:    ${{ env.IP }}
          TF_VAR_vm_hostname:   ${{ env.HOSTNAME }}
          TF_VAR_target_node:   ${{ needs.resolve-runner.outputs.pve_node }}
        run: |
          cd "$GITHUB_WORKSPACE"
          ./scripts/run-terraform.sh -chdir terraform/github-runner apply \
            -no-color -input=false -auto-approve \
            -state=terraform.${ENV}.tfstate

  ansible-runner:
    needs: [resolve-runner, terraform-runner]
    runs-on: self-hosted
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      ENV: ${{ needs.resolve-runner.outputs.environment }}
      IP:  ${{ needs.resolve-runner.outputs.ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Inject GH_PAT into bootstrap vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv put secret/github-runner/gh_pat token="${{ secrets.GH_PAT }}"

      - name: Fetch SSH key from bootstrap vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          set -o pipefail
          vault kv get -field=private_key secret/ssh_keys/github_runner_worker \
            | python3 -c "import sys,textwrap; raw=sys.stdin.read().strip().replace('\r',''); B='-----BEGIN OPENSSH PRIVATE KEY-----'; E='-----END OPENSSH PRIVATE KEY-----'; body=raw[raw.find(B)+len(B):raw.find(E)].replace(' ','').replace('\n','').replace('\t',''); print(B); print(textwrap.fill(body,width=70)); print(E)" \
            > /tmp/ansible_github_runner_id_ed25519
          chmod 600 /tmp/ansible_github_runner_id_ed25519
          grep -q "BEGIN OPENSSH PRIVATE KEY" /tmp/ansible_github_runner_id_ed25519 \
            || { echo "ERROR: key missing PEM header"; exit 1; }

      - name: Wait for SSH to be ready
        run: |
          echo "Waiting for SSH on ${IP}..."
          timeout 120 bash -c "until nc -z ${IP} 22; do sleep 5; done"
          echo "SSH is up"

      - name: Run Ansible playbook
        env:
          VAULT_BOOTSTRAP_ADDR:       ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_DEV_TOKEN:            ${{ secrets.VAULT_DEV_TOKEN }}
          VAULT_BOOTSTRAP_ROOT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          ssh-keygen -R "${IP}" || true
          ansible-playbook \
            -i "${IP}," \
            -v \
            --private-key /tmp/ansible_github_runner_id_ed25519 \
            -e "ansible_host=${IP}" \
            -e "ansible_user=root" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10'" \
            -e "runner_env=${ENV}" \
            -e "github_repo=${{ github.event.inputs.github_repo || 'TomasBFerreira/infra-platform' }}" \
            ansible/github-runner/github-runner_setup.yml

  save-runner-state:
    needs: [resolve-runner, ansible-runner]
    runs-on: self-hosted
    steps:
      - name: Write runner state to bootstrap vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ENV="${{ needs.resolve-runner.outputs.environment }}"
          vault kv put secret/github-runner/${ENV}/state \
            vmid="${{ needs.resolve-runner.outputs.vmid }}" \
            ip="${{ needs.resolve-runner.outputs.ip }}" \
            hostname="${{ needs.resolve-runner.outputs.hostname }}" \
            runner_name="github-runner-${ENV}" \
            provisioned_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  cleanup-on-failure:
    needs: [resolve-runner, terraform-runner, ansible-runner]
    if: failure()
    runs-on: self-hosted
    env:
      ENV:  ${{ needs.resolve-runner.outputs.environment }}
      VMID: ${{ needs.resolve-runner.outputs.vmid }}
      IP:   ${{ needs.resolve-runner.outputs.ip }}
    steps:
      - name: Clean stale root-owned Terraform artifacts
        run: |
          # run-terraform.sh uses --user so new files are appadm-owned.
          # Sudo find covers any residual root-owned .terraform dirs from
          # older runs. Falls back to plain find if sudo is unavailable
          # (e.g. tomas-dev runner where appadm sudoers may not include find).
          sudo find "${GITHUB_WORKSPACE:-$(pwd)}" -name .terraform -type d \
            -exec rm -rf {} + 2>/dev/null || \
          find "${GITHUB_WORKSPACE:-$(pwd)}" -name .terraform -type d \
            -user "$(id -u)" -exec rm -rf {} + 2>/dev/null || true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Terraform Init
        env:
          TF_VAR_pve_api:       ${{ needs.resolve-runner.outputs.pve_api_url }}
          TF_VAR_pve_user:      ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:      ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user:      ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:   ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:          ${{ env.VMID }}
          TF_VAR_ip_address:    ${{ env.IP }}
          TF_VAR_vm_hostname:   ${{ needs.resolve-runner.outputs.hostname }}
          TF_VAR_target_node:   ${{ needs.resolve-runner.outputs.pve_node }}
        run: |
          cd "$GITHUB_WORKSPACE"
          ./scripts/run-terraform.sh -chdir terraform/github-runner init -input=false

      - name: Terraform Destroy failed CT
        env:
          TF_VAR_pve_api:       ${{ needs.resolve-runner.outputs.pve_api_url }}
          TF_VAR_pve_user:      ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:      ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user:      ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:   ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:          ${{ env.VMID }}
          TF_VAR_ip_address:    ${{ env.IP }}
          TF_VAR_vm_hostname:   ${{ needs.resolve-runner.outputs.hostname }}
          TF_VAR_target_node:   ${{ needs.resolve-runner.outputs.pve_node }}
          PVE_API:  ${{ needs.resolve-runner.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          cd "$GITHUB_WORKSPACE"
          ./scripts/run-terraform.sh -chdir terraform/github-runner destroy \
            -no-color -input=false -auto-approve \
            -state=terraform.${ENV}.tfstate || true
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
            "pct stop ${VMID} 2>/dev/null || true; pct destroy ${VMID} 2>/dev/null || true"
          rm -f "$GITHUB_WORKSPACE/terraform/github-runner/terraform.${ENV}.tfstate"
