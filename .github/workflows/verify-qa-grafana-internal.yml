name: Verify qa Grafana via traefik-lxc-qa (read-only)

# QA is Tailscale-only — `grafana-qa.databaes.net` returning 503 from
# public internet is by design. This workflow verifies the internal
# path that Tailscale clients actually use:
#   traefik-lxc-qa (.95) → grafana-qa-service → 192.168.30.91:3000
#
# Probes from traefik-lxc-qa's container namespace (via heaton pct exec)
# so we don't depend on any external runner having Tailscale access.

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: [self-hosted, management]
    env:
      PVE_USER: ${{ secrets.PVE_USER }}
    steps:
      - name: From traefik-lxc-qa — probe backend + Traefik
        run: |
          set -uo pipefail
          PVE_USER_SHORT=$(echo "$PVE_USER" | cut -d'@' -f1)
          HEATON="ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${PVE_USER_SHORT}@192.168.50.8"

          echo "=== from traefik-lxc-qa: curl backend at 192.168.30.91:3000/api/health ==="
          $HEATON "pct exec 395 -- curl -sS -o /dev/null -w 'HTTP %{http_code}  total=%{time_total}s\n' --max-time 6 http://192.168.30.91:3000/api/health"

          echo ""
          echo "=== from traefik-lxc-qa: docker compose ps (only traefik+otelcol expected) ==="
          $HEATON "pct exec 395 -- bash -c 'cd /opt/traefik && docker compose ps --format \"table {{.Name}}\t{{.Status}}\" 2>&1 | head -10'"

          echo ""
          echo "=== from traefik-lxc-qa: services.yml line for grafana-qa-service ==="
          $HEATON "pct exec 395 -- grep -A6 'grafana-qa-service' /opt/traefik/config/dynamic/services.yml | head -10"

          echo ""
          echo "=== from traefik-lxc-qa: Traefik dashboard API for grafana-qa-service health ==="
          # Traefik dashboard exposes /api/http/services/<name>. Names typically end with @file provider suffix.
          $HEATON "pct exec 395 -- curl -sS --max-time 6 http://localhost:8080/api/http/services 2>/dev/null | python3 -c 'import sys,json; data=json.load(sys.stdin); [print(f\"{s[\\\"name\\\"]}: serverStatus={s.get(\\\"serverStatus\\\",{})}\") for s in data if \"grafana\" in s[\"name\"]]' 2>&1 | head -20" || echo "(Traefik admin endpoint not reachable on :8080 — that's OK, dashboard may not be exposed)"

          echo ""
          echo "=== DONE — if backend probe is HTTP 200, Tailscale-routed users will see Grafana ==="
