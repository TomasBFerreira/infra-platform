name: Reset Authentik user password

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      username:
        description: 'Authentik username to reset'
        required: true
        type: string

jobs:
  reset:
    runs-on: [self-hosted, linux, "${{ inputs.env }}"]
    steps:
      - name: Reset Authentik user password
        env:
          BOOTSTRAP_VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          BOOTSTRAP_VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
          TARGET_USER: ${{ inputs.username }}
          TARGET_ENV:  ${{ inputs.env }}
        run: |
          set -euo pipefail

          NEW_PASS=$(openssl rand -base64 48 | tr -d '/+=' | head -c 32)
          echo "::add-mask::${NEW_PASS}"

          VAULT_ADDR="$BOOTSTRAP_VAULT_ADDR" VAULT_TOKEN="$BOOTSTRAP_VAULT_TOKEN" \
            vault kv get -field=private_key secret/ssh_keys/sso_worker \
            | awk 'NF > 0' > /tmp/sso_worker_id
          chmod 600 /tmp/sso_worker_id

          SSO_IP=$(VAULT_ADDR="$BOOTSTRAP_VAULT_ADDR" VAULT_TOKEN="$BOOTSTRAP_VAULT_TOKEN" \
            vault kv get -field=ip "secret/sso/${TARGET_ENV}/active-slot")

          echo "Target: ${SSO_IP} (env=${TARGET_ENV}) user=${TARGET_USER}"
          ssh-keygen -R "${SSO_IP}" || true

          printf 'import os\nfrom authentik.core.models import User\nu = User.objects.get(username=os.environ["TARGET_USER"])\nu.set_password(os.environ["NEW_PASS"])\nu.save()\nprint("password_reset_ok:" + u.username)\n' > /tmp/reset_user.py

          scp -i /tmp/sso_worker_id -o StrictHostKeyChecking=no \
            /tmp/reset_user.py root@"${SSO_IP}":/tmp/reset_user.py

          RESULT=$(ssh -i /tmp/sso_worker_id -o StrictHostKeyChecking=no root@"${SSO_IP}" \
            "docker cp /tmp/reset_user.py authentik-server:/tmp/reset_user.py && \
             docker exec -e NEW_PASS='${NEW_PASS}' -e TARGET_USER='${TARGET_USER}' authentik-server ak shell --command \"exec(open('/tmp/reset_user.py').read())\" && \
             rm -f /tmp/reset_user.py")

          ssh -i /tmp/sso_worker_id -o StrictHostKeyChecking=no root@"${SSO_IP}" "rm -f /tmp/reset_user.py" || true
          rm -f /tmp/sso_worker_id

          echo "Result: ${RESULT}"
          if ! echo "${RESULT}" | grep -q "password_reset_ok:"; then
            echo "::error::Password reset failed — username not found or shell error"
            exit 1
          fi

          {
            echo "## Authentik password reset"
            echo ""
            echo "- User: \`${TARGET_USER}\`"
            echo "- Env:  \`${TARGET_ENV}\`"
            echo "- SSO:  \`${SSO_IP}\`"
            echo ""
            echo "**New password:** \`${NEW_PASS}\`"
            echo ""
            echo "_Copy it now — it is not stored anywhere._"
          } >> "$GITHUB_STEP_SUMMARY"
