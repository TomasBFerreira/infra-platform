name: Register GitHub Actions Runner

# Registers a self-hosted runner on the env runner LXC for any repo.
# Run this once when onboarding a new repo that needs its own runner.
# Each repo gets an isolated directory + systemd service on the shared LXC.
#
# IMPORTANT: also add the repo to ansible/github-runner/registered-repos.yml
# under the right env. The runner pipeline replays that list when the LXC
# is reprovisioned — repos missing from it will silently lose their runner
# on the next reprovision.
#
# Usage:
#   gh workflow run register-runner.yml \
#     --field repo=TomasBFerreira/media-stack \
#     --field env=dev

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repo to register runner for (owner/repo)'
        required: true
      env:
        description: 'Environment runner LXC to register on'
        type: choice
        options: [dev, prod, qa]
        default: dev
      runner_ip:
        description: 'Override runner LXC IP (optional — used if vault path secret/github-runner/<env>/state is missing)'
        required: false
        default: ''

jobs:
  register:
    runs-on: [self-hosted, "${{ inputs.env }}"]
    env:
      VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
      VAULT_BOOTSTRAP_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_BOOTSTRAP_ROOT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
      VAULT_DEV_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Ensure Vault CLI is installed
        run: |
          if ! command -v vault &>/dev/null; then
            curl -fsSL https://apt.releases.hashicorp.com/gpg \
              | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
              | sudo tee /etc/apt/sources.list.d/hashicorp.list
            sudo apt-get update -qq && sudo apt-get install -y vault
          fi

      - name: Fetch runner LXC SSH key
        run: |
          vault kv get -field=private_key secret/ssh_keys/github_runner_worker \
            | python3 -c "
          import sys, textwrap
          raw = sys.stdin.read().strip().replace('\r', '')
          B = '-----BEGIN OPENSSH PRIVATE KEY-----'
          E = '-----END OPENSSH PRIVATE KEY-----'
          body = raw[raw.find(B)+len(B):raw.find(E)].replace(' ', '').replace('\n', '').replace('\t', '')
          print(B); print(textwrap.fill(body, width=70)); print(E)
          " > /tmp/runner_lxc_key
          chmod 600 /tmp/runner_lxc_key
          grep -q "BEGIN OPENSSH PRIVATE KEY" /tmp/runner_lxc_key \
            || { echo "ERROR: key missing PEM header — check secret/ssh_keys/github_runner_worker"; exit 1; }

      - name: Resolve runner LXC IP
        run: |
          # Static fallback IPs per VMID scheme (VMID 101/201/301 → IP .101/.201/.301)
          declare -A STATIC_IPS=([dev]="192.168.50.201" [prod]="192.168.50.101" [qa]="192.168.50.301")

          # 1. Try vault path (may not be populated yet)
          RUNNER_IP=$(vault kv get -field=ip secret/github-runner/${{ inputs.env }}/state 2>/dev/null || true)

          # 2. Fall back to explicit workflow input
          if [[ -z "${RUNNER_IP}" ]]; then
            RUNNER_IP="${{ inputs.runner_ip }}"
            if [[ -n "${RUNNER_IP}" ]]; then
              echo "INFO: vault path not found — using runner_ip input: ${RUNNER_IP}"
            fi
          fi

          # 3. Fall back to static known IP from VMID scheme
          if [[ -z "${RUNNER_IP}" ]]; then
            RUNNER_IP="${STATIC_IPS[${{ inputs.env }}]}"
            if [[ -n "${RUNNER_IP}" ]]; then
              echo "INFO: vault path and runner_ip input both missing — using static fallback IP: ${RUNNER_IP}"
            fi
          fi

          if [[ -z "${RUNNER_IP}" ]]; then
            echo "ERROR: could not resolve runner LXC IP for env=${{ inputs.env }}" >&2
            exit 1
          fi

          echo "RUNNER_IP=${RUNNER_IP}" >> $GITHUB_ENV

      - name: Run Ansible to register runner for repo
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
        run: |
          ansible-playbook \
            -i "${RUNNER_IP}," \
            --private-key /tmp/runner_lxc_key \
            -u root \
            -e "github_repo=${{ inputs.repo }}" \
            -e "runner_env=${{ inputs.env }}" \
            -e "VAULT_BOOTSTRAP_ADDR=${VAULT_ADDR}" \
            ansible/github-runner/github-runner_setup.yml

      - name: Cleanup
        if: always()
        run: rm -f /tmp/runner_lxc_key
