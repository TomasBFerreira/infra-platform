name: Build ARC runner image

# Builds and pushes the ARC ephemeral runner image to GHCR. Runs on:
#   - any push to main that touches docker/arc-runner/**
#   - manual dispatch (for testing image changes from a branch)
#
# Tags pushed:
#   - <git-sha>          stable, referenced by Helm values for reproducibility
#   - latest             convenience for ad-hoc local runs; not used by ARC
#
# Runs on ubuntu-latest (GitHub-hosted) to keep the image build off the env
# runner LXC. The env runner is going away anyway; do not add a self-hosted
# fallback that would re-create the dependency.

on:
  push:
    branches: [main]
    paths:
      - 'docker/arc-runner/**'
      - '.github/workflows/arc-runner-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/arc-runner
          push: true
          tags: |
            ghcr.io/tomasbferreira/arc-runner:${{ github.sha }}
            ghcr.io/tomasbferreira/arc-runner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
