name: SSO Pipeline (Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: sso-pipeline-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: true

jobs:
  resolve-slots:
    runs-on: self-hosted
    outputs:
      environment:  ${{ steps.slots.outputs.environment }}
      pve_api_url:  ${{ steps.slots.outputs.pve_api_url }}
      pve_node:     ${{ steps.slots.outputs.pve_node }}
      active_slot:  ${{ steps.slots.outputs.active_slot }}
      active_vmid:  ${{ steps.slots.outputs.active_vmid }}
      active_ip:    ${{ steps.slots.outputs.active_ip }}
      active_host:  ${{ steps.slots.outputs.active_host }}
      staging_slot: ${{ steps.slots.outputs.staging_slot }}
      staging_vmid: ${{ steps.slots.outputs.staging_vmid }}
      staging_ip:   ${{ steps.slots.outputs.staging_ip }}
      staging_host: ${{ steps.slots.outputs.staging_host }}
      first_run:    ${{ steps.slots.outputs.first_run }}
      gateway:        ${{ steps.slots.outputs.gateway }}
      network_bridge: ${{ steps.slots.outputs.network_bridge }}
    steps:
      - name: Resolve active and staging slots
        id: slots
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"

          case "$ENV" in
            dev)
              BLUE_VMID=275;  BLUE_IP="192.168.20.75"
              GREEN_VMID=276; GREEN_IP="192.168.20.76"
              PVE_API_URL="https://192.168.50.4:8006/api2/json"
              PVE_NODE="benedict"
              GATEWAY="192.168.20.1"; NETWORK_BRIDGE="vmbr20"
              ;;
            prod)
              BLUE_VMID=175;  BLUE_IP="192.168.10.75"
              GREEN_VMID=176; GREEN_IP="192.168.10.76"
              PVE_API_URL="https://192.168.50.2:8006/api2/json"
              PVE_NODE="betsy"
              GATEWAY="192.168.10.1"; NETWORK_BRIDGE="vmbr10"
              ;;
          esac

          BLUE_HOST="sso-blue"
          GREEN_HOST="sso-green"

          ACTIVE_SLOT=$(vault kv get -field=slot secret/sso/$ENV/active-slot 2>/dev/null || echo "none")

          if [ "$ACTIVE_SLOT" = "none" ]; then
            echo "No active slot found — first run, deploying to blue"
            STAGING_SLOT="blue"
            STAGING_VMID="$BLUE_VMID"
            STAGING_IP="$BLUE_IP"
            STAGING_HOST="$BLUE_HOST"
            ACTIVE_VMID=""
            ACTIVE_IP=""
            ACTIVE_HOST=""
            FIRST_RUN="true"
          elif [ "$ACTIVE_SLOT" = "blue" ]; then
            STAGING_SLOT="green"
            STAGING_VMID="$GREEN_VMID"
            STAGING_IP="$GREEN_IP"
            STAGING_HOST="$GREEN_HOST"
            ACTIVE_VMID="$BLUE_VMID"
            ACTIVE_IP="$BLUE_IP"
            ACTIVE_HOST="$BLUE_HOST"
            FIRST_RUN="false"
          else
            STAGING_SLOT="blue"
            STAGING_VMID="$BLUE_VMID"
            STAGING_IP="$BLUE_IP"
            STAGING_HOST="$BLUE_HOST"
            ACTIVE_VMID="$GREEN_VMID"
            ACTIVE_IP="$GREEN_IP"
            ACTIVE_HOST="$GREEN_HOST"
            FIRST_RUN="false"
          fi

          echo "environment=$ENV"           >> "$GITHUB_OUTPUT"
          echo "pve_api_url=$PVE_API_URL"   >> "$GITHUB_OUTPUT"
          echo "pve_node=$PVE_NODE"         >> "$GITHUB_OUTPUT"
          echo "active_slot=$ACTIVE_SLOT"   >> "$GITHUB_OUTPUT"
          echo "active_vmid=$ACTIVE_VMID"   >> "$GITHUB_OUTPUT"
          echo "active_ip=$ACTIVE_IP"       >> "$GITHUB_OUTPUT"
          echo "active_host=$ACTIVE_HOST"   >> "$GITHUB_OUTPUT"
          echo "staging_slot=$STAGING_SLOT" >> "$GITHUB_OUTPUT"
          echo "staging_vmid=$STAGING_VMID" >> "$GITHUB_OUTPUT"
          echo "staging_ip=$STAGING_IP"     >> "$GITHUB_OUTPUT"
          echo "staging_host=$STAGING_HOST" >> "$GITHUB_OUTPUT"
          echo "first_run=$FIRST_RUN"       >> "$GITHUB_OUTPUT"
          echo "gateway=$GATEWAY"               >> "$GITHUB_OUTPUT"
          echo "network_bridge=$NETWORK_BRIDGE" >> "$GITHUB_OUTPUT"

  generate-secrets:
    needs: resolve-slots
    runs-on: self-hosted
    env:
      ENV: ${{ needs.resolve-slots.outputs.environment }}
    steps:
      - name: Generate SSO secrets if not already in vault
        run: |
          case "$ENV" in
            dev)
              export VAULT_ADDR="${{ secrets.VAULT_ADDR }}"
              export VAULT_TOKEN="${{ secrets.VAULT_TOKEN }}"
              ;;
            prod)
              export VAULT_ADDR="${{ secrets.VAULT_PROD_ADDR }}"
              export VAULT_TOKEN="${{ secrets.VAULT_PROD_TOKEN }}"
              ;;
          esac

          if ! vault kv get -field=db_password secret/sso 2>/dev/null; then
            echo "Generating SSO secrets for the first time..."
            vault kv put secret/sso \
              db_password="$(openssl rand -hex 32)" \
              secret_key="$(openssl rand -hex 64)" \
              bootstrap_password="$(openssl rand -base64 16 | tr -d '=')" \
              bootstrap_token="$(openssl rand -hex 32)"
            echo "SSO secrets written to vault."
          else
            echo "SSO secrets already exist in vault — skipping generation."
          fi

  terraform-staging:
    needs: [resolve-slots, generate-secrets]
    runs-on: self-hosted
    env:
      ENV:          ${{ needs.resolve-slots.outputs.environment }}
      STAGING_SLOT: ${{ needs.resolve-slots.outputs.staging_slot }}
      STAGING_VMID: ${{ needs.resolve-slots.outputs.staging_vmid }}
      STAGING_IP:   ${{ needs.resolve-slots.outputs.staging_ip }}
      STAGING_HOST: ${{ needs.resolve-slots.outputs.staging_host }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: /app/infra-platform

      - name: Terraform Init
        env:
          TF_VAR_pve_api:       ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user:      ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:      ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user:      ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:   ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:          ${{ env.STAGING_VMID }}
          TF_VAR_ip_address:    ${{ env.STAGING_IP }}
          TF_VAR_vm_hostname:   ${{ env.STAGING_HOST }}
          TF_VAR_target_node:   ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/sso init -input=false

      - name: Pre-flight — destroy any stale staging CT
        env:
          TF_VAR_pve_api:       ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user:      ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:      ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user:      ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:   ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:          ${{ env.STAGING_VMID }}
          TF_VAR_ip_address:    ${{ env.STAGING_IP }}
          TF_VAR_vm_hostname:   ${{ env.STAGING_HOST }}
          TF_VAR_target_node:   ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          PVE_API:  ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/sso destroy \
            -no-color -input=false -auto-approve \
            -state=terraform.${STAGING_SLOT}.${ENV}.tfstate || true
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
            "pct stop ${STAGING_VMID} 2>/dev/null || true; pct destroy ${STAGING_VMID} 2>/dev/null || true"
          rm -f /app/infra-platform/terraform/sso/terraform.${STAGING_SLOT}.${ENV}.tfstate

      - name: Terraform Apply
        env:
          TF_VAR_pve_api:       ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user:      ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:      ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user:      ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:   ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:          ${{ env.STAGING_VMID }}
          TF_VAR_ip_address:    ${{ env.STAGING_IP }}
          TF_VAR_vm_hostname:   ${{ env.STAGING_HOST }}
          TF_VAR_target_node:   ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/sso apply \
            -no-color -input=false -auto-approve \
            -state=terraform.${STAGING_SLOT}.${ENV}.tfstate

  ansible-staging:
    needs: [resolve-slots, terraform-staging, backup-db]
    # Run whether backup-db succeeded (re-deploy) or was skipped (first run).
    if: >-
      needs.terraform-staging.result == 'success' &&
      (needs.backup-db.result == 'success' || needs.backup-db.result == 'skipped')
    runs-on: self-hosted
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      ENV:          ${{ needs.resolve-slots.outputs.environment }}
      STAGING_IP:   ${{ needs.resolve-slots.outputs.staging_ip }}
      STAGING_HOST: ${{ needs.resolve-slots.outputs.staging_host }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: /app/infra-platform

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Fetch SSH key from bootstrap vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/sso_worker \
            | awk 'NF > 0' > /tmp/sso_worker_key
          chmod 600 /tmp/sso_worker_key

      - name: Fetch SSO secrets from env vault
        run: |
          case "$ENV" in
            dev)
              ENV_VAULT_ADDR="${{ secrets.VAULT_ADDR }}"
              ENV_VAULT_TOKEN="${{ secrets.VAULT_TOKEN }}"
              ;;
            prod)
              ENV_VAULT_ADDR="${{ secrets.VAULT_PROD_ADDR }}"
              ENV_VAULT_TOKEN="${{ secrets.VAULT_PROD_TOKEN }}"
              ;;
          esac
          export VAULT_ADDR="$ENV_VAULT_ADDR"
          export VAULT_TOKEN="$ENV_VAULT_TOKEN"

          SSO_DB_PASSWORD=$(vault kv get -field=db_password secret/sso)
          SSO_SECRET_KEY=$(vault kv get -field=secret_key secret/sso)
          SSO_BOOTSTRAP_PASSWORD=$(vault kv get -field=bootstrap_password secret/sso)
          SSO_BOOTSTRAP_TOKEN=$(vault kv get -field=bootstrap_token secret/sso)

          # Check for an existing DB backup — restore on new LXC to persist users.
          # Primary store: betsy NFS at /mnt/nfs-shared-data/backups/sso/
          # Runner disk (/opt/sso-backup/) is the local cache; NFS is the durable copy.
          # Vault KV is not used — its ~512KB value limit is too small for the Authentik DB.
          SSO_HAS_DB_BACKUP="false"
          BACKUP_FILE="/opt/sso-backup/sso_${ENV}_db.sql.gz"
          NFS_BACKUP="192.168.50.2:/mnt/nfs-shared-data/backups/sso/sso_${ENV}_db.sql.gz"
          PVE_SSH_USER=$(echo "${{ secrets.PVE_USER }}" | cut -d'@' -f1)

          if [[ -f "$BACKUP_FILE" ]]; then
            cp "$BACKUP_FILE" /tmp/sso_db_backup.sql.gz
            SSO_HAS_DB_BACKUP="true"
            echo "DB backup found on runner disk — will restore on new LXC"
          else
            echo "No runner-local backup — checking NFS (betsy)..."
            mkdir -p /opt/sso-backup
            if scp -o StrictHostKeyChecking=no \
                ${PVE_SSH_USER}@192.168.50.2:/mnt/nfs-shared-data/backups/sso/sso_${ENV}_db.sql.gz \
                "$BACKUP_FILE" 2>/dev/null; then
              cp "$BACKUP_FILE" /tmp/sso_db_backup.sql.gz
              SSO_HAS_DB_BACKUP="true"
              echo "DB backup pulled from NFS ($(du -sh "$BACKUP_FILE" | cut -f1)) — will restore on new LXC"
            else
              echo "No DB backup found on NFS either — fresh install"
            fi
          fi

          # Export env vault address/token into GITHUB_ENV so subsequent steps
          # (including Ansible's delegate_to: localhost tasks that write OIDC
          # credentials back to the env vault) can reach it.
          echo "VAULT_ADDR=$ENV_VAULT_ADDR"                               >> "$GITHUB_ENV"
          echo "VAULT_TOKEN=$ENV_VAULT_TOKEN"                           >> "$GITHUB_ENV"
          echo "VAULT_PROD_ADDR=${{ secrets.VAULT_PROD_ADDR }}"         >> "$GITHUB_ENV"
          echo "VAULT_PROD_TOKEN=${{ secrets.VAULT_PROD_TOKEN }}"       >> "$GITHUB_ENV"
          echo "VAULT_BOOTSTRAP_ADDR=${{ secrets.VAULT_BOOTSTRAP_ADDR }}" >> "$GITHUB_ENV"
          echo "VAULT_DEV_TOKEN=${{ secrets.VAULT_DEV_TOKEN }}"         >> "$GITHUB_ENV"
          echo "SSO_DB_PASSWORD=$SSO_DB_PASSWORD"                 >> "$GITHUB_ENV"
          echo "SSO_SECRET_KEY=$SSO_SECRET_KEY"                   >> "$GITHUB_ENV"
          echo "SSO_BOOTSTRAP_PASSWORD=$SSO_BOOTSTRAP_PASSWORD"   >> "$GITHUB_ENV"
          echo "SSO_BOOTSTRAP_TOKEN=$SSO_BOOTSTRAP_TOKEN"         >> "$GITHUB_ENV"
          echo "SSO_HAS_DB_BACKUP=$SSO_HAS_DB_BACKUP"           >> "$GITHUB_ENV"

      - name: Wait for SSH to be ready
        run: |
          echo "Waiting for SSH on ${STAGING_IP}..."
          timeout 120 bash -c "until nc -z ${STAGING_IP} 22; do sleep 5; done"
          echo "SSH is up"

      - name: Run Ansible playbook
        run: |
          ssh-keygen -R "${STAGING_IP}" || true
          ansible-playbook \
            -i "${STAGING_IP}," \
            -v \
            --private-key /tmp/sso_worker_key \
            -e "ansible_host=${STAGING_IP}" \
            -e "ansible_user=root" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            -e "vault_env=${ENV}" \
            -e "sso_db_password=$SSO_DB_PASSWORD" \
            -e "sso_secret_key=$SSO_SECRET_KEY" \
            -e "sso_bootstrap_password=$SSO_BOOTSTRAP_PASSWORD" \
            -e "sso_bootstrap_token=$SSO_BOOTSTRAP_TOKEN" \
            -e "sso_has_db_backup=${SSO_HAS_DB_BACKUP}" \
            ansible/sso/sso_setup.yml

  flip-active:
    needs: [resolve-slots, ansible-staging]
    runs-on: self-hosted
    steps:
      - name: Record new active slot in bootstrap vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ENV="${{ needs.resolve-slots.outputs.environment }}"
          vault kv put secret/sso/$ENV/active-slot \
            slot="${{ needs.resolve-slots.outputs.staging_slot }}" \
            vmid="${{ needs.resolve-slots.outputs.staging_vmid }}" \
            ip="${{ needs.resolve-slots.outputs.staging_ip }}"

  configure-vault-oidc:
    needs: [resolve-slots, flip-active]
    if: needs.flip-active.result == 'success'
    uses: ./.github/workflows/configure-vault-oidc.yml
    with:
      environment: ${{ needs.resolve-slots.outputs.environment }}
    secrets: inherit

  configure-bootstrap-vault-oidc:
    needs: [flip-active, configure-vault-oidc]
    if: needs.flip-active.result == 'success'
    uses: ./.github/workflows/configure-bootstrap-vault-oidc.yml
    secrets: inherit

  backup-db:
    needs: [resolve-slots]
    if: needs.resolve-slots.outputs.first_run == 'false'
    runs-on: self-hosted
    env:
      ENV:       ${{ needs.resolve-slots.outputs.environment }}
      ACTIVE_IP: ${{ needs.resolve-slots.outputs.active_ip }}
    steps:
      - name: Dump PostgreSQL from old active LXC and store on runner disk
        run: |
          # Fetch SSH key from bootstrap vault
          VAULT_ADDR="${{ secrets.VAULT_BOOTSTRAP_ADDR }}" VAULT_TOKEN="${{ secrets.VAULT_DEV_TOKEN }}" \
            vault kv get -field=private_key secret/ssh_keys/sso_worker \
            | awk 'NF > 0' > /tmp/sso_backup_key
          chmod 600 /tmp/sso_backup_key

          echo "Dumping Authentik PostgreSQL from old active LXC ${ACTIVE_IP}..."
          BACKUP_FILE="/opt/sso-backup/sso_${ENV}_db.sql.gz"
          mkdir -p /opt/sso-backup

          # Stream gzipped dump directly to runner disk — avoids Vault KV size limits
          ssh -o StrictHostKeyChecking=no -i /tmp/sso_backup_key root@${ACTIVE_IP} \
            "docker exec authentik-postgresql pg_dump -U authentik authentik 2>/dev/null | gzip" \
            > "$BACKUP_FILE" 2>/dev/null || true

          if [[ -s "$BACKUP_FILE" ]]; then
            echo "DB backup saved to ${BACKUP_FILE} ($(du -sh "$BACKUP_FILE" | cut -f1))"
          else
            echo "WARNING: DB dump is empty — removing empty file"
            rm -f "$BACKUP_FILE"
          fi

      - name: Mirror backup to NFS (betsy)
        run: |
          BACKUP_FILE="/opt/sso-backup/sso_${ENV}_db.sql.gz"
          PVE_SSH_USER=$(echo "${{ secrets.PVE_USER }}" | cut -d'@' -f1)

          if [[ ! -s "$BACKUP_FILE" ]]; then
            echo "No backup file to mirror — skipping NFS copy"
            exit 0
          fi

          echo "Mirroring backup to betsy NFS..."
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@192.168.50.2 \
            "mkdir -p /mnt/nfs-shared-data/backups/sso"
          scp -o StrictHostKeyChecking=no \
            "$BACKUP_FILE" \
            ${PVE_SSH_USER}@192.168.50.2:/mnt/nfs-shared-data/backups/sso/sso_${ENV}_db.sql.gz
          echo "Backup mirrored to betsy:/mnt/nfs-shared-data/backups/sso/sso_${ENV}_db.sql.gz"

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/sso_backup_key

  teardown-old-active:
    needs: [resolve-slots, flip-active, backup-db, configure-vault-oidc, configure-bootstrap-vault-oidc]
    if: >-
      needs.resolve-slots.outputs.first_run == 'false' &&
      needs.flip-active.result == 'success' &&
      (needs.backup-db.result == 'success' || needs.backup-db.result == 'failure') &&
      (needs.configure-vault-oidc.result == 'success' || needs.configure-vault-oidc.result == 'failure') &&
      (needs.configure-bootstrap-vault-oidc.result == 'success' || needs.configure-bootstrap-vault-oidc.result == 'failure')
    runs-on: self-hosted
    env:
      ENV:         ${{ needs.resolve-slots.outputs.environment }}
      ACTIVE_SLOT: ${{ needs.resolve-slots.outputs.active_slot }}
      ACTIVE_VMID: ${{ needs.resolve-slots.outputs.active_vmid }}
      ACTIVE_IP:   ${{ needs.resolve-slots.outputs.active_ip }}
      ACTIVE_HOST: ${{ needs.resolve-slots.outputs.active_host }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: /app/infra-platform

      - name: Terraform Init
        env:
          TF_VAR_pve_api:       ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user:      ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:      ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user:      ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:   ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:          ${{ env.ACTIVE_VMID }}
          TF_VAR_ip_address:    ${{ env.ACTIVE_IP }}
          TF_VAR_vm_hostname:   ${{ env.ACTIVE_HOST }}
          TF_VAR_target_node:   ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/sso init -input=false

      - name: Terraform Destroy old active CT
        env:
          TF_VAR_pve_api:       ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user:      ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:      ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user:      ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:   ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:          ${{ env.ACTIVE_VMID }}
          TF_VAR_ip_address:    ${{ env.ACTIVE_IP }}
          TF_VAR_vm_hostname:   ${{ env.ACTIVE_HOST }}
          TF_VAR_target_node:   ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          PVE_API:  ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/sso destroy \
            -no-color -input=false -auto-approve \
            -state=terraform.${ACTIVE_SLOT}.${ENV}.tfstate || true
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
            "pct stop ${ACTIVE_VMID} 2>/dev/null || true; pct destroy ${ACTIVE_VMID} 2>/dev/null || true"

  cleanup-on-failure:
    needs: [resolve-slots, terraform-staging, ansible-staging]
    if: failure()
    runs-on: self-hosted
    env:
      ENV:          ${{ needs.resolve-slots.outputs.environment }}
      STAGING_SLOT: ${{ needs.resolve-slots.outputs.staging_slot }}
      STAGING_VMID: ${{ needs.resolve-slots.outputs.staging_vmid }}
      STAGING_IP:   ${{ needs.resolve-slots.outputs.staging_ip }}
      STAGING_HOST: ${{ needs.resolve-slots.outputs.staging_host }}
    steps:
      - name: Collect failure logs from CT
        env:
          PVE_API:  ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          LOG_DIR="/app/infra-platform/logs/sso-failures"
          mkdir -p "$LOG_DIR"
          LOG_FILE="$LOG_DIR/sso-${ENV}-$(date -u +%Y%m%dT%H%M%SZ)-run${{ github.run_id }}.log"
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          {
            echo "=== SSO failure log: run ${{ github.run_id }}, env=${ENV}, vmid=${STAGING_VMID} ==="
            echo "=== $(date -u) ==="
            echo "--- system journal (last 100 lines) ---"
            ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
              "pct exec ${STAGING_VMID} -- journalctl -n 100 --no-pager 2>/dev/null || echo '(journal unavailable)'" 2>/dev/null || echo "(pct exec failed)"
          } | tee "$LOG_FILE" || true
          echo "Failure log saved to $LOG_FILE"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: /app/infra-platform

      - name: Terraform Init
        env:
          TF_VAR_pve_api:       ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user:      ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:      ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user:      ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:   ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:          ${{ env.STAGING_VMID }}
          TF_VAR_ip_address:    ${{ env.STAGING_IP }}
          TF_VAR_vm_hostname:   ${{ env.STAGING_HOST }}
          TF_VAR_target_node:   ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/sso init -input=false

      - name: Terraform Destroy staging CT
        env:
          TF_VAR_pve_api:       ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user:      ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:      ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user:      ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:   ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:          ${{ env.STAGING_VMID }}
          TF_VAR_ip_address:    ${{ env.STAGING_IP }}
          TF_VAR_vm_hostname:   ${{ env.STAGING_HOST }}
          TF_VAR_target_node:   ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          PVE_API:  ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/sso destroy \
            -no-color -input=false -auto-approve \
            -state=terraform.${STAGING_SLOT}.${ENV}.tfstate || true
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
            "pct stop ${STAGING_VMID} 2>/dev/null || true; pct destroy ${STAGING_VMID} 2>/dev/null || true"
          rm -f /app/infra-platform/terraform/sso/terraform.${STAGING_SLOT}.${ENV}.tfstate
