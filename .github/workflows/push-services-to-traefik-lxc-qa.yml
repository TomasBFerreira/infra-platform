name: Push services.yml to traefik-lxc-qa (one-shot)

# Pushes config/dynamic/services.yml + config/traefik.yml from the
# traefik-gitops main branch to traefik-lxc-qa (CT 395 / .95).
# Routes through heaton because the management runner can't reach
# 192.168.30.x directly.
#
# Workaround for the qa traefik backend swap landing. Delete this
# workflow once the qa env runner is healthy and the proper deploy-qa
# job in traefik-gitops handles it.

on:
  workflow_dispatch:

jobs:
  push:
    runs-on: [self-hosted, management]
    steps:
      - name: Checkout traefik-gitops main
        uses: actions/checkout@v4
        with:
          repository: TomasBFerreira/traefik-gitops
          ref: main
          token: ${{ secrets.GH_PAT }}
          path: traefik-gitops

      - name: Fetch traefik_worker SSH key from bootstrap vault
        env:
          VAULT_ADDR:        ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN:       ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
          VAULT_CLIENT_TIMEOUT: "30"
        run: |
          V="${VAULT_ADDR}"
          if [[ "$V" != http://* && "$V" != https://* ]]; then V="http://${V}"; fi
          export VAULT_ADDR="$V"
          mkdir -p /tmp/tx-qa-push && chmod 700 /tmp/tx-qa-push
          vault kv get -field=private_key secret/ssh_keys/traefik_worker \
            | awk 'NF > 0' > /tmp/tx-qa-push/key
          chmod 600 /tmp/tx-qa-push/key
          head -1 /tmp/tx-qa-push/key | grep -q "PRIVATE KEY" \
            || { echo "ERROR: vault read produced an empty key"; exit 1; }

      - name: Push to traefik-lxc-qa via heaton hop
        env:
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          set -uo pipefail
          PVE_USER_SHORT=$(echo "$PVE_USER" | cut -d'@' -f1)
          HEATON="${PVE_USER_SHORT}@192.168.50.8"

          # Stage files on heaton
          scp -o StrictHostKeyChecking=no \
            traefik-gitops/config/dynamic/services.yml \
            ${HEATON}:/tmp/services.yml
          scp -o StrictHostKeyChecking=no \
            traefik-gitops/config/traefik.yml \
            ${HEATON}:/tmp/traefik.yml
          scp -o StrictHostKeyChecking=no \
            /tmp/tx-qa-push/key \
            ${HEATON}:/tmp/tx-qa-key
          ssh -o StrictHostKeyChecking=no ${HEATON} "chmod 600 /tmp/tx-qa-key"

          # Push from heaton onward to traefik-lxc-qa (.30.95) and restart Traefik.
          # All one-line remote commands — no heredoc to avoid YAML pitfalls.
          ssh -o StrictHostKeyChecking=no ${HEATON} \
            "scp -i /tmp/tx-qa-key -o StrictHostKeyChecking=no /tmp/services.yml root@192.168.30.95:/opt/traefik/config/dynamic/services.yml"
          ssh -o StrictHostKeyChecking=no ${HEATON} \
            "scp -i /tmp/tx-qa-key -o StrictHostKeyChecking=no /tmp/traefik.yml root@192.168.30.95:/opt/traefik/config/traefik.yml"
          ssh -o StrictHostKeyChecking=no ${HEATON} \
            "ssh -i /tmp/tx-qa-key -o StrictHostKeyChecking=no root@192.168.30.95 'cd /opt/traefik && docker compose restart traefik && echo Traefik restarted on traefik-lxc-qa'"

          # Cleanup remote
          ssh -o StrictHostKeyChecking=no ${HEATON} \
            "rm -f /tmp/tx-qa-key /tmp/services.yml /tmp/traefik.yml"

      - name: Cleanup local key
        if: always()
        run: rm -rf /tmp/tx-qa-push
