name: Debug prod Traefik

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: [self-hosted, prod]
    steps:
      - name: Diagnose Traefik on network-vm (192.168.10.55)
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/network_vm_worker \
            | awk 'NF > 0' > /tmp/nwkey && chmod 600 /tmp/nwkey

          NW="ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55"

          echo "=== 1. Docker container status ==="
          $NW "docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' 2>&1" || echo "docker ps failed"

          echo ""
          echo "=== 2. services.yml on disk (first 20 + last 20 lines) ==="
          $NW "head -20 /opt/traefik/config/dynamic/services.yml && echo '...' && tail -20 /opt/traefik/config/dynamic/services.yml" || echo "file read failed"

          echo ""
          echo "=== 3. Grep prowlarr/sonarr/rancher routers in deployed services.yml ==="
          $NW "grep -n -E 'prowlarr-router|sonarr-router|radarr-router|rancher-prod-router|grafana-router' /opt/traefik/config/dynamic/services.yml" || echo "grep failed"

          echo ""
          echo "=== 4. Traefik API — list loaded HTTP routers ==="
          $NW "curl -s http://localhost:8080/api/http/routers 2>/dev/null | python3 -c 'import sys,json; [print(r[\"name\"],r.get(\"status\",\"?\"),r[\"rule\"][:60]) for r in json.load(sys.stdin)]' 2>&1 || echo 'API not available or no python3'" || echo "traefik api check failed"

          echo ""
          echo "=== 5. Traefik API — list loaded middlewares ==="
          $NW "curl -s http://localhost:8080/api/http/middlewares 2>/dev/null | python3 -c 'import sys,json; [print(m[\"name\"],m.get(\"status\",\"?\"),m.get(\"type\",\"?\")) for m in json.load(sys.stdin)]' 2>&1 || echo 'API not available'" || echo "middleware check failed"

          echo ""
          echo "=== 6. Test forwardAuth chain from inside network-vm ==="
          $NW "curl -sv --max-time 5 -H 'Host: prowlarr.databaes.net' http://127.0.0.1:80/ 2>&1 | grep -E '< HTTP|Location|content-type' | head -10" || echo "local test failed"

          echo ""
          echo "=== 7. Test internal-prod loopback (forwardAuth target) ==="
          $NW "curl -sv --max-time 5 http://127.0.0.1:9098/outpost.goauthentik.io/auth/traefik 2>&1 | grep -E '< HTTP|Location|content-type' | head -10" || echo "loopback test failed"

          echo ""
          echo "=== 8. Auth-service backend connectivity ==="
          $NW "for ip in 192.168.10.75 192.168.10.76; do echo -n \"\$ip:9000 → \"; curl -s --max-time 3 http://\$ip:9000/-/health/ready/ -o /dev/null -w '%{http_code}'; echo; done" || echo "auth backend check failed"

          echo ""
          echo "=== 9. Traefik logs (last 30 lines) ==="
          $NW "docker logs traefik --tail 30 2>&1" || echo "docker logs failed"

          echo ""
          echo "=== 10. traefik.yml static config entrypoints ==="
          $NW "grep -A3 'entryPoints' /opt/traefik/config/traefik.yml | head -30" || echo "static config check failed"

          rm -f /tmp/nwkey

      - name: Diagnose Authentik outpost, Vault, and Grafana health
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/network_vm_worker \
            | awk 'NF > 0' > /tmp/nwkey && chmod 600 /tmp/nwkey

          NW="ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55"
          JUMP="-o ProxyJump=root@192.168.10.55"

          echo "=== 1. Authentik outpost endpoint from network-vm → SSO LXC .75 ==="
          $NW "curl -sv --max-time 5 http://192.168.10.75:9000/outpost.goauthentik.io/auth/traefik 2>&1" || echo "curl to .75 failed"

          echo ""
          echo "=== 2. Authentik outpost endpoint from network-vm → SSO LXC .76 ==="
          $NW "curl -sv --max-time 5 http://192.168.10.76:9000/outpost.goauthentik.io/auth/traefik 2>&1" || echo "curl to .76 failed"

          echo ""
          echo "=== 3. Docker containers on SSO prod .75 ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no $JUMP root@192.168.10.75 "docker ps -a" 2>&1 || echo "docker ps on .75 failed"

          echo ""
          echo "=== 4. Authentik logs on SSO prod .75 ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no $JUMP root@192.168.10.75 "docker logs authentik-server --tail 20 2>&1 || journalctl -u authentik -n 20 --no-pager 2>&1" 2>&1 || echo "logs on .75 failed"

          echo ""
          echo "=== 5. Docker containers on SSO prod .76 ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no $JUMP root@192.168.10.76 "docker ps -a" 2>&1 || echo "docker ps on .76 failed"

          echo ""
          echo "=== 6. Authentik logs on SSO prod .76 ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no $JUMP root@192.168.10.76 "docker logs authentik-server --tail 20 2>&1 || journalctl -u authentik -n 20 --no-pager 2>&1" 2>&1 || echo "logs on .76 failed"

          echo ""
          echo "=== 7. Vault prod health from network-vm ==="
          $NW "curl -sv --max-time 5 http://192.168.10.46:8200/v1/sys/health 2>&1" || echo "vault health check failed"

          echo ""
          echo "=== 8. Grafana health on .95 from network-vm ==="
          $NW "curl -sv --max-time 5 http://192.168.10.95:3000/api/health 2>&1" || echo "grafana .95 health check failed"

          echo ""
          echo "=== 9. Grafana health on .96 from network-vm ==="
          $NW "curl -sv --max-time 5 http://192.168.10.96:3000/api/health 2>&1" || echo "grafana .96 health check failed"

          rm -f /tmp/nwkey





