name: Debug prod Traefik

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: [self-hosted, prod]
    steps:
      - name: Check Traefik on prod network-vm
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/network_vm_worker \
            | awk 'NF > 0' > /tmp/nwkey && chmod 600 /tmp/nwkey

          echo "=== Docker containers ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'"

          echo "=== Test localhost:80 ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -sI -H 'Host: databaes.net' http://localhost:80/ 2>&1 | head -5"

          echo "=== Test k3s landing page ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -sI http://192.168.10.12:30080/ 2>&1 | head -5"

          echo "=== Traefik rancher-prod-router ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -s http://localhost:8080/api/http/routers/rancher-prod-router@file 2>/dev/null || echo 'router not found'"

          echo "=== Traefik rancher-prod-service ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -s http://localhost:8080/api/http/services/rancher-prod-service@file 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); print(\"status:\",d.get(\"status\")); print(\"error:\",d.get(\"error\",\"none\")); print(\"serverStatus:\",d.get(\"serverStatus\",{}))'  2>&1 || echo 'service not found'"

          echo "=== Traefik plex-router (control - uses insecureTransport) ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -s http://localhost:8080/api/http/routers/plex-router@file 2>/dev/null"

          echo "=== Traefik plex-service status ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -s http://localhost:8080/api/http/services/plex-service@file 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); print(\"status:\",d.get(\"status\")); print(\"serverStatus:\",d.get(\"serverStatus\",{}))' 2>&1"

          echo "=== services.yml inside container (rancher section) ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "docker exec traefik cat /etc/traefik/dynamic/services.yml | grep -A8 'rancher-prod-router'"

          echo "=== Rancher backend reachable? ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -ks -o /dev/null -w '%{http_code}' --max-time 5 https://192.168.10.2/ || echo 'unreachable'"

          echo "=== curl rancher via --resolve ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -sIv --resolve rancher.databaes.net:80:127.0.0.1 http://rancher.databaes.net/ 2>&1 | grep -E 'HTTP/|> Host|< |Connected'"

          echo "=== All web-entrypoint routers in API ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -s http://localhost:8080/api/http/routers 2>/dev/null | python3 -c 'import sys,json; [print(r[\"name\"],\"|\",r.get(\"rule\",\"\"),\"|\",r.get(\"status\")) for r in json.load(sys.stdin) if \"web\" in r.get(\"using\",[])]'"

          echo "=== cloudflared systemd status ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "systemctl status cloudflared --no-pager 2>&1 | head -20"

          echo "=== cloudflared config ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "cat /etc/cloudflared/config.yml 2>/dev/null || echo 'no config.yml'; ls /etc/cloudflared/ 2>/dev/null"

          echo "=== cloudflared tunnel status (last 20 lines of journal) ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "journalctl -u cloudflared -n 20 --no-pager 2>&1"

          rm -f /tmp/nwkey
