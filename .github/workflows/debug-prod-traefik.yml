name: Debug prod Traefik

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: [self-hosted, prod]
    steps:
      - name: Check Traefik on prod network-vm
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/network_vm_worker \
            | awk 'NF > 0' > /tmp/nwkey && chmod 600 /tmp/nwkey

          echo "=== Dynamic config dir ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "ls -la /opt/traefik/config/dynamic/"

          echo "=== acme.json cert domains ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "docker exec traefik cat /acme.json 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); [print(k,\"certs:\",[c.get(\"domain\",{}).get(\"main\") for c in v.get(\"Certificates\",[])]) for k,v in d.items()]' || echo 'no acme.json'"

          echo "=== Traefik rancher-prod-router ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -s http://localhost:8080/api/http/routers/rancher-prod-router@file"

          echo "=== curl rancher ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -sI --resolve rancher.databaes.net:80:127.0.0.1 http://rancher.databaes.net/ 2>&1 | head -5"

          echo "=== curl plex (control) ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -sI --resolve plex.databaes.net:80:127.0.0.1 http://plex.databaes.net/ 2>&1 | head -3"

          rm -f /tmp/nwkey



