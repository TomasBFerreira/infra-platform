name: Debug prod Traefik

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: [self-hosted, prod]
    steps:
      - name: Check Rancher LXC (192.168.10.2)
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/network_vm_worker \
            | awk 'NF > 0' > /tmp/nwkey && chmod 600 /tmp/nwkey

          echo "=== Check port 443 and 80 on Rancher LXC from network VM ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -ksv --max-time 5 https://192.168.10.2/ 2>&1 | grep -E 'Connected|SSL|< HTTP|TLS|certificate|SNI|Host|subject|issuer' | head -20"

          echo "=== Port 80 on Rancher LXC ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -sv --max-time 5 -H 'Host: rancher.databaes.net' http://192.168.10.2/ 2>&1 | grep -E 'Connected|< HTTP|Location' | head -10"

          echo "=== SSH to Rancher LXC and check k3s ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "ssh -o StrictHostKeyChecking=no root@192.168.10.2 'kubectl get pods -A 2>&1 | head -30; echo ---; kubectl get ingress -A 2>&1; echo ---; kubectl get svc -A 2>&1 | grep -E rancher'" \
            2>&1 || echo "ssh to rancher LXC failed — trying with rancher key from vault"

          echo "=== Try rancher LXC with vault SSH key ==="
          vault kv get -field=private_key secret/ssh_keys/lxc_default 2>/dev/null \
            | awk 'NF > 0' > /tmp/rancherkey && chmod 600 /tmp/rancherkey 2>/dev/null || echo "no lxc_default key"
          ssh -i /tmp/rancherkey -o StrictHostKeyChecking=no root@192.168.10.2 \
            "kubectl get pods -A 2>&1 | head -30" 2>&1 || echo "lxc_default key also failed"

          rm -f /tmp/nwkey /tmp/rancherkey





