name: Debug prod Traefik

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: [self-hosted, prod]
    steps:
      - name: Check Traefik on prod network-vm
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/network_vm_worker \
            | awk 'NF > 0' > /tmp/nwkey && chmod 600 /tmp/nwkey

          echo "=== docker-compose.yml on prod VM ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "cat /opt/traefik/docker-compose.yml 2>/dev/null || cat /opt/traefik/docker-compose.yaml 2>/dev/null || find /opt/traefik -name 'docker-compose*' | head -3"

          echo "=== Traefik container inspect (labels + mounts) ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "docker inspect traefik 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin)[0]; print(\"Labels:\",d.get(\"Config\",{}).get(\"Labels\",{})); print(\"Mounts:\",[(m[\"Source\"],m[\"Destination\"]) for m in d.get(\"Mounts\",[])]);'"

          echo "=== curl rancher + immediate access log ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -sI --resolve rancher.databaes.net:80:127.0.0.1 http://rancher.databaes.net/ > /dev/null 2>&1; sleep 1; docker logs traefik --tail 5 2>&1"

          echo "=== curl plex + immediate access log ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -sI --resolve plex.databaes.net:80:127.0.0.1 http://plex.databaes.net/ > /dev/null 2>&1; sleep 1; docker logs traefik --tail 5 2>&1"

          echo "=== All routers from API (all providers) ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.10.55 \
            "curl -s http://localhost:8080/api/http/routers 2>/dev/null | python3 -c 'import sys,json; [print(r[\"name\"],\"priority:\",r.get(\"priority\"),\"|\",r.get(\"rule\",\"\")) for r in sorted(json.load(sys.stdin), key=lambda x: x.get(\"priority\",0), reverse=True) if \"rancher\" in r.get(\"rule\",\"\").lower() or r.get(\"priority\",0) > 100]'"

          rm -f /tmp/nwkey




