name: Create Authentik recovery flow (from stages)

# Runs ansible/sso/files/build_recovery.py against the live Authentik to build +
# bind the recovery flow (no recovery blueprint ships with this build). Single
# source of truth — the SSO deploy runs the same script via the ansible `script`
# module. Idempotent + self-healing (repairs wrong stage bindings). Runs on the
# env runner (Authentik CT is dev-network only).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, prod]

jobs:
  create:
    runs-on: [self-hosted, "${{ inputs.environment }}"]
    env:
      ENVIRONMENT: ${{ inputs.environment }}
      VAULT_BOOTSTRAP_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_DEV_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve env vault creds
        run: |
          case "$ENVIRONMENT" in
            dev)  echo "ENVVAULT_ADDR=${{ secrets.VAULT_ADDR }}"   >> "$GITHUB_ENV"; echo "ENVVAULT_TOKEN=${{ secrets.VAULT_TOKEN }}" >> "$GITHUB_ENV" ;;
            qa)   echo "ENVVAULT_ADDR=${{ secrets.VAULT_QA_ADDR }}" >> "$GITHUB_ENV"; echo "ENVVAULT_TOKEN=${{ secrets.VAULT_QA_TOKEN }}" >> "$GITHUB_ENV" ;;
            prod) echo "ENVVAULT_ADDR=${{ secrets.VAULT_PROD_ADDR }}" >> "$GITHUB_ENV"; echo "ENVVAULT_TOKEN=${{ secrets.VAULT_PROD_TOKEN }}" >> "$GITHUB_ENV" ;;
          esac

      - name: Resolve active SSO IP + bootstrap token
        run: |
          IP=$(VAULT_ADDR="$VAULT_BOOTSTRAP_ADDR" VAULT_TOKEN="$VAULT_DEV_TOKEN" \
               vault kv get -field=ip secret/sso/$ENVIRONMENT/active-slot)
          TOK=$(VAULT_ADDR="$ENVVAULT_ADDR" VAULT_TOKEN="$ENVVAULT_TOKEN" \
               vault kv get -field=bootstrap_token secret/sso)
          echo "::add-mask::$TOK"
          echo "SSO_IP=$IP" >> "$GITHUB_ENV"
          echo "AK_TOKEN=$TOK" >> "$GITHUB_ENV"

      - name: Build + bind recovery flow (runs the shared script)
        env:
          AK_BASE: "http://${{ env.SSO_IP }}:9000/api/v3"
          AK_TOKEN: ${{ env.AK_TOKEN }}
        run: python3 ansible/sso/files/build_recovery.py
