name: Vault CT Pipeline (Self-Hosted)

on:
  push:
    branches: [main]
    paths:
      - 'terraform/dev/vault-ct/**'
      - 'ansible/dev/vault-ct/**'
  workflow_dispatch:

env:
  TF_VERSION: 1.6.4
  PVE_NODE: benedict
  VMID: '210'

jobs:
  terraform:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Terraform Init
        env:
          TF_VAR_pve_api: ${{ secrets.PVE_API }}
          TF_VAR_pve_user: ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass: ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
          TF_VAR_vault_token: ${{ secrets.VAULT_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_ADDR }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/dev/vault-ct init -input=false

      - name: Terraform Apply
        env:
          TF_VAR_pve_api: ${{ secrets.PVE_API }}
          TF_VAR_pve_user: ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass: ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
          TF_VAR_vault_token: ${{ secrets.VAULT_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_ADDR }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/dev/vault-ct apply -no-color -input=false -auto-approve

  ansible:
    needs: terraform
    runs-on: self-hosted
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run Ansible playbook
        run: |
          ansible-playbook \
            -i ansible/dev/vault-ct/inventory.ini \
            -v \
            ansible/dev/vault-ct/vault-ct_setup.yml
