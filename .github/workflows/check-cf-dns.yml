name: Check Cloudflare DNS records

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: List all DNS records
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID:  ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          echo "=== All DNS records for databaes.net ==="
          curl -sf "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?per_page=100" \
            -H "Authorization: Bearer $CF_TOKEN" | \
            jq -r '.result[] | "\(.type) \(.name) -> \(.content)  proxied=\(.proxied)"' | sort

          echo ""
          echo "=== Wildcard *.databaes.net record ==="
          WILD=$(curl -sf \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=*.databaes.net" \
            -H "Authorization: Bearer $CF_TOKEN")
          echo "$WILD" | jq '.result_info.count, .result[]'

      - name: Check dev tunnel ingress config
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "=== Get account ID ==="
          ACCT=$(curl -sf "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer $CF_TOKEN" | jq -r '.result[0].id // "none"')
          echo "Account: $ACCT"

          TUNNEL_ID="80b044ef-7217-4215-8e4f-b3c9d59add34"
          echo ""
          echo "=== Dev tunnel ingress config ==="
          curl -sf "https://api.cloudflare.com/client/v4/accounts/$ACCT/cfd_tunnel/$TUNNEL_ID/configurations" \
            -H "Authorization: Bearer $CF_TOKEN" | jq '.' || echo "Cannot read tunnel config (token may lack tunnel permissions)"
