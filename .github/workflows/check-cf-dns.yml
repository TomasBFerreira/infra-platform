name: Check and fix Cloudflare wildcard DNS

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: List all DNS records and check tunnel ingress
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID:  ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          echo "=== All DNS records for databaes.net ==="
          curl -sf "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?per_page=100" \
            -H "Authorization: Bearer $CF_TOKEN" | \
            python3 -c "
import sys,json
d=json.load(sys.stdin)
for r in sorted(d['result'], key=lambda x: x['name']):
    print(f'  {r[\"type\"]:6s} {r[\"name\"]:50s} -> {r[\"content\"]}  proxied={r.get(\"proxied\",False)}')
"

          echo ""
          echo "=== Delete wildcard *.databaes.net if it exists ==="
          WILD=$(curl -sf \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=*.databaes.net" \
            -H "Authorization: Bearer $CF_TOKEN")
          COUNT=$(echo "$WILD" | python3 -c "import sys,json; print(json.load(sys.stdin)['result_info']['count'])")
          echo "Wildcard records found: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "$WILD" | python3 -c "
import sys,json
d=json.load(sys.stdin)
for r in d['result']:
    print(f'  Found: {r[\"type\"]} {r[\"name\"]} -> {r[\"content\"]} proxied={r.get(\"proxied\")}')
"
          fi

          echo ""
          echo "=== Update dev tunnel ingress: route grafana-dev to Traefik HTTPS ==="
          ACCT=$(curl -sf "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer $CF_TOKEN" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d['result'] else 'none')")
          echo "Account ID: $ACCT"

          TUNNEL_ID="80b044ef-7217-4215-8e4f-b3c9d59add34"

          echo "=== Get current tunnel config ==="
          curl -sf "https://api.cloudflare.com/client/v4/accounts/$ACCT/cfd_tunnel/$TUNNEL_ID/configurations" \
            -H "Authorization: Bearer $CF_TOKEN" | python3 -m json.tool 2>/dev/null || echo "Cannot read tunnel config (token may lack tunnel permissions)"
