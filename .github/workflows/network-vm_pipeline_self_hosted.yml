name: Network-VM Pipeline (Self-Hosted)

on:
  push:
    branches: [main, 'feature/**']
    paths:
      - 'terraform/dev/network-vm/**'
      - 'ansible/dev/network-vm/**'
  workflow_dispatch:

concurrency:
  group: network-vm-pipeline
  cancel-in-progress: true

env:
  TF_VERSION: 1.6.4
  VAULT_VERSION: 1.21.0
  PVE_NODE: benedict
  VMID: '220'

jobs:
  terraform:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Terraform Init
        env:
          TF_VAR_pve_api: ${{ secrets.PVE_API }}
          TF_VAR_pve_user: ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass: ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
          TF_VAR_vault_token: ${{ secrets.VAULT_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_ADDR }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/dev/network-vm init -input=false

      - name: Terraform Apply
        env:
          TF_VAR_pve_api: ${{ secrets.PVE_API }}
          TF_VAR_pve_user: ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass: ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
          TF_VAR_vault_token: ${{ secrets.VAULT_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_ADDR }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/dev/network-vm apply -no-color -input=false -auto-approve

  ansible:
    needs: terraform
    runs-on: self-hosted
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Configure TUN device via Proxmox API
        env:
          PVE_API: ${{ secrets.PVE_API }}
          PVE_USER: ${{ secrets.PVE_USER }}
          PVE_PASS: ${{ secrets.PVE_PASS }}
        run: |
          python3 - <<'EOF'
          import urllib.request, urllib.parse, json, ssl, os, time

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          api  = os.environ['PVE_API']
          user = os.environ['PVE_USER']
          pw   = os.environ['PVE_PASS']

          auth_data = urllib.parse.urlencode({'username': user, 'password': pw}).encode()
          with urllib.request.urlopen(urllib.request.Request(f'{api}/access/ticket', data=auth_data), context=ctx) as r:
            resp = json.loads(r.read())
          ticket = resp['data']['ticket']
          csrf   = resp['data']['CSRFPreventionToken']
          headers = {'CSRFPreventionToken': csrf, 'Cookie': f'PVEAuthCookie={ticket}', 'Content-Type': 'application/x-www-form-urlencoded'}

          # Build body manually to keep brackets unencoded in key names (urlencode encodes them to %5B%5D which Proxmox rejects)
          def make_body(*params):
            return '&'.join(k + '=' + urllib.parse.quote(v, safe='') for k, v in params).encode()

          cfg = make_body(
            ('lxc[0]', 'lxc.cgroup2.devices.allow: c 10:200 rwm'),
            ('lxc[1]', 'lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file'),
          )

          def api_call(url, data=b'', method='POST'):
            req = urllib.request.Request(url, data=data, method=method, headers=headers)
            try:
              with urllib.request.urlopen(req, context=ctx) as r:
                print(f"{method} {url.split('/nodes/')[-1]} -> {r.status}")
            except urllib.error.HTTPError as e:
              print(f"{method} {url.split('/nodes/')[-1]} -> {e.code}: {e.read().decode()}")
              raise

          api_call(f'{api}/nodes/benedict/lxc/220/config', data=cfg, method='PUT')
          print("Config updated, stopping container...")
          api_call(f'{api}/nodes/benedict/lxc/220/status/stop')
          time.sleep(8)
          api_call(f'{api}/nodes/benedict/lxc/220/status/start')
          print("Container restarted, waiting for boot...")
          time.sleep(15)
          EOF

      - name: Wait for SSH to be ready
        run: |
          echo "Waiting for SSH on 192.168.50.220..."
          timeout 120 bash -c 'until nc -z 192.168.50.220 22; do sleep 5; done'
          echo "SSH is up"

      - name: Fetch SSH key from Vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/network_vm_worker \
            | awk 'NF > 0' > /tmp/network_vm_key
          chmod 600 /tmp/network_vm_key

      - name: Run Ansible playbook
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          ansible-playbook \
            -i ansible/dev/network-vm/inventory.ini \
            -v \
            ansible/dev/network-vm/network-vm_setup.yml

  destroy-on-failure:
    needs: [terraform, ansible]
    if: failure()
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Terraform Init
        env:
          TF_VAR_pve_api: ${{ secrets.PVE_API }}
          TF_VAR_pve_user: ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass: ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
          TF_VAR_vault_token: ${{ secrets.VAULT_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_ADDR }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/dev/network-vm init -input=false

      - name: Terraform Destroy
        env:
          TF_VAR_pve_api: ${{ secrets.PVE_API }}
          TF_VAR_pve_user: ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass: ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
          TF_VAR_vault_token: ${{ secrets.VAULT_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_ADDR }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/dev/network-vm destroy -no-color -input=false -auto-approve
