name: Network-VM Pipeline (Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod

concurrency:
  group: network-vm-pipeline-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: true

jobs:
  resolve-slots:
    runs-on: self-hosted
    outputs:
      environment: ${{ steps.slots.outputs.environment }}
      pve_api_url: ${{ steps.slots.outputs.pve_api_url }}
      pve_node: ${{ steps.slots.outputs.pve_node }}
      active_slot: ${{ steps.slots.outputs.active_slot }}
      active_vmid: ${{ steps.slots.outputs.active_vmid }}
      active_ip: ${{ steps.slots.outputs.active_ip }}
      active_host: ${{ steps.slots.outputs.active_host }}
      staging_slot: ${{ steps.slots.outputs.staging_slot }}
      staging_vmid: ${{ steps.slots.outputs.staging_vmid }}
      staging_ip: ${{ steps.slots.outputs.staging_ip }}
      staging_host: ${{ steps.slots.outputs.staging_host }}
      first_run: ${{ steps.slots.outputs.first_run }}
      gateway:        ${{ steps.slots.outputs.gateway }}
      network_bridge: ${{ steps.slots.outputs.network_bridge }}
    steps:
      - name: Resolve active and staging slots
        id: slots
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"

          case "$ENV" in
            dev)
              BLUE_VMID=255;  BLUE_IP="192.168.20.55"
              GREEN_VMID=256; GREEN_IP="192.168.20.56"
              PVE_NODE="benedict"
              PVE_API_URL="https://192.168.50.4:8006/api2/json"
              GATEWAY="192.168.20.1"; NETWORK_BRIDGE="vmbr20"
              ;;
            qa)
              BLUE_VMID=355;  BLUE_IP="192.168.30.55"
              GREEN_VMID=356; GREEN_IP="192.168.30.56"
              PVE_NODE="vladimir"
              PVE_API_URL="https://192.168.50.4:8006/api2/json"
              GATEWAY="192.168.30.1"; NETWORK_BRIDGE="vmbr30"
              ;;
            prod)
              BLUE_VMID=155;  BLUE_IP="192.168.10.55"
              GREEN_VMID=156; GREEN_IP="192.168.10.56"
              PVE_NODE="betsy"
              PVE_API_URL="https://192.168.50.2:8006/api2/json"
              GATEWAY="192.168.10.1"; NETWORK_BRIDGE="vmbr10"
              ;;
          esac

          BLUE_HOST="network-vm-blue"
          GREEN_HOST="network-vm-green"

          ACTIVE_SLOT=$(vault kv get -field=slot secret/network-vm/$ENV/active-slot 2>/dev/null || echo "none")

          if [ "$ACTIVE_SLOT" = "none" ]; then
            echo "No active slot found — first run, deploying to blue"
            STAGING_SLOT="blue"
            STAGING_VMID="$BLUE_VMID"
            STAGING_IP="$BLUE_IP"
            STAGING_HOST="$BLUE_HOST"
            ACTIVE_VMID=""
            ACTIVE_IP=""
            ACTIVE_HOST=""
            FIRST_RUN="true"
          elif [ "$ACTIVE_SLOT" = "blue" ]; then
            STAGING_SLOT="green"
            STAGING_VMID="$GREEN_VMID"
            STAGING_IP="$GREEN_IP"
            STAGING_HOST="$GREEN_HOST"
            ACTIVE_VMID="$BLUE_VMID"
            ACTIVE_IP="$BLUE_IP"
            ACTIVE_HOST="$BLUE_HOST"
            FIRST_RUN="false"
          else
            STAGING_SLOT="blue"
            STAGING_VMID="$BLUE_VMID"
            STAGING_IP="$BLUE_IP"
            STAGING_HOST="$BLUE_HOST"
            ACTIVE_VMID="$GREEN_VMID"
            ACTIVE_IP="$GREEN_IP"
            ACTIVE_HOST="$GREEN_HOST"
            FIRST_RUN="false"
          fi

          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "pve_api_url=$PVE_API_URL" >> "$GITHUB_OUTPUT"
          echo "pve_node=$PVE_NODE" >> "$GITHUB_OUTPUT"
          echo "active_slot=$ACTIVE_SLOT" >> "$GITHUB_OUTPUT"
          echo "active_vmid=$ACTIVE_VMID" >> "$GITHUB_OUTPUT"
          echo "active_ip=$ACTIVE_IP" >> "$GITHUB_OUTPUT"
          echo "active_host=$ACTIVE_HOST" >> "$GITHUB_OUTPUT"
          echo "staging_slot=$STAGING_SLOT" >> "$GITHUB_OUTPUT"
          echo "staging_vmid=$STAGING_VMID" >> "$GITHUB_OUTPUT"
          echo "staging_ip=$STAGING_IP" >> "$GITHUB_OUTPUT"
          echo "staging_host=$STAGING_HOST" >> "$GITHUB_OUTPUT"
          echo "first_run=$FIRST_RUN" >> "$GITHUB_OUTPUT"
          echo "gateway=$GATEWAY"               >> "$GITHUB_OUTPUT"
          echo "network_bridge=$NETWORK_BRIDGE" >> "$GITHUB_OUTPUT"

  terraform-staging:
    needs: resolve-slots
    runs-on: self-hosted
    env:
      ENV: ${{ needs.resolve-slots.outputs.environment }}
      STAGING_SLOT: ${{ needs.resolve-slots.outputs.staging_slot }}
      STAGING_VMID: ${{ needs.resolve-slots.outputs.staging_vmid }}
      STAGING_IP: ${{ needs.resolve-slots.outputs.staging_ip }}
      STAGING_HOST: ${{ needs.resolve-slots.outputs.staging_host }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to persistent clone
        run: |
          cd /app/infra-platform
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}

      - name: Migrate legacy state file (first-ever blue/green run)
        run: |
          OLD_STATE_DIR=/app/infra-platform/terraform/dev/network-vm
          NEW_STATE_DIR=/app/infra-platform/terraform/network-vm
          if [ ! -f "${NEW_STATE_DIR}/terraform.${STAGING_SLOT}.${ENV}.tfstate" ] && \
             [ -f "${OLD_STATE_DIR}/terraform.tfstate" ]; then
            echo "Migrating terraform/dev/network-vm/terraform.tfstate → terraform/network-vm/terraform.${STAGING_SLOT}.${ENV}.tfstate"
            cp "${OLD_STATE_DIR}/terraform.tfstate" "${NEW_STATE_DIR}/terraform.${STAGING_SLOT}.${ENV}.tfstate"
          fi

      - name: Terraform Init
        env:
          TF_VAR_pve_api: ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user: ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass: ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
          TF_VAR_vault_token: ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_target_node: ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          TF_VAR_vmid: ${{ env.STAGING_VMID }}
          TF_VAR_ip_address: ${{ env.STAGING_IP }}
          TF_VAR_vm_hostname: ${{ env.STAGING_HOST }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/network-vm init -input=false

      - name: Pre-flight — destroy any stale staging VM
        env:
          TF_VAR_pve_api: ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user: ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass: ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
          TF_VAR_vault_token: ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_target_node: ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          TF_VAR_vmid: ${{ env.STAGING_VMID }}
          TF_VAR_ip_address: ${{ env.STAGING_IP }}
          TF_VAR_vm_hostname: ${{ env.STAGING_HOST }}
          PVE_API: ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/network-vm destroy \
            -no-color -input=false -auto-approve \
            -state=terraform.${STAGING_SLOT}.${ENV}.tfstate || true
          # Force-remove via Proxmox in case of state/reality mismatch
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
            "pct stop ${STAGING_VMID} 2>/dev/null || true; pct destroy ${STAGING_VMID} 2>/dev/null || true"
          # Always wipe the stale state file so terraform apply starts clean
          rm -f /app/infra-platform/terraform/network-vm/terraform.${STAGING_SLOT}.${ENV}.tfstate

      - name: Terraform Apply
        env:
          TF_VAR_pve_api: ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user: ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass: ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
          TF_VAR_vault_token: ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_target_node: ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          TF_VAR_vmid: ${{ env.STAGING_VMID }}
          TF_VAR_ip_address: ${{ env.STAGING_IP }}
          TF_VAR_vm_hostname: ${{ env.STAGING_HOST }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/network-vm apply \
            -no-color -input=false -auto-approve \
            -state=terraform.${STAGING_SLOT}.${ENV}.tfstate

  configure-tun-staging:
    needs: [resolve-slots, terraform-staging]
    runs-on: self-hosted
    env:
      STAGING_VMID: ${{ needs.resolve-slots.outputs.staging_vmid }}
      STAGING_IP: ${{ needs.resolve-slots.outputs.staging_ip }}
    steps:
      - name: Configure TUN device via SSH to Proxmox host
        env:
          PVE_API: ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} bash -s -- "${STAGING_VMID}" << 'SSHEOF'
            VMID="$1"
            grep -q 'lxc.cgroup2.devices.allow: c 10:200 rwm' /etc/pve/lxc/${VMID}.conf \
              || echo 'lxc.cgroup2.devices.allow: c 10:200 rwm' >> /etc/pve/lxc/${VMID}.conf
            grep -q 'lxc.mount.entry.*tun' /etc/pve/lxc/${VMID}.conf \
              || echo 'lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file' >> /etc/pve/lxc/${VMID}.conf
            grep -q 'lxc.sysctl.net.ipv4.ip_unprivileged_port_start' /etc/pve/lxc/${VMID}.conf \
              || echo 'lxc.sysctl.net.ipv4.ip_unprivileged_port_start = 0' >> /etc/pve/lxc/${VMID}.conf
            pct reboot ${VMID}
          SSHEOF
          echo "TUN configured, waiting for reboot..."
          sleep 15

      - name: Wait for SSH to be ready
        run: |
          echo "Waiting for SSH on ${STAGING_IP}..."
          timeout 120 bash -c "until nc -z ${STAGING_IP} 22; do sleep 5; done"
          echo "SSH is up"

  ansible-staging:
    needs: [resolve-slots, configure-tun-staging]
    runs-on: self-hosted
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      ENV: ${{ needs.resolve-slots.outputs.environment }}
      STAGING_IP: ${{ needs.resolve-slots.outputs.staging_ip }}
      STAGING_HOST: ${{ needs.resolve-slots.outputs.staging_host }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to persistent clone
        run: |
          cd /app/infra-platform
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}

      - name: Pull latest traefik-gitops (canonical Traefik config source)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -d /app/traefik-gitops/.git ]; then
            git -C /app/traefik-gitops pull --rebase origin main
          else
            gh repo clone TomasBFerreira/traefik-gitops /app/traefik-gitops
          fi

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml
          pip3 install hvac --quiet --break-system-packages

      - name: Fetch SSH key from Vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/network_vm_worker \
            | awk 'NF > 0' > /tmp/network_vm_key
          chmod 600 /tmp/network_vm_key

      - name: Fetch secrets from Vault
        run: |
          case "$ENV" in
            dev)
              VAULT_ADDR="${{ secrets.VAULT_ADDR }}"
              VAULT_TOKEN="${{ secrets.VAULT_TOKEN }}"
              ;;
            qa)
              VAULT_ADDR="${{ secrets.VAULT_QA_ADDR }}"
              VAULT_TOKEN="${{ secrets.VAULT_QA_TOKEN }}"
              ;;
            prod)
              VAULT_ADDR="${{ secrets.VAULT_PROD_ADDR }}"
              VAULT_TOKEN="${{ secrets.VAULT_PROD_TOKEN }}"
              ;;
          esac
          export VAULT_ADDR VAULT_TOKEN
          TS_AUTHKEY=$(vault kv get -field=authkey secret/tailscale)
          # WireGuard only enabled for prod — dev routes everything normally
          if [ "$ENV" = "prod" ]; then
            WG_PRIVATE_KEY=$(vault kv get -field=private_key secret/wireguard 2>/dev/null || echo "")
            WG_PEER_PUBLIC_KEY=$(vault kv get -field=peer_public_key secret/wireguard 2>/dev/null || echo "")
            WG_ENDPOINT=$(vault kv get -field=endpoint secret/wireguard 2>/dev/null || echo "")
            WG_ADDRESS=$(vault kv get -field=address secret/wireguard 2>/dev/null || echo "")
            WG_DNS=$(vault kv get -field=dns secret/wireguard 2>/dev/null || echo "")
          else
            WG_PRIVATE_KEY="" WG_PEER_PUBLIC_KEY="" WG_ENDPOINT="" WG_ADDRESS="" WG_DNS=""
          fi
          ADGUARD_USER=$(vault kv get -field=username secret/adguard 2>/dev/null || echo "")
          ADGUARD_PASS=$(vault kv get -field=password secret/adguard 2>/dev/null || echo "")
          # Prod tunnel token lives in env vault; dev/qa use the GH secret directly
          if [ "$ENV" = "prod" ]; then
            CF_TUNNEL_TOKEN=$(vault kv get -field=token secret/cloudflare-tunnel 2>/dev/null || echo "")
          else
            CF_TUNNEL_TOKEN="${{ secrets.CLOUDFLARE_DEV_TUNNEL_TOKEN }}"
          fi
          echo "::add-mask::$TS_AUTHKEY"
          echo "::add-mask::$WG_PRIVATE_KEY"
          echo "::add-mask::$WG_PEER_PUBLIC_KEY"
          echo "::add-mask::$ADGUARD_PASS"
          echo "::add-mask::$CF_TUNNEL_TOKEN"
          # Env tag: dev/qa/prod maps to tag:dev / tag:qa / tag:prod
          TS_TAGS="tag:container,tag:${ENV},tag:subnet-router"
          echo "TS_TAGS=$TS_TAGS" >> $GITHUB_ENV
          echo "TS_AUTHKEY=$TS_AUTHKEY" >> $GITHUB_ENV
          echo "WG_PRIVATE_KEY=$WG_PRIVATE_KEY" >> $GITHUB_ENV
          echo "WG_PEER_PUBLIC_KEY=$WG_PEER_PUBLIC_KEY" >> $GITHUB_ENV
          echo "WG_ENDPOINT=$WG_ENDPOINT" >> $GITHUB_ENV
          echo "WG_ADDRESS=$WG_ADDRESS" >> $GITHUB_ENV
          echo "WG_DNS=$WG_DNS" >> $GITHUB_ENV
          echo "ADGUARD_USER=$ADGUARD_USER" >> $GITHUB_ENV
          echo "ADGUARD_PASS=$ADGUARD_PASS" >> $GITHUB_ENV
          echo "CF_TUNNEL_TOKEN=$CF_TUNNEL_TOKEN" >> $GITHUB_ENV

      - name: Run Ansible playbook
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          # Clear stale known_hosts entry — VM was rebuilt so host key changed
          ssh-keygen -R "${STAGING_IP}" || true
          ansible-playbook \
            -i "${STAGING_IP}," \
            -v \
            -e "ansible_host=${STAGING_IP}" \
            -e "ansible_user=root" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no -i /tmp/network_vm_key'" \
            -e "tailscale_hostname=${ENV}-${STAGING_HOST}" \
            -e "tailscale_authkey=$TS_AUTHKEY" \
            -e "tailscale_advertise_tags=$TS_TAGS" \
            -e "wg_private_key=$WG_PRIVATE_KEY" \
            -e "wg_peer_public_key=$WG_PEER_PUBLIC_KEY" \
            -e "wg_endpoint=$WG_ENDPOINT" \
            -e "wg_address=$WG_ADDRESS" \
            -e "wg_dns=$WG_DNS" \
            -e "adguard_username=$ADGUARD_USER" \
            -e "adguard_password=$ADGUARD_PASS" \
            -e "cloudflare_tunnel_token=$CF_TUNNEL_TOKEN" \
            ansible/network-vm/network-vm_setup.yml

  flip-active:
    needs: [resolve-slots, ansible-staging]
    runs-on: self-hosted
    steps:
      - name: Write new active slot to Vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ENV="${{ needs.resolve-slots.outputs.environment }}"
          vault kv put secret/network-vm/$ENV/active-slot \
            slot="${{ needs.resolve-slots.outputs.staging_slot }}" \
            vmid="${{ needs.resolve-slots.outputs.staging_vmid }}" \
            ip="${{ needs.resolve-slots.outputs.staging_ip }}"

  teardown-old-active:
    needs: [resolve-slots, flip-active]
    if: needs.resolve-slots.outputs.first_run == 'false' && needs.flip-active.result == 'success'
    runs-on: self-hosted
    env:
      ENV: ${{ needs.resolve-slots.outputs.environment }}
      ACTIVE_SLOT: ${{ needs.resolve-slots.outputs.active_slot }}
      ACTIVE_VMID: ${{ needs.resolve-slots.outputs.active_vmid }}
      ACTIVE_IP: ${{ needs.resolve-slots.outputs.active_ip }}
      ACTIVE_HOST: ${{ needs.resolve-slots.outputs.active_host }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to persistent clone
        run: |
          cd /app/infra-platform
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}

      - name: Tailscale logout on old active VM
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/network_vm_worker \
            | awk 'NF > 0' > /tmp/network_vm_key
          chmod 600 /tmp/network_vm_key
          ssh -o StrictHostKeyChecking=no -i /tmp/network_vm_key \
            ${SSH_USER}@${ACTIVE_IP} "tailscale logout || true" || true

      - name: Terraform Init
        env:
          TF_VAR_pve_api: ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user: ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass: ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
          TF_VAR_vault_token: ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_target_node: ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          TF_VAR_vmid: ${{ env.ACTIVE_VMID }}
          TF_VAR_ip_address: ${{ env.ACTIVE_IP }}
          TF_VAR_vm_hostname: ${{ env.ACTIVE_HOST }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/network-vm init -input=false

      - name: Terraform Destroy old active VM
        env:
          TF_VAR_pve_api: ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user: ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass: ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
          TF_VAR_vault_token: ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_target_node: ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          TF_VAR_vmid: ${{ env.ACTIVE_VMID }}
          TF_VAR_ip_address: ${{ env.ACTIVE_IP }}
          TF_VAR_vm_hostname: ${{ env.ACTIVE_HOST }}
          PVE_API: ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/network-vm destroy \
            -no-color -input=false -auto-approve \
            -state=terraform.${ACTIVE_SLOT}.${ENV}.tfstate || true
          # Force-remove via Proxmox in case of state/reality mismatch
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
            "pct stop ${ACTIVE_VMID} 2>/dev/null || true; pct destroy ${ACTIVE_VMID} 2>/dev/null || true"

  cleanup-on-failure:
    needs: [resolve-slots, terraform-staging, configure-tun-staging, ansible-staging]
    if: failure()
    runs-on: self-hosted
    env:
      ENV: ${{ needs.resolve-slots.outputs.environment }}
      STAGING_SLOT: ${{ needs.resolve-slots.outputs.staging_slot }}
      STAGING_VMID: ${{ needs.resolve-slots.outputs.staging_vmid }}
      STAGING_IP: ${{ needs.resolve-slots.outputs.staging_ip }}
      STAGING_HOST: ${{ needs.resolve-slots.outputs.staging_host }}
    steps:
      - name: Collect failure logs from CT
        env:
          PVE_API:  ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          LOG_DIR="/app/infra-platform/logs/network-vm-failures"
          mkdir -p "$LOG_DIR"
          LOG_FILE="$LOG_DIR/network-vm-${ENV}-$(date -u +%Y%m%dT%H%M%SZ)-run${{ github.run_id }}.log"
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          {
            echo "=== network-vm failure log: run ${{ github.run_id }}, env=${ENV}, vmid=${STAGING_VMID} ==="
            echo "=== $(date -u) ==="
            echo "--- system journal (last 100 lines) ---"
            ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
              "pct exec ${STAGING_VMID} -- journalctl -n 100 --no-pager 2>/dev/null || echo '(journal unavailable)'" 2>/dev/null || echo "(pct exec failed)"
          } | tee "$LOG_FILE" || true
          echo "Failure log saved to $LOG_FILE"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to persistent clone
        run: |
          cd /app/infra-platform
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}

      - name: Terraform Init
        env:
          TF_VAR_pve_api: ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user: ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass: ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
          TF_VAR_vault_token: ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_target_node: ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          TF_VAR_vmid: ${{ env.STAGING_VMID }}
          TF_VAR_ip_address: ${{ env.STAGING_IP }}
          TF_VAR_vm_hostname: ${{ env.STAGING_HOST }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/network-vm init -input=false

      - name: Terraform Destroy staging VM
        env:
          TF_VAR_pve_api: ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user: ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass: ${{ secrets.PVE_PASS }}
          TF_VAR_ssh_user: ${{ secrets.SSH_USER }}
          TF_VAR_vault_token: ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_target_node: ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          TF_VAR_vmid: ${{ env.STAGING_VMID }}
          TF_VAR_ip_address: ${{ env.STAGING_IP }}
          TF_VAR_vm_hostname: ${{ env.STAGING_HOST }}
          PVE_API: ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/network-vm destroy \
            -no-color -input=false -auto-approve \
            -state=terraform.${STAGING_SLOT}.${ENV}.tfstate || true
          # Force-remove via Proxmox and wipe stale state
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
            "pct stop ${STAGING_VMID} 2>/dev/null || true; pct destroy ${STAGING_VMID} 2>/dev/null || true"
          rm -f /app/infra-platform/terraform/network-vm/terraform.${STAGING_SLOT}.${ENV}.tfstate
