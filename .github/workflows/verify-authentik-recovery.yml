name: Verify Authentik recovery + SMTP (dev)

# One-off verification for the self-service-accounts work: confirms, against the
# LIVE Authentik on the active slot, that (1) the recovery flow is bound to the
# brand (login shows "Forgot password?"), (2) the default-recovery-flow exists,
# and (3) SMTP (Brevo) is wired into Authentik's .env. Runs on the dev runner
# because the Authentik CT + auth-dev are only reachable on the dev network.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, prod]

jobs:
  verify:
    runs-on: [self-hosted, "${{ inputs.environment }}"]
    env:
      ENVIRONMENT: ${{ inputs.environment }}
      VAULT_BOOTSTRAP_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_DEV_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
    steps:
      - name: Resolve env vault creds
        run: |
          case "$ENVIRONMENT" in
            dev)  echo "ENVVAULT_ADDR=${{ secrets.VAULT_ADDR }}"   >> "$GITHUB_ENV"; echo "ENVVAULT_TOKEN=${{ secrets.VAULT_TOKEN }}" >> "$GITHUB_ENV" ;;
            qa)   echo "ENVVAULT_ADDR=${{ secrets.VAULT_QA_ADDR }}" >> "$GITHUB_ENV"; echo "ENVVAULT_TOKEN=${{ secrets.VAULT_QA_TOKEN }}" >> "$GITHUB_ENV" ;;
            prod) echo "ENVVAULT_ADDR=${{ secrets.VAULT_PROD_ADDR }}" >> "$GITHUB_ENV"; echo "ENVVAULT_TOKEN=${{ secrets.VAULT_PROD_TOKEN }}" >> "$GITHUB_ENV" ;;
          esac

      - name: Resolve active SSO IP + bootstrap token
        run: |
          IP=$(VAULT_ADDR="$VAULT_BOOTSTRAP_ADDR" VAULT_TOKEN="$VAULT_DEV_TOKEN" \
               vault kv get -field=ip secret/sso/$ENVIRONMENT/active-slot)
          TOK=$(VAULT_ADDR="$ENVVAULT_ADDR" VAULT_TOKEN="$ENVVAULT_TOKEN" \
               vault kv get -field=bootstrap_token secret/sso)
          echo "::add-mask::$TOK"
          echo "SSO_IP=$IP" >> "$GITHUB_ENV"
          echo "AK_TOKEN=$TOK" >> "$GITHUB_ENV"
          echo "Active SSO slot IP: $IP"

      - name: Check recovery flow exists
        run: |
          R=$(curl -s "http://$SSO_IP:9000/api/v3/flows/instances/?slug=default-recovery-flow" \
                -H "Authorization: Bearer $AK_TOKEN")
          COUNT=$(echo "$R" | python3 -c "import sys,json;print(json.load(sys.stdin).get('pagination',{}).get('count','?'))" 2>/dev/null || echo "?")
          echo "default-recovery-flow count: $COUNT"
          [ "$COUNT" = "1" ] || { echo "::error::recovery flow not found"; exit 1; }

      - name: Check recovery flow is BOUND to the brand
        run: |
          R=$(curl -s "http://$SSO_IP:9000/api/v3/core/brands/" -H "Authorization: Bearer $AK_TOKEN")
          FR=$(echo "$R" | python3 -c "import sys,json;d=json.load(sys.stdin)['results'][0];print(d.get('flow_recovery') or 'NULL')")
          echo "brand.flow_recovery = $FR"
          [ "$FR" != "NULL" ] || { echo "::error::recovery flow NOT bound to brand — 'Forgot password?' will not appear"; exit 1; }
          echo "✅ Recovery flow bound → login page shows 'Forgot password?'"

      - name: Check SMTP (Brevo) wired into Authentik .env
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/sso_worker | awk 'NF>0' > /tmp/sso_key
          chmod 600 /tmp/sso_key
          HOST=$(ssh -i /tmp/sso_key -o StrictHostKeyChecking=no root@"$SSO_IP" \
                 "grep -E '^AUTHENTIK_EMAIL__HOST=' /opt/authentik/.env | cut -d= -f2-")
          FROM=$(ssh -i /tmp/sso_key -o StrictHostKeyChecking=no root@"$SSO_IP" \
                 "grep -E '^AUTHENTIK_EMAIL__FROM=' /opt/authentik/.env | cut -d= -f2-")
          rm -f /tmp/sso_key
          echo "AUTHENTIK_EMAIL__HOST=$HOST"
          echo "AUTHENTIK_EMAIL__FROM=$FROM"
          [ -n "$HOST" ] || { echo "::error::SMTP host empty — Authentik can't send recovery email"; exit 1; }
          echo "✅ SMTP wired ($HOST, from $FROM)"

      - name: Summary
        run: echo "::notice::Authentik recovery verified on $ENVIRONMENT ($SSO_IP): recovery flow exists + bound to brand + SMTP wired. 'Forgot password?' is live and will send via Brevo."
