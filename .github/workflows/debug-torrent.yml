name: Debug Torrent CT

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options: [dev, qa, prod]
      apply_fix:
        description: 'Apply a fix step (none=diag only, 1=raise limits, 2=recheck, 3=delete-dead, 4=savepath+move)'
        required: false
        default: 'none'
        type: choice
        options: ['none','1','2','3','4']

jobs:
  debug:
    runs-on: [self-hosted, "${{ github.event.inputs.environment || 'prod' }}"]
    steps:
      - name: Resolve active torrent slot
        id: slots
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ENV="${{ github.event.inputs.environment || 'prod' }}"
          ACTIVE_SLOT=$(vault kv get -field=slot  secret/torrent/$ENV/active-slot 2>/dev/null || echo "none")
          ACTIVE_IP=$(vault kv get   -field=ip     secret/torrent/$ENV/active-slot 2>/dev/null || echo "")
          echo "slot=$ACTIVE_SLOT" >> $GITHUB_OUTPUT
          echo "ip=$ACTIVE_IP"    >> $GITHUB_OUTPUT
          echo "Active slot: $ACTIVE_SLOT  IP: $ACTIVE_IP"

      - name: Fetch SSH key
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/torrent_worker \
            | awk 'NF > 0' > /tmp/torrent_debug_key
          chmod 600 /tmp/torrent_debug_key

      - name: Diagnose torrent CT
        run: |
          IP="${{ steps.slots.outputs.ip }}"
          if [ -z "$IP" ]; then
            echo "ERROR: could not resolve torrent CT IP"
            exit 1
          fi
          echo "=== Diagnosing torrent CT at $IP ==="
          ssh -i /tmp/torrent_debug_key -o StrictHostKeyChecking=no root@"$IP" bash <<'REMOTE'
          echo "--- Docker containers ---"
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
          echo ""
          echo "--- qBittorrent logs (last 30 lines) ---"
          docker logs qbittorrent --tail 30 2>&1 || echo "(no qbittorrent container)"
          echo ""
          echo "--- WireGuard status ---"
          systemctl status wg-quick@wg0 --no-pager -l 2>&1 | head -20 || echo "(wg-quick@wg0 not found)"
          wg show 2>&1 || echo "(wg not available)"
          echo ""
          echo "--- Routing tables ---"
          ip route show
          ip route show table 200 2>/dev/null || true
          echo "--- ip rule ---"
          ip rule show
          echo ""
          echo "--- Port 8080 listening ---"
          ss -tlnp | grep 8080 || echo "(nothing on 8080)"
          echo ""
          echo "--- Disk space ---"
          df -h /mnt/media 2>/dev/null || df -h /
          REMOTE

      - name: Per-torrent state (tracker + peers + category)
        run: |
          IP="${{ steps.slots.outputs.ip }}"
          ssh -i /tmp/torrent_debug_key -o StrictHostKeyChecking=no root@"$IP" bash <<'REMOTE'
          set +e
          COOKIE=$(mktemp)
          curl -s -c "$COOKIE" -d "username=admin&password=adminadmin" \
            http://127.0.0.1:8080/api/v2/auth/login > /dev/null

          echo "=== Per-torrent summary ==="
          curl -s -b "$COOKIE" "http://127.0.0.1:8080/api/v2/torrents/info?filter=all" > /tmp/torrents.json
          cat > /tmp/print_torrents.py <<'PY'
          import json
          t=json.load(open('/tmp/torrents.json'))
          print("total torrents:", len(t))
          for x in t:
              hsh=x.get('hash','')[:12]
              name=x.get('name','')[:90]
              cat=x.get('category','')
              st=x.get('state','')
              prog=x.get('progress',0)*100
              seeds=x.get('num_seeds',0); leech=x.get('num_leechs',0)
              dl=x.get('dlspeed',0)
              trk=x.get('tracker','')[:50] or '(none)'
              print(f"  {hsh} [{cat:10s}] {st:14s} {prog:5.1f}%  seeds={seeds} peers={leech} dl={dl}B/s  trk={trk}  {name}")
          PY
          # Strip leading 10 spaces (YAML indent) then run
          sed 's/^          //' /tmp/print_torrents.py > /tmp/pt.py
          python3 /tmp/pt.py

          echo ""
          echo "=== Tracker detail for each 'radarr' category torrent ==="
          cat > /tmp/print_trackers.py <<'PY'
          import json, sys, subprocess, os
          t=json.load(open('/tmp/torrents.json'))
          status_map={0:'DISABLED',1:'NOT_CONTACTED',2:'WORKING',3:'UPDATING',4:'NOT_WORKING'}
          for x in t:
              if x.get('category') != 'radarr':
                  continue
              h = x.get('hash','')
              print(f"\n-- {x.get('name','')[:80]}  (hash={h[:12]}, state={x.get('state')}) --")
              trks_raw = subprocess.run(
                  ['curl','-s','-b',os.environ['COOKIE'],
                   f'http://127.0.0.1:8080/api/v2/torrents/trackers?hash={h}'],
                  capture_output=True, text=True).stdout
              try:
                  trks = json.loads(trks_raw)
              except Exception as e:
                  print(f"  (trackers parse failed: {e})")
                  continue
              for tr in trks:
                  stat = tr.get('status',0)
                  print(f"  [{status_map.get(stat,stat):14s}] "
                        f"seeds={tr.get('num_seeds',0):3d} peers={tr.get('num_peers',0):3d} "
                        f"msg='{tr.get('msg','')[:50]}'  url={tr.get('url','')[:80]}")
          PY
          sed 's/^          //' /tmp/print_trackers.py > /tmp/ptrk.py
          COOKIE="$COOKIE" python3 /tmp/ptrk.py

          echo ""
          echo "=== qBT preferences (key fields) ==="
          curl -s -b "$COOKIE" http://127.0.0.1:8080/api/v2/app/preferences > /tmp/prefs.json
          cat > /tmp/print_prefs.py <<'PY'
          import json
          d=json.load(open('/tmp/prefs.json'))
          keys=['current_network_interface','current_interface_address','listen_port','save_path',
                'temp_path','web_ui_address','max_active_downloads','max_active_torrents',
                'queueing_enabled','dont_count_slow_torrents','slow_torrent_dl_rate_threshold',
                'dht','pex','lsd','anonymous_mode','encryption']
          for k in keys:
              print(f"  {k} = {d.get(k)}")
          PY
          sed 's/^          //' /tmp/print_prefs.py > /tmp/pp.py && python3 /tmp/pp.py

          echo ""
          echo "=== Categories ==="
          curl -s -b "$COOKIE" http://127.0.0.1:8080/api/v2/torrents/categories | python3 -m json.tool 2>&1

          echo ""
          echo "=== External IP via wg0 vs default ==="
          echo -n "via wg0 : "; timeout 8 curl -s --interface wg0 https://api.ipify.org 2>&1; echo
          echo -n "default : "; timeout 8 curl -s https://api.ipify.org 2>&1; echo

          rm -f "$COOKIE" /tmp/torrents.json /tmp/prefs.json /tmp/p*.py
          REMOTE

      - name: Check vault qBittorrent credentials + media-stack side
        env:
          BOOT_VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          BOOT_VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
          PROD_VAULT_ADDR:  ${{ secrets.VAULT_PROD_ADDR }}
          PROD_VAULT_TOKEN: ${{ secrets.VAULT_PROD_TOKEN }}
        run: |
          ENV="${{ github.event.inputs.environment || 'prod' }}"
          if [ "$ENV" = "prod" ]; then
            export VAULT_ADDR="$PROD_VAULT_ADDR"; export VAULT_TOKEN="$PROD_VAULT_TOKEN"
          else
            export VAULT_ADDR="${{ secrets.VAULT_ADDR }}"; export VAULT_TOKEN="${{ secrets.VAULT_TOKEN }}"
          fi

          echo "=== J. Vault secret/qbittorrent ==="
          QB_USER=$(vault kv get -field=username secret/qbittorrent 2>/dev/null || echo "(missing)")
          QB_PASS=$(vault kv get -field=password secret/qbittorrent 2>/dev/null || echo "(missing)")
          echo "username: $QB_USER"
          echo "password: $(echo -n "$QB_PASS" | head -c 2)***${#QB_PASS}chars"

          echo ""
          echo "=== K. Test vault creds against actual qBittorrent ==="
          IP="${{ steps.slots.outputs.ip }}"
          CODE=$(curl -s -o /tmp/login-body -w '%{http_code}' --max-time 5 \
            -d "username=${QB_USER}&password=${QB_PASS}" \
            "http://${IP}:8080/api/v2/auth/login" 2>&1)
          echo "Vault-creds login to qBT at ${IP}:8080 → HTTP $CODE, body: $(cat /tmp/login-body 2>/dev/null)"

          echo ""
          echo "=== L. Pull kubeconfig and inspect Sonarr/Radarr download clients ==="
          # Resolve worker node IP (prod)
          export VAULT_ADDR="$BOOT_VAULT_ADDR"; export VAULT_TOKEN="$BOOT_VAULT_TOKEN"
          WORKER_IP=$(vault kv get -field=ip secret/worker-node/$ENV/active-slot 2>/dev/null \
                      || vault kv get -field=ip secret/worker-node-gpu/$ENV/active-slot 2>/dev/null \
                      || echo "192.168.10.21")
          echo "Using worker IP: $WORKER_IP"
          vault kv get -field=private_key secret/ssh_keys/worker_node_worker \
            | awk 'NF > 0' > /tmp/worker_key
          chmod 600 /tmp/worker_key
          ssh -i /tmp/worker_key -o StrictHostKeyChecking=no root@"$WORKER_IP" \
            "cat /etc/rancher/k3s/k3s.yaml" | sed "s/127.0.0.1/${WORKER_IP}/g" > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          # Install kubectl if missing
          if ! command -v kubectl &>/dev/null; then
            curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/ 2>/dev/null || mv kubectl "$HOME/bin/" 2>/dev/null || { mkdir -p "$HOME/bin"; mv kubectl "$HOME/bin/"; export PATH="$HOME/bin:$PATH"; }
          fi

          echo ""
          echo "--- Pods in media-stack ---"
          kubectl get pods -n media-stack -o wide 2>&1 | head -20

          # Fetch API keys from streambox-secrets
          SONARR_KEY=$(kubectl -n streambox get secret streambox-secrets -o jsonpath='{.data.sonarr-api-key}' | base64 -d)
          RADARR_KEY=$(kubectl -n streambox get secret streambox-secrets -o jsonpath='{.data.radarr-api-key}' | base64 -d)
          echo "Sonarr key len: ${#SONARR_KEY}  Radarr key len: ${#RADARR_KEY}"

          # Exec into sonarr pod and query its own API
          SONARR_POD=$(kubectl get pod -n media-stack -l app=sonarr -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          RADARR_POD=$(kubectl get pod -n media-stack -l app=radarr -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          echo "Sonarr pod: $SONARR_POD  Radarr pod: $RADARR_POD"

          cat > /tmp/print_queue.py <<'PY'
          import json, sys
          d=json.load(sys.stdin)
          rec=d.get('records',d) if isinstance(d,dict) else d
          print(f"queue count: {len(rec)}")
          for q in rec:
              hsh=q.get('downloadId','')[:12]
              status=q.get('status','')
              trk=f"{q.get('trackedDownloadStatus','')}/{q.get('trackedDownloadState','')}"
              size=q.get('size',0)
              sl=q.get('sizeleft',0)
              err=q.get('errorMessage','')
              title=q.get('title','')[:70]
              print(f"  hash={hsh} status={status} tracked={trk} size={size} left={sl} err='{err}' title={title}")
              for sm in q.get('statusMessages',[]):
                  print(f"    msg: {sm.get('title','')}: {sm.get('messages',[])}")
          PY
          sed 's/^          //' /tmp/print_queue.py > /tmp/pq.py

          echo ""
          echo "--- Sonarr /api/v3/queue ---"
          kubectl exec -n media-stack "$SONARR_POD" -- \
            curl -s -H "X-Api-Key: $SONARR_KEY" "http://localhost:8989/api/v3/queue?pageSize=50&includeUnknownSeriesItems=true" \
            | python3 /tmp/pq.py 2>&1 | head -80

          echo ""
          echo "--- Radarr /api/v3/queue ---"
          kubectl exec -n media-stack "$RADARR_POD" -- \
            curl -s -H "X-Api-Key: $RADARR_KEY" "http://localhost:7878/api/v3/queue?pageSize=50&includeUnknownMovieItems=true" \
            | python3 /tmp/pq.py 2>&1 | head -80

          echo ""
          echo "--- Sonarr /api/v3/downloadclient ---"
          kubectl exec -n media-stack "$SONARR_POD" -- \
            curl -s -H "X-Api-Key: $SONARR_KEY" http://localhost:8989/api/v3/downloadclient \
            | python3 -c 'import json,sys;d=json.load(sys.stdin);
          for c in d:
              fs={f["name"]:f.get("value") for f in c.get("fields",[])}
              print(f"  {c[\"name\"]} impl={c[\"implementation\"]} enable={c[\"enable\"]} host={fs.get(\"host\")} port={fs.get(\"port\")} user={fs.get(\"username\")} pw={bool(fs.get(\"password\"))} cat={fs.get(\"movieCategory\") or fs.get(\"tvCategory\")}")' 2>&1 || echo "(sonarr dc query failed)"

          echo ""
          echo "--- Radarr /api/v3/downloadclient ---"
          kubectl exec -n media-stack "$RADARR_POD" -- \
            curl -s -H "X-Api-Key: $RADARR_KEY" http://localhost:7878/api/v3/downloadclient \
            | python3 -c 'import json,sys;d=json.load(sys.stdin);
          for c in d:
              fs={f["name"]:f.get("value") for f in c.get("fields",[])}
              print(f"  {c[\"name\"]} impl={c[\"implementation\"]} enable={c[\"enable\"]} host={fs.get(\"host\")} port={fs.get(\"port\")} user={fs.get(\"username\")} pw={bool(fs.get(\"password\"))} cat={fs.get(\"movieCategory\") or fs.get(\"tvCategory\")}")' 2>&1 || echo "(radarr dc query failed)"

          echo ""
          echo "--- Sonarr test download client (tries connecting to qBT) ---"
          DC_JSON=$(kubectl exec -n media-stack "$SONARR_POD" -- \
            curl -s -H "X-Api-Key: $SONARR_KEY" http://localhost:8989/api/v3/downloadclient)
          DC_ID=$(echo "$DC_JSON" | python3 -c 'import json,sys;d=json.load(sys.stdin);print(d[0]["id"]) if d else print("")')
          echo "Testing DC id=$DC_ID"
          TEST_BODY=$(echo "$DC_JSON" | python3 -c 'import json,sys;d=json.load(sys.stdin);print(json.dumps(d[0]))')
          kubectl exec -n media-stack "$SONARR_POD" -- \
            curl -s -X POST -H "X-Api-Key: $SONARR_KEY" -H "Content-Type: application/json" \
            --data "$TEST_BODY" \
            http://localhost:8989/api/v3/downloadclient/test 2>&1 | head -5

          echo ""
          echo "--- Radarr test download client ---"
          DC_JSON=$(kubectl exec -n media-stack "$RADARR_POD" -- \
            curl -s -H "X-Api-Key: $RADARR_KEY" http://localhost:7878/api/v3/downloadclient)
          TEST_BODY=$(echo "$DC_JSON" | python3 -c 'import json,sys;d=json.load(sys.stdin);print(json.dumps(d[0]) if d else "{}")')
          kubectl exec -n media-stack "$RADARR_POD" -- \
            curl -s -X POST -H "X-Api-Key: $RADARR_KEY" -H "Content-Type: application/json" \
            --data "$TEST_BODY" \
            http://localhost:7878/api/v3/downloadclient/test 2>&1 | head -5

          echo ""
          echo "--- Sonarr recent log snippet (download/indexer errors) ---"
          kubectl exec -n media-stack "$SONARR_POD" -- \
            sh -c "ls -t /config/logs/sonarr.txt /config/logs/sonarr.*.txt 2>/dev/null | head -1 | xargs -r tail -n 200" 2>&1 \
            | grep -iE 'error|warn|fail|refused|qbittorrent|download' | tail -30

          echo ""
          echo "--- Radarr recent log snippet ---"
          kubectl exec -n media-stack "$RADARR_POD" -- \
            sh -c "ls -t /config/logs/radarr.txt /config/logs/radarr.*.txt 2>/dev/null | head -1 | xargs -r tail -n 200" 2>&1 \
            | grep -iE 'error|warn|fail|refused|qbittorrent|download' | tail -30

          rm -f /tmp/worker_key /tmp/kubeconfig /tmp/login-body

      - name: Restart WireGuard if peer has 0 bytes received
        run: |
          IP="${{ steps.slots.outputs.ip }}"
          echo "=== Restarting WireGuard on $IP ==="
          ssh -i /tmp/torrent_debug_key -o StrictHostKeyChecking=no root@"$IP" bash <<'REMOTE'
          RECEIVED=$(wg show wg0 transfer 2>/dev/null | awk '{print $1}' | head -1)
          if [ "$RECEIVED" = "0" ] || [ -z "$RECEIVED" ]; then
            echo "WireGuard peer has 0 bytes received — restarting wg-quick@wg0"
            systemctl restart wg-quick@wg0
            sleep 5
            echo "--- WireGuard status after restart ---"
            wg show 2>&1
          else
            echo "WireGuard receiving data ($RECEIVED bytes) — no restart needed"
          fi
          REMOTE

      - name: STEP 1 — raise qBT active-download limits
        if: github.event.inputs.apply_fix == '1'
        run: |
          IP="${{ steps.slots.outputs.ip }}"
          ssh -i /tmp/torrent_debug_key -o StrictHostKeyChecking=no root@"$IP" bash <<'REMOTE'
          set +e
          COOKIE=$(mktemp)
          curl -s -c "$COOKIE" -d "username=admin&password=adminadmin" \
            http://127.0.0.1:8080/api/v2/auth/login > /dev/null

          echo "--- BEFORE ---"
          cat > /tmp/pp.py <<'PY'
          import json, sys
          d=json.load(sys.stdin)
          for k in ['max_active_downloads','max_active_torrents','max_active_uploads','queueing_enabled','dont_count_slow_torrents']:
              print(f"  {k} = {d.get(k)}")
          PY
          sed -i 's/^          //' /tmp/pp.py
          curl -s -b "$COOKIE" http://127.0.0.1:8080/api/v2/app/preferences | python3 /tmp/pp.py

          NEW='{"max_active_downloads":10,"max_active_torrents":20,"max_active_uploads":10,"dont_count_slow_torrents":true}'
          HTTP=$(curl -s -o /tmp/r -w '%{http_code}' -b "$COOKIE" \
            --data-urlencode "json=$NEW" \
            http://127.0.0.1:8080/api/v2/app/setPreferences)
          echo "setPreferences → HTTP $HTTP"

          echo "--- AFTER ---"
          curl -s -b "$COOKIE" http://127.0.0.1:8080/api/v2/app/preferences | python3 /tmp/pp.py

          echo ""
          echo "--- Torrent states after 5s ---"
          sleep 5
          curl -s -b "$COOKIE" 'http://127.0.0.1:8080/api/v2/torrents/info?filter=all' > /tmp/t.json
          cat > /tmp/pt.py <<'PY'
          import json
          t=json.load(open('/tmp/t.json'))
          for x in t:
              print(f"  [{x.get('category','')[:10]:10s}] {x.get('state',''):14s} {x.get('progress',0)*100:5.1f}%  peers={x.get('num_leechs',0)}/{x.get('num_seeds',0)}  {x.get('name','')[:80]}")
          PY
          sed -i 's/^          //' /tmp/pt.py
          python3 /tmp/pt.py
          rm -f "$COOKIE" /tmp/r /tmp/t.json /tmp/pp.py /tmp/pt.py
          REMOTE

      - name: STEP 2 — force-recheck/reannounce stuck torrents
        if: github.event.inputs.apply_fix == '2'
        run: |
          IP="${{ steps.slots.outputs.ip }}"
          ssh -i /tmp/torrent_debug_key -o StrictHostKeyChecking=no root@"$IP" bash <<'REMOTE'
          set +e
          COOKIE=$(mktemp)
          curl -s -c "$COOKIE" -d "username=admin&password=adminadmin" \
            http://127.0.0.1:8080/api/v2/auth/login > /dev/null

          curl -s -b "$COOKIE" 'http://127.0.0.1:8080/api/v2/torrents/info?filter=all' > /tmp/t.json
          cat > /tmp/pick.py <<'PY'
          import json
          t=json.load(open('/tmp/t.json'))
          stuck=[x for x in t if x.get('state') in ('error','stalledDL') and x.get('category') in ('radarr','tv-sonarr')]
          for x in stuck: print(x['hash'])
          PY
          sed -i 's/^          //' /tmp/pick.py
          HLIST=$(python3 /tmp/pick.py | paste -sd '|' -)
          echo "Targets: $HLIST"
          if [ -z "$HLIST" ]; then echo "(nothing to recheck)"; exit 0; fi

          curl -s -b "$COOKIE" -d "hashes=$HLIST" http://127.0.0.1:8080/api/v2/torrents/resume > /dev/null
          curl -s -b "$COOKIE" -d "hashes=$HLIST" http://127.0.0.1:8080/api/v2/torrents/recheck > /dev/null
          curl -s -b "$COOKIE" -d "hashes=$HLIST" http://127.0.0.1:8080/api/v2/torrents/reannounce > /dev/null
          echo "issued resume + recheck + reannounce"

          echo ""
          echo "--- State after 15s ---"
          sleep 15
          curl -s -b "$COOKIE" 'http://127.0.0.1:8080/api/v2/torrents/info?filter=all' > /tmp/t.json
          cat > /tmp/show.py <<'PY'
          import json, os
          want=set(os.environ['HLIST'].split('|'))
          t=json.load(open('/tmp/t.json'))
          for x in t:
              if x['hash'] in want:
                  print(f"  {x.get('state',''):14s} {x.get('progress',0)*100:5.1f}%  peers={x.get('num_leechs',0)}/{x.get('num_seeds',0)}  dl={x.get('dlspeed',0)}B/s  {x.get('name','')[:80]}")
          PY
          sed -i 's/^          //' /tmp/show.py
          HLIST="$HLIST" python3 /tmp/show.py
          rm -f "$COOKIE" /tmp/t.json /tmp/pick.py /tmp/show.py
          REMOTE

      - name: STEP 3 — remove dead torrents (qBT + Sonarr/Radarr queue with blocklist)
        if: github.event.inputs.apply_fix == '3'
        env:
          BOOT_VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          BOOT_VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          IP="${{ steps.slots.outputs.ip }}"
          # Identify dead torrents via qBT
          ssh -i /tmp/torrent_debug_key -o StrictHostKeyChecking=no root@"$IP" bash > /tmp/dead.txt <<'REMOTE'
          COOKIE=$(mktemp)
          curl -s -c "$COOKIE" -d "username=admin&password=adminadmin" \
            http://127.0.0.1:8080/api/v2/auth/login > /dev/null
          curl -s -b "$COOKIE" 'http://127.0.0.1:8080/api/v2/torrents/info?filter=all' > /tmp/t.json
          cat > /tmp/pick.py <<'PY'
          import json
          t=json.load(open('/tmp/t.json'))
          for x in t:
              if x.get('category') not in ('radarr','tv-sonarr'): continue
              s=x.get('state','')
              peers=x.get('num_leechs',0); dl=x.get('dlspeed',0)
              if s=='error' or (s=='stalledDL' and peers==0 and dl<100):
                  print(x['hash']+'|'+x.get('category','')+'|'+x.get('name','')[:80])
          PY
          sed -i 's/^          //' /tmp/pick.py
          python3 /tmp/pick.py
          rm -f "$COOKIE" /tmp/t.json /tmp/pick.py
          REMOTE
          echo "--- Dead torrents identified ---"
          cat /tmp/dead.txt
          if [ ! -s /tmp/dead.txt ]; then echo "nothing dead to remove"; exit 0; fi

          # Setup kubectl
          export VAULT_ADDR="$BOOT_VAULT_ADDR"; export VAULT_TOKEN="$BOOT_VAULT_TOKEN"
          ENV="${{ github.event.inputs.environment || 'prod' }}"
          WORKER_IP=$(vault kv get -field=ip secret/worker-node/$ENV/active-slot 2>/dev/null || echo "192.168.10.21")
          vault kv get -field=private_key secret/ssh_keys/worker_node_worker | awk 'NF>0' > /tmp/wkey
          chmod 600 /tmp/wkey
          ssh -i /tmp/wkey -o StrictHostKeyChecking=no root@"$WORKER_IP" \
            "cat /etc/rancher/k3s/k3s.yaml" | sed "s/127.0.0.1/${WORKER_IP}/g" > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          if ! command -v kubectl &>/dev/null; then
            curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && mkdir -p "$HOME/bin" && mv kubectl "$HOME/bin/" && export PATH="$HOME/bin:$PATH"
          fi

          SONARR_POD=$(kubectl get pod -n media-stack -l app=sonarr -o jsonpath='{.items[0].metadata.name}')
          RADARR_POD=$(kubectl get pod -n media-stack -l app=radarr -o jsonpath='{.items[0].metadata.name}')
          SONARR_KEY=$(kubectl -n streambox get secret streambox-secrets -o jsonpath='{.data.sonarr-api-key}' | base64 -d)
          RADARR_KEY=$(kubectl -n streambox get secret streambox-secrets -o jsonpath='{.data.radarr-api-key}' | base64 -d)

          while IFS='|' read -r HASH CAT NAME; do
            [ -z "$HASH" ] && continue
            echo ""
            echo "== $CAT / $NAME (hash=$HASH) =="
            UHASH=$(echo "$HASH" | tr 'a-z' 'A-Z')
            if [ "$CAT" = "tv-sonarr" ]; then POD=$SONARR_POD; KEY=$SONARR_KEY; PORT=8989; APP=sonarr;
            else                               POD=$RADARR_POD; KEY=$RADARR_KEY; PORT=7878; APP=radarr;
            fi
            QID=$(kubectl exec -n media-stack "$POD" -- \
              curl -s -H "X-Api-Key: $KEY" "http://localhost:${PORT}/api/v3/queue?pageSize=200" \
              | UHASH="$UHASH" python3 -c "
          import json,sys,os
          d=json.load(sys.stdin); rec=d.get('records',d)
          ids=[str(q['id']) for q in rec if q.get('downloadId','').upper()==os.environ['UHASH']]
          print(','.join(sorted(set(ids))))")
            echo "  ${APP} queue ids: '$QID'"
            if [ -n "$QID" ]; then
              IFS=',' read -ra IDS <<< "$QID"
              for id in "${IDS[@]}"; do
                kubectl exec -n media-stack "$POD" -- \
                  curl -s -X DELETE -H "X-Api-Key: $KEY" \
                  "http://localhost:${PORT}/api/v3/queue/${id}?removeFromClient=true&blocklist=true&skipRedownload=false" \
                  > /dev/null && echo "  deleted ${APP} queue id $id (blocklisted)"
              done
            fi
            # Ensure removed from qBT (idempotent if Sonarr/Radarr already removed)
            ssh -i /tmp/torrent_debug_key -o StrictHostKeyChecking=no root@"$IP" \
              "curl -s -c /tmp/c -d 'username=admin&password=adminadmin' http://127.0.0.1:8080/api/v2/auth/login >/dev/null && curl -s -b /tmp/c -d 'hashes=$HASH&deleteFiles=true' http://127.0.0.1:8080/api/v2/torrents/delete > /dev/null && rm -f /tmp/c && echo '  confirmed deletion in qBT'"
          done < /tmp/dead.txt

          echo ""
          echo "--- Kicking Sonarr MissingEpisodeSearch + Radarr MissingMoviesSearch ---"
          kubectl exec -n media-stack "$SONARR_POD" -- \
            curl -s -X POST -H "X-Api-Key: $SONARR_KEY" -H "Content-Type: application/json" \
            --data '{"name":"MissingEpisodeSearch"}' \
            http://localhost:8989/api/v3/command | head -c 300; echo
          kubectl exec -n media-stack "$RADARR_POD" -- \
            curl -s -X POST -H "X-Api-Key: $RADARR_KEY" -H "Content-Type: application/json" \
            --data '{"name":"MissingMoviesSearch"}' \
            http://localhost:7878/api/v3/command | head -c 300; echo

          rm -f /tmp/wkey /tmp/kubeconfig /tmp/dead.txt

      - name: STEP 4 — fix qBT save_path + locate/relocate Narcos S03
        if: github.event.inputs.apply_fix == '4'
        run: |
          IP="${{ steps.slots.outputs.ip }}"
          ssh -i /tmp/torrent_debug_key -o StrictHostKeyChecking=no root@"$IP" bash <<'REMOTE'
          set +e
          COOKIE=$(mktemp)
          curl -s -c "$COOKIE" -d "username=admin&password=adminadmin" \
            http://127.0.0.1:8080/api/v2/auth/login > /dev/null

          echo "--- Before ---"
          curl -s -b "$COOKIE" http://127.0.0.1:8080/api/v2/app/preferences \
            | python3 -c "import json,sys;d=json.load(sys.stdin);print('save_path:',d.get('save_path'));print('temp_path:',d.get('temp_path'))"

          NEW='{"save_path":"/downloads","temp_path":""}'
          curl -s -b "$COOKIE" --data-urlencode "json=$NEW" \
            http://127.0.0.1:8080/api/v2/app/setPreferences > /dev/null
          echo "set save_path=/downloads"

          echo "--- After ---"
          curl -s -b "$COOKIE" http://127.0.0.1:8080/api/v2/app/preferences \
            | python3 -c "import json,sys;d=json.load(sys.stdin);print('save_path:',d.get('save_path'));print('temp_path:',d.get('temp_path'))"

          echo ""
          echo "--- Inside qBT container: /config/Downloads contents ---"
          docker exec qbittorrent sh -c 'ls -la /config/Downloads/ 2>/dev/null | head -30' || echo "(container probe failed)"

          echo ""
          echo "--- Host filesystem search for 'Narcos (2015) Season 3' ---"
          find /opt/torrent /var/lib/docker /mnt/media -maxdepth 7 -type d -name '*Narcos*Season 3*' 2>/dev/null | head -10

          # If the Narcos S03 folder is in qBT's container /config/Downloads (unmounted),
          # copy it out via docker cp and move into /mnt/media/downloads/tv-sonarr.
          FOLDER="/config/Downloads/Narcos (2015) Season 3 S03 (1080p BluRay x265 HEVC 10bit AAC 5.1 Vyndros)"
          if docker exec qbittorrent sh -c "[ -d \"$FOLDER\" ]" 2>/dev/null; then
            echo ""
            echo "--- Narcos S03 found in container at $FOLDER — copying to host NFS ---"
            DEST="/mnt/media/downloads/tv-sonarr/"
            mkdir -p "$DEST"
            # docker cp preserves perms; use the target so qBT's container id resolves
            TARGET_DIR="$DEST$(basename "$FOLDER")"
            if [ -d "$TARGET_DIR" ]; then
              echo "  (target already exists: $TARGET_DIR — leaving alone)"
            else
              docker cp "qbittorrent:$FOLDER" "$DEST" && echo "  copied to $TARGET_DIR"
              chown -R 1000:1000 "$TARGET_DIR" 2>/dev/null || true
            fi
            # Update the torrent's save_path via qBT so next import uses correct path
            # Look up hash of the Narcos S03 torrent
            HASH=$(curl -s -b "$COOKIE" 'http://127.0.0.1:8080/api/v2/torrents/info?filter=all' \
              | python3 -c "
          import json,sys
          t=json.load(sys.stdin)
          for x in t:
              if 'Narcos' in x.get('name','') and 'Season 3' in x.get('name',''):
                  print(x['hash']); break")
            if [ -n "$HASH" ]; then
              echo "  updating qBT torrent $HASH location → /downloads/tv-sonarr"
              curl -s -b "$COOKIE" -d "hashes=$HASH&location=/downloads/tv-sonarr" \
                http://127.0.0.1:8080/api/v2/torrents/setLocation > /dev/null
            fi
          else
            echo "  (Narcos S03 NOT in container /config/Downloads — may already be in /downloads)"
          fi

          rm -f "$COOKIE"
          REMOTE

          # After the copy, ask Sonarr to rescan DownloadedEpisodes
          # (uses KUBECONFIG set up in step 3 chain — re-fetch for this step)
          VAULT_ADDR="${{ secrets.VAULT_BOOTSTRAP_ADDR }}" \
          VAULT_TOKEN="${{ secrets.VAULT_DEV_TOKEN }}" \
          vault kv get -field=private_key secret/ssh_keys/worker_node_worker | awk 'NF>0' > /tmp/wkey2
          chmod 600 /tmp/wkey2
          ENV="${{ github.event.inputs.environment || 'prod' }}"
          VAULT_ADDR="${{ secrets.VAULT_BOOTSTRAP_ADDR }}" \
          VAULT_TOKEN="${{ secrets.VAULT_DEV_TOKEN }}" \
          WORKER_IP=$(vault kv get -field=ip secret/worker-node/$ENV/active-slot 2>/dev/null || echo "192.168.10.21")
          ssh -i /tmp/wkey2 -o StrictHostKeyChecking=no root@"$WORKER_IP" \
            "cat /etc/rancher/k3s/k3s.yaml" | sed "s/127.0.0.1/${WORKER_IP}/g" > /tmp/kc2
          chmod 600 /tmp/kc2
          if ! command -v kubectl &>/dev/null; then
            curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && mkdir -p "$HOME/bin" && mv kubectl "$HOME/bin/" && export PATH="$HOME/bin:$PATH"
          fi
          KUBECONFIG=/tmp/kc2 kubectl exec -n media-stack \
            "$(KUBECONFIG=/tmp/kc2 kubectl get pod -n media-stack -l app=sonarr -o jsonpath='{.items[0].metadata.name}')" -- \
            curl -s -X POST -H "X-Api-Key: $(KUBECONFIG=/tmp/kc2 kubectl -n streambox get secret streambox-secrets -o jsonpath='{.data.sonarr-api-key}' | base64 -d)" \
            -H "Content-Type: application/json" \
            --data '{"name":"DownloadedEpisodesScan","path":"/downloads/tv-sonarr/Narcos (2015) Season 3 S03 (1080p BluRay x265 HEVC 10bit AAC 5.1 Vyndros)","importMode":"Move"}' \
            http://localhost:8989/api/v3/command | head -c 500; echo
          rm -f /tmp/wkey2 /tmp/kc2

      - name: Disk audit (run always)
        run: |
          IP="${{ steps.slots.outputs.ip }}"
          ssh -i /tmp/torrent_debug_key -o StrictHostKeyChecking=no root@"$IP" bash <<'REMOTE'
          echo "=== CT filesystems ==="
          df -h | head -10
          echo ""
          echo "=== /opt/qbittorrent breakdown ==="
          ls -la /opt/qbittorrent/ | head -30
          echo ""
          du -x -sh /opt/qbittorrent/* 2>&1 | sort -h | tail -20
          echo ""
          echo "=== /opt/qbittorrent/Downloads (if present) ==="
          if [ -d /opt/qbittorrent/Downloads ]; then
            ls -la /opt/qbittorrent/Downloads/ | head -30
            du -x -sh /opt/qbittorrent/Downloads/*/ 2>&1 | sort -h | tail -20
          fi
          echo ""
          echo "=== NFS target /mnt/media ==="
          df -h /mnt/media
          REMOTE

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/torrent_debug_key
