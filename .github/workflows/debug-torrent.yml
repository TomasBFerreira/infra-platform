name: Debug Torrent CT

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options: [dev, qa, prod]

jobs:
  debug:
    runs-on: [self-hosted, "${{ github.event.inputs.environment || 'prod' }}"]
    steps:
      - name: Resolve active torrent slot
        id: slots
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ENV="${{ github.event.inputs.environment || 'prod' }}"
          ACTIVE_SLOT=$(vault kv get -field=slot  secret/torrent/$ENV/active-slot 2>/dev/null || echo "none")
          ACTIVE_IP=$(vault kv get   -field=ip     secret/torrent/$ENV/active-slot 2>/dev/null || echo "")
          echo "slot=$ACTIVE_SLOT" >> $GITHUB_OUTPUT
          echo "ip=$ACTIVE_IP"    >> $GITHUB_OUTPUT
          echo "Active slot: $ACTIVE_SLOT  IP: $ACTIVE_IP"

      - name: Fetch SSH key
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/torrent_worker \
            | awk 'NF > 0' > /tmp/torrent_debug_key
          chmod 600 /tmp/torrent_debug_key

      - name: Diagnose torrent CT
        run: |
          IP="${{ steps.slots.outputs.ip }}"
          if [ -z "$IP" ]; then
            echo "ERROR: could not resolve torrent CT IP"
            exit 1
          fi
          echo "=== Diagnosing torrent CT at $IP ==="
          ssh -i /tmp/torrent_debug_key -o StrictHostKeyChecking=no root@"$IP" bash <<'REMOTE'
          echo "--- Docker containers ---"
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
          echo ""
          echo "--- qBittorrent logs (last 30 lines) ---"
          docker logs qbittorrent --tail 30 2>&1 || echo "(no qbittorrent container)"
          echo ""
          echo "--- WireGuard status ---"
          systemctl status wg-quick@wg0 --no-pager -l 2>&1 | head -20 || echo "(wg-quick@wg0 not found)"
          wg show 2>&1 || echo "(wg not available)"
          echo ""
          echo "--- Routing tables ---"
          ip route show
          ip route show table 200 2>/dev/null || true
          echo "--- ip rule ---"
          ip rule show
          echo ""
          echo "--- Port 8080 listening ---"
          ss -tlnp | grep 8080 || echo "(nothing on 8080)"
          echo ""
          echo "--- Disk space ---"
          df -h /mnt/media 2>/dev/null || df -h /
          REMOTE

      - name: Deep qBittorrent diagnostic
        run: |
          IP="${{ steps.slots.outputs.ip }}"
          ssh -i /tmp/torrent_debug_key -o StrictHostKeyChecking=no root@"$IP" bash <<'REMOTE'
          set +e
          echo "=== A. qBittorrent config persistence ==="
          find /opt/torrent -name 'qBittorrent.conf' 2>/dev/null | head -5
          CONFFILE=$(find /opt/torrent -name 'qBittorrent.conf' 2>/dev/null | head -1)
          if [ -n "$CONFFILE" ]; then
            echo "--- $CONFFILE (relevant keys) ---"
            grep -iE 'webui|interface|listenport|savepath|tempath|enabled|bypass|auth' "$CONFFILE" | head -40
          else
            echo "(no qBittorrent.conf found)"
          fi
          echo ""

          echo "=== B. qBittorrent API login attempts ==="
          COOKIE=$(mktemp)
          for PW in "adminadmin" "" "admin"; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' -c "$COOKIE" \
              -d "username=admin&password=$PW" \
              http://127.0.0.1:8080/api/v2/auth/login)
            echo "login(admin/'$PW') → $CODE"
            if [ "$CODE" = "200" ]; then
              BODY=$(curl -s -b "$COOKIE" http://127.0.0.1:8080/api/v2/auth/login -d "username=admin&password=$PW")
              echo "  body: $BODY"
              if [ "$BODY" = "Ok." ]; then
                echo "  ✓ authenticated with password=[$([ -z "$PW" ] && echo EMPTY || echo SET)]"
                break
              fi
            fi
          done

          echo ""
          echo "--- Preferences (relevant keys) ---"
          curl -s -b "$COOKIE" http://127.0.0.1:8080/api/v2/app/preferences > /tmp/prefs.json
          python3 - <<'PY'
          import json
          try:
              d=json.load(open('/tmp/prefs.json'))
          except Exception as e:
              print("(failed to parse prefs:", e, ")"); raise SystemExit
          keys=["current_network_interface","current_interface_address","listen_port","save_path","temp_path",
                "bypass_auth_subnet_whitelist_enabled","bypass_auth_subnet_whitelist",
                "web_ui_port","web_ui_username","web_ui_address"]
          print(json.dumps({k:d.get(k) for k in keys}, indent=2))
          PY

          echo ""
          echo "=== C. Active torrents ==="
          curl -s -b "$COOKIE" "http://127.0.0.1:8080/api/v2/torrents/info?filter=all" > /tmp/torrents.json
          python3 - <<'PY'
          import json
          try:
              t=json.load(open('/tmp/torrents.json'))
          except Exception as e:
              print("(failed:", e, ")"); raise SystemExit
          print(f"Total torrents: {len(t)}")
          for x in t[:25]:
              print(f"  [{x.get('state',''):12s}] {x.get('progress',0)*100:5.1f}%  "
                    f"dl={x.get('dlspeed',0)}B/s  peers={x.get('num_leechs',0)}/{x.get('num_seeds',0)}  "
                    f"tracker_err={'Y' if x.get('tracker','').startswith('http') and x.get('num_seeds',0)==0 and x.get('state','')=='stalledDL' else '.'}  "
                    f"{x.get('name','')[:60]}")
          PY

          echo ""
          echo "=== D. Transfer info ==="
          curl -s -b "$COOKIE" http://127.0.0.1:8080/api/v2/transfer/info

          echo ""
          echo ""
          echo "=== E. External IP: WITH vs WITHOUT VPN (must differ) ==="
          echo -n "via wg0   : "; timeout 8 curl -sS --interface wg0 https://api.ipify.org 2>&1; echo ""
          echo -n "default   : "; timeout 8 curl -sS https://api.ipify.org 2>&1; echo ""

          echo ""
          echo "=== F. DNS resolution ==="
          getent hosts google.com 2>&1 | head -2
          getent hosts tracker.opentrackr.org 2>&1 | head -2

          echo ""
          echo "=== G. Recent qBittorrent logs (errors/warnings, last 2h) ==="
          docker logs qbittorrent --since 2h 2>&1 | grep -iE 'error|warn|fail|refused|denied|unreach' | tail -30 || echo "(no error lines)"

          echo ""
          echo "=== H. Port 8080 reachability from LAN perspective ==="
          ss -tln | grep 8080

          echo ""
          echo "=== I. Download directory state ==="
          for d in /downloads /opt/torrent/downloads /mnt/media/downloads; do
            if [ -d "$d" ]; then
              echo "-- $d --"; ls -la "$d" 2>&1 | head -10
              df -h "$d" 2>&1 | head -2
            fi
          done

          rm -f "$COOKIE" /tmp/prefs.json /tmp/torrents.json
          REMOTE

      - name: Check vault qBittorrent credentials + media-stack side
        env:
          BOOT_VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          BOOT_VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
          PROD_VAULT_ADDR:  ${{ secrets.VAULT_PROD_ADDR }}
          PROD_VAULT_TOKEN: ${{ secrets.VAULT_PROD_TOKEN }}
        run: |
          ENV="${{ github.event.inputs.environment || 'prod' }}"
          if [ "$ENV" = "prod" ]; then
            export VAULT_ADDR="$PROD_VAULT_ADDR"; export VAULT_TOKEN="$PROD_VAULT_TOKEN"
          else
            export VAULT_ADDR="${{ secrets.VAULT_ADDR }}"; export VAULT_TOKEN="${{ secrets.VAULT_TOKEN }}"
          fi

          echo "=== J. Vault secret/qbittorrent ==="
          QB_USER=$(vault kv get -field=username secret/qbittorrent 2>/dev/null || echo "(missing)")
          QB_PASS=$(vault kv get -field=password secret/qbittorrent 2>/dev/null || echo "(missing)")
          echo "username: $QB_USER"
          echo "password: $(echo -n "$QB_PASS" | head -c 2)***${#QB_PASS}chars"

          echo ""
          echo "=== K. Test vault creds against actual qBittorrent ==="
          IP="${{ steps.slots.outputs.ip }}"
          CODE=$(curl -s -o /tmp/login-body -w '%{http_code}' --max-time 5 \
            -d "username=${QB_USER}&password=${QB_PASS}" \
            "http://${IP}:8080/api/v2/auth/login" 2>&1)
          echo "Vault-creds login to qBT at ${IP}:8080 → HTTP $CODE, body: $(cat /tmp/login-body 2>/dev/null)"

          echo ""
          echo "=== L. Pull kubeconfig and inspect Sonarr/Radarr download clients ==="
          # Resolve worker node IP (prod)
          export VAULT_ADDR="$BOOT_VAULT_ADDR"; export VAULT_TOKEN="$BOOT_VAULT_TOKEN"
          WORKER_IP=$(vault kv get -field=ip secret/worker-node/$ENV/active-slot 2>/dev/null \
                      || vault kv get -field=ip secret/worker-node-gpu/$ENV/active-slot 2>/dev/null \
                      || echo "192.168.10.21")
          echo "Using worker IP: $WORKER_IP"
          vault kv get -field=private_key secret/ssh_keys/worker_node_worker \
            | awk 'NF > 0' > /tmp/worker_key
          chmod 600 /tmp/worker_key
          ssh -i /tmp/worker_key -o StrictHostKeyChecking=no root@"$WORKER_IP" \
            "cat /etc/rancher/k3s/k3s.yaml" | sed "s/127.0.0.1/${WORKER_IP}/g" > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          # Install kubectl if missing
          if ! command -v kubectl &>/dev/null; then
            curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/ 2>/dev/null || mv kubectl "$HOME/bin/" 2>/dev/null || { mkdir -p "$HOME/bin"; mv kubectl "$HOME/bin/"; export PATH="$HOME/bin:$PATH"; }
          fi

          echo ""
          echo "--- Pods in media-stack ---"
          kubectl get pods -n media-stack -o wide 2>&1 | head -20

          # Fetch API keys from streambox-secrets
          SONARR_KEY=$(kubectl -n streambox get secret streambox-secrets -o jsonpath='{.data.sonarr-api-key}' | base64 -d)
          RADARR_KEY=$(kubectl -n streambox get secret streambox-secrets -o jsonpath='{.data.radarr-api-key}' | base64 -d)
          echo "Sonarr key len: ${#SONARR_KEY}  Radarr key len: ${#RADARR_KEY}"

          # Exec into sonarr pod and query its own API
          SONARR_POD=$(kubectl get pod -n media-stack -l app=sonarr -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          RADARR_POD=$(kubectl get pod -n media-stack -l app=radarr -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          echo "Sonarr pod: $SONARR_POD  Radarr pod: $RADARR_POD"

          echo ""
          echo "--- Sonarr /api/v3/downloadclient ---"
          kubectl exec -n media-stack "$SONARR_POD" -- \
            curl -s -H "X-Api-Key: $SONARR_KEY" http://localhost:8989/api/v3/downloadclient \
            | python3 -c 'import json,sys;d=json.load(sys.stdin);
          for c in d:
              fs={f["name"]:f.get("value") for f in c.get("fields",[])}
              print(f"  {c[\"name\"]} impl={c[\"implementation\"]} enable={c[\"enable\"]} host={fs.get(\"host\")} port={fs.get(\"port\")} user={fs.get(\"username\")} pw={bool(fs.get(\"password\"))} cat={fs.get(\"movieCategory\") or fs.get(\"tvCategory\")}")' 2>&1 || echo "(sonarr dc query failed)"

          echo ""
          echo "--- Radarr /api/v3/downloadclient ---"
          kubectl exec -n media-stack "$RADARR_POD" -- \
            curl -s -H "X-Api-Key: $RADARR_KEY" http://localhost:7878/api/v3/downloadclient \
            | python3 -c 'import json,sys;d=json.load(sys.stdin);
          for c in d:
              fs={f["name"]:f.get("value") for f in c.get("fields",[])}
              print(f"  {c[\"name\"]} impl={c[\"implementation\"]} enable={c[\"enable\"]} host={fs.get(\"host\")} port={fs.get(\"port\")} user={fs.get(\"username\")} pw={bool(fs.get(\"password\"))} cat={fs.get(\"movieCategory\") or fs.get(\"tvCategory\")}")' 2>&1 || echo "(radarr dc query failed)"

          echo ""
          echo "--- Sonarr test download client (tries connecting to qBT) ---"
          DC_JSON=$(kubectl exec -n media-stack "$SONARR_POD" -- \
            curl -s -H "X-Api-Key: $SONARR_KEY" http://localhost:8989/api/v3/downloadclient)
          DC_ID=$(echo "$DC_JSON" | python3 -c 'import json,sys;d=json.load(sys.stdin);print(d[0]["id"]) if d else print("")')
          echo "Testing DC id=$DC_ID"
          TEST_BODY=$(echo "$DC_JSON" | python3 -c 'import json,sys;d=json.load(sys.stdin);print(json.dumps(d[0]))')
          kubectl exec -n media-stack "$SONARR_POD" -- \
            curl -s -X POST -H "X-Api-Key: $SONARR_KEY" -H "Content-Type: application/json" \
            --data "$TEST_BODY" \
            http://localhost:8989/api/v3/downloadclient/test 2>&1 | head -5

          echo ""
          echo "--- Radarr test download client ---"
          DC_JSON=$(kubectl exec -n media-stack "$RADARR_POD" -- \
            curl -s -H "X-Api-Key: $RADARR_KEY" http://localhost:7878/api/v3/downloadclient)
          TEST_BODY=$(echo "$DC_JSON" | python3 -c 'import json,sys;d=json.load(sys.stdin);print(json.dumps(d[0]) if d else "{}")')
          kubectl exec -n media-stack "$RADARR_POD" -- \
            curl -s -X POST -H "X-Api-Key: $RADARR_KEY" -H "Content-Type: application/json" \
            --data "$TEST_BODY" \
            http://localhost:7878/api/v3/downloadclient/test 2>&1 | head -5

          echo ""
          echo "--- Sonarr recent log snippet (download/indexer errors) ---"
          kubectl exec -n media-stack "$SONARR_POD" -- \
            sh -c "ls -t /config/logs/sonarr.txt /config/logs/sonarr.*.txt 2>/dev/null | head -1 | xargs -r tail -n 200" 2>&1 \
            | grep -iE 'error|warn|fail|refused|qbittorrent|download' | tail -30

          echo ""
          echo "--- Radarr recent log snippet ---"
          kubectl exec -n media-stack "$RADARR_POD" -- \
            sh -c "ls -t /config/logs/radarr.txt /config/logs/radarr.*.txt 2>/dev/null | head -1 | xargs -r tail -n 200" 2>&1 \
            | grep -iE 'error|warn|fail|refused|qbittorrent|download' | tail -30

          rm -f /tmp/worker_key /tmp/kubeconfig /tmp/login-body

      - name: Restart WireGuard if peer has 0 bytes received
        run: |
          IP="${{ steps.slots.outputs.ip }}"
          echo "=== Restarting WireGuard on $IP ==="
          ssh -i /tmp/torrent_debug_key -o StrictHostKeyChecking=no root@"$IP" bash <<'REMOTE'
          RECEIVED=$(wg show wg0 transfer 2>/dev/null | awk '{print $1}' | head -1)
          if [ "$RECEIVED" = "0" ] || [ -z "$RECEIVED" ]; then
            echo "WireGuard peer has 0 bytes received — restarting wg-quick@wg0"
            systemctl restart wg-quick@wg0
            sleep 5
            echo "--- WireGuard status after restart ---"
            wg show 2>&1
          else
            echo "WireGuard receiving data ($RECEIVED bytes) — no restart needed"
          fi
          REMOTE

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/torrent_debug_key
