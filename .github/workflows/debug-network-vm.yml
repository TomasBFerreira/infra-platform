name: Debug dev network-vm

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: self-hosted
    steps:
      - name: Fetch SSH key
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/network_vm_worker \
            | awk 'NF > 0' > /tmp/network_vm_key
          chmod 600 /tmp/network_vm_key
          ACTIVE_IP=$(vault kv get -field=ip secret/network-vm/dev/active-slot)
          echo "ACTIVE_IP=$ACTIVE_IP" >> $GITHUB_ENV

      - name: Check Traefik and vault connectivity
        run: |
          ssh -i /tmp/network_vm_key -o StrictHostKeyChecking=no root@"$ACTIVE_IP" bash <<'EOF'
          echo "=== Active IP ==="
          hostname -I

          echo ""
          echo "=== services.yml vault routes ==="
          grep -A5 "vault" /opt/traefik/config/dynamic/services.yml || echo "No vault routes found"

          echo ""
          echo "=== Traefik containers ==="
          docker ps --format "{{.Names}}\t{{.Status}}"

          echo ""
          echo "=== Vault health from this host ==="
          curl -s -o /dev/null -w "dev-blue: %{http_code}\n" http://192.168.20.45:8200/v1/sys/health || echo "dev-blue: unreachable"
          curl -s -o /dev/null -w "dev-green: %{http_code}\n" http://192.168.20.46:8200/v1/sys/health || echo "dev-green: unreachable"

          echo ""
          echo "=== Rancher reachability from this host ==="
          curl -sk -o /dev/null -w "rancher (192.168.20.2:443): %{http_code}\n" --connect-timeout 5 https://192.168.20.2/ || echo "rancher: unreachable/timeout"
          curl -sk -o /dev/null -w "rancher v3 ping: %{http_code}\n" --connect-timeout 5 https://192.168.20.2/v3 || echo "rancher v3: unreachable/timeout"

          echo ""
          echo "=== WikiJS backend from this host ==="
          curl -s -o /dev/null -w "wikijs (192.168.20.11:3000): %{http_code}\n" --connect-timeout 5 http://192.168.20.11:3000/ || echo "wikijs: unreachable/timeout"

          echo ""
          echo "=== Traefik API routers (dev) ==="
          curl -s http://localhost:8080/api/http/routers 2>/dev/null | python3 -c "import json,sys; [print(r.get('name'),'|',r.get('entryPoints'),'|',r.get('status')) for r in json.load(sys.stdin) if 'dev' in r.get('name','').lower()]" || echo "API unavailable"

          echo ""
          echo "=== Traefik ForwardAuth tests ==="
          curl -sI -H 'Host: vault-dev.databaes.net' --connect-timeout 5 http://localhost:80/ 2>&1 | head -3
          curl -sI -H 'Host: wikijs-dev.databaes.net' --connect-timeout 5 http://localhost:80/ 2>&1 | head -3
          curl -skI -H 'Host: vault-dev.databaes.net' --connect-timeout 5 https://localhost:443/ 2>&1 | head -3

          echo ""
          echo "=== services.yml stats on server ==="
          sha1sum /opt/traefik/config/dynamic/services.yml
          grep -c "websecure" /opt/traefik/config/dynamic/services.yml || echo "0 websecure"

          echo ""
          echo "=== Traefik error logs ==="
          docker logs traefik 2>&1 | grep -iE "error|warn|level=error" | tail -10

          echo ""
          echo "=== cloudflared status ==="
          systemctl is-active cloudflared
          EOF

      - name: Check Tailscale routing status
        run: |
          ssh -i /tmp/network_vm_key -o StrictHostKeyChecking=no root@"$ACTIVE_IP" bash <<'EOF'
          echo "=== Tailscale status ==="
          tailscale status

          echo ""
          echo "=== Advertised vs accepted routes ==="
          tailscale status --json | python3 -c "import json,sys; d=json.load(sys.stdin); s=d.get('Self',{}); print('Host:', s.get('HostName')); print('IPs:', s.get('TailscaleIPs')); print('PrimaryRoutes:', s.get('PrimaryRoutes')); print('AdvertisedRoutes:', s.get('AdvertisedRoutes'))"

          echo ""
          echo "=== UFW forward policy ==="
          grep DEFAULT_FORWARD_POLICY /etc/default/ufw

          echo ""
          echo "=== IP forwarding ==="
          cat /proc/sys/net/ipv4/ip_forward

          echo ""
          echo "=== Ping betsy (192.168.50.2) ==="
          ping -c3 -W2 192.168.50.2 && echo "BETSY: REACHABLE" || echo "BETSY: UNREACHABLE"
          EOF

      - name: Cleanup
        if: always()
        run: rm -f /tmp/network_vm_key