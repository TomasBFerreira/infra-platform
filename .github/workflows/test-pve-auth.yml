name: Test PVE Auth

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, dev]
    steps:
      - name: Test Proxmox API auth
        env:
          PVE_USER: ${{ secrets.PVE_USER }}
          PVE_PASS: ${{ secrets.PVE_PASS }}
        run: |
          echo "Testing Proxmox API at https://192.168.50.4:8006..."
          HTTP=$(curl -sk -o /tmp/pve_resp.json -w '%{http_code}' \
            -X POST "https://192.168.50.4:8006/api2/json/access/ticket" \
            -d "username=${PVE_USER}&password=${PVE_PASS}" 2>/dev/null || echo "000")
          echo "HTTP status: $HTTP"
          if [ "$HTTP" = "200" ]; then
            echo "AUTH SUCCESS — Proxmox API credentials are valid"
          elif [ "$HTTP" = "401" ]; then
            echo "AUTH FAILED — PVE_USER/PVE_PASS are wrong or expired"
            cat /tmp/pve_resp.json || true
          else
            echo "UNEXPECTED response: HTTP $HTTP"
            cat /tmp/pve_resp.json || true
          fi
          rm -f /tmp/pve_resp.json
