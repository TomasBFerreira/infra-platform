name: Sync GH_PAT to Vault + downstream repos

# Triggered on GH_PAT rotation. Two jobs:
#
#   1. `sync`       — writes `secrets.GH_PAT` (the rotated value in *this*
#                     repo's settings) to Vault at
#                     `secret/github-runner/gh_pat`. Consumers: runner-register
#                     ansible playbook, anything that reads from Vault.
#
#   2. `propagate`  — mirrors that same PAT into every downstream repo's
#                     `GH_PAT` Actions secret. Required because workflows in
#                     other repos (e.g. otel-monitoring's `register-dns` job
#                     doing a cross-repo checkout of traefik-gitops) use their
#                     *own* repo-scoped `secrets.GH_PAT`, not Vault. Without
#                     this step, rotating GH_PAT silently breaks every
#                     downstream cross-repo CI checkout — observed on
#                     2026-04-21 where register-dns failed in otel-monitoring
#                     after a rotation landed only on infra-platform +
#                     landing-page.
#
# Run this workflow any time the GH_PAT Actions secret is rotated — faster
# than the full github-runner_pipeline_self_hosted.yml, which also rebuilds
# the runner LXC as a side effect.

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: [self-hosted, management]
    steps:
      - name: Write GH_PAT to Vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv put secret/github-runner/gh_pat token="${{ secrets.GH_PAT }}"

      - name: Smoke-test the token against api.github.com
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          TOKEN=$(vault kv get -field=token secret/github-runner/gh_pat)
          CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: token $TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/TomasBFerreira/infra-platform)
          echo "GitHub API response: $CODE"
          test "$CODE" = "200"

  propagate:
    needs: sync
    runs-on: [self-hosted, management]
    # Repo list: any repo whose workflows reference secrets.GH_PAT. Keep in
    # sync when new repos are onboarded. Repos that never use GH_PAT (e.g.
    # streambox, traefik-gitops) are intentionally omitted.
    strategy:
      fail-fast: false
      matrix:
        repo:
          - otel-monitoring
          - wikijs
          - nextcloud
          - landing-page
          - databaes-status-api
          - ops-portal-shell
          - ops-portal-identity
          - ops-portal-cmdb
          - ops-portal-audit
          - ops-portal-infrastructure
          - ops-portal-incidents
          - ops-portal-deployments
          - ops-portal-domain
    steps:
      - name: Set GH_PAT in TomasBFerreira/${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PAT_VALUE: ${{ secrets.GH_PAT }}
          TARGET_REPO: TomasBFerreira/${{ matrix.repo }}
        run: |
          # gh secret set reads the value from stdin (when no --body is given),
          # encrypts with the target repo's public key, and uploads via the
          # REST API. Needs GH_TOKEN with `repo` scope (admin:repo) for the
          # destination. Value passed via env var (not command line) so it
          # stays out of `ps`/logs.
          printf '%s' "$PAT_VALUE" | gh secret set GH_PAT --repo "$TARGET_REPO"
          echo "Updated GH_PAT on $TARGET_REPO"
