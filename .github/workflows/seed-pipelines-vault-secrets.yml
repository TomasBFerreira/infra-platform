name: Seed Vault secrets onto ops-portal-pipelines

# One-shot helper: copies VAULT_BOOTSTRAP_ADDR + VAULT_BOOTSTRAP_ROOT_TOKEN
# from this repo's secrets onto TomasBFerreira/ops-portal-pipelines so its
# gremlin-run / apply-remediation workflows can talk to Vault.
#
# Run once after the new repo is created, and again if either token rotates.

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: [self-hosted, management]
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
      TARGET_REPO: TomasBFerreira/ops-portal-pipelines
    steps:
      - name: Set VAULT_BOOTSTRAP_ADDR
        env:
          VALUE: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
        run: printf '%s' "$VALUE" | gh secret set VAULT_BOOTSTRAP_ADDR --repo "$TARGET_REPO"

      - name: Set VAULT_BOOTSTRAP_ROOT_TOKEN
        env:
          VALUE: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: printf '%s' "$VALUE" | gh secret set VAULT_BOOTSTRAP_ROOT_TOKEN --repo "$TARGET_REPO"

      - name: List target repo secrets to confirm
        run: gh secret list --repo "$TARGET_REPO"
