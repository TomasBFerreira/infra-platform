name: Fetch SSO bootstrap password to bootstrap vault

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment (dev/prod)'
        required: true
        default: 'dev'

jobs:
  fetch:
    runs-on: self-hosted
    steps:
      - name: Reset akadmin password and store in bootstrap vault
        env:
          # Source: env vault
          VAULT_ADDR:  ${{ inputs.env == 'prod' && secrets.VAULT_PROD_ADDR || secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ inputs.env == 'prod' && secrets.VAULT_PROD_TOKEN || secrets.VAULT_TOKEN }}
          # Dest: bootstrap vault
          BOOTSTRAP_VAULT_ADDR:  ${{ secrets.VAULT_DEV_ADDR }}
          BOOTSTRAP_VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          # Fetch Authentik connection details from env vault
          SSO_IP=$(vault kv get -field=sso_ip secret/authentik/vault-oidc)
          BOOTSTRAP_TOKEN=$(vault kv get -field=bootstrap_token secret/sso)
          BOOTSTRAP_PASSWORD=$(vault kv get -field=bootstrap_password secret/sso)

          echo "SSO IP: ${SSO_IP}"
          echo "Token prefix: ${BOOTSTRAP_TOKEN:0:8}"

          # Find akadmin user ID via Authentik API
          USER_RESP=$(curl -s "http://${SSO_IP}:9000/api/v3/core/users/?username=akadmin" \
            -H "Authorization: Bearer ${BOOTSTRAP_TOKEN}")
          echo "User list response: ${USER_RESP}"

          USER_ID=$(echo "$USER_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['results'][0]['pk'])")
          echo "akadmin user ID: ${USER_ID}"

          # Reset akadmin password to the value currently in vault
          RESET_RESP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "http://${SSO_IP}:9000/api/v3/core/users/${USER_ID}/set_password/" \
            -H "Authorization: Bearer ${BOOTSTRAP_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"password\": \"${BOOTSTRAP_PASSWORD}\"}")
          echo "Password reset HTTP status: ${RESET_RESP}"

          # Store confirmed credentials in bootstrap vault for easy access
          VAULT_ADDR="$BOOTSTRAP_VAULT_ADDR" VAULT_TOKEN="$BOOTSTRAP_VAULT_TOKEN" \
            vault kv put secret/sso/${{ inputs.env }}/credentials \
              bootstrap_password="$BOOTSTRAP_PASSWORD" \
              sso_ip="$SSO_IP"

          echo "Done — credentials at bootstrap vault: secret/sso/${{ inputs.env }}/credentials"