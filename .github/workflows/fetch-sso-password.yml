name: Fetch SSO bootstrap password to bootstrap vault

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment (dev/prod)'
        required: true
        default: 'dev'

jobs:
  fetch:
    runs-on: self-hosted
    steps:
      - name: Reset akadmin password and store in bootstrap vault
        env:
          # Source: env vault
          VAULT_ADDR:  ${{ inputs.env == 'prod' && secrets.VAULT_PROD_ADDR || secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ inputs.env == 'prod' && secrets.VAULT_PROD_TOKEN || secrets.VAULT_TOKEN }}
          # Dest: bootstrap vault
          BOOTSTRAP_VAULT_ADDR:  ${{ secrets.VAULT_DEV_ADDR }}
          BOOTSTRAP_VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          # Fetch SSH key and secrets from bootstrap + env vaults
          VAULT_ADDR="$BOOTSTRAP_VAULT_ADDR" VAULT_TOKEN="$BOOTSTRAP_VAULT_TOKEN" \
            vault kv get -field=private_key secret/ssh_keys/sso_worker \
            | awk 'NF > 0' > /tmp/sso_worker_id
          chmod 600 /tmp/sso_worker_id

          SSO_IP=$(vault kv get -field=sso_ip secret/authentik/vault-oidc)
          BOOTSTRAP_PASSWORD=$(vault kv get -field=bootstrap_password secret/sso)

          echo "SSO IP: ${SSO_IP}"
          ssh-keygen -R "${SSO_IP}" || true

          # Write reset script as single line to avoid YAML heredoc issues
          printf 'import os\nfrom authentik.core.models import User\nu = User.objects.get(username="akadmin")\nu.set_password(os.environ["NEW_PASS"])\nu.save()\nprint("password_reset_ok")\n' > /tmp/reset_akadmin.py

          scp -i /tmp/sso_worker_id -o StrictHostKeyChecking=no \
            /tmp/reset_akadmin.py root@"${SSO_IP}":/tmp/reset_akadmin.py

          # Copy script into the container, then exec
          ssh -i /tmp/sso_worker_id -o StrictHostKeyChecking=no root@"${SSO_IP}" \
            "docker cp /tmp/reset_akadmin.py authentik-server:/tmp/reset_akadmin.py && \
             docker exec -e NEW_PASS='${BOOTSTRAP_PASSWORD}' authentik-server ak shell --command \"exec(open('/tmp/reset_akadmin.py').read())\""

          rm -f /tmp/sso_worker_id

          # Store confirmed credentials in bootstrap vault for easy access
          VAULT_ADDR="$BOOTSTRAP_VAULT_ADDR" VAULT_TOKEN="$BOOTSTRAP_VAULT_TOKEN" \
            vault kv put secret/sso/${{ inputs.env }}/credentials \
              bootstrap_password="$BOOTSTRAP_PASSWORD" \
              sso_ip="$SSO_IP"

          echo "Done — credentials at bootstrap vault: secret/sso/${{ inputs.env }}/credentials"