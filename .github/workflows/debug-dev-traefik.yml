name: Debug dev Traefik

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: [self-hosted, dev]
    steps:
      - name: Check Traefik on dev network-vm
        env:
          VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/network_vm_worker \
            | awk 'NF > 0' > /tmp/nwkey && chmod 600 /tmp/nwkey

          echo "=== Docker containers ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'"

          echo "=== Test localhost:80 with Host: databaes.net ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "curl -sI -H 'Host: databaes.net' http://localhost:80/ 2>&1 | head -5"

          echo "=== Test prod k3s landing page reachability from dev ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "curl -sI --connect-timeout 5 http://192.168.10.12:30080/ 2>&1 | head -5"

          echo "=== services.yml on dev network-vm ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "grep -A2 'databaes-landing-page\|Host.*databaes.net' /opt/traefik/config/dynamic/services.yml 2>/dev/null || echo 'file not found or no match'"

          echo "=== Traefik routes for databaes.net ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "curl -s http://localhost:8080/api/http/routers 2>/dev/null | python3 -m json.tool 2>/dev/null | grep -B1 -A3 'databaes\.net' | head -30 || echo 'dashboard not available'"

          echo "=== Test grafana-dev Host via Traefik ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "curl -sI -H 'Host: grafana-dev.databaes.net' http://localhost:80/ 2>&1 | head -10"

          echo "=== Grafana direct on 192.168.20.96:3000 ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "curl -sI --connect-timeout 5 http://192.168.20.96:3000/api/health 2>&1 | head -10"

          echo "=== All files in /opt/traefik/config/dynamic/ ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "ls -la /opt/traefik/config/dynamic/"

          echo "=== grafana-dev + authentik refs across ALL dynamic config files ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "grep -rn 'grafana-dev\|authentik' /opt/traefik/config/dynamic/"

          echo "=== ACME cert status ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "cat /opt/traefik/data/acme/acme.json 2>/dev/null | python3 -c \"import json,sys; d=json.load(sys.stdin); certs=d.get('letsencrypt',{}).get('Certificates',[]); [print(c['domain']['main'], c.get('domain',{}).get('sans',[])) for c in certs]\" 2>/dev/null || echo 'no acme.json or no certs yet'"

          echo "=== Traefik runtime: grafana-dev-router details ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "curl -s http://localhost:8080/api/http/routers/grafana-dev-router@file 2>/dev/null | python3 -m json.tool 2>/dev/null || echo 'not found in API'"

          echo "=== Traefik HTTPS test for grafana-dev ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "curl -skI -H 'Host: grafana-dev.databaes.net' https://localhost:443/ 2>&1 | head -15"

          echo "=== Cloudflare tunnel ingress rules ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "cloudflared tunnel info 2>/dev/null | head -30 || cat /etc/cloudflared/config.yml 2>/dev/null || cat /root/.cloudflared/config.yml 2>/dev/null || echo 'no local config found'"

          echo "=== Traefik ACME logs ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "docker logs traefik 2>&1 | grep -i 'acme\|cert\|letsencrypt\|challenge\|cloudflare\|error' | tail -30 || journalctl -u traefik -n 30 --no-pager 2>/dev/null | grep -i 'acme\|cert\|error'"

          echo "=== CF_DNS_API_TOKEN set in Traefik env ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "grep CF_DNS_API_TOKEN /opt/traefik/.env | sed 's/=.*/=[REDACTED]/'"

          echo "=== grafana-dev.databaes.net public DNS ==="
          dig +short grafana-dev.databaes.net @1.1.1.1 || echo "no record (expected)"

          echo "=== Traefik static config (traefik.yml) on server ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "cat /opt/traefik/config/traefik.yml"

          echo "=== Trigger ACME cert via SNI-correct HTTPS request ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "curl -sk --resolve 'grafana-dev.databaes.net:443:127.0.0.1' https://grafana-dev.databaes.net/ -o /dev/null -w 'HTTP %{http_code} cert=%{ssl_verify_result}' && echo ''"

          echo "=== AdGuard DNS rewrites (check grafana-dev) ==="
          ADGUARD_USER=$(vault kv get -field=username secret/adguard 2>/dev/null || echo "")
          ADGUARD_PASS=$(vault kv get -field=password secret/adguard 2>/dev/null || echo "")
          if [ -n "$ADGUARD_USER" ]; then
            ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
              "curl -s -u '${ADGUARD_USER}:${ADGUARD_PASS}' http://127.0.0.1:3000/control/rewrite/list | python3 -c \"import json,sys; [print(r['domain'],'->',r['answer']) for r in json.load(sys.stdin)]\" 2>/dev/null | grep -i 'dev\|grafana' | head -20"
          else
            echo "No adguard creds in Vault"
          fi

          echo "=== ALL ACME/cert errors in Traefik docker logs ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "docker logs traefik 2>&1 | grep -iE 'acme|ACME|certif|letsencrypt|challenge|cloudflare|level=error|ERR ' | head -60 || echo 'no matches'"

          echo "=== Traefik log files on disk ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "ls -la /opt/traefik/data/logs/ && cat /opt/traefik/data/logs/*.log 2>/dev/null | grep -iE 'acme|cert|error' | tail -30 || echo 'no log files or no matches'"

          echo "=== .env file on server (redacted values) ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "cat /opt/traefik/.env | sed 's/=.*/=[REDACTED]/'"

          echo "=== CF env inside Traefik container ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "docker exec traefik env | grep -E 'CF_|CLOUDFLARE' | sed 's/=.*/=[REDACTED]/'""
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "ss -tlnp | grep ':443' || echo 'nothing on 443'"

          echo "=== Trigger ACME + wait 15s + check logs ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "curl -sk --resolve 'grafana-dev.databaes.net:443:127.0.0.1' https://grafana-dev.databaes.net/ -o /dev/null -w 'HTTPS %{http_code} cert=%{ssl_verify_result}\n' && sleep 15 && docker logs traefik 2>&1 | grep -iE 'acme|certif|letsencrypt|challenge|cloudflare|error' | tail -30"

          echo "=== OpenSSL cert details served on 443 ==="
          ssh -i /tmp/nwkey -o StrictHostKeyChecking=no root@192.168.20.55 \
            "echo Q | openssl s_client -connect 127.0.0.1:443 -servername grafana-dev.databaes.net 2>&1 | grep -E 'subject|issuer|notAfter|Verify|error' | head -10"

          rm -f /tmp/nwkey
