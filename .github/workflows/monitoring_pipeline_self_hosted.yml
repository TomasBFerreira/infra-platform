name: Monitoring Pipeline (Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod

concurrency:
  group: monitoring-pipeline-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: true

jobs:
  resolve-slots:
    runs-on: [self-hosted, "${{ github.event.inputs.environment || 'dev' }}"]
    outputs:
      environment:    ${{ steps.slots.outputs.environment }}
      pve_api_url:    ${{ steps.slots.outputs.pve_api_url }}
      pve_node:       ${{ steps.slots.outputs.pve_node }}
      active_slot:    ${{ steps.slots.outputs.active_slot }}
      active_vmid:    ${{ steps.slots.outputs.active_vmid }}
      active_ip:      ${{ steps.slots.outputs.active_ip }}
      active_host:    ${{ steps.slots.outputs.active_host }}
      staging_slot:   ${{ steps.slots.outputs.staging_slot }}
      staging_vmid:   ${{ steps.slots.outputs.staging_vmid }}
      staging_ip:     ${{ steps.slots.outputs.staging_ip }}
      staging_host:   ${{ steps.slots.outputs.staging_host }}
      first_run:      ${{ steps.slots.outputs.first_run }}
      gateway:        ${{ steps.slots.outputs.gateway }}
      network_bridge: ${{ steps.slots.outputs.network_bridge }}
    steps:
      - name: Resolve active and staging slots
        id: slots
        env:
          # Always read slot state from the stable bootstrap vault (CT 200),
          # regardless of which environment is being deployed.
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"

          # VMID scheme: prod=1xx, dev=2xx, qa=3xx (x95/x96 for blue/green)
          # IPs: last octet = VMID last 2 digits; env encoded in 3rd octet (10=prod,20=dev,30=qa)
          case "$ENV" in
            dev)
              BLUE_VMID=295;  BLUE_IP="192.168.20.95"
              GREEN_VMID=296; GREEN_IP="192.168.20.96"
              PVE_API_URL="https://192.168.50.4:8006/api2/json"
              PVE_NODE="benedict"
              GATEWAY="192.168.20.1"; NETWORK_BRIDGE="vmbr20"
              ;;
            qa)
              BLUE_VMID=395;  BLUE_IP="192.168.30.95"
              GREEN_VMID=396; GREEN_IP="192.168.30.96"
              PVE_API_URL="https://192.168.50.8:8006/api2/json"
              PVE_NODE="heaton"
              GATEWAY="192.168.30.1"; NETWORK_BRIDGE="vmbr30"
              ;;
            prod)
              BLUE_VMID=195;  BLUE_IP="192.168.10.95"
              GREEN_VMID=196; GREEN_IP="192.168.10.96"
              PVE_API_URL="https://192.168.50.2:8006/api2/json"
              PVE_NODE="betsy"
              GATEWAY="192.168.10.1"; NETWORK_BRIDGE="vmbr10"
              ;;
          esac

          BLUE_HOST="monitoring-blue"
          GREEN_HOST="monitoring-green"

          ACTIVE_SLOT=$(vault kv get -field=slot secret/monitoring/$ENV/active-slot 2>/dev/null || echo "none")

          if [ "$ACTIVE_SLOT" = "none" ]; then
            echo "No active slot found — first run, deploying to blue"
            STAGING_SLOT="blue"
            STAGING_VMID="$BLUE_VMID"
            STAGING_IP="$BLUE_IP"
            STAGING_HOST="$BLUE_HOST"
            ACTIVE_VMID=""
            ACTIVE_IP=""
            ACTIVE_HOST=""
            FIRST_RUN="true"
          elif [ "$ACTIVE_SLOT" = "blue" ]; then
            STAGING_SLOT="green"
            STAGING_VMID="$GREEN_VMID"
            STAGING_IP="$GREEN_IP"
            STAGING_HOST="$GREEN_HOST"
            ACTIVE_VMID="$BLUE_VMID"
            ACTIVE_IP="$BLUE_IP"
            ACTIVE_HOST="$BLUE_HOST"
            FIRST_RUN="false"
          else
            STAGING_SLOT="blue"
            STAGING_VMID="$BLUE_VMID"
            STAGING_IP="$BLUE_IP"
            STAGING_HOST="$BLUE_HOST"
            ACTIVE_VMID="$GREEN_VMID"
            ACTIVE_IP="$GREEN_IP"
            ACTIVE_HOST="$GREEN_HOST"
            FIRST_RUN="false"
          fi

          echo "environment=$ENV"           >> "$GITHUB_OUTPUT"
          echo "pve_api_url=$PVE_API_URL"   >> "$GITHUB_OUTPUT"
          echo "pve_node=$PVE_NODE"         >> "$GITHUB_OUTPUT"
          echo "active_slot=$ACTIVE_SLOT"   >> "$GITHUB_OUTPUT"
          echo "active_vmid=$ACTIVE_VMID"   >> "$GITHUB_OUTPUT"
          echo "active_ip=$ACTIVE_IP"       >> "$GITHUB_OUTPUT"
          echo "active_host=$ACTIVE_HOST"   >> "$GITHUB_OUTPUT"
          echo "staging_slot=$STAGING_SLOT" >> "$GITHUB_OUTPUT"
          echo "staging_vmid=$STAGING_VMID" >> "$GITHUB_OUTPUT"
          echo "staging_ip=$STAGING_IP"     >> "$GITHUB_OUTPUT"
          echo "staging_host=$STAGING_HOST" >> "$GITHUB_OUTPUT"
          echo "first_run=$FIRST_RUN"       >> "$GITHUB_OUTPUT"
          echo "gateway=$GATEWAY"               >> "$GITHUB_OUTPUT"
          echo "network_bridge=$NETWORK_BRIDGE" >> "$GITHUB_OUTPUT"

  setup-betsy-nfs:
    needs: resolve-slots
    runs-on: [self-hosted, "${{ needs.resolve-slots.outputs.environment }}"]
    env:
      VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
      PVE_USER: ${{ secrets.PVE_USER }}
      PVE_API:  ${{ needs.resolve-slots.outputs.pve_api_url }}
    steps:
      - name: Seed monitoring_worker SSH key in Vault if missing
        run: |
          if vault kv get secret/ssh_keys/monitoring_worker > /dev/null 2>&1; then
            echo "Secret secret/ssh_keys/monitoring_worker already exists — skipping"
          else
            echo "Generating new ED25519 SSH keypair for monitoring_worker..."
            ssh-keygen -t ed25519 -C "monitoring_worker" -f /tmp/monitoring_worker_key -N ""
            PRIVATE_KEY=$(cat /tmp/monitoring_worker_key)
            PUBLIC_KEY=$(cat /tmp/monitoring_worker_key.pub)
            vault kv put secret/ssh_keys/monitoring_worker \
              private_key="${PRIVATE_KEY}" \
              public_key="${PUBLIC_KEY}"
            rm -f /tmp/monitoring_worker_key /tmp/monitoring_worker_key.pub
            echo "Seeded secret/ssh_keys/monitoring_worker in Vault"
          fi

      - name: Create NFS monitoring directories and export on betsy
        run: |
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          NFS_BASE="/mnt/nfs-shared-data/monitoring"

          echo "Setting up NFS monitoring directories on betsy (${PVE_HOST})..."
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} bash -s <<'REMOTE'
            set -e
            NFS_BASE="/mnt/nfs-shared-data/monitoring"

            # Create per-service subdirs (mode 0777 so any container UID can write)
            for dir in grafana prometheus loki tempo; do
              mkdir -p "${NFS_BASE}/${dir}"
              chmod 0777 "${NFS_BASE}/${dir}"
            done
            echo "Directories created: $(ls -la ${NFS_BASE})"

            # Idempotently add the NFS export
            EXPORT_LINE="${NFS_BASE} 192.168.0.0/16(rw,sync,no_subtree_check,no_root_squash)"
            if ! grep -qF "${NFS_BASE}" /etc/exports; then
              echo "${EXPORT_LINE}" >> /etc/exports
              echo "Added NFS export: ${EXPORT_LINE}"
            else
              echo "NFS export already present"
            fi

            # Ensure nfs-kernel-server is installed and running
            if ! command -v exportfs &>/dev/null; then
              apt-get install -y -q nfs-kernel-server
            fi
            systemctl is-active nfs-kernel-server || systemctl start nfs-kernel-server
            exportfs -ra
            echo "NFS exports reloaded"
            exportfs -v | grep monitoring || true
          REMOTE

  terraform-staging:
    needs: [resolve-slots, setup-betsy-nfs]
    runs-on: [self-hosted, "${{ needs.resolve-slots.outputs.environment }}"]
    env:
      ENV:          ${{ needs.resolve-slots.outputs.environment }}
      STAGING_SLOT: ${{ needs.resolve-slots.outputs.staging_slot }}
      STAGING_VMID: ${{ needs.resolve-slots.outputs.staging_vmid }}
      STAGING_IP:   ${{ needs.resolve-slots.outputs.staging_ip }}
      STAGING_HOST: ${{ needs.resolve-slots.outputs.staging_host }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to persistent clone
        run: |
          cd /app/infra-platform
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}

      - name: Terraform Init
        env:
          TF_VAR_pve_api:        ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user:       ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:       ${{ (inputs.environment || 'dev') == 'prod' && secrets.PVE_PROD_PASS || secrets.PVE_PASS }}
          TF_VAR_ssh_user:       ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:    ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:           ${{ env.STAGING_VMID }}
          TF_VAR_ip_address:     ${{ env.STAGING_IP }}
          TF_VAR_vm_hostname:    ${{ env.STAGING_HOST }}
          TF_VAR_target_node:    ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          TF_VAR_cores:          ${{ (inputs.environment || 'dev') == 'prod' && '4' || '2' }}
          TF_VAR_memory:         ${{ (inputs.environment || 'dev') == 'prod' && '8192' || '4096' }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/monitoring init -input=false

      - name: Pre-flight — destroy any stale staging CT
        env:
          TF_VAR_pve_api:        ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user:       ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:       ${{ (inputs.environment || 'dev') == 'prod' && secrets.PVE_PROD_PASS || secrets.PVE_PASS }}
          TF_VAR_ssh_user:       ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:    ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:           ${{ env.STAGING_VMID }}
          TF_VAR_ip_address:     ${{ env.STAGING_IP }}
          TF_VAR_vm_hostname:    ${{ env.STAGING_HOST }}
          TF_VAR_target_node:    ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          TF_VAR_cores:          ${{ (inputs.environment || 'dev') == 'prod' && '4' || '2' }}
          TF_VAR_memory:         ${{ (inputs.environment || 'dev') == 'prod' && '8192' || '4096' }}
          PVE_API:  ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/monitoring destroy \
            -no-color -input=false -auto-approve \
            -state=terraform.${STAGING_SLOT}.${ENV}.tfstate || true
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
            "pct stop ${STAGING_VMID} 2>/dev/null || true; pct destroy ${STAGING_VMID} 2>/dev/null || true"
          rm -f /app/infra-platform/terraform/monitoring/terraform.${STAGING_SLOT}.${ENV}.tfstate

      - name: Terraform Apply
        env:
          TF_VAR_pve_api:        ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user:       ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:       ${{ (inputs.environment || 'dev') == 'prod' && secrets.PVE_PROD_PASS || secrets.PVE_PASS }}
          TF_VAR_ssh_user:       ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:    ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:           ${{ env.STAGING_VMID }}
          TF_VAR_ip_address:     ${{ env.STAGING_IP }}
          TF_VAR_vm_hostname:    ${{ env.STAGING_HOST }}
          TF_VAR_target_node:    ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          TF_VAR_cores:          ${{ (inputs.environment || 'dev') == 'prod' && '4' || '2' }}
          TF_VAR_memory:         ${{ (inputs.environment || 'dev') == 'prod' && '8192' || '4096' }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/monitoring apply \
            -no-color -input=false -auto-approve \
            -state=terraform.${STAGING_SLOT}.${ENV}.tfstate

  ansible-staging:
    needs: [resolve-slots, terraform-staging]
    runs-on: [self-hosted, "${{ needs.resolve-slots.outputs.environment }}"]
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      STAGING_IP:   ${{ needs.resolve-slots.outputs.staging_ip }}
      STAGING_HOST: ${{ needs.resolve-slots.outputs.staging_host }}
      ENV:          ${{ needs.resolve-slots.outputs.environment }}
      PVE_API:      ${{ needs.resolve-slots.outputs.pve_api_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to persistent clone
        run: |
          cd /app/infra-platform
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Fetch SSH key from bootstrap Vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/monitoring_worker \
            | awk 'NF > 0' > /tmp/ansible_monitoring_id_ed25519
          chmod 600 /tmp/ansible_monitoring_id_ed25519

      - name: Fetch Grafana admin password from Vault (create if absent)
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          GRAFANA_ADMIN_PASSWORD=$(vault kv get -field=grafana_admin_password secret/monitoring/${ENV}/grafana_admin_password 2>/dev/null || openssl rand -base64 24)
          # If it didn't exist, store it for future runs
          vault kv put secret/monitoring/${ENV}/grafana_admin_password grafana_admin_password="${GRAFANA_ADMIN_PASSWORD}" 2>/dev/null || true
          echo "GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}" >> "$GITHUB_ENV"

      - name: Wait for SSH to be ready
        run: |
          echo "Waiting for SSH on ${STAGING_IP}..."
          timeout 120 bash -c "until nc -z ${STAGING_IP} 22; do sleep 5; done"
          echo "SSH is up"

      - name: Run Ansible playbook
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          NFS_SERVER=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          ssh-keygen -R "${STAGING_IP}" || true
          ansible-playbook \
            -i "${STAGING_IP}," \
            -v \
            --private-key /tmp/ansible_monitoring_id_ed25519 \
            -e "ansible_host=${STAGING_IP}" \
            -e "ansible_user=root" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            -e "monitoring_env=${ENV}" \
            -e "grafana_admin_password=${GRAFANA_ADMIN_PASSWORD}" \
            -e "gh_pat=${GH_PAT}" \
            -e "nfs_server=${NFS_SERVER}" \
            ansible/monitoring/monitoring_setup.yml

  flip-active:
    needs: [resolve-slots, ansible-staging]
    runs-on: [self-hosted, "${{ needs.resolve-slots.outputs.environment }}"]
    steps:
      - name: Record new active slot in bootstrap Vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ENV="${{ needs.resolve-slots.outputs.environment }}"
          vault kv put secret/monitoring/$ENV/active-slot \
            slot="${{ needs.resolve-slots.outputs.staging_slot }}" \
            vmid="${{ needs.resolve-slots.outputs.staging_vmid }}" \
            ip="${{ needs.resolve-slots.outputs.staging_ip }}"

  teardown-old-active:
    needs: [resolve-slots, flip-active]
    if: needs.resolve-slots.outputs.first_run == 'false' && needs.flip-active.result == 'success'
    runs-on: [self-hosted, "${{ needs.resolve-slots.outputs.environment }}"]
    env:
      ENV:         ${{ needs.resolve-slots.outputs.environment }}
      ACTIVE_SLOT: ${{ needs.resolve-slots.outputs.active_slot }}
      ACTIVE_VMID: ${{ needs.resolve-slots.outputs.active_vmid }}
      ACTIVE_IP:   ${{ needs.resolve-slots.outputs.active_ip }}
      ACTIVE_HOST: ${{ needs.resolve-slots.outputs.active_host }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to persistent clone
        run: |
          cd /app/infra-platform
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}

      - name: Terraform Init
        env:
          TF_VAR_pve_api:        ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user:       ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:       ${{ (inputs.environment || 'dev') == 'prod' && secrets.PVE_PROD_PASS || secrets.PVE_PASS }}
          TF_VAR_ssh_user:       ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:    ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:           ${{ env.ACTIVE_VMID }}
          TF_VAR_ip_address:     ${{ env.ACTIVE_IP }}
          TF_VAR_vm_hostname:    ${{ env.ACTIVE_HOST }}
          TF_VAR_target_node:    ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          TF_VAR_cores:          ${{ (inputs.environment || 'dev') == 'prod' && '4' || '2' }}
          TF_VAR_memory:         ${{ (inputs.environment || 'dev') == 'prod' && '8192' || '4096' }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/monitoring init -input=false

      - name: Terraform Destroy old active CT
        env:
          TF_VAR_pve_api:        ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user:       ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:       ${{ (inputs.environment || 'dev') == 'prod' && secrets.PVE_PROD_PASS || secrets.PVE_PASS }}
          TF_VAR_ssh_user:       ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:    ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:           ${{ env.ACTIVE_VMID }}
          TF_VAR_ip_address:     ${{ env.ACTIVE_IP }}
          TF_VAR_vm_hostname:    ${{ env.ACTIVE_HOST }}
          TF_VAR_target_node:    ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          TF_VAR_cores:          ${{ (inputs.environment || 'dev') == 'prod' && '4' || '2' }}
          TF_VAR_memory:         ${{ (inputs.environment || 'dev') == 'prod' && '8192' || '4096' }}
          PVE_API:  ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/monitoring destroy \
            -no-color -input=false -auto-approve \
            -state=terraform.${ACTIVE_SLOT}.${ENV}.tfstate || true
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
            "pct stop ${ACTIVE_VMID} 2>/dev/null || true; pct destroy ${ACTIVE_VMID} 2>/dev/null || true"

  cleanup-on-failure:
    needs: [resolve-slots, terraform-staging, ansible-staging]
    if: failure()
    runs-on: [self-hosted, "${{ needs.resolve-slots.outputs.environment }}"]
    env:
      ENV:          ${{ needs.resolve-slots.outputs.environment }}
      STAGING_SLOT: ${{ needs.resolve-slots.outputs.staging_slot }}
      STAGING_VMID: ${{ needs.resolve-slots.outputs.staging_vmid }}
      STAGING_IP:   ${{ needs.resolve-slots.outputs.staging_ip }}
      STAGING_HOST: ${{ needs.resolve-slots.outputs.staging_host }}
    steps:
      - name: Collect failure logs from CT
        env:
          PVE_API:  ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          LOG_DIR="/app/infra-platform/logs/monitoring-failures"
          mkdir -p "$LOG_DIR"
          LOG_FILE="$LOG_DIR/monitoring-${ENV}-$(date -u +%Y%m%dT%H%M%SZ)-run${{ github.run_id }}.log"
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          {
            echo "=== monitoring failure log: run ${{ github.run_id }}, env=${ENV}, vmid=${STAGING_VMID} ==="
            echo "=== $(date -u) ==="
            echo "--- system journal (last 100 lines) ---"
            ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
              "pct exec ${STAGING_VMID} -- journalctl -n 100 --no-pager 2>/dev/null || echo '(journal unavailable)'" 2>/dev/null || echo "(pct exec failed)"
          } | tee "$LOG_FILE" || true
          echo "Failure log saved to $LOG_FILE"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to persistent clone
        run: |
          cd /app/infra-platform
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}

      - name: Terraform Init
        env:
          TF_VAR_pve_api:        ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user:       ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:       ${{ (inputs.environment || 'dev') == 'prod' && secrets.PVE_PROD_PASS || secrets.PVE_PASS }}
          TF_VAR_ssh_user:       ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:    ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:           ${{ env.STAGING_VMID }}
          TF_VAR_ip_address:     ${{ env.STAGING_IP }}
          TF_VAR_vm_hostname:    ${{ env.STAGING_HOST }}
          TF_VAR_target_node:    ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          TF_VAR_cores:          ${{ (inputs.environment || 'dev') == 'prod' && '4' || '2' }}
          TF_VAR_memory:         ${{ (inputs.environment || 'dev') == 'prod' && '8192' || '4096' }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/monitoring init -input=false

      - name: Terraform Destroy staging CT
        env:
          TF_VAR_pve_api:        ${{ needs.resolve-slots.outputs.pve_api_url }}
          TF_VAR_pve_user:       ${{ secrets.PVE_USER }}
          TF_VAR_pve_pass:       ${{ (inputs.environment || 'dev') == 'prod' && secrets.PVE_PROD_PASS || secrets.PVE_PASS }}
          TF_VAR_ssh_user:       ${{ secrets.SSH_USER }}
          TF_VAR_vault_token:    ${{ secrets.VAULT_DEV_TOKEN }}
          TF_VAR_vault_address:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          TF_VAR_vmid:           ${{ env.STAGING_VMID }}
          TF_VAR_ip_address:     ${{ env.STAGING_IP }}
          TF_VAR_vm_hostname:    ${{ env.STAGING_HOST }}
          TF_VAR_target_node:    ${{ needs.resolve-slots.outputs.pve_node }}
          TF_VAR_network_bridge: ${{ needs.resolve-slots.outputs.network_bridge }}
          TF_VAR_gateway:        ${{ needs.resolve-slots.outputs.gateway }}
          TF_VAR_cores:          ${{ (inputs.environment || 'dev') == 'prod' && '4' || '2' }}
          TF_VAR_memory:         ${{ (inputs.environment || 'dev') == 'prod' && '8192' || '4096' }}
          PVE_API:  ${{ needs.resolve-slots.outputs.pve_api_url }}
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          cd /app/infra-platform
          ./scripts/run-terraform.sh -chdir terraform/monitoring destroy \
            -no-color -input=false -auto-approve \
            -state=terraform.${STAGING_SLOT}.${ENV}.tfstate || true
          PVE_HOST=$(python3 -c "import urllib.parse, os; print(urllib.parse.urlparse(os.environ['PVE_API']).hostname)")
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@${PVE_HOST} \
            "pct stop ${STAGING_VMID} 2>/dev/null || true; pct destroy ${STAGING_VMID} 2>/dev/null || true"
          rm -f /app/infra-platform/terraform/monitoring/terraform.${STAGING_SLOT}.${ENV}.tfstate
