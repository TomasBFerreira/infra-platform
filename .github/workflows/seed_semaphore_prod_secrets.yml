name: Seed Semaphore Prod Secrets (one-time)

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: [self-hosted, prod]
    steps:
      - name: Generate and write prod secrets to bootstrap vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          # Check if secrets already exist
          EXISTING=$(vault kv get secret/semaphore/prod/config 2>/dev/null || echo "not_found")
          if echo "$EXISTING" | grep -q "admin_password"; then
            echo "Secrets already exist — skipping"
            vault kv get secret/semaphore/prod/config
            exit 0
          fi

          # Generate random secrets
          ADMIN_PASSWORD=$(openssl rand -base64 24)
          COOKIE_HASH=$(openssl rand -hex 32)
          COOKIE_ENCRYPTION=$(openssl rand -hex 16)

          vault kv put secret/semaphore/prod/config \
            admin_password="$ADMIN_PASSWORD" \
            cookie_hash="$COOKIE_HASH" \
            cookie_encryption="$COOKIE_ENCRYPTION"

          echo "Prod semaphore secrets written to bootstrap vault at secret/semaphore/prod/config"
          echo "admin_password: ${ADMIN_PASSWORD:0:4}****"
          echo "cookie_hash: ${COOKIE_HASH:0:8}****"
          echo "cookie_encryption: ${COOKIE_ENCRYPTION:0:8}****"
