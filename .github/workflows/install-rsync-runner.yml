name: Install rsync on runner LXC

# One-off: installs rsync on the dev runner LXC (needed by otel-monitoring deploy.yml).
# Delete after running.

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Runner environment'
        type: choice
        options: [dev, prod, qa]
        default: dev

jobs:
  install:
    runs-on: [self-hosted, "${{ inputs.env }}"]
    steps:
      - name: Install rsync
        run: apt-get install -y rsync && echo "rsync $(rsync --version | head -1)"
