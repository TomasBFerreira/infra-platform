name: Probe benedict connectivity

on:
  workflow_dispatch:

jobs:
  diagnose-qa-traefik:
    runs-on: [self-hosted, qa]
    env:
      VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
    steps:
      - name: Resolve active QA Traefik slot
        run: |
          ACTIVE_IP=$(vault kv get -field=ip secret/traefik/qa/active-slot)
          ACTIVE_SLOT=$(vault kv get -field=slot secret/traefik/qa/active-slot)
          echo "ACTIVE_IP=$ACTIVE_IP" >> $GITHUB_ENV
          echo "ACTIVE_SLOT=$ACTIVE_SLOT" >> $GITHUB_ENV
          echo "Active QA Traefik slot: $ACTIVE_SLOT @ $ACTIVE_IP"

      - name: Fetch Traefik SSH key
        run: |
          vault kv get -field=private_key secret/ssh_keys/traefik_worker \
            | awk 'NF > 0' > /tmp/traefik_dbg_key
          chmod 600 /tmp/traefik_dbg_key

      - name: Runner-side TLS verification to QA Traefik Tailscale IP
        run: |
          set +e
          echo "=== Runner curl verified TLS ==="
          curl -sSI --connect-timeout 12 --resolve auth-qa.databaes.net:443:100.85.44.36 https://auth-qa.databaes.net/ || true
          echo "---"
          curl -sSI --connect-timeout 12 --resolve signoz-qa.databaes.net:443:100.85.44.36 https://signoz-qa.databaes.net/ || true
          echo "=== Runner openssl auth-qa ==="
          timeout 12 bash -lc "echo | openssl s_client -connect 100.85.44.36:443 -servername auth-qa.databaes.net -showcerts" 2>&1 | sed -n '1,80p' || true
          echo "=== Runner openssl signoz-qa ==="
          timeout 12 bash -lc "echo | openssl s_client -connect 100.85.44.36:443 -servername signoz-qa.databaes.net -showcerts" 2>&1 | sed -n '1,80p' || true

      - name: On-box cert and TLS checks
        run: |
          ssh -i /tmp/traefik_dbg_key -o StrictHostKeyChecking=no root@${ACTIVE_IP} bash <<'ENDSSH'
          set +e
          echo "=== Tailscale IP ==="
          tailscale ip -4 || true
          echo "=== Local verified TLS via localhost ==="
          curl -sSI --connect-timeout 12 --resolve auth-qa.databaes.net:443:127.0.0.1 https://auth-qa.databaes.net/ || true
          echo "---"
          curl -sSI --connect-timeout 12 --resolve signoz-qa.databaes.net:443:127.0.0.1 https://signoz-qa.databaes.net/ || true
          echo "=== Local openssl auth-qa ==="
          timeout 12 bash -lc "echo | openssl s_client -connect 127.0.0.1:443 -servername auth-qa.databaes.net -showcerts" 2>&1 | sed -n '1,80p' || true
          echo "=== Local openssl signoz-qa ==="
          timeout 12 bash -lc "echo | openssl s_client -connect 127.0.0.1:443 -servername signoz-qa.databaes.net -showcerts" 2>&1 | sed -n '1,80p' || true
          ENDSSH

      - name: Cleanup
        if: always()
        run: rm -f /tmp/traefik_dbg_key
