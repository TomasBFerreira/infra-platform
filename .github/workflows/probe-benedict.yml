name: Probe benedict connectivity

on:
  workflow_dispatch:

jobs:
  diagnose-qa-traefik:
    runs-on: [self-hosted, qa]
    env:
      VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
    steps:
      - name: Resolve active QA Traefik slot
        run: |
          ACTIVE_IP=$(vault kv get -field=ip secret/traefik/qa/active-slot)
          ACTIVE_SLOT=$(vault kv get -field=slot secret/traefik/qa/active-slot)
          echo "ACTIVE_IP=$ACTIVE_IP" >> $GITHUB_ENV
          echo "ACTIVE_SLOT=$ACTIVE_SLOT" >> $GITHUB_ENV
          echo "Active QA Traefik slot: $ACTIVE_SLOT @ $ACTIVE_IP"

      - name: Fetch Traefik SSH key
        run: |
          vault kv get -field=private_key secret/ssh_keys/traefik_worker \
            | awk 'NF > 0' > /tmp/traefik_dbg_key
          chmod 600 /tmp/traefik_dbg_key

      - name: Runner-side reachability to QA Traefik Tailscale IP
        run: |
          set +e
          echo "=== Runner curl to QA Tailscale IP ==="
          curl -skI --connect-timeout 8 --resolve auth-qa.databaes.net:443:100.85.44.36 https://auth-qa.databaes.net/ || true
          curl -skI --connect-timeout 8 --resolve signoz-qa.databaes.net:443:100.85.44.36 https://signoz-qa.databaes.net/ || true

      - name: Diagnose active QA Traefik host
        run: |
          ssh -i /tmp/traefik_dbg_key -o StrictHostKeyChecking=no root@${ACTIVE_IP} bash <<'ENDSSH'
          set +e
          echo "=== Host identity ==="
          hostname
          hostname -I
          echo
          echo "=== Tailscale ==="
          tailscale ip -4 2>/dev/null || true
          tailscale status 2>&1 | head -20 || true
          echo
          echo "=== Listeners ==="
          ss -tulpen | grep -E ':(80|443|8080) ' || true
          echo
          echo "=== Curl self via localhost ==="
          curl -skI --resolve auth-qa.databaes.net:443:127.0.0.1 https://auth-qa.databaes.net/ || true
          curl -skI --resolve signoz-qa.databaes.net:443:127.0.0.1 https://signoz-qa.databaes.net/ || true
          echo
          echo "=== Curl self via tailscale IP ==="
          TS_IP=$(tailscale ip -4 2>/dev/null | head -1)
          echo "TS_IP=$TS_IP"
          curl -skI --connect-timeout 8 --resolve auth-qa.databaes.net:443:${TS_IP} https://auth-qa.databaes.net/ || true
          curl -skI --connect-timeout 8 --resolve signoz-qa.databaes.net:443:${TS_IP} https://signoz-qa.databaes.net/ || true
          echo
          echo "=== Backend reachability ==="
          curl -sS -o /dev/null -w 'auth-root %{http_code}\n' --connect-timeout 8 http://192.168.30.75:9000/ || true
          curl -sS -o /dev/null -w 'auth-outpost %{http_code}\n' --connect-timeout 8 http://192.168.30.75:9000/outpost.goauthentik.io/auth/traefik || true
          curl -sS -o /dev/null -w 'signoz-root %{http_code}\n' --connect-timeout 8 http://192.168.30.91:8081/ || true
          echo
          echo "=== Traefik access log tail for qa ==="
          docker logs traefik --tail 80 2>&1 | grep -E 'auth-qa|signoz-qa' | tail -20 || true
          ENDSSH

      - name: Cleanup
        if: always()
        run: rm -f /tmp/traefik_dbg_key
