name: Configure Vault OIDC

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string

jobs:
  configure:
    runs-on: self-hosted
    steps:
      - name: Check SSO is deployed — skip if not
        id: check-sso
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ENV="${{ inputs.environment }}"
          if ! vault kv get secret/sso/${ENV}/active-slot > /dev/null 2>&1; then
            echo "SSO not yet deployed for ${ENV} — skipping OIDC configuration"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch SSH keys and resolve IPs
        if: steps.check-sso.outputs.skip != 'true'
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/vault_ct_worker \
            | awk 'NF > 0' > /tmp/vault_ct_key
          chmod 600 /tmp/vault_ct_key

          vault kv get -field=private_key secret/ssh_keys/sso_worker \
            | awk 'NF > 0' > /tmp/sso_key
          chmod 600 /tmp/sso_key

          case "${{ inputs.environment }}" in
            dev)
              VAULT_IP=$(vault kv get -field=ip secret/vault-ct/dev/active-slot)
              SSO_IP=$(vault kv get -field=ip secret/sso/dev/active-slot)
              echo "VAULT_ADDR=http://${VAULT_IP}:8200" >> $GITHUB_ENV
              ;;
            prod)
              VAULT_IP=$(vault kv get -field=ip secret/vault-ct/prod/active-slot)
              SSO_IP=$(vault kv get -field=ip secret/sso/prod/active-slot)
              echo "VAULT_ADDR=http://${VAULT_IP}:8200" >> $GITHUB_ENV
              ;;
          esac
          echo "VAULT_IP=$VAULT_IP" >> $GITHUB_ENV
          echo "SSO_IP=$SSO_IP" >> $GITHUB_ENV

      - name: Generate root token on vault CT
        if: steps.check-sso.outputs.skip != 'true'
        run: |
          ROOT_TOKEN=$(ssh -i /tmp/vault_ct_key -o StrictHostKeyChecking=no root@"$VAULT_IP" bash <<'ENDSSH'
          export VAULT_ADDR=http://127.0.0.1:8200

          # Fast path: root token still in init file from first deploy
          if [ -f /root/vault-init.json ]; then
            python3 -c "import json; print(json.load(open('/root/vault-init.json'))['root_token'])"
            exit 0
          fi

          # Slow path: generate-root using the stored unseal keys (threshold=2)
          INIT=$(vault operator generate-root -init -format=json)
          NONCE=$(echo "$INIT" | python3 -c "import sys,json; print(json.load(sys.stdin)['nonce'])")
          OTP=$(echo "$INIT"   | python3 -c "import sys,json; print(json.load(sys.stdin)['otp'])")
          mapfile -t KEYS < /etc/vault.d/.unseal_keys
          RESULT=""
          for KEY in "${KEYS[@]}"; do
            RESULT=$(printf '%s' "$KEY" | vault operator generate-root -nonce="$NONCE" -format=json -)
          done
          ENCODED=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['encoded_root_token'])")
          vault operator generate-root -decode="$ENCODED" -otp="$OTP"
          ENDSSH
          )
          echo "::add-mask::$ROOT_TOKEN"
          echo "VAULT_TOKEN=$ROOT_TOKEN" >> $GITHUB_ENV

      - name: Patch discovery_url to public HTTPS URL
        if: steps.check-sso.outputs.skip != 'true'
        run: |
          case "${{ inputs.environment }}" in
            dev)  PUBLIC_SSO_URL="https://auth-dev.databaes.net" ;;
            prod) PUBLIC_SSO_URL="https://auth.databaes.net"     ;;
          esac
          # Vault validates the discovery_url by fetching it server-to-server.
          # The Vault CT has internet access via the Cloudflare Tunnel on the
          # network-vm, so the public HTTPS URL is reachable. Using it ensures
          # the discovery doc returns https:// authorization_endpoint URLs so
          # browsers are redirected to the correct public OIDC endpoints.
          vault kv patch secret/authentik/vault-oidc \
            discovery_url="${PUBLIC_SSO_URL}/application/o/vault/"
          echo "Patched discovery_url → ${PUBLIC_SSO_URL}/application/o/vault/"

      - name: Configure Vault OIDC auth method
        if: steps.check-sso.outputs.skip != 'true'
        run: |
          CLIENT_ID=$(vault kv get -field=client_id secret/authentik/vault-oidc)
          CLIENT_SECRET=$(vault kv get -field=client_secret secret/authentik/vault-oidc)
          DISCOVERY_URL=$(vault kv get -field=discovery_url secret/authentik/vault-oidc)
          SSO_IP=$(vault kv get -field=sso_ip secret/authentik/vault-oidc)

          echo "::add-mask::$CLIENT_SECRET"
          echo "Discovery URL: $DISCOVERY_URL"
          echo "SSO IP: $SSO_IP"

          # Enable OIDC auth method if not already enabled
          if ! vault auth list -format=json 2>/dev/null | grep -q '"oidc/"'; then
            vault auth enable oidc
            echo "Enabled OIDC auth method"
          else
            echo "OIDC auth method already enabled"
          fi

          # Configure OIDC
          vault write auth/oidc/config \
            oidc_discovery_url="$DISCOVERY_URL" \
            oidc_client_id="$CLIENT_ID" \
            oidc_client_secret="$CLIENT_SECRET" \
            default_role="admin"
          echo "OIDC config written"

          # Create admin policy
          vault policy write admin - <<'EOF'
          path "*" {
            capabilities = ["create", "read", "update", "delete", "list", "sudo"]
          }
          EOF
          echo "Admin policy written"

          # Create OIDC admin role with all redirect URIs (IPs + domain)
          vault write auth/oidc/role/admin \
            bound_audiences="$CLIENT_ID" \
            allowed_redirect_uris="http://192.168.20.45:8200/ui/vault/auth/oidc/oidc/callback" \
            allowed_redirect_uris="http://192.168.20.46:8200/ui/vault/auth/oidc/oidc/callback" \
            allowed_redirect_uris="http://192.168.10.45:8200/ui/vault/auth/oidc/oidc/callback" \
            allowed_redirect_uris="http://192.168.10.46:8200/ui/vault/auth/oidc/oidc/callback" \
            allowed_redirect_uris="https://vault-dev.databaes.net/ui/vault/auth/oidc/oidc/callback" \
            allowed_redirect_uris="https://vault.databaes.net/ui/vault/auth/oidc/oidc/callback" \
            allowed_redirect_uris="http://localhost:8250/oidc/callback" \
            allowed_redirect_uris="http://localhost:8200/oidc/callback" \
            user_claim="sub" \
            policies="admin" \
            ttl="12h"
          echo "Admin OIDC role written"

      - name: Update Authentik redirect_uris
        if: steps.check-sso.outputs.skip != 'true'
        run: |
          SSO_IP=$(vault kv get -field=sso_ip secret/authentik/vault-oidc)
          echo "SSO IP: $SSO_IP"

          # Get a fresh API token from Authentik via docker exec directly
          FRESH_TOKEN=$(ssh -i /tmp/sso_key -o StrictHostKeyChecking=no root@"$SSO_IP" \
            "docker exec authentik-server ak shell --command \
              \"from authentik.core.models import Token, TokenIntents, User; u=User.objects.get(username='akadmin'); t,_=Token.objects.get_or_create(identifier='bootstrap-api-token',defaults={'user':u,'intent':TokenIntents.INTENT_API,'expiring':False}); print(t.key)\"" 2>/dev/null \
          )

          if [ -z "$FRESH_TOKEN" ]; then
            echo "Could not get fresh token from Authentik — skipping redirect_uris update (IP-based URIs from original SSO deploy are still valid)"
            exit 0
          fi
          echo "::add-mask::$FRESH_TOKEN"

          # Find the vault provider (search all, match case-insensitively on name containing "vault")
          PROVIDER_RESP=$(curl -s "http://${SSO_IP}:9000/api/v3/providers/oauth2/" \
            -H "Authorization: Bearer $FRESH_TOKEN")
          echo "Providers found: $(echo "$PROVIDER_RESP" | python3 -c "import sys,json; [print(r['pk'], r['name']) for r in json.load(sys.stdin)['results']]" 2>/dev/null)"
          PROVIDER_UUID=$(echo "$PROVIDER_RESP" | python3 -c \
            "import sys,json; results=[r for r in json.load(sys.stdin)['results'] if 'vault' in r['name'].lower()]; print(results[0]['pk'] if results else '')" 2>/dev/null || echo "")

          if [ -z "$PROVIDER_UUID" ]; then
            echo "Vault OAuth2 provider not found in Authentik — skipping"
            exit 0
          fi
          echo "Vault provider UUID: $PROVIDER_UUID"

          # Patch redirect_uris
          PATCH_RESULT=$(curl -s -X PATCH \
            "http://${SSO_IP}:9000/api/v3/providers/oauth2/${PROVIDER_UUID}/" \
            -H "Authorization: Bearer $FRESH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "redirect_uris": [
                {"url": "http://192.168.20.45:8200/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "http://192.168.20.46:8200/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "http://192.168.10.45:8200/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "http://192.168.10.46:8200/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "https://vault-dev.databaes.net/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "https://vault.databaes.net/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "http://localhost:8250/oidc/callback", "matching_mode": "strict"},
                {"url": "http://localhost:8200/oidc/callback", "matching_mode": "strict"}
              ]
            }')
          echo "$PATCH_RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print('Updated OK — provider:', r.get('pk'))" \
            || echo "PATCH response: $PATCH_RESULT"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/vault_ct_key /tmp/sso_key
