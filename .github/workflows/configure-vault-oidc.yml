name: Configure Vault OIDC

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

jobs:
  configure:
    runs-on: self-hosted
    steps:
      - name: Fetch SSH key and resolve vault IP
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_DEV_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/vault_ct_worker \
            | awk 'NF > 0' > /tmp/vault_ct_key
          chmod 600 /tmp/vault_ct_key

          case "${{ inputs.environment }}" in
            dev)
              VAULT_IP=$(vault kv get -field=ip secret/vault-ct/dev/active-slot)
              echo "VAULT_ADDR=http://${VAULT_IP}:8200" >> $GITHUB_ENV
              ;;
            prod)
              VAULT_IP=$(vault kv get -field=ip secret/vault-ct/prod/active-slot)
              echo "VAULT_ADDR=http://${VAULT_IP}:8200" >> $GITHUB_ENV
              ;;
          esac
          echo "VAULT_IP=$VAULT_IP" >> $GITHUB_ENV

      - name: Generate root token on vault CT
        run: |
          ROOT_TOKEN=$(ssh -i /tmp/vault_ct_key -o StrictHostKeyChecking=no root@"$VAULT_IP" bash <<'ENDSSH'
          export VAULT_ADDR=http://127.0.0.1:8200

          # Fast path: root token still in init file from first deploy
          if [ -f /root/vault-init.json ]; then
            python3 -c "import json; print(json.load(open('/root/vault-init.json'))['root_token'])"
            exit 0
          fi

          # Slow path: generate-root using the stored unseal keys (threshold=2)
          INIT=$(vault operator generate-root -init -format=json)
          NONCE=$(echo "$INIT" | python3 -c "import sys,json; print(json.load(sys.stdin)['nonce'])")
          OTP=$(echo "$INIT"   | python3 -c "import sys,json; print(json.load(sys.stdin)['otp'])")
          mapfile -t KEYS < /etc/vault.d/.unseal_keys
          RESULT=""
          for KEY in "${KEYS[@]}"; do
            RESULT=$(printf '%s' "$KEY" | vault operator generate-root -nonce="$NONCE" -format=json -)
          done
          ENCODED=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['encoded_root_token'])")
          vault operator generate-root -decode="$ENCODED" -otp="$OTP"
          ENDSSH
          )
          echo "::add-mask::$ROOT_TOKEN"
          echo "VAULT_TOKEN=$ROOT_TOKEN" >> $GITHUB_ENV

      - name: Configure Vault OIDC auth method
        run: |
          CLIENT_ID=$(vault kv get -field=client_id secret/authentik/vault-oidc)
          CLIENT_SECRET=$(vault kv get -field=client_secret secret/authentik/vault-oidc)
          DISCOVERY_URL=$(vault kv get -field=discovery_url secret/authentik/vault-oidc)
          SSO_IP=$(vault kv get -field=sso_ip secret/authentik/vault-oidc)

          echo "::add-mask::$CLIENT_SECRET"
          echo "Discovery URL: $DISCOVERY_URL"
          echo "SSO IP: $SSO_IP"

          # Enable OIDC auth method if not already enabled
          if ! vault auth list -format=json 2>/dev/null | grep -q '"oidc/"'; then
            vault auth enable oidc
            echo "Enabled OIDC auth method"
          else
            echo "OIDC auth method already enabled"
          fi

          # Configure OIDC
          vault write auth/oidc/config \
            oidc_discovery_url="$DISCOVERY_URL" \
            oidc_client_id="$CLIENT_ID" \
            oidc_client_secret="$CLIENT_SECRET" \
            default_role="admin"
          echo "OIDC config written"

          # Create admin policy
          vault policy write admin - <<'EOF'
          path "*" {
            capabilities = ["create", "read", "update", "delete", "list", "sudo"]
          }
          EOF
          echo "Admin policy written"

          # Create OIDC admin role with all redirect URIs (IPs + domain)
          vault write auth/oidc/role/admin \
            bound_audiences="$CLIENT_ID" \
            allowed_redirect_uris="http://192.168.50.245:8200/ui/vault/auth/oidc/oidc/callback" \
            allowed_redirect_uris="http://192.168.50.246:8200/ui/vault/auth/oidc/oidc/callback" \
            allowed_redirect_uris="http://192.168.50.145:8200/ui/vault/auth/oidc/oidc/callback" \
            allowed_redirect_uris="http://192.168.50.146:8200/ui/vault/auth/oidc/oidc/callback" \
            allowed_redirect_uris="https://vault-dev.databaes.net/ui/vault/auth/oidc/oidc/callback" \
            allowed_redirect_uris="https://vault.databaes.net/ui/vault/auth/oidc/oidc/callback" \
            allowed_redirect_uris="http://localhost:8250/oidc/callback" \
            allowed_redirect_uris="http://localhost:8200/oidc/callback" \
            user_claim="sub" \
            policies="admin" \
            ttl="12h"
          echo "Admin OIDC role written"

      - name: Update Authentik redirect_uris
        run: |
          SSO_IP=$(vault kv get -field=sso_ip secret/authentik/vault-oidc)
          echo "SSO IP: $SSO_IP"

          BOOTSTRAP_TOKEN=$(vault kv get -field=bootstrap_token secret/sso 2>/dev/null || echo "")
          if [ -z "$BOOTSTRAP_TOKEN" ]; then
            echo "No bootstrap token in secret/sso — skipping Authentik redirect_uris update"
            exit 0
          fi
          echo "::add-mask::$BOOTSTRAP_TOKEN"
          echo "Bootstrap token found (${#BOOTSTRAP_TOKEN} chars)"

          # Find the vault provider — show full response for debugging
          PROVIDER_RESP=$(curl -s "http://${SSO_IP}:9000/api/v3/providers/oauth2/?name=vault" \
            -H "Authorization: Token $BOOTSTRAP_TOKEN")
          echo "Provider search response: $PROVIDER_RESP" | head -c 500

          PROVIDER_UUID=$(echo "$PROVIDER_RESP" | python3 -c \
            "import sys,json; results=json.load(sys.stdin)['results']; print(results[0]['pk'] if results else '')" 2>/dev/null || echo "")

          if [ -z "$PROVIDER_UUID" ]; then
            echo "Vault OAuth2 provider not found — trying name=Vault (capital V)"
            PROVIDER_RESP=$(curl -s "http://${SSO_IP}:9000/api/v3/providers/oauth2/" \
              -H "Authorization: Token $BOOTSTRAP_TOKEN")
            echo "All providers: $PROVIDER_RESP" | head -c 1000
            exit 1
          fi

          echo "Vault provider UUID: $PROVIDER_UUID"

          # Patch redirect_uris
          PATCH_RESULT=$(curl -s -X PATCH \
            "http://${SSO_IP}:9000/api/v3/providers/oauth2/${PROVIDER_UUID}/" \
            -H "Authorization: Token $BOOTSTRAP_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "redirect_uris": [
                {"url": "http://192.168.50.245:8200/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "http://192.168.50.246:8200/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "http://192.168.50.145:8200/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "http://192.168.50.146:8200/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "https://vault-dev.databaes.net/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "https://vault.databaes.net/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "http://localhost:8250/oidc/callback", "matching_mode": "strict"},
                {"url": "http://localhost:8200/oidc/callback", "matching_mode": "strict"}
              ]
            }')
          echo "$PATCH_RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print('Updated OK — provider:', r.get('pk'))" \
            || echo "PATCH failed: $PATCH_RESULT"
