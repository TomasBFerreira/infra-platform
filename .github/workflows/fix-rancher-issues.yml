name: Fix Rancher Issues

# Fix two specific problems:
#   1. Prod worker-node-gpu-01 stuck in "Upgrading" (Rancher keeps re-pushing SUC Plans)
#   2. Dev worker-node-01 not appearing in dev Rancher (dev Rancher down + stuck pod)
#
# Usage:
#   gh workflow run fix-rancher-issues.yml

on:
  workflow_dispatch:

jobs:

  # ── Prod: clear Rancher "Upgrading" state ──────────────────────────────────
  fix-prod-upgrading:
    runs-on: [self-hosted, prod]
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      NODE_IP: 192.168.10.21
      RANCHER_IP: 192.168.10.2
      RANCHER_HOSTNAME: rancher.databaes.net
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to persistent clone
        run: |
          cd /app/infra-platform
          git fetch origin
          git checkout main
          git reset --hard origin/main

      - name: Fetch SSH key from Vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/worker_node_worker \
            | awk 'NF > 0' > /tmp/worker_node_key
          chmod 600 /tmp/worker_node_key

      - name: Diagnose + clear prod Rancher Upgrading state
        run: |
          ssh-keygen -R "${NODE_IP}" || true
          ansible-playbook \
            -i "${NODE_IP}," \
            -v \
            --private-key /tmp/worker_node_key \
            -e "ansible_host=${NODE_IP}" \
            -e "ansible_user=root" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            -e "rancher_ip=${RANCHER_IP}" \
            -e "rancher_hostname=${RANCHER_HOSTNAME}" \
            ansible/worker-node/fix-rancher-upgrading-loop.yml

      - name: Cleanup
        if: always()
        run: rm -f /tmp/worker_node_key

  # ── Dev: restart Rancher + unblock stuck agent pod ─────────────────────────
  fix-dev-rancher-and-agent:
    runs-on: [self-hosted, dev]
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      RANCHER_IP: 192.168.20.2
      WORKER_IP: 192.168.20.11
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to persistent clone
        run: |
          cd /app/infra-platform
          git fetch origin
          git checkout main
          git reset --hard origin/main

      - name: Fetch SSH keys from Vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/rancher_worker \
            | python3 -c "import sys,textwrap; raw=sys.stdin.read().strip().replace('\r',''); B='-----BEGIN OPENSSH PRIVATE KEY-----'; E='-----END OPENSSH PRIVATE KEY-----'; body=raw[raw.find(B)+len(B):raw.find(E)].replace(' ','').replace('\n','').replace('\t',''); print(B); print(textwrap.fill(body,width=70)); print(E)" \
            > /tmp/rancher_key
          chmod 600 /tmp/rancher_key

          vault kv get -field=private_key secret/ssh_keys/worker_node_worker \
            | awk 'NF > 0' > /tmp/worker_node_key
          chmod 600 /tmp/worker_node_key

      - name: Restart dev Rancher
        run: |
          ssh-keygen -R "${RANCHER_IP}" || true
          ansible-playbook \
            -i "${RANCHER_IP}," \
            -v \
            --private-key /tmp/rancher_key \
            -e "ansible_host=${RANCHER_IP}" \
            -e "ansible_user=root" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            ansible/worker-node/restart-rancher.yml

      - name: Force-delete stuck cattle-cluster-agent pod on dev worker
        run: |
          ssh-keygen -R "${WORKER_IP}" || true
          ansible-playbook \
            -i "${WORKER_IP}," \
            -v \
            --private-key /tmp/worker_node_key \
            -e "ansible_host=${WORKER_IP}" \
            -e "ansible_user=root" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            ansible/worker-node/fix-stuck-agent-pod.yml

      - name: Cleanup
        if: always()
        run: rm -f /tmp/rancher_key /tmp/worker_node_key
