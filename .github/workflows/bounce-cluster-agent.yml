name: Bounce Cluster Agent (Reset Backoff)

# Deletes the cattle-cluster-agent pod so the deployment recreates it fresh.
# Use when the agent pod is Running but not connecting to Rancher — typically
# happens after multiple Rancher restarts put the agent into a long backoff loop.
# Does NOT restart Rancher.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'prod'
        type: choice
        options: [prod, dev]
      node_ip:
        description: 'Worker node IP'
        required: true
        default: '192.168.10.21'

jobs:
  bounce-agent:
    runs-on: [self-hosted, "${{ inputs.environment }}"]
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      NODE_IP: ${{ inputs.node_ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code
        run: |
          cd /app/infra-platform
          git fetch origin && git checkout main && git reset --hard origin/main

      - name: Fetch worker SSH key from Vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          vault kv get -field=private_key secret/ssh_keys/worker_node_worker \
            | awk 'NF > 0' > /tmp/worker_key
          chmod 600 /tmp/worker_key
          ssh-keygen -l -f /tmp/worker_key > /dev/null 2>&1 || {
            vault kv get -field=private_key secret/ssh_keys/worker_node_worker \
              | python3 -c "import sys,textwrap,re; raw=sys.stdin.read(); raw=raw.replace('\\\\n','\n').replace('\\\\r','').replace('\r',''); B='-----BEGIN OPENSSH PRIVATE KEY-----'; E='-----END OPENSSH PRIVATE KEY-----'; bi=raw.find(B); ei=raw.find(E); body=re.sub(r'\s+','',raw[bi+len(B):ei]); print(B); print(textwrap.fill(body,width=64)); print(E)" \
              > /tmp/worker_key
            chmod 600 /tmp/worker_key
          }

      - name: Bounce cluster agent pod
        run: |
          ssh-keygen -R "${NODE_IP}" || true
          ansible-playbook \
            -i "${NODE_IP}," -v \
            --private-key /tmp/worker_key \
            -e "ansible_host=${NODE_IP}" \
            -e "ansible_user=root" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            ansible/worker-node/bounce-cluster-agent.yml

      - name: Cleanup
        if: always()
        run: rm -f /tmp/worker_key
