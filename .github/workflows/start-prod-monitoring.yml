name: Start prod monitoring (LXC 196)

# One-shot recovery for the prod monitoring CT 196 (.96, green slot) when
# the CT is stopped/crashed. Models start-prod-network-vm.yml.
#
# Pre-flight:
#  - Confirms pct status 196 on betsy. If running, exits clean (no-op).
#  - If stopped, starts it and waits for SSH on 192.168.10.96.
#  - If notfound, FAILS — provisioning a fresh monitoring CT is not in scope
#    for a recovery workflow; that path goes through the monitoring pipeline.
#
# Post-start:
#  - SSHes in, dumps docker ps for visibility.
#  - If the otel-monitoring compose project is present but not all containers
#    are up, runs `docker compose up -d` against /opt/monitoring.
#  - Curls grafana /api/health locally on the CT for a final check.

on:
  workflow_dispatch:

jobs:
  start:
    runs-on: [self-hosted, prod]
    steps:
      - name: Fetch monitoring SSH private key from Vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          V="${VAULT_ADDR}"
          if [[ "$V" != http://* && "$V" != https://* ]]; then
            V="http://${V}"
          fi
          export VAULT_ADDR="$V"

          mkdir -p /tmp/mon-recover && chmod 700 /tmp/mon-recover
          vault kv get -field=private_key secret/ssh_keys/monitoring_worker \
            | awk 'NF > 0' > /tmp/mon-recover/mon_key
          chmod 600 /tmp/mon-recover/mon_key
          echo "fetched monitoring_worker key ($(wc -c </tmp/mon-recover/mon_key) bytes)"

      - name: Start LXC 196 on betsy if needed
        env:
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          set -euo pipefail
          PVE_USER_SHORT=$(echo "$PVE_USER" | cut -d'@' -f1)

          echo "=== pct status 196 on betsy ==="
          STATUS=$(ssh -o StrictHostKeyChecking=no \
            ${PVE_USER_SHORT}@192.168.50.2 \
            "pct status 196 2>/dev/null || echo 'notfound'")
          echo "LXC 196: $STATUS"

          if echo "$STATUS" | grep -q "running"; then
            echo "LXC 196 already running — no start needed"
          elif echo "$STATUS" | grep -q "stopped"; then
            echo "LXC 196 is stopped — starting..."
            ssh -o StrictHostKeyChecking=no \
              ${PVE_USER_SHORT}@192.168.50.2 "pct start 196"
            echo "started"
          elif echo "$STATUS" | grep -q "notfound"; then
            echo "ERROR: LXC 196 not found on betsy."
            echo "Provisioning is out of scope for this recovery workflow."
            echo "Use monitoring_pipeline_self_hosted.yml with env=prod."
            exit 1
          else
            echo "ERROR: unexpected pct status output: $STATUS"
            exit 1
          fi

          echo "=== Waiting for SSH on 192.168.10.96 ==="
          for i in $(seq 1 30); do
            sleep 5
            if nc -zw3 192.168.10.96 22 2>/dev/null; then
              echo "SSH reachable after ${i}x5s"
              break
            fi
            echo "  attempt $i/30 — not yet reachable"
          done
          nc -zw5 192.168.10.96 22 \
            || { echo "ERROR: 192.168.10.96 still unreachable on :22"; exit 1; }

      - name: Force-reboot CT 196 to clear wedged userspace
        # Prior run confirmed PVE thinks 196 is running but `pct exec 196 -- hostname`
        # hung for 7m+ — kernel is up, userspace is wedged (likely hung NFS mount or
        # OOM/D-state cascade). `pct stop` is the equivalent of yanking power; it
        # SIGKILLs the lxc-init and frees the userspace deadlock. Then we restart.
        env:
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          set -uo pipefail
          PVE_USER_SHORT=$(echo "$PVE_USER" | cut -d'@' -f1)
          BETSY_SSH="ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${PVE_USER_SHORT}@192.168.50.2"

          echo "=== pct stop 196 (force) ==="
          $BETSY_SSH "pct stop 196" 2>&1 || echo "(pct stop returned non-zero — proceeding)"

          sleep 5
          echo "=== post-stop status ==="
          $BETSY_SSH "pct status 196"

          echo ""
          echo "=== pct start 196 ==="
          $BETSY_SSH "pct start 196"

          sleep 8
          $BETSY_SSH "pct status 196"

          echo ""
          echo "=== wait for SSH banner exchange (post-boot, up to 3min) ==="
          SSH_PROBE_OPTS="-i /tmp/mon-recover/mon_key -o StrictHostKeyChecking=no -o ConnectTimeout=4 -o BatchMode=yes"
          SSH_OK=0
          for i in $(seq 1 36); do
            sleep 5
            RESP=$(timeout 6 ssh ${SSH_PROBE_OPTS} root@192.168.10.96 \
              "echo SSH_OK" 2>/dev/null || echo "")
            if [ "$RESP" = "SSH_OK" ]; then
              echo "SSH alive after ${i}x5s"
              SSH_OK=1
              break
            fi
            echo "  attempt $i/36 — not yet"
          done

          if [ "$SSH_OK" != "1" ]; then
            echo "ERROR: SSH on 192.168.10.96 did not come back after reboot"
            echo "--- pct exec hostname probe (10s timeout) ---"
            timeout 10 $BETSY_SSH "pct exec 196 -- hostname" 2>&1 || echo "(pct exec hung again)"
            exit 1
          fi

      - name: Bring up docker-compose monitoring stack
        run: |
          set -uo pipefail
          SSH_OPTS="-i /tmp/mon-recover/mon_key -o StrictHostKeyChecking=no -o ConnectTimeout=10"

          echo "=== Container identity (post-boot) ==="
          ssh ${SSH_OPTS} root@192.168.10.96 "hostname; hostname -I; uptime"

          echo ""
          echo "=== docker daemon ==="
          ssh ${SSH_OPTS} root@192.168.10.96 "systemctl is-active docker; docker ps -a --format 'table {{.Names}}\t{{.Status}}' | head -20"

          echo ""
          echo "=== NFS mounts present? ==="
          ssh ${SSH_OPTS} root@192.168.10.96 "mount | grep -E 'nfs|monitoring' || echo '(no nfs mounts found)'"

          echo ""
          echo "=== docker compose up -d ==="
          ssh ${SSH_OPTS} root@192.168.10.96 bash <<'EOF'
          set -e
          if [ ! -f /opt/monitoring/docker-compose.yml ]; then
            echo "ERROR: no /opt/monitoring/docker-compose.yml — stack not present, need full deploy"
            exit 1
          fi
          cd /opt/monitoring
          docker compose up -d 2>&1 | tail -30
          sleep 10
          docker compose ps 2>&1 | tail -30
          EOF

      - name: Verify Grafana /api/health
        run: |
          SSH_OPTS="-i /tmp/mon-recover/mon_key -o StrictHostKeyChecking=no -o ConnectTimeout=10"
          echo "=== local probe on the CT ==="
          for i in $(seq 1 24); do
            sleep 5
            CODE=$(ssh ${SSH_OPTS} root@192.168.10.96 \
              "curl -sS -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:3000/api/health" 2>/dev/null || echo "000")
            echo "  attempt $i/24: HTTP ${CODE}"
            if [ "$CODE" = "200" ]; then
              echo "Grafana healthy on localhost"
              break
            fi
          done
          echo ""
          echo "=== external probe (Cloudflare → Traefik → backend) ==="
          for i in $(seq 1 6); do
            sleep 5
            EXT_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 8 https://grafana.databaes.net/api/health 2>/dev/null || echo "000")
            echo "  external attempt $i/6: HTTP ${EXT_CODE}"
            [ "$EXT_CODE" = "200" ] && exit 0
          done
          echo "WARN: external still not 200 (backend may be coming up; Traefik will see healthy on next poll)"

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/mon-recover
