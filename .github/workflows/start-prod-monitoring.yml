name: Start prod monitoring (LXC 196)

# One-shot recovery for the prod monitoring CT 196 (.96, green slot) when
# the CT is stopped/crashed. Models start-prod-network-vm.yml.
#
# Pre-flight:
#  - Confirms pct status 196 on betsy. If running, exits clean (no-op).
#  - If stopped, starts it and waits for SSH on 192.168.10.96.
#  - If notfound, FAILS — provisioning a fresh monitoring CT is not in scope
#    for a recovery workflow; that path goes through the monitoring pipeline.
#
# Post-start:
#  - SSHes in, dumps docker ps for visibility.
#  - If the otel-monitoring compose project is present but not all containers
#    are up, runs `docker compose up -d` against /opt/monitoring.
#  - Curls grafana /api/health locally on the CT for a final check.

on:
  workflow_dispatch:

jobs:
  start:
    runs-on: [self-hosted, prod]
    steps:
      - name: Fetch monitoring SSH private key from Vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          V="${VAULT_ADDR}"
          if [[ "$V" != http://* && "$V" != https://* ]]; then
            V="http://${V}"
          fi
          export VAULT_ADDR="$V"

          mkdir -p /tmp/mon-recover && chmod 700 /tmp/mon-recover
          vault kv get -field=private_key secret/ssh_keys/monitoring_worker \
            | awk 'NF > 0' > /tmp/mon-recover/mon_key
          chmod 600 /tmp/mon-recover/mon_key
          echo "fetched monitoring_worker key ($(wc -c </tmp/mon-recover/mon_key) bytes)"

      - name: Start LXC 196 on betsy if needed
        env:
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          set -euo pipefail
          PVE_USER_SHORT=$(echo "$PVE_USER" | cut -d'@' -f1)

          echo "=== pct status 196 on betsy ==="
          STATUS=$(ssh -o StrictHostKeyChecking=no \
            ${PVE_USER_SHORT}@192.168.50.2 \
            "pct status 196 2>/dev/null || echo 'notfound'")
          echo "LXC 196: $STATUS"

          if echo "$STATUS" | grep -q "running"; then
            echo "LXC 196 already running — no start needed"
          elif echo "$STATUS" | grep -q "stopped"; then
            echo "LXC 196 is stopped — starting..."
            ssh -o StrictHostKeyChecking=no \
              ${PVE_USER_SHORT}@192.168.50.2 "pct start 196"
            echo "started"
          elif echo "$STATUS" | grep -q "notfound"; then
            echo "ERROR: LXC 196 not found on betsy."
            echo "Provisioning is out of scope for this recovery workflow."
            echo "Use monitoring_pipeline_self_hosted.yml with env=prod."
            exit 1
          else
            echo "ERROR: unexpected pct status output: $STATUS"
            exit 1
          fi

          echo "=== Waiting for SSH on 192.168.10.96 ==="
          for i in $(seq 1 30); do
            sleep 5
            if nc -zw3 192.168.10.96 22 2>/dev/null; then
              echo "SSH reachable after ${i}x5s"
              break
            fi
            echo "  attempt $i/30 — not yet reachable"
          done
          nc -zw5 192.168.10.96 22 \
            || { echo "ERROR: 192.168.10.96 still unreachable on :22"; exit 1; }

      - name: Inspect docker + grafana health on monitoring-lxc
        run: |
          set -euo pipefail
          SSH_OPTS="-i /tmp/mon-recover/mon_key -o StrictHostKeyChecking=no -o ConnectTimeout=10"

          echo "=== Container identity ==="
          ssh ${SSH_OPTS} root@192.168.10.96 "hostname && hostname -I"

          echo ""
          echo "=== docker ps ==="
          ssh ${SSH_OPTS} root@192.168.10.96 \
            "docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}' 2>&1 || echo '(docker not responding)'"

          echo ""
          echo "=== docker ps -a (any crashed) ==="
          ssh ${SSH_OPTS} root@192.168.10.96 \
            "docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.RunningFor}}' 2>&1 | head -20 || true"

          echo ""
          echo "=== /opt/monitoring contents ==="
          ssh ${SSH_OPTS} root@192.168.10.96 \
            "ls -la /opt/monitoring/ 2>&1 | head -20"

          echo ""
          echo "=== compose state (if compose project present, check + bring up missing) ==="
          ssh ${SSH_OPTS} root@192.168.10.96 bash <<'EOF'
          set -e
          if [ -f /opt/monitoring/docker-compose.yml ]; then
            cd /opt/monitoring
            echo "--- docker compose ps ---"
            docker compose ps 2>&1 || true
            echo ""
            echo "--- bringing up missing/stopped services ---"
            docker compose up -d 2>&1 || echo "(compose up returned non-zero)"
          else
            echo "(no /opt/monitoring/docker-compose.yml — stack not present, needs full deploy)"
          fi
          EOF

          echo ""
          echo "=== Grafana /api/health (local, give it 60s to come up) ==="
          for i in $(seq 1 12); do
            sleep 5
            CODE=$(ssh ${SSH_OPTS} root@192.168.10.96 \
              "curl -sS -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:3000/api/health" 2>/dev/null || echo "000")
            echo "  attempt $i/12: HTTP ${CODE}"
            if [ "$CODE" = "200" ]; then
              echo "Grafana healthy"
              exit 0
            fi
          done
          echo "WARN: Grafana not returning 200 from localhost yet — may still be starting."
          echo "Run otel-monitoring/validate-monitoring.yml for env=prod to re-check."

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/mon-recover
