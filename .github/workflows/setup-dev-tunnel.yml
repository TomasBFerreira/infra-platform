name: Setup dev Cloudflare tunnel

on:
  workflow_dispatch:

# Stores the dev tunnel token in the bootstrap vault, then triggers traefik-gitops
# backfill to move all *-dev CNAMEs to the dev tunnel.

jobs:
  setup:
    runs-on: self-hosted
    steps:
      - name: Store dev tunnel token in bootstrap vault
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
          DEV_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_DEV_TUNNEL_TOKEN }}
        run: |
          vault kv put secret/cloudflare/dev-tunnel \
            token="$DEV_TUNNEL_TOKEN" \
            hostname="80b044ef-7217-4215-8e4f-b3c9d59add34.cfargotunnel.com"
          echo "Stored dev tunnel credentials in bootstrap vault at secret/cloudflare/dev-tunnel"

      - name: Trigger traefik-gitops backfill to update dev CNAMEs
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run backfill-dns.yml \
            --repo TomasBFerreira/traefik-gitops
          echo "Triggered backfill-dns — *-dev CNAMEs will move to dev tunnel"