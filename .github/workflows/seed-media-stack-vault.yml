name: Seed Media-Stack Vault Secrets

on:
  workflow_dispatch:
    inputs:
      qb_username:
        description: 'qBittorrent WebUI username'
        required: false
        default: 'admin'
      qb_password:
        description: 'qBittorrent WebUI password'
        required: true
      plex_claim:
        description: 'Plex claim token (optional — get from plex.tv/claim, leave blank to skip)'
        required: false
        default: ''

jobs:
  seed:
    runs-on: [self-hosted, dev]
    env:
      VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
    steps:
      - name: Normalise Vault address
        run: |
          VAULT_ADDR_NORM="${VAULT_ADDR}"
          if [[ "${VAULT_ADDR_NORM}" != http://* && "${VAULT_ADDR_NORM}" != https://* ]]; then
            VAULT_ADDR_NORM="http://${VAULT_ADDR_NORM}"
          fi
          echo "VAULT_ADDR=${VAULT_ADDR_NORM}" >> $GITHUB_ENV

      - name: Seed media-stack/api-keys (placeholder UUIDs)
        run: |
          # Generate placeholder 32-char hex API keys (same format apps use internally).
          # After first deploy the apps generate their own keys — extract and update vault.
          RADARR_KEY=$(python3 -c "import uuid; print(uuid.uuid4().hex)")
          SONARR_KEY=$(python3 -c "import uuid; print(uuid.uuid4().hex)")
          PROWLARR_KEY=$(python3 -c "import uuid; print(uuid.uuid4().hex)")
          OVERSEERR_KEY=$(python3 -c "import uuid; print(uuid.uuid4().hex)")
          vault kv put secret/media-stack/api-keys \
            radarr_api_key="${RADARR_KEY}" \
            sonarr_api_key="${SONARR_KEY}" \
            prowlarr_api_key="${PROWLARR_KEY}" \
            overseerr_api_key="${OVERSEERR_KEY}"
          echo "Written secret/media-stack/api-keys (placeholder keys)"

      - name: Seed qbittorrent credentials
        env:
          QB_USERNAME: ${{ github.event.inputs.qb_username }}
          QB_PASSWORD: ${{ github.event.inputs.qb_password }}
        run: |
          vault kv put secret/qbittorrent \
            username="${QB_USERNAME}" \
            password="${QB_PASSWORD}"
          echo "Written secret/qbittorrent"

      - name: Seed media-stack/plex claim token
        env:
          PLEX_CLAIM: ${{ github.event.inputs.plex_claim }}
        run: |
          vault kv put secret/media-stack/plex \
            claim_token="${PLEX_CLAIM}"
          echo "Written secret/media-stack/plex (claim_token='${PLEX_CLAIM:-<empty>}')"

      - name: Verify secrets written
        run: |
          echo "=== media-stack/api-keys ==="
          vault kv get -format=json secret/media-stack/api-keys \
            | python3 -c "import sys,json; d=json.load(sys.stdin)['data']['data']; [print(f'{k}: {v[:8]}...') for k,v in d.items()]"
          echo "=== qbittorrent ==="
          vault kv get -format=json secret/qbittorrent \
            | python3 -c "import sys,json; d=json.load(sys.stdin)['data']['data']; [print(f'{k}: {v}') for k,v in d.items()]"
          echo "=== media-stack/plex ==="
          vault kv get secret/media-stack/plex
