name: Update AdGuard Rewrites (no reprovision)

# Applies the adguard Ansible role to the ACTIVE adguard-lxc slot without
# running Terraform or the full blue/green pipeline. Use this after
# config-only changes (adguard_*_rewrites, HOSTNAME_RE regex, etc.) when
# you want to push the change to the existing CT instead of paying the
# cost of a blue/green flip.
#
# Mirror of update-network-vm-services.yml but for the adguard-lxc fleet.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, prod, qa]
        default: dev

jobs:
  update-rewrites:
    runs-on: [self-hosted, "${{ inputs.environment }}"]
    env:
      ENV: ${{ inputs.environment }}
      VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      # Slot state lives under bootstrap vault; DEV_TOKEN is dev-scoped and
      # gets 403 on qa/prod paths. Use the bootstrap root token so this
      # workflow works for every env.
      VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve active adguard-lxc IP from Vault
        run: |
          ACTIVE_IP=$(vault kv get -field=ip secret/adguard/${ENV}/active-slot)
          echo "ACTIVE_IP=${ACTIVE_IP}" >> $GITHUB_ENV
          echo "Active adguard-lxc IP: ${ACTIVE_IP}"

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml
          pip3 install hvac --quiet --break-system-packages

      - name: Fetch SSH key from Vault
        run: |
          vault kv get -field=private_key secret/ssh_keys/adguard_worker \
            | awk 'NF > 0' > /tmp/adguard_key_${GITHUB_RUN_ID}
          chmod 600 /tmp/adguard_key_${GITHUB_RUN_ID}
          echo "SSH_KEY_PATH=/tmp/adguard_key_${GITHUB_RUN_ID}" >> $GITHUB_ENV

      - name: Fetch AdGuard credentials from bootstrap vault
        run: |
          ADGUARD_USER=$(vault kv get -field=username secret/adguard 2>/dev/null || echo "")
          ADGUARD_PASS=$(vault kv get -field=password secret/adguard 2>/dev/null || echo "")
          echo "::add-mask::$ADGUARD_PASS"
          echo "ADGUARD_USER=$ADGUARD_USER" >> $GITHUB_ENV
          echo "ADGUARD_PASS=$ADGUARD_PASS" >> $GITHUB_ENV

      - name: Run Ansible (adguard role only)
        run: |
          ssh-keygen -R "${ACTIVE_IP}" || true
          ansible-playbook \
            -i "${ACTIVE_IP}," \
            -v \
            -e "ansible_host=${ACTIVE_IP}" \
            -e "ansible_user=root" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no -i ${SSH_KEY_PATH}'" \
            -e "adguard_username=$ADGUARD_USER" \
            -e "adguard_password=$ADGUARD_PASS" \
            -e "deploy_env=${ENV}" \
            ansible/adguard/update-rewrites.yml

      - name: Cleanup
        if: always()
        run: rm -f ${SSH_KEY_PATH} /tmp/adguard_key_* 2>/dev/null || true

  update-tailscale-dns:
    needs: update-rewrites
    # Runs on GitHub-hosted to reach api.tailscale.com without hitting the
    # outbound TLS quirk on env-runner → adguard-lxc egress path.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh Tailscale split-DNS for databaes.net
        env:
          TAILSCALE_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
          TAILSCALE_TAILNET: ${{ secrets.TAILSCALE_TAILNET }}
        run: |
          chmod +x scripts/update-tailscale-split-dns.sh
          scripts/update-tailscale-split-dns.sh
