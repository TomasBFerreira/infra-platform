name: Update Network-VM Services (no reprovision)

# Applies traefik + adguard Ansible roles to the ACTIVE network-vm slot
# without running Terraform or the full blue/green pipeline.
# Use this after config-only changes (traefik.yml, services.yml, ACME token, etc.)
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, prod, qa]
        default: dev

jobs:
  update-services:
    runs-on: [self-hosted, "${{ inputs.environment }}"]
    env:
      ENV: ${{ inputs.environment }}
      VAULT_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      # VAULT_DEV_TOKEN is dev-scoped and gets 403 on `secret/network-vm/prod/active-slot`.
      # Use the bootstrap root token so this workflow works for all envs (the slot state
      # paths under bootstrap vault are shared infra, intentionally readable by root).
      VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout traefik-gitops (so Ansible can copy services.yml)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ ! -d /app/traefik-gitops ]; then
            git clone https://x-access-token:${GH_PAT}@github.com/TomasBFerreira/traefik-gitops /app/traefik-gitops
          else
            git -C /app/traefik-gitops remote set-url origin https://x-access-token:${GH_PAT}@github.com/TomasBFerreira/traefik-gitops
            git -C /app/traefik-gitops pull --ff-only
          fi
          git -C /app/traefik-gitops remote set-url origin https://github.com/TomasBFerreira/traefik-gitops

      - name: Resolve active network-vm IP from Vault
        run: |
          ACTIVE_IP=$(vault kv get -field=ip secret/network-vm/${ENV}/active-slot)
          echo "ACTIVE_IP=${ACTIVE_IP}" >> $GITHUB_ENV
          echo "Active network-vm IP: ${ACTIVE_IP}"

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml
          pip3 install hvac --quiet --break-system-packages

      - name: Fetch SSH key from Vault
        run: |
          vault kv get -field=private_key secret/ssh_keys/network_vm_worker \
            | awk 'NF > 0' > /tmp/network_vm_key_${GITHUB_RUN_ID}
          chmod 600 /tmp/network_vm_key_${GITHUB_RUN_ID}
          echo "SSH_KEY_PATH=/tmp/network_vm_key_${GITHUB_RUN_ID}" >> $GITHUB_ENV

      - name: Fetch secrets from Vault
        env:
          VAULT_BOOTSTRAP_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_ROOT_TOKEN }}
        run: |
          ADGUARD_USER=$(vault kv get -field=username secret/adguard 2>/dev/null || echo "")
          ADGUARD_PASS=$(vault kv get -field=password secret/adguard 2>/dev/null || echo "")
          # collector_endpoint is a computed convenience field only populated on dev.
          # Fall back to `<ip>:4317` (always present under active-slot) for qa/prod
          # and for any env where the field hasn't been seeded.
          # Also treat a literal "${...}" value as unset — prod had the unexpanded
          # placeholder "${OTEL_COLLECTOR_ENDPOINT}" stored there on 2026-04-23
          # which slipped past the -z check and disabled Traefik telemetry until
          # PR #176 added a Jinja guard downstream.
          OTEL_ENDPOINT=$(vault kv get -field=collector_endpoint secret/monitoring/${ENV}/active-slot 2>/dev/null || echo "")
          if [ -z "$OTEL_ENDPOINT" ] || [[ "$OTEL_ENDPOINT" == \$\{*\} ]]; then
            MON_IP=$(vault kv get -field=ip secret/monitoring/${ENV}/active-slot 2>/dev/null || echo "")
            [ -n "$MON_IP" ] && OTEL_ENDPOINT="${MON_IP}:4317"
          fi
          # CF DNS token lives at a path the DEV token may not access — use bootstrap token
          CF_DNS_TOKEN=$(VAULT_TOKEN="$VAULT_BOOTSTRAP_TOKEN" vault kv get -field=dns_api_token secret/cloudflare 2>/dev/null || echo "")
          echo "::add-mask::$ADGUARD_PASS"
          echo "::add-mask::$CF_DNS_TOKEN"
          echo "ADGUARD_USER=$ADGUARD_USER" >> $GITHUB_ENV
          echo "ADGUARD_PASS=$ADGUARD_PASS" >> $GITHUB_ENV
          echo "OTEL_ENDPOINT=$OTEL_ENDPOINT" >> $GITHUB_ENV
          echo "CF_DNS_TOKEN=$CF_DNS_TOKEN" >> $GITHUB_ENV

      - name: Run Ansible (traefik + adguard roles only)
        run: |
          ssh-keygen -R "${ACTIVE_IP}" || true
          ansible-playbook \
            -i "${ACTIVE_IP}," \
            -v \
            -e "ansible_host=${ACTIVE_IP}" \
            -e "ansible_user=root" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no -i ${SSH_KEY_PATH}'" \
            -e "adguard_username=$ADGUARD_USER" \
            -e "adguard_password=$ADGUARD_PASS" \
            -e "otel_collector_endpoint=$OTEL_ENDPOINT" \
            -e "deploy_env=${ENV}" \
            -e "cf_dns_api_token=$CF_DNS_TOKEN" \
            ansible/network-vm/update-services.yml

      - name: Restart Traefik to apply static config changes
        run: |
          ssh -i ${SSH_KEY_PATH} -o StrictHostKeyChecking=no root@${ACTIVE_IP} \
            "cd /opt/traefik && docker compose restart traefik && echo 'Traefik restarted OK'"

      - name: Update Tailscale routes and exit node advertisement
        env:
          SUBNETS: "192.168.10.0/24,192.168.20.0/24,192.168.30.0/24,192.168.50.0/24"
        run: |
          ssh -i ${SSH_KEY_PATH} -o StrictHostKeyChecking=no root@${ACTIVE_IP} \
            "tailscale up --advertise-routes=${SUBNETS} --advertise-exit-node || true"
          echo "Tailscale routes + exit node updated"

      - name: Cleanup
        if: always()
        run: rm -f ${SSH_KEY_PATH} /tmp/network_vm_key_* 2>/dev/null || true

  update-tailscale-dns:
    needs: update-services
    # Runs on GitHub-hosted to reach api.tailscale.com without hitting the
    # outbound TLS quirk on env-runner → network-vm egress path.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh Tailscale split-DNS for databaes.net
        env:
          TAILSCALE_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
          TAILSCALE_TAILNET: ${{ secrets.TAILSCALE_TAILNET }}
        run: |
          chmod +x scripts/update-tailscale-split-dns.sh
          scripts/update-tailscale-split-dns.sh
