name: Configure Bootstrap Vault OIDC

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'dev'
        type: choice
        options: [dev, qa, prod]
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'dev'
        type: string

jobs:
  configure:
    runs-on: [self-hosted, management]
    steps:
      - name: Check SSO is deployed — skip if not
        id: check-sso
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          if ! vault kv get secret/authentik/${ENV}/vault-oidc > /dev/null 2>&1; then
            echo "SSO OIDC credentials not yet seeded — skipping bootstrap vault OIDC config"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Read OIDC credentials from bootstrap vault
        if: steps.check-sso.outputs.skip != 'true'
        id: oidc-creds
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          CLIENT_ID=$(vault kv get -field=client_id secret/authentik/${ENV}/vault-oidc)
          CLIENT_SECRET=$(vault kv get -field=client_secret secret/authentik/${ENV}/vault-oidc)
          echo "::add-mask::$CLIENT_SECRET"
          echo "client_id=$CLIENT_ID"    >> $GITHUB_OUTPUT
          echo "client_secret=$CLIENT_SECRET" >> $GITHUB_OUTPUT
          case "$ENV" in
            dev)  AUTH_HOST="auth-dev.databaes.net" ;;
            qa)   AUTH_HOST="auth-qa.databaes.net"  ;;
            prod) AUTH_HOST="auth.databaes.net"     ;;
          esac
          echo "discovery_url=https://${AUTH_HOST}/application/o/vault/" >> $GITHUB_OUTPUT

      - name: Obtain root token via pct exec on bootstrap vault CT
        if: steps.check-sso.outputs.skip != 'true'
        id: root-token
        env:
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ROOT_TOKEN=$(ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@192.168.50.4 \
            "pct exec 200 -- python3 -c \"import json; print(json.load(open('/root/vault-init.json'))['root_token'])\"")
          echo "::add-mask::$ROOT_TOKEN"
          echo "root_token=$ROOT_TOKEN" >> $GITHUB_OUTPUT

      - name: Patch Authentik Vault provider — add bootstrap vault redirect URI
        if: steps.check-sso.outputs.skip != 'true'
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
        run: |
          SSO_IP=$(vault kv get -field=ip secret/sso/dev/active-slot)

          # Fetch SSO container SSH key
          vault kv get -field=private_key secret/ssh_keys/sso_worker \
            | awk 'NF > 0' > /tmp/bs_sso_key
          chmod 600 /tmp/bs_sso_key

          # Get a fresh Authentik API token via docker exec
          FRESH_TOKEN=$(ssh -i /tmp/bs_sso_key -o StrictHostKeyChecking=no root@"$SSO_IP" \
            "docker exec authentik-server ak shell --command \
              \"from authentik.core.models import Token, TokenIntents, User; u=User.objects.get(username='akadmin'); t,_=Token.objects.get_or_create(identifier='bootstrap-api-token',defaults={'user':u,'intent':TokenIntents.INTENT_API,'expiring':False}); print(t.key)\"" 2>/dev/null)

          if [ -z "$FRESH_TOKEN" ]; then
            echo "Could not get Authentik token — skipping redirect_uri patch"
            exit 0
          fi
          echo "::add-mask::$FRESH_TOKEN"

          # Find the Vault OAuth2 provider
          PROVIDER_PK=$(curl -s "http://${SSO_IP}:9000/api/v3/providers/oauth2/" \
            -H "Authorization: Bearer $FRESH_TOKEN" \
            | python3 -c "import sys,json; rs=[r for r in json.load(sys.stdin)['results'] if 'vault' in r['name'].lower()]; print(rs[0]['pk'] if rs else '')" 2>/dev/null || echo "")

          if [ -z "$PROVIDER_PK" ]; then
            echo "Vault provider not found in Authentik — skipping"
            exit 0
          fi
          echo "Patching Vault provider pk=$PROVIDER_PK"

          curl -s -X PATCH \
            "http://${SSO_IP}:9000/api/v3/providers/oauth2/${PROVIDER_PK}/" \
            -H "Authorization: Bearer $FRESH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "redirect_uris": [
                {"url": "http://192.168.50.200:8200/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "http://192.168.20.45:8200/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "http://192.168.20.46:8200/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "http://192.168.10.45:8200/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "http://192.168.10.46:8200/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "https://vault-dev.databaes.net/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "https://vault.databaes.net/ui/vault/auth/oidc/oidc/callback", "matching_mode": "strict"},
                {"url": "http://localhost:8250/oidc/callback", "matching_mode": "strict"},
                {"url": "http://localhost:8200/oidc/callback", "matching_mode": "strict"}
              ]
            }' | python3 -c "import sys,json; r=json.load(sys.stdin); print('Patched OK — pk:', r.get('pk'))" \
            || echo "PATCH failed"

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/bs_sso_key

      - name: Inject network-VM hosts entry into bootstrap vault CT
        if: steps.check-sso.outputs.skip != 'true'
        env:
          VAULT_ADDR:  ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
          PVE_USER:    ${{ secrets.PVE_USER }}
        run: |
          # The bootstrap vault CT (192.168.50.200) has no route to auth hostnames
          # (management subnet has no direct path to Cloudflare edge or service subnets).
          # Resolve the auth hostname using the active network-VM IP so Traefik
          # serves HTTPS for the domain at a reachable internal address.
          ENV="${{ inputs.environment || 'dev' }}"
          case "$ENV" in
            dev) AUTH_HOST="auth-dev.databaes.net"; NW_FALLBACK="192.168.20.55" ;;
            qa)  AUTH_HOST="auth-qa.databaes.net";  NW_FALLBACK="192.168.30.55" ;;
            *)   AUTH_HOST="auth.databaes.net";     NW_FALLBACK="" ;;
          esac
          NETWORK_VM_IP=$(vault kv get -field=ip secret/network-vm/${ENV}/active-slot 2>/dev/null || echo "$NW_FALLBACK")
          if [ -z "$NETWORK_VM_IP" ]; then
            echo "Could not resolve active ${ENV} network-VM IP — skipping hosts injection"
          else
            PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
            echo "Injecting $NETWORK_VM_IP $AUTH_HOST into CT 200 /etc/hosts"
            ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@192.168.50.4 \
              "pct exec 200 -- bash -c 'grep -q $AUTH_HOST /etc/hosts && sed -i \"/$AUTH_HOST/d\" /etc/hosts; echo \"${NETWORK_VM_IP} $AUTH_HOST\" >> /etc/hosts'"
          fi

      - name: Configure OIDC auth method on bootstrap vault
        if: steps.check-sso.outputs.skip != 'true'
        env:
          VAULT_ADDR:  http://192.168.50.200:8200
          VAULT_TOKEN: ${{ steps.root-token.outputs.root_token }}
          CLIENT_ID:     ${{ steps.oidc-creds.outputs.client_id }}
          CLIENT_SECRET: ${{ steps.oidc-creds.outputs.client_secret }}
          DISCOVERY_URL: ${{ steps.oidc-creds.outputs.discovery_url }}
        run: |
          # Enable OIDC auth if not already active
          if ! vault auth list -format=json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if 'oidc/' in d else 1)" 2>/dev/null; then
            vault auth enable oidc
            echo "Enabled OIDC auth method"
          else
            echo "OIDC auth method already enabled"
          fi

          # Write OIDC config
          vault write auth/oidc/config \
            oidc_discovery_url="$DISCOVERY_URL" \
            oidc_client_id="$CLIENT_ID" \
            oidc_client_secret="$CLIENT_SECRET" \
            default_role="admin"
          echo "OIDC config written"

          # Ensure admin policy covers everything
          vault policy write admin - <<'EOF'
          path "*" {
            capabilities = ["create", "read", "update", "delete", "list", "sudo"]
          }
          EOF
          echo "Admin policy written"

          # Create/update admin OIDC role
          vault write auth/oidc/role/admin \
            bound_audiences="$CLIENT_ID" \
            allowed_redirect_uris="http://192.168.50.200:8200/ui/vault/auth/oidc/oidc/callback" \
            allowed_redirect_uris="http://localhost:8250/oidc/callback" \
            allowed_redirect_uris="http://localhost:8200/oidc/callback" \
            user_claim="sub" \
            policies="admin" \
            ttl="12h"
          echo "Admin OIDC role written"
          echo "Bootstrap vault OIDC configured — login at http://192.168.50.200:8200 via OIDC"

      - name: Remove injected hosts entry from bootstrap vault CT
        if: always() && steps.check-sso.outputs.skip != 'true'
        env:
          PVE_USER: ${{ secrets.PVE_USER }}
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          case "$ENV" in
            dev) AUTH_HOST="auth-dev.databaes.net" ;;
            qa)  AUTH_HOST="auth-qa.databaes.net"  ;;
            *)   AUTH_HOST="auth.databaes.net"     ;;
          esac
          PVE_SSH_USER=$(echo "$PVE_USER" | cut -d'@' -f1)
          ssh -o StrictHostKeyChecking=no ${PVE_SSH_USER}@192.168.50.4 \
            "pct exec 200 -- sed -i '/$AUTH_HOST/d' /etc/hosts" 2>/dev/null || true
