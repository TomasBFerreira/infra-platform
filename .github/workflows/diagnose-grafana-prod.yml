name: Diagnose Grafana (prod)
on:
  workflow_dispatch:
    inputs:
      environment: { description: env, required: true, default: 'prod', type: choice, options: [prod, qa, dev] }
jobs:
  diag:
    runs-on: [self-hosted, "${{ inputs.environment }}"]
    env:
      ENVIRONMENT: ${{ inputs.environment }}
      VAULT_BOOTSTRAP_ADDR: ${{ secrets.VAULT_BOOTSTRAP_ADDR }}
      VAULT_DEV_TOKEN: ${{ secrets.VAULT_DEV_TOKEN }}
    steps:
      - name: resolve
        run: |
          case "$ENVIRONMENT" in
            prod) EV="${{ secrets.VAULT_PROD_ADDR }}"; ET="${{ secrets.VAULT_PROD_TOKEN }}"; echo "MON_IP=192.168.10.96" >> "$GITHUB_ENV" ;;
            qa) EV="${{ secrets.VAULT_QA_ADDR }}"; ET="${{ secrets.VAULT_QA_TOKEN }}"; echo "MON_IP=192.168.30.92" >> "$GITHUB_ENV" ;;
            dev) EV="${{ secrets.VAULT_ADDR }}"; ET="${{ secrets.VAULT_TOKEN }}"; echo "MON_IP=192.168.20.96" >> "$GITHUB_ENV" ;;
          esac
          AK_IP=$(vault kv get -field=ip secret/sso/$ENVIRONMENT/active-slot)
          AK_TOKEN=$(VAULT_ADDR="$EV" VAULT_TOKEN="$ET" vault kv get -field=bootstrap_token secret/sso)
          echo "::add-mask::$AK_TOKEN"; echo "AK_IP=$AK_IP" >> "$GITHUB_ENV"; echo "AK_TOKEN=$AK_TOKEN" >> "$GITHUB_ENV"
        env: { VAULT_ADDR: "${{ secrets.VAULT_BOOTSTRAP_ADDR }}", VAULT_TOKEN: "${{ secrets.VAULT_DEV_TOKEN }}" }
      - name: ssh key
        run: vault kv get -field=private_key secret/ssh_keys/monitoring_worker | awk 'NF>0' > /tmp/k; chmod 600 /tmp/k
        env: { VAULT_ADDR: "${{ secrets.VAULT_BOOTSTRAP_ADDR }}", VAULT_TOKEN: "${{ secrets.VAULT_DEV_TOKEN }}" }
      - name: diagnose
        run: |
          S="ssh -i /tmp/k -o StrictHostKeyChecking=no root@${MON_IP}"
          echo "=== docker ps ==="; $S "docker ps -a --format '{{.Names}}\t{{.Status}}' | grep -iE 'grafana|graf' || docker ps -a --format '{{.Names}}\t{{.Status}}'"
          echo "=== grafana /api/health (on CT) ==="; $S "curl -s -o /dev/null -w '%{http_code}\n' --max-time 8 http://localhost:3000/api/health || echo unreachable"
          echo "=== grafana container logs (errors) ==="; $S "docker logs --tail 60 grafana 2>&1 | grep -iE 'error|oauth|oidc|fail|panic|token|client' | tail -25 || echo 'no grafana container named grafana'"
          echo "=== grafana OIDC client_id (container env) ==="; $S "docker inspect grafana 2>/dev/null | grep -iE 'GENERIC_OAUTH_CLIENT_ID|GENERIC_OAUTH_ENABLED|OAUTH_AUTH_URL' | head"
          echo "=== Authentik grafana provider client_id ==="
          curl -s "http://${AK_IP}:9000/api/v3/providers/oauth2/?name=Grafana" -H "Authorization: Bearer ${AK_TOKEN}" | python3 -c "import sys,json;r=json.load(sys.stdin).get('results',[]);print('client_id=',r[0].get('client_id') if r else 'NO PROVIDER')"
          rm -f /tmp/k
